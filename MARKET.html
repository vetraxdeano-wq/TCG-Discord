<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Marché des Échanges — Discord TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0d0f;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
  .card-thumb{width:52px;height:78px;overflow:hidden;flex-shrink:0;position:relative;border:2px solid #000;}
  .card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .badge-owned{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.5);color:#22c55e;font-size:7px;font-weight:900;padding:1px 5px;letter-spacing:.4px;text-transform:uppercase;}
  .badge-missing{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:#ef4444;font-size:7px;font-weight:900;padding:1px 5px;letter-spacing:.4px;text-transform:uppercase;}
  .stand-card{background:#16181f;border:3px solid #000;overflow:hidden;transition:border-color .15s;}
  .stand-card:hover{border-color:#333;}
  .my-stand-card{border:3px solid #fbbf24;background:#1a1710;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fade-in{animation:fadeIn .3s ease both;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#a78bfa;animation:spin .7s linear infinite;border-radius:50%;}
  /* Bouton musique */
  #mkt-music-btn{position:fixed;bottom:20px;right:16px;z-index:500;display:flex;align-items:center;gap:5px;padding:6px 11px 6px 9px;background:rgba(14,12,9,.88);border:2px solid rgba(251,191,36,.35);box-shadow:2px 2px 0 #000;cursor:pointer;backdrop-filter:blur(6px);transition:border-color .18s;}
  #mkt-music-btn:hover{border-color:rgba(251,191,36,.7);}
  .card-invalid{opacity:.45;filter:grayscale(1);}
  .badge-invalid{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:#ef4444;font-size:7px;font-weight:900;padding:1px 5px;letter-spacing:.4px;text-transform:uppercase;}
</style>
</head>
<body>

<div id="mkt-yt-player" style="position:fixed;bottom:-200px;left:-200px;width:1px;height:1px;pointer-events:none;opacity:0;"></div>
<button id="mkt-music-btn" onclick="window._mktTogglePopup(event)" title="Musique">
  <span id="mkt-music-icon" style="font-size:13px;line-height:1;">🔊</span>
  <span id="mkt-music-label" style="font-family:'Luckiest Guy',cursive;font-size:9px;letter-spacing:.12em;color:#9d8ea0;">MUSIQUE</span>
</button>

<!-- TOP BAR -->
<div id="topbar" style="position:sticky;top:0;z-index:100;background:#0d0d0f;border-bottom:3px solid #000;display:flex;align-items:center;gap:12px;padding:12px 16px;padding-top:max(env(safe-area-inset-top,12px),12px);">
  <button onclick="history.back()" style="width:36px;height:36px;background:#16181f;border:2px solid #000;color:#94a3b8;font-size:16px;display:flex;align-items:center;justify-content:center;">←</button>
  <div style="flex:1;">
    <div style="font-family:'Luckiest Guy',cursive;font-size:16px;letter-spacing:1.5px;color:#fbbf24;">🛒 MARCHÉ DES ÉCHANGES</div>
    <div style="font-size:9px;color:#64748b;margin-top:1px;">Trouvez des partenaires d'échange · Créez votre stand</div>
  </div>
  <button id="btn-my-stand" style="padding:6px 14px;background:rgba(251,191,36,.15);color:#fbbf24;border:2px solid rgba(251,191,36,.4);font-size:10px;font-weight:800;letter-spacing:.5px;display:none;">MON STAND</button>
</div>

<!-- MAIN -->
<div id="app" style="padding:0 0 40px;">
  <div style="display:flex;align-items:center;justify-content:center;min-height:50vh;gap:14px;flex-direction:column;">
    <div class="spinner"></div>
    <div style="font-size:11px;color:#64748b;">Connexion…</div>
  </div>
</div>

<!-- MODAL STAND EDITOR -->
<div id="modal-stand" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);overflow-y:auto;padding:20px;padding-bottom:max(env(safe-area-inset-bottom,20px),20px);">
  <div style="max-width:500px;margin:0 auto;background:#16181f;border:3px solid #000;box-shadow:6px 6px 0 #000;">
    <div style="height:3px;background:linear-gradient(90deg,#fbbf24,#f43f5e,#fbbf24);"></div>
    <div style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:2px solid #000;">
      <div style="font-family:'Luckiest Guy',cursive;font-size:14px;color:#fbbf24;flex:1;">MON STAND</div>
      <button onclick="closeStandModal()" style="width:30px;height:30px;background:#1e2130;border:2px solid #000;color:#94a3b8;font-size:13px;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>
    <div style="padding:16px;">

      <!-- J'OFFRE -->
      <div style="margin-bottom:14px;">
        <div style="font-size:10px;font-weight:900;color:#22c55e;letter-spacing:.8px;margin-bottom:6px;">🟢 CARTES QUE JE PROPOSE (doublons)</div>
        <div style="font-size:9px;color:#64748b;margin-bottom:6px;">IDs séparés par des virgules · ex: 001,042,107</div>
        <textarea id="input-offer" placeholder="001, 042, 107, 255…" rows="3" style="width:100%;background:#0d0d0f;border:2px solid #333;color:#e2e8f0;padding:8px 10px;font-size:11px;resize:vertical;outline:none;"></textarea>
        <div id="offer-preview" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:6px;"></div>
      </div>

      <!-- JE RECHERCHE -->
      <div style="margin-bottom:16px;">
        <div style="font-size:10px;font-weight:900;color:#ef4444;letter-spacing:.8px;margin-bottom:6px;">🔴 CARTES QUE JE RECHERCHE</div>
        <div style="font-size:9px;color:#64748b;margin-bottom:6px;">IDs séparés par des virgules</div>
        <textarea id="input-want" placeholder="003, 088, 201…" rows="3" style="width:100%;background:#0d0d0f;border:2px solid #333;color:#e2e8f0;padding:8px 10px;font-size:11px;resize:vertical;outline:none;"></textarea>
        <div id="want-preview" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:6px;"></div>
      </div>

      <div style="display:flex;gap:8px;">
        <button id="btn-save-stand" style="flex:1;padding:11px;background:#fbbf24;color:#000;border:none;font-size:12px;font-weight:900;letter-spacing:.5px;">💾 ENREGISTRER</button>
        <button id="btn-delete-stand" style="padding:11px 16px;background:transparent;color:#ef4444;border:2px solid rgba(239,68,68,.4);font-size:12px;font-weight:800;">🗑</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ndsnbvvcbkblkncvoroc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kc25idnZjYmtibGtuY3Zvcm9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NjczMTksImV4cCI6MjA4ODU0MzMxOX0.mMsaBIrDI3BIoeTFBsCXo2AbuBLRnzqk625fKRkYCtM';
const CARD_BACK = 'https://i.goopics.net/iic46c.png';

let db, currentUser, myCards = new Set(), allCards = [], stands = [], myStand = null;

const RARITY_COLOR = {common:'#94a3b8',uncommon:'#22d3ee',rare:'#a78bfa',mythic:'#fbbf24'};
const RARITY_LABEL = {common:'Commune',uncommon:'Peu Commune',rare:'Rare',mythic:'Mythique'};

async function init(){
  // Attendre Supabase avec timeout max 10s
  let _t = 0;
  while(!window.supabase?.createClient && _t < 100){ await sleep(100); _t++; }
  if(!window.supabase?.createClient){
    render('<div style="text-align:center;padding:40px 20px;color:#ef4444;"><div style="font-size:24px;margin-bottom:10px;">⚠️</div><div style="font-size:12px;">Impossible de charger Supabase.<br>Vérifie ta connexion internet.</div><br><button onclick="location.reload()" style="padding:9px 20px;background:#a78bfa;color:#000;border:none;font-size:11px;font-weight:800;">↺ Réessayer</button></div>');
    return;
  }
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:true, detectSessionInUrl: true}});

  let session = null;
  try{
    const res = await db.auth.getSession();
    session = res.data?.session;
  }catch(e){ console.error('[MARKET] getSession error', e); }

  if(!session?.user){
    render('<div style="text-align:center;padding:40px 20px;"><div style="font-size:32px;margin-bottom:10px;">🔒</div><div style="font-size:13px;color:#94a3b8;">Connecte-toi depuis l'index pour accéder au marché.</div><br><button onclick="history.back()" style="padding:9px 20px;background:#a78bfa;color:#000;border:none;font-size:11px;font-weight:800;">← Retour</button></div>');
    return;
  }
  currentUser = session.user;

  // Charger cartes du joueur
  const [cardsRes, ownedRes] = await Promise.all([
    db.from('cards').select('id,name,rarity,image_url,color').limit(2000),
    db.from('player_cards').select('card_id,quantity').eq('player_id', currentUser.id).limit(2000),
  ]);
  allCards = cardsRes.data || [];
  (ownedRes.data||[]).forEach(r => myCards.add(String(r.card_id)));

  // Assurer que la table market_stands existe (via insert silencieux)
  await loadStands();

  document.getElementById('btn-my-stand').style.display = 'flex';
  document.getElementById('btn-my-stand').addEventListener('click', openMyStand);

  // Inputs live preview
  document.getElementById('input-offer').addEventListener('input', () => updatePreview('offer'));
  document.getElementById('input-want').addEventListener('input', () => updatePreview('want'));
  document.getElementById('btn-save-stand').addEventListener('click', saveStand);
  document.getElementById('btn-delete-stand').addEventListener('click', deleteStand);

  renderStands();
}

// Wrapper global pour afficher les erreurs au lieu de rester sur "Connexion..."
const _rawInit = init;
init = async function(){
  try{ await _rawInit(); }
  catch(e){
    console.error('[MARKET] init error:', e);
    render('<div style="text-align:center;padding:40px;color:#ef4444;"><div style="font-size:24px;margin-bottom:8px;">⚠️</div><div style="font-size:12px;">'+e.message+'</div><br><button onclick="location.reload()" style="padding:8px 18px;background:#a78bfa;color:#000;border:none;font-size:11px;font-weight:800;">↺ Réessayer</button></div>');
  }
};

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function loadStands(){
  const { data } = await db
    .from('market_stands')
    .select('id,player_id,offer_ids,want_ids,updated_at,players(discord_username,avatar_url)')
    .order('updated_at',{ascending:false})
    .limit(100);
  stands = data || [];
  myStand = stands.find(s => s.player_id === currentUser.id) || null;
}

function getCard(id){
  return allCards.find(c => String(c.id) === String(id).padStart(3,'0') || String(parseInt(c.id)) === String(parseInt(id)));
}

// mode : 'offer' | 'want' | 'display'
// offer → montre PNG si possédée, invalide si non possédée
// want  → invalide si carte n'existe pas dans la collection générale
// display → affiche PNG si possédée par le viewer, dos sinon
function cardMini(id, mode = 'display'){
  const card  = getCard(id);
  const owned = card && (myCards.has(String(card.id)) || [...myCards].some(k=>parseInt(k)===parseInt(id)));
  const rarCol = card ? (RARITY_COLOR[card.rarity]||'#94a3b8') : '#64748b';

  if(mode === 'offer'){
    // Carte proposée : doit être possédée — afficher le vrai PNG
    const valid = owned && card;
    const imgSrc = (valid && card.image_url) ? card.image_url : CARD_BACK;
    return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;${valid?'':'opacity:.5'}">
      <div class="card-thumb" style="border-color:${valid?rarCol+'60':'#ef444440'};">
        <img src="${imgSrc}" alt="Carte #${id}" onerror="this.src='${CARD_BACK}'" />
      </div>
      <div style="font-size:7px;font-weight:700;color:${valid?rarCol:'#ef4444'};text-align:center;">#${parseInt(id)}</div>
      <div class="${valid?'badge-owned':'badge-invalid'}">${valid?'✓ Possédée':'✗ Non possédée'}</div>
    </div>`;
  }

  if(mode === 'want'){
    // Carte recherchée : doit exister dans la collection générale
    const exists = !!card;
    const imgSrc = (owned && card?.image_url) ? card.image_url : CARD_BACK;
    return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;${exists?'':'opacity:.5'}">
      <div class="card-thumb" style="border-color:${exists?rarCol+'60':'#ef444440'};">
        <img src="${exists?imgSrc:CARD_BACK}" alt="Carte #${id}" onerror="this.src='${CARD_BACK}'" />
      </div>
      <div style="font-size:7px;font-weight:700;color:${exists?rarCol:'#ef4444'};text-align:center;">#${parseInt(id)}</div>
      <div class="${exists?(owned?'badge-owned':'badge-missing'):'badge-invalid'}">${exists?(owned?'✓ Possédée':'✗ Manquante'):'✗ Inexistante'}</div>
    </div>`;
  }

  // mode 'display' — vue stand public
  const imgSrc = (owned && card?.image_url) ? card.image_url : CARD_BACK;
  return `
  <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;">
    <div class="card-thumb" style="border-color:${rarCol}40;">
      <img src="${imgSrc}" alt="Carte #${id}" onerror="this.src='${CARD_BACK}'" />
    </div>
    <div style="font-size:7px;font-weight:700;color:${rarCol};text-align:center;">#${parseInt(id)}</div>
    <div class="${owned?'badge-owned':'badge-missing'}">${owned?'✓ Possédée':'✗ Manquante'}</div>
  </div>`;
}

function renderStands(){
  const app = document.getElementById('app');
  if(stands.length === 0){
    app.innerHTML = `
    <div style="text-align:center;padding:50px 20px;">
      <div style="font-size:48px;opacity:.15;margin-bottom:12px;">🛒</div>
      <div style="font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:8px;">Aucun stand pour l'instant</div>
      <div style="font-size:11px;color:#475569;">Sois le premier à créer le tien !</div>
    </div>
    <div style="padding:0 16px;"><button onclick="openMyStand()" style="width:100%;padding:13px;background:#fbbf24;color:#000;border:none;font-size:13px;font-weight:900;letter-spacing:.5px;">🛒 CRÉER MON STAND</button></div>`;
    return;
  }

  const me = stands.find(s => s.player_id === currentUser.id);
  const others = stands.filter(s => s.player_id !== currentUser.id);

  let html = '<div style="padding:12px 14px 0;display:flex;flex-direction:column;gap:10px;">';

  // Bouton créer/modifier mon stand en haut
  if(!me){
    html += `<button onclick="openMyStand()" style="width:100%;padding:11px;background:rgba(251,191,36,.12);color:#fbbf24;border:2px dashed rgba(251,191,36,.4);font-size:11px;font-weight:800;letter-spacing:.5px;">+ CRÉER MON STAND</button>`;
  }

  // Mon stand d'abord
  if(me) html += renderStandCard(me, true);
  // Autres stands
  others.forEach(s => { html += renderStandCard(s, false); });

  html += '</div>';
  app.innerHTML = html;
}

function renderStandCard(stand, isMe){
  const player = stand.players || {};
  const avatar = player.avatar_url;
  const name = player.discord_username || 'Joueur';
  const offerIds = (stand.offer_ids || []).slice(0, 10);
  const wantIds  = (stand.want_ids  || []).slice(0, 10);
  const updated = new Date(stand.updated_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});

  return `
  <div class="stand-card ${isMe?'my-stand-card':''} fade-in">
    ${isMe ? '<div style="height:3px;background:linear-gradient(90deg,#fbbf24,#f59e0b,#fbbf24);"></div>' : '<div style="height:2px;background:#1e2130;"></div>'}
    <!-- Header joueur -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 8px;">
      <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;background:#1e2130;border:${isMe?'2px solid #fbbf24':'2px solid #000'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
        ${avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<span style=font-size:16px>👤</span>'" />` : '<span style="font-size:16px;">👤</span>'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:900;color:${isMe?'#fbbf24':'#e2e8f0'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}${isMe?' (Toi)':''}</div>
        <div style="font-size:9px;color:#475569;">Mis à jour le ${updated}</div>
      </div>
      ${isMe ? `<button onclick="openMyStand()" style="padding:5px 12px;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.4);font-size:9px;font-weight:800;">✏ MODIFIER</button>` : ''}
    </div>

    <!-- Offre -->
    <div style="padding:0 14px 10px;">
      <div style="font-size:9px;font-weight:900;color:#22c55e;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:5px;">
        <span>🟢</span> PROPOSE (${offerIds.length} carte${offerIds.length>1?'s':''})
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${offerIds.length ? offerIds.map(id => cardMini(id, isMe ? 'offer' : 'display')).join('') : '<div style="font-size:10px;color:#475569;font-style:italic;">Aucune carte proposée</div>'}
      </div>
    </div>

    <!-- Séparateur -->
    <div style="height:1px;background:#1e2130;margin:0 14px;"></div>

    <!-- Recherche -->
    <div style="padding:10px 14px 14px;">
      <div style="font-size:9px;font-weight:900;color:#ef4444;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:5px;">
        <span>🔴</span> RECHERCHE (${wantIds.length} carte${wantIds.length>1?'s':''})
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${wantIds.length ? wantIds.map(id => cardMini(id, 'want')).join('') : '<div style="font-size:10px;color:#475569;font-style:italic;">Aucune carte recherchée</div>'}
      </div>
    </div>
  </div>`;
}

function openMyStand(){
  const modal = document.getElementById('modal-stand');
  modal.style.display = 'block';
  if(myStand){
    document.getElementById('input-offer').value = (myStand.offer_ids||[]).join(', ');
    document.getElementById('input-want').value  = (myStand.want_ids||[]).join(', ');
    updatePreview('offer');
    updatePreview('want');
  } else {
    document.getElementById('input-offer').value = '';
    document.getElementById('input-want').value  = '';
    document.getElementById('offer-preview').innerHTML = '';
    document.getElementById('want-preview').innerHTML  = '';
  }
}

function closeStandModal(){
  document.getElementById('modal-stand').style.display = 'none';
}

function parseIds(raw){
  return raw.split(/[\s,;]+/).map(s=>s.trim().replace(/^0+/,'')).filter(s=>s && !isNaN(parseInt(s))).slice(0,20);
}

function updatePreview(type){
  const raw = document.getElementById('input-'+type).value;
  const ids = parseIds(raw);
  const preview = document.getElementById(type+'-preview');
  if(!ids.length){ preview.innerHTML=''; return; }
  const mode = type === 'offer' ? 'offer' : 'want';
  preview.innerHTML = ids.map(id=>cardMini(id, mode)).join('');

  // Message d'avertissement si IDs invalides
  const warn = document.getElementById(type+'-warn') || (() => {
    const el = document.createElement('div');
    el.id = type+'-warn';
    el.style.cssText = 'font-size:9px;color:#ef4444;margin-top:4px;';
    preview.after(el);
    return el;
  })();

  if(type === 'offer'){
    const invalid = ids.filter(id => {
      const card = getCard(id);
      const owned = card && (myCards.has(String(card.id)) || [...myCards].some(k=>parseInt(k)===parseInt(id)));
      return !owned;
    });
    warn.textContent = invalid.length ? `⚠ Cartes non possédées (ignorées à la sauvegarde) : ${invalid.map(id=>'#'+id).join(', ')}` : '';
  } else {
    const invalid = ids.filter(id => !getCard(id));
    warn.textContent = invalid.length ? `⚠ Cartes inexistantes (ignorées à la sauvegarde) : ${invalid.map(id=>'#'+id).join(', ')}` : '';
  }
}

async function saveStand(){
  const btn = document.getElementById('btn-save-stand');
  btn.disabled = true; btn.textContent = '⏳ Sauvegarde…';

  const rawOffer = parseIds(document.getElementById('input-offer').value);
  const rawWant  = parseIds(document.getElementById('input-want').value);

  // Filtrer : offre = uniquement cartes possédées
  const offerIds = rawOffer.filter(id => {
    const card = getCard(id);
    return card && (myCards.has(String(card.id)) || [...myCards].some(k=>parseInt(k)===parseInt(id)));
  });
  // Filtrer : recherche = uniquement cartes qui existent dans la collection générale
  const wantIds = rawWant.filter(id => !!getCard(id));

  if(offerIds.length === 0 && wantIds.length === 0){
    alert('Aucune carte valide à enregistrer.
Cartes proposées : uniquement celles que tu possèdes.
Cartes recherchées : uniquement celles qui existent.');
    btn.disabled = false; btn.textContent = '💾 ENREGISTRER';
    return;
  }

  const payload = {
    player_id: currentUser.id,
    offer_ids: offerIds,
    want_ids:  wantIds,
    updated_at: new Date().toISOString(),
  };

  if(myStand){
    await db.from('market_stands').update(payload).eq('id', myStand.id);
  } else {
    await db.from('market_stands').insert(payload);
  }

  await loadStands();
  closeStandModal();
  renderStands();
  btn.disabled = false; btn.textContent = '💾 ENREGISTRER';
}

async function deleteStand(){
  if(!myStand) return;
  if(!confirm('Supprimer ton stand ?')) return;
  await db.from('market_stands').delete().eq('id', myStand.id);
  await loadStands();
  closeStandModal();
  renderStands();
}

function render(html){ document.getElementById('app').innerHTML = html; }


// ═══════════════════════════════════════════════════════════════════
// MUSIQUE — PLAYLIST ALÉATOIRE depuis music_tracks (Supabase)
// ═══════════════════════════════════════════════════════════════════
(function(){
  let _player=null, _ready=false, _pending=false, _playing=false, _retry=null;
  let _tracks=[], _idx=-1;

  async function _loadPlaylist(){
    try{
      const {data,error}=await db.from('music_tracks').select('id,youtube_id,title,artist').order('id');
      if(!error&&data&&data.length){ _tracks=data; }
    }catch(e){}
  }
  function _pick(){
    if(!_tracks.length) return -1;
    if(_tracks.length===1) return 0;
    let i; do{ i=Math.floor(Math.random()*_tracks.length); }while(i===_idx);
    return i;
  }
  function _loadVol(){ try{ return parseInt(localStorage.getItem('music_volume')||'25'); }catch(e){ return 25; } }
  function _savePref(on,vol){
    try{ localStorage.setItem('music_on',on?'1':'0'); if(vol!==undefined) localStorage.setItem('music_volume',String(vol)); }catch(e){}
    try{
      if(currentUser){ const patch={music_on:on}; if(vol!==undefined) patch.music_volume=vol; db.from('players').update(patch).eq('id',currentUser.id).then(()=>{}).catch(()=>{}); }
    }catch(e){}
  }

  // API YT
  if(!window.YT||!window.YT.Player){
    const t=document.createElement('script'); t.src='https://www.youtube.com/iframe_api'; document.head.appendChild(t);
  } else { _ready=true; }
  const _prev=window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady=function(){
    if(_prev) _prev();
    _ready=true; _initPlayer();
  };

  function _initPlayer(){
    const el=document.getElementById('mkt-yt-player');
    if(!el||_player) return;
    _player=new YT.Player('mkt-yt-player',{
      videoId:'',
      playerVars:{autoplay:0,controls:0,loop:0,modestbranding:1,rel:0,playsinline:1,mute:0},
      events:{
        onReady:function(e){
          e.target.setVolume(_loadVol());
          if(_pending){ _pending=false; _playCurrent(); } else { try{e.target.pauseVideo();}catch(ex){} }
          _updateBtn();
        },
        onStateChange:function(e){
          if(!_playing) return;
          if(e.data===YT.PlayerState.ENDED){ _skipNext(); }
          else if(e.data===YT.PlayerState.PAUSED){ setTimeout(()=>{ if(_playing) try{_player.playVideo();}catch(ex){} },300); }
        },
        onError:function(){ if(_playing) setTimeout(_skipNext,1000); }
      }
    });
  }

  function _playCurrent(){
    if(!_player||_idx<0||_idx>=_tracks.length) return;
    try{ _player.loadVideoById({videoId:_tracks[_idx].youtube_id,suggestedQuality:'small'}); _updateTrack(); }catch(e){}
  }
  function _doPlay(){
    if(!_player) return;
    try{ const s=_player.getPlayerState?_player.getPlayerState():-1; if(s===1) return; _player.playVideo(); }catch(e){}
  }
  function _ensurePlay(){
    if(_retry) return;
    _retry=setInterval(()=>{
      if(!_playing){ clearInterval(_retry);_retry=null; return; }
      const s=_player?(_player.getPlayerState?_player.getPlayerState():-1):-1;
      if(s===1){ clearInterval(_retry);_retry=null; return; }
      _doPlay();
    },800);
    setTimeout(()=>{ if(_retry){ clearInterval(_retry);_retry=null; } },15000);
  }

  function _skipNext(){
    _idx=_pick();
    if(_idx<0) return;
    _playCurrent(); _ensurePlay(); _updateTrack();
  }
  window._mktSkip=function(){ _skipNext(); };

  function _updateTrack(){
    const titleEl=document.getElementById('mkt-track-title');
    const artistEl=document.getElementById('mkt-track-artist');
    if(_idx>=0&&_idx<_tracks.length){
      const t=_tracks[_idx];
      if(titleEl)  titleEl.textContent=t.title||'—';
      if(artistEl) artistEl.textContent=t.artist||'';
    }
  }

  function _start(){
    if(_playing) return;
    _playing=true; _savePref(true);
    if(!_ready||!_player){ _pending=true; if(_ready) _initPlayer(); return; }
    if(_idx<0) _idx=_pick();
    if(_tracks.length) _playCurrent(); else _doPlay();
    _ensurePlay(); _updateBtn();
  }
  function _stop(){
    _playing=false; _pending=false; _savePref(false);
    if(_retry){ clearInterval(_retry);_retry=null; }
    if(_player) try{_player.pauseVideo();}catch(e){}
    _updateBtn();
  }

  function _updateBtn(){
    const icon=document.getElementById('mkt-music-icon');
    const lbl=document.getElementById('mkt-music-label');
    const btn=document.getElementById('mkt-music-btn');
    if(icon)  icon.textContent=_playing?'🔊':'🔇';
    if(lbl)   lbl.textContent=_playing?'MUSIQUE':'MUET';
    if(btn)   btn.style.borderColor=_playing?'rgba(251,191,36,.6)':'rgba(251,191,36,.25)';
  }

  window._mktTogglePopup=function(e){
    if(e) e.stopPropagation();
    const existing=document.getElementById('mkt-music-popup');
    if(existing){ existing.remove(); return; }
    const vol=_loadVol(); const on=_playing;
    const track=(_idx>=0&&_idx<_tracks.length)?_tracks[_idx]:null;
    const btn=document.getElementById('mkt-music-btn');
    const rect=btn?btn.getBoundingClientRect():{bottom:window.innerHeight-60,right:window.innerWidth-16};
    const pop=document.createElement('div');
    pop.id='mkt-music-popup';
    pop.style.cssText=`position:fixed;bottom:${window.innerHeight-rect.top+6}px;right:${window.innerWidth-rect.right}px;z-index:600;background:#1a1825;border:2px solid #000;box-shadow:3px 3px 0 #000,0 0 20px rgba(0,0,0,.6);min-width:210px;opacity:0;transform:translateY(6px) scale(.97);transition:opacity .18s,transform .18s;pointer-events:auto;`;
    pop.innerHTML=`
      <div style="height:2px;background:linear-gradient(90deg,#fbbf24,#f59e0b);"></div>
      <div style="padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.6);">
        <div style="font-size:8px;color:#9d8ea0;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;">🎵 Musique Ambiante</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <div style="flex:1;min-width:0;">
            <div id="mkt-track-title" style="font-size:10px;font-weight:900;color:#fbbf24;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${track?track.title||'—':'—'}</div>
            <div id="mkt-track-artist" style="font-size:8px;color:#9d8ea0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${track?track.artist||'':''}</div>
          </div>
          <button onclick="window._mktSkip()" title="Piste suivante" style="flex-shrink:0;padding:4px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9d8ea0;cursor:pointer;font-size:13px;line-height:1;" onmouseover="this.style.color='#fbbf24'" onmouseout="this.style.color='#9d8ea0'">⏭</button>
        </div>
        <button id="mkt-toggle-btn" onclick="window._mktToggle()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:${on?'rgba(251,191,36,.12)':'rgba(255,255,255,.04)'};border:1px solid ${on?'rgba(251,191,36,.3)':'rgba(255,255,255,.08)'};color:${on?'#fbbf24':'#9d8ea0'};cursor:pointer;font-size:10px;font-weight:900;letter-spacing:.5px;">
          <span id="mkt-tog-label">${on?'▶ EN LECTURE':'⏸ EN PAUSE'}</span>
          <span id="mkt-tog-icon" style="font-size:14px;">${on?'🔊':'🔇'}</span>
        </button>
      </div>
      <div style="padding:12px 12px 10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:8px;color:#9d8ea0;text-transform:uppercase;letter-spacing:1px;font-weight:700;">Volume</span>
          <span id="mkt-vol-label" style="font-size:10px;font-weight:900;color:#fbbf24;min-width:32px;text-align:right;">${vol}%</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;opacity:.5;">🔈</span>
          <input id="mkt-vol-slider" type="range" min="0" max="100" value="${vol}" oninput="window._mktPreviewVol(this.value)" onchange="window._mktApplyVol(this.value)" style="flex:1;-webkit-appearance:none;height:4px;background:linear-gradient(90deg,#fbbf24 ${vol}%,rgba(255,255,255,.1) ${vol}%);outline:none;border:none;cursor:pointer;accent-color:#fbbf24;">
          <span style="font-size:11px;opacity:.8;">🔊</span>
        </div>
        <div style="display:flex;gap:4px;margin-top:10px;">
          ${[0,25,50,75,100].map(v=>`<button onclick="window._mktApplyVol(${v})" style="flex:1;padding:4px 0;background:${vol===v?'rgba(251,191,36,.2)':'rgba(255,255,255,.04)'};border:1px solid ${vol===v?'rgba(251,191,36,.4)':'rgba(255,255,255,.07)'};color:${vol===v?'#fbbf24':'#9d8ea0'};font-size:9px;font-weight:700;cursor:pointer;">${v}%</button>`).join('')}
        </div>
      </div>
    `;
    document.body.appendChild(pop);
    requestAnimationFrame(()=>{ pop.style.opacity='1'; pop.style.transform='translateY(0) scale(1)'; });
    setTimeout(()=>{ document.addEventListener('click',function close(ev){ if(!pop.contains(ev.target)&&ev.target!==btn){ pop.remove(); document.removeEventListener('click',close); } }); },50);
  };

  window._mktToggle=function(){
    if(_playing) _stop(); else _start();
    const on=_playing;
    const lbl=document.getElementById('mkt-tog-label');
    const ico=document.getElementById('mkt-tog-icon');
    const tb=document.getElementById('mkt-toggle-btn');
    if(lbl) lbl.textContent=on?'▶ EN LECTURE':'⏸ EN PAUSE';
    if(ico) ico.textContent=on?'🔊':'🔇';
    if(tb){ tb.style.background=on?'rgba(251,191,36,.12)':'rgba(255,255,255,.04)'; tb.style.borderColor=on?'rgba(251,191,36,.3)':'rgba(255,255,255,.08)'; tb.style.color=on?'#fbbf24':'#9d8ea0'; }
  };
  window._mktPreviewVol=function(val){
    const v=parseInt(val);
    const vl=document.getElementById('mkt-vol-label');
    const sl=document.getElementById('mkt-vol-slider');
    if(vl) vl.textContent=v+'%';
    if(sl) sl.style.background=`linear-gradient(90deg,#fbbf24 ${v}%,rgba(255,255,255,.1) ${v}%)`;
    if(_player&&_player.setVolume) try{_player.setVolume(v);}catch(e){}
  };
  window._mktApplyVol=function(val){
    const v=parseInt(val);
    _savePref(_playing,v);
    if(_player&&_player.setVolume) try{_player.setVolume(v);}catch(e){}
    const sl=document.getElementById('mkt-vol-slider');
    const vl=document.getElementById('mkt-vol-label');
    if(sl){ sl.value=v; sl.style.background=`linear-gradient(90deg,#fbbf24 ${v}%,rgba(255,255,255,.1) ${v}%)`; }
    if(vl) vl.textContent=v+'%';
    if(v>0&&!_playing) _start();
    if(v===0&&_playing) _stop();
    // Presets highlight
    const pop=document.getElementById('mkt-music-popup');
    if(pop){ pop.querySelectorAll('[onclick^="window._mktApplyVol"]').forEach(b=>{ const bv=parseInt(b.textContent); b.style.background=bv===v?'rgba(251,191,36,.2)':'rgba(255,255,255,.04)'; b.style.borderColor=bv===v?'rgba(251,191,36,.4)':'rgba(255,255,255,.07)'; b.style.color=bv===v?'#fbbf24':'#9d8ea0'; }); }
  };

  window.addEventListener('beforeunload',()=>{ try{ localStorage.setItem('music_on',_playing?'1':'0'); }catch(e){} });

  // Auto-démarrer après init() — db et currentUser sont disponibles
  window._mktMusicInit=async function(){
    try{
      const {data:pref}=await db.from('players').select('music_on,music_volume').eq('id',currentUser.id).single();
      if(pref){
        if(pref.music_on!==null&&pref.music_on!==undefined) localStorage.setItem('music_on',pref.music_on?'1':'0');
        if(pref.music_volume!==null&&!isNaN(pref.music_volume)) localStorage.setItem('music_volume',String(pref.music_volume));
      }
    }catch(e){}
    await _loadPlaylist();
    _idx=_pick();
    if(_ready) _initPlayer();
    if(localStorage.getItem('music_on')==='1') _start();
    document.addEventListener('click',()=>{ if(_playing&&_player) try{const s=_player.getPlayerState();if(s!==1)_doPlay();}catch(e){} },{once:true});
    _updateBtn();
  };
})();


init().then(()=>{
  if(window._mktMusicInit) window._mktMusicInit().catch(()=>{});
}).catch(e => {
  console.error(e);
  render('<div style="text-align:center;padding:40px;color:#ef4444;">Erreur de chargement.</div>');
});
</script>

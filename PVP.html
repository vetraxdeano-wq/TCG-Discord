<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Discord TCG — PvP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Oswald',sans-serif;
  background:#0a0810;
  color:#eaeaf0;
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}
:root{
  --bg:#0a0810;
  --bg2:#14121c;
  --bg3:#1c1828;
  --surface:#241f34;
  --border:#000;
  --text:#eaeaf0;
  --muted:#9d8ea0;
  --faint:#5a4f68;
  --accent:#5865f2;
  --accentAlt:#a08ef2;
  --red:#f04050;
  --green:#3ddb6f;
  --yellow:#fbbf24;
  --gold:#f0c040;
}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;
  background:var(--bg2);
  border-bottom:2px solid #000;
  box-shadow:0 4px 0 #000;
}
.topbar .back{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg3);
  border:2px solid #000;
  box-shadow:3px 3px 0 #000;
  color:var(--text);
  cursor:pointer;
  font-size:16px;
  font-weight:900;
  font-family:inherit;
  transition:transform .12s;
}
.topbar .back:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.topbar .title{
  flex:1;
  font-family:'Bangers',cursive;
  font-size:22px;
  letter-spacing:2px;
  color:var(--red);
  text-shadow:2px 2px 0 #000;
}
.topbar .subtitle{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:600;
}

/* ── Layout ── */
.container{
  max-width:640px;
  margin:0 auto;
  padding:14px;
  padding-bottom:40px;
}

/* ── Hero stats banner ── */
.hero{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:2px solid #000;
  box-shadow:4px 4px 0 #000;
  padding:14px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--accent));
}
.hero .label{
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
  margin-bottom:10px;
}
.hero .stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.hero .stat{
  background:var(--surface);
  border:2px solid #000;
  padding:8px 4px;
  text-align:center;
}
.hero .stat .k{
  font-size:8px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:700;
  margin-bottom:4px;
}
.hero .stat .v{
  font-family:'Bangers',cursive;
  font-size:22px;
  font-weight:900;
  line-height:1;
  letter-spacing:1px;
}
.hero .stat.v-wins  .v{color:var(--green);}
.hero .stat.v-loss  .v{color:var(--red);}
.hero .stat.v-ratio .v{color:var(--yellow);}
.hero .stat.v-total .v{color:var(--accent);}

/* ── Section heading ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin:18px 2px 10px;
}
.section-head .t{
  font-family:'Bangers',cursive;
  font-size:16px;
  letter-spacing:1.5px;
  color:var(--text);
}
.section-head .c{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  font-weight:700;
}

/* ── Empty state ── */
.empty{
  text-align:center;
  padding:48px 20px;
  color:var(--muted);
  background:var(--bg2);
  border:2px solid #000;
  box-shadow:4px 4px 0 #000;
}
.empty .e-ico{font-size:42px;margin-bottom:12px;opacity:.45;}
.empty .e-t{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;}
.empty .e-s{font-size:11px;}

/* ── Friend card ── */
.friend{
  background:var(--bg2);
  border:2px solid #000;
  box-shadow:4px 4px 0 #000;
  padding:12px;
  margin-bottom:12px;
  position:relative;
  transition:transform .12s;
}
.friend.online::before{
  content:'';
  position:absolute;top:0;left:0;bottom:0;
  width:4px;
  background:var(--green);
}
.friend.offline::before{
  content:'';
  position:absolute;top:0;left:0;bottom:0;
  width:4px;
  background:var(--faint);
}

.friend .row1{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;
}
.friend .avatar{
  width:44px;height:44px;
  overflow:hidden;
  background:var(--surface);
  border:2px solid #000;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.friend .avatar img{width:100%;height:100%;object-fit:cover;}
.friend .status-dot{
  position:absolute;bottom:-2px;right:-2px;
  width:12px;height:12px;
  border:2px solid #000;
  background:var(--faint);
}
.friend.online .status-dot{background:var(--green);}
.friend .identity{flex:1;min-width:0;}
.friend .name{
  font-size:13px;
  font-weight:800;
  color:var(--text);
  letter-spacing:.3px;
  line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.friend .status-label{
  font-size:9px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:700;
  margin-top:2px;
}
.friend.online .status-label{color:var(--green);}
.friend .lvl-badge{
  background:linear-gradient(135deg,var(--accent),var(--accentAlt));
  padding:3px 10px;
  font-family:'Bangers',cursive;
  font-size:14px;
  font-weight:900;
  color:#fff;
  letter-spacing:1px;
  box-shadow:2px 2px 0 #000;
  flex-shrink:0;
}

/* Stats grid */
.friend .stats-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}
.friend .stat-panel{
  background:var(--bg3);
  border:1.5px solid #000;
  padding:8px;
}
.friend .sp-head{
  font-size:8px;
  color:var(--muted);
  letter-spacing:1.2px;
  text-transform:uppercase;
  font-weight:800;
  margin-bottom:6px;
  padding-bottom:4px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.friend .sp-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:10px;
  margin-bottom:3px;
  font-weight:600;
}
.friend .sp-row:last-child{margin-bottom:0;}
.friend .sp-row .lbl{color:var(--muted);font-size:9px;letter-spacing:.5px;text-transform:uppercase;}
.friend .sp-row .val{
  font-family:'Bangers',cursive;
  font-size:13px;
  font-weight:900;
  letter-spacing:.5px;
}
.friend .sp-row .val.w{color:var(--green);}
.friend .sp-row .val.l{color:var(--red);}
.friend .sp-row .val.r{color:var(--yellow);}
.friend .sp-row .val.n{color:var(--text);}

/* Action row */
.friend .actions{
  display:flex;gap:6px;
}
.friend .btn-challenge{
  flex:1;
  padding:10px;
  background:var(--red);
  color:#fff;
  border:2px solid #000;
  box-shadow:3px 3px 0 #000;
  font-family:inherit;
  font-size:11px;
  font-weight:900;
  letter-spacing:1.5px;
  cursor:pointer;
  text-transform:uppercase;
  transition:transform .12s;
}
.friend .btn-challenge:hover{filter:brightness(1.1);}
.friend .btn-challenge:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.friend .btn-challenge:disabled{
  background:var(--surface);
  color:var(--faint);
  cursor:not-allowed;
  box-shadow:1px 1px 0 #000;
  transform:none;
}
.friend .btn-challenge:disabled:hover{filter:none;}

/* ── Loading ── */
.loading{
  text-align:center;
  padding:80px 20px;
  color:var(--muted);
  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:700;
}

/* ── Deck pick overlay (challenger + defender sélectionnent un deck) ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(10px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:0;
}
.overlay.show{display:flex;}
.overlay .sheet{
  width:100%;
  max-width:480px;
  max-height:90vh;
  max-height:90dvh;
  background:var(--bg2);
  border-top:3px solid #000;
  box-shadow:0 -10px 40px rgba(0,0,0,.8);
  display:flex;flex-direction:column;
  padding:18px 18px 24px;
  animation:slideUp .25s ease-out;
}
@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}
.overlay .sheet-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:14px;
}
.overlay .sheet-title{
  font-family:'Bangers',cursive;
  font-size:18px;
  color:var(--text);
  letter-spacing:1.5px;
  margin-bottom:4px;
}
.overlay .sheet-sub{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.5px;
}
.overlay .status-strip{
  display:flex;gap:6px;
  margin-bottom:14px;
}
.overlay .s-card{
  flex:1;
  background:var(--bg3);
  border:2px solid #000;
  padding:8px 10px;
}
.overlay .s-card .s-lbl{
  font-size:9px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:700;
  margin-bottom:4px;
}
.overlay .s-card .s-val{
  font-size:12px;
  font-weight:800;
  color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.overlay .s-card.ready{border-color:var(--green);}
.overlay .s-card.ready .s-val{color:var(--green);}
.overlay .s-card.ready .s-val::before{content:'✓';font-size:14px;}

.overlay .timer-bar{
  height:3px;
  background:var(--bg3);
  margin-bottom:14px;
  overflow:hidden;
}
.overlay .timer-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));
  transition:width 1s linear;
  width:100%;
}

.overlay .deck-list{
  flex:1;
  overflow-y:auto;
  margin-bottom:14px;
  max-height:45vh;
}
.overlay .deck-pick{
  background:var(--bg3);
  border:2px solid #000;
  padding:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .12s;
  display:flex;align-items:center;gap:10px;
}
.overlay .deck-pick:hover{background:var(--surface);}
.overlay .deck-pick.selected{
  border-color:var(--accent);
  background:rgba(88,101,242,.14);
  box-shadow:inset 0 0 0 2px rgba(88,101,242,.4);
}
.overlay .deck-pick.incomplete{opacity:.5;cursor:not-allowed;}
.overlay .deck-pick .dp-name{
  flex:1;
  font-size:13px;
  font-weight:800;
  color:var(--text);
}
.overlay .deck-pick .dp-count{
  font-size:10px;
  color:var(--muted);
  font-weight:700;
  font-family:monospace;
}
.overlay .deck-pick.selected .dp-check{
  width:22px;height:22px;
  background:var(--accent);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  font-weight:900;
  border:2px solid #000;
  box-shadow:2px 2px 0 #000;
}
.overlay .buttons{
  display:flex;gap:8px;
}
.overlay .btn-confirm{
  flex:1;
  padding:12px;
  background:var(--green);
  color:#000;
  border:2px solid #000;
  box-shadow:3px 3px 0 #000;
  font-family:inherit;
  font-size:12px;
  font-weight:900;
  letter-spacing:1.5px;
  cursor:pointer;
  text-transform:uppercase;
}
.overlay .btn-confirm:disabled{
  background:var(--surface);
  color:var(--faint);
  cursor:not-allowed;
  box-shadow:1px 1px 0 #000;
}
.overlay .btn-cancel{
  padding:12px 16px;
  background:transparent;
  color:var(--red);
  border:2px solid var(--red);
  font-family:inherit;
  font-size:11px;
  font-weight:900;
  letter-spacing:1px;
  cursor:pointer;
  text-transform:uppercase;
}

/* ── Toast ── */
.toast{
  position:fixed;
  top:20px;left:50%;transform:translateX(-50%);
  background:var(--bg2);
  border:2px solid #000;
  box-shadow:4px 4px 0 #000;
  padding:10px 18px;
  font-size:12px;
  font-weight:700;
  color:var(--text);
  z-index:9999;
  animation:toastIn .2s;
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-20px);}to{opacity:1;transform:translate(-50%,0);}}

/* ── Countdown final avant combat ── */
.countdown{
  position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.94);
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  gap:20px;
}
.countdown.show{display:flex;}
.countdown .cd-label{
  font-family:'Bangers',cursive;
  font-size:20px;
  color:var(--yellow);
  letter-spacing:3px;
  text-transform:uppercase;
}
.countdown .cd-num{
  font-family:'Bangers',cursive;
  font-size:120px;
  font-weight:900;
  color:var(--red);
  line-height:1;
  text-shadow:0 0 50px rgba(244,63,94,.6);
}
.countdown .cd-bar{
  width:240px;height:4px;
  background:var(--bg3);
  overflow:hidden;
}
.countdown .cd-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--yellow));
}
</style>
</head>
<body>

<div class="topbar">
  <button class="back" onclick="goBack()">←</button>
  <div style="flex:1;">
    <div class="title">⚔️ PVP</div>
    <div class="subtitle">Défis entre amis</div>
  </div>
</div>

<div class="container">
  <!-- Stats personnelles -->
  <div class="hero">
    <div class="label">Mes performances</div>
    <div class="stats">
      <div class="stat v-wins"><div class="k">Victoires</div><div class="v" id="my-wins">—</div></div>
      <div class="stat v-loss"><div class="k">Défaites</div><div class="v" id="my-losses">—</div></div>
      <div class="stat v-ratio"><div class="k">Ratio</div><div class="v" id="my-ratio">—</div></div>
      <div class="stat v-total"><div class="k">Combats</div><div class="v" id="my-total">—</div></div>
    </div>
  </div>

  <div class="section-head">
    <div class="t">Mes amis</div>
    <div class="c" id="friends-count">—</div>
  </div>

  <div id="friends-list">
    <div class="loading">Chargement…</div>
  </div>
</div>

<!-- ── Overlay sélection de deck (flow 2 étapes : Valider → Prêt) ── -->
<div class="overlay" id="deck-overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <div class="sheet-title">⚔️ Sélection du deck</div>
        <div class="sheet-sub" id="deck-sheet-sub">Choisis ton deck pour le combat</div>
      </div>
    </div>

    <div class="status-strip">
      <div class="s-card" id="status-me">
        <div class="s-lbl" id="status-me-lbl">Toi</div>
        <div class="s-val" id="status-me-val">En attente…</div>
      </div>
      <div class="s-card" id="status-opp">
        <div class="s-lbl" id="status-opp-lbl">Adversaire</div>
        <div class="s-val" id="status-opp-val">En attente…</div>
      </div>
    </div>

    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>

    <div class="deck-list" id="deck-list"></div>

    <div class="buttons">
      <button class="btn-cancel" onclick="cancelCombat()">❌ Annuler</button>
      <button class="btn-confirm" id="btn-validate" onclick="validateDeck()" disabled>VALIDER LE DECK</button>
      <button class="btn-confirm" id="btn-ready" onclick="markReady()" style="display:none;background:#3ddb6f;">✓ PRÊT AU COMBAT</button>
    </div>
  </div>
</div>

<!-- Countdown avant redirection gameplay -->
<div class="countdown" id="countdown">
  <div class="cd-label">⚔️ Combat PvP</div>
  <div class="cd-num" id="cd-num">5</div>
  <div class="cd-bar"><div class="cd-fill" id="cd-fill" style="width:100%;"></div></div>
  <div style="font-size:12px;color:#9d8ea0;letter-spacing:1px;">Préparation du champ de bataille…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG SUPABASE
// ═══════════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://ndsnbvvcbkblkncvoroc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kc25idnZjYmtibGtuY3Zvcm9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NjczMTksImV4cCI6MjA4ODU0MzMxOX0.mMsaBIrDI3BIoeTFBsCXo2AbuBLRnzqk625fKRkYCtM';

let _db = null;
let _me = null;
let _friends = [];
let _decks = [];
let _currentMatch = null;         // ligne pvp_matches quand on est en sélection de deck
let _selectedDeckId = null;
let _matchSub = null;             // subscription realtime
let _timerInterval = null;
let _timerStart = 0;
let _transitioningToPlaying = false; // évite les doubles transitions phase->playing
const DECK_SELECT_SECONDS = 60;   // 1 minute

// ─── LEVEL / XP — même formule que dans index.html ────────────────────
function computeLevelFromXp(xp){
  xp = xp || 0;
  // Formule compatible avec index.html (palier linéaire simple)
  let lvl = 1;
  let required = 100;
  let acc = 0;
  while(xp >= acc + required){
    acc += required;
    lvl++;
    required = 100 + (lvl - 1) * 50;
  }
  return lvl;
}

// ─── TOAST ────────────────────────────────────────────────────────────
function toast(msg, ms=2500){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), ms);
}

function goBack(){
  window.location.href = 'index.html';
}

// ─── INIT ─────────────────────────────────────────────────────────────
async function init(){
  // Attendre le SDK
  let tries = 0;
  while(!window.supabase && tries++ < 50) await new Promise(r=>setTimeout(r,100));
  if(!window.supabase){
    document.getElementById('friends-list').innerHTML =
      '<div class="empty"><div class="e-ico">⚠️</div><div class="e-t">SDK Supabase non chargé</div></div>';
    return;
  }

  _db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth:{autoRefreshToken:true, persistSession:true}
  });

  const { data:{ session } } = await _db.auth.getSession();
  if(!session){
    toast('Tu n\'es pas connecté');
    setTimeout(()=>{ window.location.href = 'index.html'; }, 1500);
    return;
  }
  _me = session.user;

  // Lancer chargement parallèle
  await Promise.all([ loadMyStats(), loadFriendsAndH2H(), loadMyDecks(), checkPendingMatch() ]);

  // Écouter les nouvelles notifs de combat (au cas où quelqu'un nous défie pendant qu'on est ici)
  listenNotifs();

  // Si on vient d'un clic ⚔️ rapide depuis la liste d'amis, lancer directement le défi
  try {
    const autoFid = sessionStorage.getItem('pvp_autochallenge_fid');
    const autoFname = sessionStorage.getItem('pvp_autochallenge_fname');
    if (autoFid) {
      sessionStorage.removeItem('pvp_autochallenge_fid');
      sessionStorage.removeItem('pvp_autochallenge_fname');
      // Laisser le temps à l'UI de se peindre
      setTimeout(() => challengeFriend(autoFid, autoFname || 'Ami'), 300);
    }
  } catch(e) {}
}

// ─── STATS PERSONNELLES ───────────────────────────────────────────────
async function loadMyStats(){
  const { data } = await _db.from('players')
    .select('wins, losses')
    .eq('id', _me.id).single();
  const w = data?.wins || 0;
  const l = data?.losses || 0;
  const total = w + l;
  const ratio = total > 0 ? Math.round(w/total*100) : null;
  document.getElementById('my-wins').textContent = w;
  document.getElementById('my-losses').textContent = l;
  document.getElementById('my-ratio').textContent = ratio !== null ? ratio+'%' : '—';
  document.getElementById('my-total').textContent = total;
}

// ─── AMIS + STATS H2H ─────────────────────────────────────────────────
async function loadFriendsAndH2H(){
  // 1. Charger la liste d'amis acceptés
  const { data:friendsData } = await _db
    .from('friend_requests')
    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url,wins,losses,xp), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url,wins,losses,xp)')
    .or(`sender_id.eq.${_me.id},receiver_id.eq.${_me.id}`)
    .eq('status','accepted');

  _friends = (friendsData||[]).map(f=>{
    const o = f.sender_id === _me.id ? f.receiver : f.players;
    if(!o) return null;
    return {
      id: o.id,
      discord_username: o.discord_username,
      avatar_url: o.avatar_url,
      wins: o.wins || 0,
      losses: o.losses || 0,
      xp: o.xp || 0,
      level: computeLevelFromXp(o.xp || 0),
      h2h_w: 0, h2h_l: 0,
    };
  }).filter(Boolean);

  document.getElementById('friends-count').textContent =
    _friends.length + ' ami' + (_friends.length>1?'s':'');

  // 2. Charger l'historique H2H via la vue pvp_h2h_stats
  if(_friends.length > 0){
    const { data:h2h } = await _db.from('pvp_h2h_stats')
      .select('opponent_id, winner_id')
      .eq('me_id', _me.id);

    if(h2h){
      const stats = {};
      h2h.forEach(row=>{
        const oid = row.opponent_id;
        if(!stats[oid]) stats[oid] = { w:0, l:0 };
        if(row.winner_id === _me.id) stats[oid].w++;
        else stats[oid].l++;
      });
      _friends.forEach(f=>{
        if(stats[f.id]){
          f.h2h_w = stats[f.id].w;
          f.h2h_l = stats[f.id].l;
        }
      });
    }
  }

  renderFriends();
}

function renderFriends(){
  const root = document.getElementById('friends-list');
  if(_friends.length === 0){
    root.innerHTML = `
      <div class="empty">
        <div class="e-ico">👥</div>
        <div class="e-t">Aucun ami pour l'instant</div>
        <div class="e-s">Ajoute des amis depuis le menu principal pour pouvoir les défier.</div>

  // Trier : en ligne d'abord (présence inconnue pour l'instant — tous "offline" par défaut)
  root.innerHTML = _friends.map(f=>{
    const total = f.wins + f.losses;
    const ratio = total > 0 ? Math.round(f.wins/total*100)+'%' : '—';
    const h2hTotal = f.h2h_w + f.h2h_l;
    const h2hRatio = h2hTotal > 0 ? Math.round(f.h2h_w/h2hTotal*100)+'%' : '—';
    const av = (f.avatar_url && f.avatar_url !== 'https://i.goopics.net/iic46c.png')
      ? `<img src="${f.avatar_url}" onerror="this.outerHTML='<span style=&quot;font-size:18px;&quot;>👤</span>'">`
      : '<span style="font-size:18px;">👤</span>';

    return `
      <div class="friend offline" data-fid="${f.id}">
        <div class="row1">
          <div class="avatar">${av}<div class="status-dot"></div></div>
          <div class="identity">
            <div class="name">${escapeHtml(f.discord_username||'Ami')}</div>
            <div class="status-label">Prêt au combat</div>
          </div>
          <div class="lvl-badge">LVL ${f.level}</div>
        </div>

        <div class="stats-grid">
          <div class="stat-panel">
            <div class="sp-head">Stats globales</div>
            <div class="sp-row"><span class="lbl">Victoires</span><span class="val w">${f.wins}</span></div>
            <div class="sp-row"><span class="lbl">Défaites</span><span class="val l">${f.losses}</span></div>
            <div class="sp-row"><span class="lbl">Ratio</span><span class="val r">${ratio}</span></div>
          </div>
          <div class="stat-panel">
            <div class="sp-head">Face à toi</div>
            <div class="sp-row"><span class="lbl">Victoires</span><span class="val w">${f.h2h_w}</span></div>
            <div class="sp-row"><span class="lbl">Défaites</span><span class="val l">${f.h2h_l}</span></div>
            <div class="sp-row"><span class="lbl">Ratio</span><span class="val r">${h2hRatio}</span></div>
          </div>
        </div>

        <div class="actions">
          <button class="btn-challenge" onclick="challengeFriend('${f.id}','${escapeHtml(f.discord_username||'Ami')}')">
            ⚔ Défier
          </button>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ─── DECKS DU JOUEUR ──────────────────────────────────────────────────
async function loadMyDecks(){
  const { data:decks } = await _db.from('decks')
    .select('id, name, is_default, created_at')
    .eq('player_id', _me.id)
    .order('created_at', { ascending: true });

  if(!decks){ _decks = []; return; }

  const ids = decks.map(d=>d.id);
  let dc = [];
  if(ids.length > 0){
    const r = await _db.from('deck_cards').select('deck_id, quantity').in('deck_id', ids);
    dc = r.data || [];
  }
  _decks = decks.map(d=>{
    const total = dc.filter(x=>x.deck_id===d.id).reduce((s,x)=>s+x.quantity,0);
    return { ...d, total };
  });
}

// ─── DÉFIER UN AMI ────────────────────────────────────────────────────
async function challengeFriend(fid, fname){
  if(!_decks || _decks.length === 0){
    await loadMyDecks();
  }
  const playable = _decks.filter(d=>d.total>=30);
  if(playable.length === 0){
    toast('Tu n\'as aucun deck complet (30 cartes).');
    return;
  }

  // Vérifier que l'ami a au moins un deck complet (sinon pas la peine de l'ennuyer)
  const { data:friendDecks } = await _db.from('decks').select('id').eq('player_id', fid);
  if(!friendDecks || friendDecks.length === 0){
    toast(`${fname} n'a pas encore de deck configuré.`);
    return;
  }

  const myName = _me.user_metadata?.full_name || _me.user_metadata?.name || 'Un joueur';

  // Créer un match_key unique
  const matchKey = `${_me.id}_${fid}_${Date.now()}`;

  try{
    // 1. Insérer la ligne pvp_matches en phase 'accepted'
    //    (volontairement 'accepted' dès la création : ça correspond à "défi envoyé", la phase deck_selection commence
    //     quand le défenseur accepte)
    const { data:match, error:mErr } = await _db.from('pvp_matches').insert({
      match_key: matchKey,
      challenger_id: _me.id,
      defender_id: fid,
      phase: 'pending',           // en attente de réponse du défenseur
    }).select().single();

    if(mErr || !match){
      console.error('pvp_matches insert', mErr);
      toast('Erreur lors de la création du match');
      return;
    }

    // 2. Envoyer la notif au défenseur
    await _db.from('notifications').insert({
      user_id: fid,
      type: 'combat_request',
      from_id: _me.id,
      text: `${myName} te défie en combat PvP !`,
      read: false,
      meta: JSON.stringify({ match_id: match.id, match_key: matchKey }),
    });

    toast(`Défi envoyé à ${fname} !`);

    // 3. S'abonner au match et afficher un overlay "en attente de réponse"
    _currentMatch = match;
    startWaitingForAccept(match, fname);
  } catch(e){
    console.error(e);
    toast('Erreur lors de l\'envoi du défi');
  }
}
window.challengeFriend = challengeFriend;

// ─── Chargement du pseudo d'un joueur (utilisé pour afficher l'adversaire) ─

// Affiche mon propre pseudo dans la carte "Toi" (symétrique avec l'adversaire)
function setMyNameLabel(){

                 || _me?.user_metadata?.discord_username || 'Toi';

// ─── ATTENTE DE L'ACCEPTATION PAR L'ADVERSAIRE (CHALLENGER) ───────────
function startWaitingForAccept(match, fname){
  const overlay = document.getElementById('deck-overlay');
  const sub = document.getElementById('deck-sheet-sub');
  const oppLbl = document.getElementById('status-opp-lbl');
  const oppVal = document.getElementById('status-opp-val');
  const meVal = document.getElementById('status-me-val');

  sub.textContent = `En attente de ${fname}…`;
  oppLbl.textContent = fname;
  oppVal.textContent = 'N\'a pas encore répondu…';
  meVal.textContent = 'Défi envoyé ✓';

  setMyNameLabel();

  // Cacher liste de decks + boutons pendant attente
  document.getElementById('deck-list').style.display = 'none';
  document.getElementById('btn-validate').style.display = 'none';
  document.getElementById('btn-ready').style.display = 'none';

  overlay.classList.add('show');

  // Timer 60s pour acceptation (côté challenger en attente de réponse)
  startTimer(DECK_SELECT_SECONDS, ()=>{
    // Timeout : annuler
    _db.from('pvp_matches').update({ phase:'cancelled', end_reason:'no_response' })
      .eq('id', match.id).then(()=>{});
    toast('Le défi a expiré.');
    closeDeckOverlay();
  });

  // Subscribe aux updates du match
  subscribeToMatch(match.id);
}

// ─── ABONNEMENT AU MATCH (REALTIME) ───────────────────────────────────
function subscribeToMatch(matchId){
  if(_matchSub){ try{_matchSub.unsubscribe();}catch(e){} _matchSub = null; }

  _matchSub = _db.channel(`pvp_match_${matchId}`)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'pvp_matches',
      filter: `id=eq.${matchId}`,
    }, (payload)=>{
      onMatchUpdate(payload.new);
    })
    .subscribe();
}

function onMatchUpdate(match){
  if(!match) return;
  const wasPhase = _currentMatch?.phase;
  _currentMatch = match;

  // Match annulé
  if(match.phase === 'cancelled'){
    toast('Le combat a été annulé.');
    closeDeckOverlay();
    return;
  }

  // Passage en phase deck_selection : le défenseur a accepté, on peut maintenant choisir nos decks
  // (les 2 côtés reçoivent cet update simultanément via Realtime)
  if(match.phase === 'deck_selection' && wasPhase !== 'deck_selection'){
    showDeckPicker();
  }

  // Les 2 joueurs sont ready : on lance le combat
  if(match.phase === 'playing'){
    redirectToGameplay(match);
    return;
  }

  // Mise à jour des statuts validated/ready
  updatePickerState(match);

  // Si on vient de passer à (challenger_ready && defender_ready) en phase deck_selection :
  // n'importe lequel des 2 clients déclenche la transition 'playing' (la première qui passe gagne,
  // les autres qui essaient après voient juste phase=playing et skippent silencieusement).
  if(match.phase === 'deck_selection'
     && match.challenger_ready && match.defender_ready
     && !_transitioningToPlaying){
    _transitioningToPlaying = true;
    const firstPlayer = Math.random() < 0.5 ? 'challenger' : 'defender';
    _db.from('pvp_matches')
      .update({ phase:'playing', first_player: firstPlayer })
      .eq('id', match.id)
      .eq('phase', 'deck_selection')  // condition pour éviter d'écraser si un autre a déjà fait la transition
      .then(()=>{}, ()=>{ _transitioningToPlaying = false; });
  }
}

// ─── ACTIVATION DU PICKER DE DECK ─────────────────────────────────────
async function showDeckPicker(){
  const sub = document.getElementById('deck-sheet-sub');
  sub.textContent = 'Choisis ton deck puis valide, enfin marque-toi Prêt pour lancer le combat !';
  document.getElementById('deck-list').style.display = '';
  document.getElementById('btn-validate').style.display = '';
  document.getElementById('btn-ready').style.display = 'none';

  // Charger le pseudo adverse si pas déjà fait + mon propre pseudo
  if(_currentMatch){
    setMyNameLabel();
    const oppId = _currentMatch.challenger_id === _me.id
      ? _currentMatch.defender_id
      : _currentMatch.challenger_id;
    const oppLbl = document.getElementById('status-opp-lbl');
    if(oppLbl){
      const oppName = await loadOpponentName(oppId);
      oppLbl.textContent = oppName;
    }
  }

  renderDeckPicker();
  updatePickerState(_currentMatch);

  // Reset timer 60s pour toute la séquence (sélection + validation + prêt)
  stopTimer();
  startTimer(DECK_SELECT_SECONDS, onTimerExpire);
}

function onTimerExpire(){
  // Timeout : si pas encore ready, annuler (gratuit pour les 2)
  if(!_currentMatch) return;
  const iAmChall = _currentMatch.challenger_id === _me.id;
  const myReady = iAmChall ? _currentMatch.challenger_ready : _currentMatch.defender_ready;
  if(myReady){
    // J'ai déjà cliqué Prêt → pas de mon ressort, on attend l'autre. On annule quand même si on arrive là.
    cancelCombat();
    return;
  }
  // Si je n'ai pas encore validé, tenter le deck par défaut
  const myVal = iAmChall ? _currentMatch.challenger_validated : _currentMatch.defender_validated;
  if(!myVal && !_selectedDeckId){
    const def = _decks.find(d=>d.is_default && d.total>=30) || _decks.find(d=>d.total>=30);
    if(def) _selectedDeckId = def.id;
  }
  // Auto-valider + auto-prêt pour ne pas bloquer la partie
  if(_selectedDeckId){
    validateDeck(true).then(()=>markReady(true)).catch(()=>cancelCombat());
  } else {
    cancelCombat();
  }
}

function renderDeckPicker(){
  const root = document.getElementById('deck-list');
  const list = _decks.filter(d=>d);
  if(list.length === 0){
    root.innerHTML = '<div style="padding:20px;text-align:center;color:#9d8ea0;">Aucun deck disponible.</div>';
    return;
  }
  // Pré-sélectionner le deck par défaut si rien de choisi
  if(!_selectedDeckId){
    const def = list.find(d=>d.is_default && d.total>=30);
    if(def) _selectedDeckId = def.id;
  }
  // Si j'ai déjà validé mon deck, désactiver la sélection (mais on peut encore changer si on clique "re-sélectionner")
  const myVal = iAmValidated();
  const myRdy = iAmReady();
  const locked = myRdy; // on ne peut plus changer une fois "prêt" (mais on peut encore avant)

  root.innerHTML = list.map(d=>{
    const ok = d.total >= 30;
    const sel = _selectedDeckId === d.id;
    const dis = !ok || locked;
    return `
      <div class="deck-pick ${sel?'selected':''} ${ok?'':'incomplete'}"
           style="${locked?'opacity:.6;cursor:not-allowed;':''}"
           onclick="${dis?'':`selectDeck('${d.id}')`}">
        <div class="dp-name">${escapeHtml(d.name)}${d.is_default?' <span style="color:#fbbf24;font-size:9px;letter-spacing:1px;">★ PAR DÉFAUT</span>':''}</div>
        <div class="dp-count">${d.total}/30</div>
        ${sel?'<div class="dp-check">✓</div>':''}
      </div>`;
  }).join('');
  updateButtonsState();
}

function selectDeck(id){
  // Interdire si déjà prêt
  if(iAmReady()) return;
  _selectedDeckId = id;
  // Si on a déjà validé et qu'on change, on "dé-valide" côté client pour forcer une nouvelle validation
  renderDeckPicker();
  updateButtonsState();
}
window.selectDeck = selectDeck;

function iAmValidated(){
  if(!_currentMatch) return false;
  if(_currentMatch.challenger_id === _me.id) return !!_currentMatch.challenger_validated;
  return !!_currentMatch.defender_validated;
}
function iAmReady(){
  if(!_currentMatch) return false;
  if(_currentMatch.challenger_id === _me.id) return !!_currentMatch.challenger_ready;
  return !!_currentMatch.defender_ready;
}

// Mise à jour des 2 boutons (valider / prêt) selon l'état actuel
function updateButtonsState(){
  const btnV = document.getElementById('btn-validate');
  const btnR = document.getElementById('btn-ready');
  const myVal = iAmValidated();
  const myRdy = iAmReady();

  if(myRdy){
    // Étape 3 : prêt, on attend l'autre
    btnV.style.display = 'none';
    btnR.style.display = '';
    btnR.textContent = '✓ EN ATTENTE DE L\'ADVERSAIRE';
    btnR.disabled = true;
    btnR.style.background = '#2a7f47';
  } else if(myVal){
    // Étape 2 : deck validé, bouton Prêt visible
    btnV.style.display = '';
    btnV.textContent = '✓ DECK VALIDÉ (ré-éditer)';
    btnV.disabled = false;
    btnV.style.background = 'transparent';
    btnV.style.color = '#fbbf24';
    btnV.style.border = '2px solid #fbbf24';
    btnV.style.boxShadow = 'none';
    btnR.style.display = '';
    btnR.textContent = '✓ PRÊT AU COMBAT';
    btnR.disabled = false;
    btnR.style.background = '#3ddb6f';
  } else {
    // Étape 1 : doit sélectionner + valider un deck
    btnV.style.display = '';
    btnV.textContent = 'VALIDER LE DECK';
    btnV.disabled = !_selectedDeckId;
    btnV.style.background = ''; // retour défaut (CSS)
    btnV.style.color = '';
    btnV.style.border = '';
    btnV.style.boxShadow = '';
    btnR.style.display = 'none';
  }
}

// Mise à jour complète (statuts + boutons) après update match
function updatePickerState(match){
  if(!match) return;
  const iAmChall = match.challenger_id === _me.id;
  const myVal  = iAmChall ? match.challenger_validated : match.defender_validated;
  const myRdy  = iAmChall ? match.challenger_ready     : match.defender_ready;
  const oppVal = iAmChall ? match.defender_validated   : match.challenger_validated;
  const oppRdy = iAmChall ? match.defender_ready       : match.challenger_ready;

  const meCard = document.getElementById('status-me');
  const oppCard = document.getElementById('status-opp');
  const meVal = document.getElementById('status-me-val');
  const oppVal2 = document.getElementById('status-opp-val');

  // Mon statut
  if(myRdy){
    meCard.classList.add('ready');
    meVal.textContent = '✓ Prêt';
  } else if(myVal){
    meCard.classList.remove('ready');
    meVal.textContent = 'Deck validé';
  } else {
    meCard.classList.remove('ready');
    meVal.textContent = 'Choisis ton deck…';
  }

  // Statut adverse
  if(oppRdy){
    oppCard.classList.add('ready');
    oppVal2.textContent = '✓ Prêt';
  } else if(oppVal){
    oppCard.classList.remove('ready');
    oppVal2.textContent = 'Deck validé';
  } else {
    oppCard.classList.remove('ready');
    oppVal2.textContent = 'Choisit son deck…';
  }

  updateButtonsState();
}

// ─── ÉTAPE 1 : Valider le deck sélectionné ────────────────────────────
async function validateDeck(forced){
  if(!_currentMatch || !_selectedDeckId){
    if(!forced) toast('Sélectionne un deck');
    return;
  }
  // Vérifier que le deck a 30 cartes
  const deck = _decks.find(d=>d.id===_selectedDeckId);
  if(!deck || deck.total < 30){
    toast('Ce deck est incomplet');
    return;
  }
  // Si on est déjà prêt, ne rien faire (verrouillé)
  if(iAmReady()) return;

  // Si le bouton sert actuellement de "ré-éditer" (déjà validé), on dé-valide localement
  // pour que le joueur puisse changer de deck
  if(iAmValidated()){
    const iAmChall = _currentMatch.challenger_id === _me.id;
    const patch = iAmChall ? { challenger_validated: false } : { defender_validated: false };
    const { data:updated } = await _db.from('pvp_matches')
      .update(patch).eq('id', _currentMatch.id).select().single();
    if(updated){ _currentMatch = updated; updatePickerState(updated); renderDeckPicker(); }
    return;
  }

  // Sinon c'est une validation normale
  const iAmChall = _currentMatch.challenger_id === _me.id;
  const patch = iAmChall
    ? { challenger_deck_id: _selectedDeckId, challenger_validated: true }
    : { defender_deck_id:   _selectedDeckId, defender_validated:   true };

  const { data:updated, error } = await _db.from('pvp_matches')
    .update(patch).eq('id', _currentMatch.id).select().single();

  if(error || !updated){
    console.error(error);
    toast('Erreur : réessaie');
    return;
  }

  _currentMatch = updated;
  updatePickerState(updated);
  renderDeckPicker();
}
window.validateDeck = validateDeck;

// ─── ÉTAPE 2 : Se déclarer prêt au combat ─────────────────────────────
async function markReady(forced){
  if(!_currentMatch) return;
  if(!iAmValidated()){
    if(!forced) toast('Valide d\'abord ton deck');
    return;
  }
  if(iAmReady()) return;

  const iAmChall = _currentMatch.challenger_id === _me.id;
  const patch = iAmChall ? { challenger_ready: true } : { defender_ready: true };

  const { data:updated, error } = await _db.from('pvp_matches')
    .update(patch).eq('id', _currentMatch.id).select().single();

  if(error || !updated){
    console.error(error);
    toast('Erreur : réessaie');
    return;
  }

  _currentMatch = updated;
  updatePickerState(updated);

  // Si les 2 sont prêts, onMatchUpdate (via Realtime) déclenchera la transition 'playing'
  // On simule aussi un onMatchUpdate local immédiat pour que le client qui valide en dernier
  // déclenche lui-même la transition (anti-race)
  onMatchUpdate(updated);
}
window.markReady = markReady;

// ─── ANNULER LE COMBAT ────────────────────────────────────────────────
async function cancelCombat(){
  if(!_currentMatch){
    closeDeckOverlay();
    return;
  }
  try{
    await _db.from('pvp_matches')
      .update({ phase:'cancelled', end_reason:'cancelled' })
      .eq('id', _currentMatch.id);

    // Notifier l'autre joueur pour qu'il sache
    const otherId = _currentMatch.challenger_id === _me.id
      ? _currentMatch.defender_id
      : _currentMatch.challenger_id;
    await _db.from('notifications').insert({
      user_id: otherId,
      type: 'combat_cancelled',
      from_id: _me.id,
      text: 'Le combat a été annulé.',
      read: false,
    });
  } catch(e){ console.error(e); }
  closeDeckOverlay();
}
window.cancelCombat = cancelCombat;

function closeDeckOverlay(){
  const overlay = document.getElementById('deck-overlay');
  overlay.classList.remove('show');
  stopTimer();
  if(_matchSub){ try{_matchSub.unsubscribe();}catch(e){} _matchSub = null; }
  _currentMatch = null;
  _selectedDeckId = null;
  _transitioningToPlaying = false;
  // Réinitialiser l'overlay pour la prochaine utilisation
  document.getElementById('deck-list').style.display = '';
  const btnV = document.getElementById('btn-validate');
  const btnR = document.getElementById('btn-ready');
  if(btnV){ btnV.style.display = ''; btnV.textContent = 'VALIDER LE DECK'; btnV.disabled = true;
            btnV.style.background = ''; btnV.style.color = ''; btnV.style.border = ''; btnV.style.boxShadow = ''; }
  if(btnR){ btnR.style.display = 'none'; btnR.disabled = false; btnR.style.background = '#3ddb6f'; }
}

// ─── TIMER ────────────────────────────────────────────────────────────
function startTimer(sec, onEnd){
  stopTimer();
  _timerStart = Date.now();
  const total = sec * 1000;
  const fill = document.getElementById('timer-fill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  // Forcer reflow puis appliquer transition
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      fill.style.transition = `width ${sec}s linear`;
      fill.style.width = '0%';
    });
  });
  _timerInterval = setTimeout(onEnd, total);
}
function stopTimer(){
  if(_timerInterval){ clearTimeout(_timerInterval); _timerInterval = null; }
}

// ─── REDIRECTION VERS GAMEPLAY ────────────────────────────────────────
function redirectToGameplay(match){
  stopTimer();
  // Stocker les infos nécessaires pour GAMEPLAY.html
  try{
    sessionStorage.setItem('pvp_match_id', match.id);
    sessionStorage.setItem('pvp_match_key', match.match_key);
    sessionStorage.setItem('pvp_my_id', _me.id);
    sessionStorage.setItem('pvp_opponent_id',
      match.challenger_id === _me.id ? match.defender_id : match.challenger_id);
    sessionStorage.setItem('pvp_role',
      match.challenger_id === _me.id ? 'challenger' : 'defender');
    sessionStorage.setItem('pvp_my_deck_id',
      match.challenger_id === _me.id ? match.challenger_deck_id : match.defender_deck_id);
    sessionStorage.setItem('pvp_first_player', match.first_player);
  } catch(e){}

  // Countdown 5s
  const cd = document.getElementById('countdown');
  cd.classList.add('show');
  const num = document.getElementById('cd-num');
  const fill = document.getElementById('cd-fill');
  let n = 5;
  num.textContent = n;
  fill.style.transition = `width ${n}s linear`;
  fill.style.width = '0%';

  const iv = setInterval(()=>{
    n--;
    if(n > 0){
      num.textContent = n;
    } else {
      num.textContent = '⚔️';
      clearInterval(iv);
      setTimeout(()=>{
        window.location.href = 'GAMEPLAY.html';
      }, 500);
    }
  }, 1000);
}

// ─── DÉMARRAGE : VÉRIFIER SI ON A UN MATCH EN COURS ───────────────────
//  (utile si l'utilisateur arrive ici via une acceptation de défi)
async function checkPendingMatch(){
  const pendingMatchId = sessionStorage.getItem('pvp_pending_match_id');
  if(!pendingMatchId) return;
  sessionStorage.removeItem('pvp_pending_match_id');

  // Charger ce match
  const { data:match } = await _db.from('pvp_matches')
    .select('*').eq('id', pendingMatchId).single();
  if(!match) return;

  if(match.phase === 'finished' || match.phase === 'cancelled') return;
  if(match.phase === 'playing'){
    redirectToGameplay(match);
    return;
  }

  _currentMatch = match;
  // Si j'ai accepté, alors on est en deck_selection
  if(match.phase === 'deck_selection'){
    document.getElementById('deck-overlay').classList.add('show');
    showDeckPicker();
    subscribeToMatch(match.id);
  }
}

// ─── ÉCOUTER LES NOTIFS DE COMBAT ACCEPTED ────────────────────────────
//  Si on est challenger et qu'on attend que l'autre réponde,
//  il répond via une notif type 'combat_request' acceptée côté index.html.
//  Mais si on est ici, on a déjà créé le pvp_matches, donc on attend un update sur pvp_matches.
//  Déjà géré par subscribeToMatch → onMatchUpdate.
function listenNotifs(){
  // On subscribe aussi aux notifications pour le cas où un défi nous arrive pendant qu'on est sur cette page.
  _db.channel(`pvp_notifs_${_me.id}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${_me.id}`,
    }, async (payload)=>{
      const n = payload.new;
      if(!n) return;
      if(n.type === 'combat_request'){
        let matchId = null, matchKey = null;
        try{ const m = JSON.parse(n.meta||'{}'); matchId = m.match_id; matchKey = m.match_key; }catch(e){}
        const { data:sender } = await _db.from('players').select('discord_username').eq('id', n.from_id).single();
        const sname = sender?.discord_username || 'Un joueur';
        const ok = confirm(`${sname} te défie en combat PvP !\n\nAccepter ?`);
        if(ok){
          // Passer la notif en read
          await _db.from('notifications').update({ read:true }).eq('id', n.id);
          // Passer le match en phase deck_selection
          if(matchId){
            await _db.from('pvp_matches')
              .update({ phase:'deck_selection' })
              .eq('id', matchId);
            // Se connecter au match
            const { data:match } = await _db.from('pvp_matches').select('*').eq('id', matchId).single();
            if(match){
              _currentMatch = match;
              document.getElementById('deck-overlay').classList.add('show');
              showDeckPicker();
              subscribeToMatch(match.id);
            }
          }
        } else {
          await _db.from('notifications').update({ read:true }).eq('id', n.id);
          if(matchId){
            await _db.from('pvp_matches')
              .update({ phase:'cancelled', end_reason:'declined' })
              .eq('id', matchId);
            // Notifier l'expéditeur
            await _db.from('notifications').insert({
              user_id: n.from_id,
              type: 'combat_declined',
              from_id: _me.id,
              text: 'Ton défi a été refusé.',
              read: false,
            });
          }
        }
      }
    })
    .subscribe();
}

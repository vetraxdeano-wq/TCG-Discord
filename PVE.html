<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PWL TCG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Sans:wght@400;600;700&family=DM+Mono:wght@500&family=Bangers&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080d;--s1:#0f0f16;--s2:#14141e;--s3:#1c1c2a;
  --bdr:#ffffff0d;--bdr2:#ffffff18;--bdr3:#ffffff26;
  --gold:#f0c040;--gold2:#fde68a;--red:#f04050;--blue:#5b9cf6;
  --grn:#3ecf8e;--pur:#a78bfa;--txt:#eeeef8;--sub:#7777aa;--dim:#44445a;
  --C:#888;--PC:#3ecf8e;--R:#a78bfa;--M:#f0c040;
}
body.light{
  --bg:#f0ede8;--s1:#e6e2dc;--s2:#ddd9d2;--s3:#d4cfc7;
  --bdr:#00000012;--bdr2:#0000001e;--bdr3:#0000002e;
  --txt:#1a1814;--sub:#4a4640;--dim:#888078;
  --gold:#b8860b;--gold2:#a07808;--red:#c0202e;--blue:#2255c0;
  --grn:#1a8a5a;--pur:#6644cc;
}
body.light .sp-name{color:#1a1814;font-weight:800;}
body.light .sr-lbl{color:#3a3630;font-weight:700;}
body.light .sr-val{color:#1a1814;font-weight:800;}
body.light .sr-ico{opacity:.9;}
body.light .sp-effslbl{color:#4a4640;}
body.light .etag{border-width:1.5px;}
body.light .etag.buf{background:rgba(20,120,70,.1);border-color:rgba(20,120,70,.35);color:#0e7a46;}
body.light .stat-row.buf{background:rgba(20,120,70,.08);border-color:rgba(20,120,70,.25);color:#0e7a46;}
body.light .stat-row.buf .sr-delta{color:#0e7a46;}
body.light .stat-row.buf .sr-val{color:#0e7a46;}
body.light .pj-name{color:#1a1814;}
body.light .t-title{color:#8a6a00;}
body.light .t-turn{color:#3a3630;background:var(--s3);border-color:var(--bdr3);}
body.light .t-log{color:#4a4640;}
body.light .t-log:hover{color:#1a1814;}
body.light .auto-btn{color:#3a3630;border-color:var(--bdr3);}
body.light .auto-btn.on{color:#1a6a30;background:rgba(26,138,90,.12);border-color:rgba(26,138,90,.5);}
body.light .hand-card{border-color:var(--bdr3);background:var(--s2);}
body.light .hand-card:hover{border-color:rgba(0,0,0,.35);}
body.light .fc-ph{background:var(--s3);}
body.light .fc-ph .icon{opacity:.35;}
body.light .fc-ph .lbl{color:var(--dim);}
body.light .ov-title{color:#1a1814;}
body.light .ov-stat{color:#3a3630;}
body.light .logp{background:rgba(230,226,220,.97);border-color:rgba(0,0,0,.15);}
body.light .log-hdr{color:#8a6a00;border-color:rgba(0,0,0,.12);}
body.light .log-hdr-toggle{color:#4a4640;}
body.light .log-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);}
body.light .le{color:#2a2620;}
body.light .le.p1{color:#a05000;}
body.light .le.p1b{color:#c06000;}
body.light .le.p1s{color:#b06820;}
body.light .le.p2{color:#b02030;}
body.light .wt-pill.ww{color:#4a4640;}
body.light .wt-pill.ht{color:#8a6a00;}
body.light .sp-hpbar{background:rgba(0,0,0,.15);}
body.light .fc-hpbar{background:rgba(0,0,0,.2);}
body.light .fc-hplabel{color:#1a1814;text-shadow:none;}
body.light .fc-hplabel{color:#1a1814;text-shadow:none;}
body.light .pj-deck{color:#4a4640;}
body.light .pj-hand-count{color:#1a1814;}
body.light .instr-bar{background:var(--s1);border-color:var(--bdr3);color:#2a2620;}
body.light .deck-count{color:#4a4640;}
body.light .sr-dmg-hint{color:#3a3630;opacity:.9;}
body.light .sr-dmg.pos{color:var(--red);}
body.light .sp-rar.rC{color:#5a5650;}
body.light .chrono{color:#1a1814;}
body.light .btn-primary{background:#b8860b;color:#fff;}
body.light .btn-secondary{color:#3a3630;border-color:var(--bdr3);}
body.light .spell-announce{background:rgba(238,234,228,.97);border-color:var(--blue);box-shadow:0 0 30px rgba(34,85,192,.2),0 12px 40px rgba(0,0,0,.15);}
body.light .spell-announce.piege{border-color:var(--red);box-shadow:0 0 30px rgba(192,32,46,.2),0 12px 40px rgba(0,0,0,.15);}
body.light .sa-who{color:var(--sub);}
body.light .sa-nom{color:#1a1814;}
body.light .sa-desc{color:#3a3630;}
/* ═══════════════════════════════════════════════════════
   MODE TÉLÉPHONE — layout 100% fluide (dvh / flex)
   Tout est proportionnel à la hauteur de l'écran.
   Aucune hauteur fixe en px sur les zones principales.
   ═══════════════════════════════════════════════════════ */

/* Fallback dvh → vh */
:root{--dvh:1vh}
@supports (height:1dvh){:root{--dvh:1dvh}}

/* ── Topbar compact ── */
body.mobile .topbar{height:36px;padding:0 7px;flex-shrink:0}
body.mobile .t-title{font-size:11px}
body.mobile .t-turn{font-size:9px;padding:1px 5px}
body.mobile .wt-pill{font-size:9px;padding:2px 6px}

/* ── Écran jeu : flex colonne pleine hauteur ── */
body.mobile .screen.active{overflow:hidden;height:calc(100*var(--dvh))}
body.mobile #sg{overflow:hidden;display:flex;flex-direction:column;height:calc(100*var(--dvh))}

/* ══ FIELD : grille 3 col × 2 lignes, prend tout l'espace restant ══
   L'espace restant = 100dvh - topbar(38) - instr(~28) - actions(~38) - hand(~18+cartes) 
   On laisse flex:1 gérer ça automatiquement.
*/
body.mobile .field{
  display:grid !important;
  grid-template-columns: clamp(72px,22vw,90px) 1fr clamp(48px,14vw,66px);
  grid-template-rows: 1fr 1.18fr;
  flex:1;
  min-height:0;
  overflow:hidden;
}

/* ─── COL 1 ROW 1 : stats adversaire ─── */
body.mobile .centre{
  grid-column:1; grid-row:1;
  display:flex !important;
  flex-direction:column;
  padding:3px 3px 3px 4px;
  border-right:1px solid var(--bdr2);
  border-bottom:1px solid var(--bdr2);
  overflow:hidden; min-width:0;
}
body.mobile .centre .stats-panel.sp-left{display:none !important}
body.mobile .centre .arrows{display:none !important}
body.mobile .centre .stats-row{display:flex;flex-direction:column;gap:1px;flex:1;min-height:0;overflow:hidden}
body.mobile .centre .stats-panel{flex:1;min-height:0;padding:0;border:none;background:none;display:flex;flex-direction:column;gap:1px;overflow:hidden}
body.mobile .centre .sp-rar{font-size:clamp(6px,2vw,8px);letter-spacing:.06em;margin-bottom:1px}
body.mobile .centre .sp-name{font-size:clamp(7.5px,2.4vw,10px);font-weight:700;line-height:1.15;white-space:normal;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:1px}
body.mobile .centre .stat-row{padding:1px 2px;gap:2px;border-radius:3px}
body.mobile .centre .sr-ico{font-size:clamp(8px,2.6vw,11px)}
body.mobile .centre .sr-lbl{font-size:clamp(6px,1.9vw,8px);letter-spacing:0}
body.mobile .centre .sr-val{font-size:clamp(9px,2.8vw,11.5px)}
body.mobile .centre .sr-dmg-hint{display:block;font-size:clamp(5px,1.6vw,7px);padding:0 1px 2px 18px;margin-top:-1px}
body.mobile .centre .sr-dmg-row{display:flex}
body.mobile .centre .sp-effslbl{font-size:clamp(6px,1.9vw,7.5px);margin-top:2px}
body.mobile .centre .etag{font-size:clamp(6px,1.9vw,7.5px);padding:0 2px}

/* Override le comportement PC du field-card (flex:1 + max-height % qui crée l'encadré noir) */
body.mobile .field-card{
  flex:none !important;
  max-height:none !important;
  max-width:none !important;
}
/* fc-ph (placeholder vide) : taille identique à la carte */
body.mobile .fc-ph .icon{font-size:24px}
body.mobile .fc-ph .lbl{font-size:7px}
/* barre HP sous la carte : plus compacte */
body.mobile .fc-hprow{margin:2px auto 0;gap:3px}
body.mobile .fc-hplabel{font-size:clamp(6px,1.9vw,7.5px)}
body.mobile .fc-hpbar{height:3px}

/* ─── COL 2 ROW 1 : carte terrain adversaire — remplit la cellule à 100% ─── */
body.mobile .cz-bot{
  grid-column:2; grid-row:1;
  display:flex !important;
  flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding:2px 2px;
  border-bottom:1px solid var(--bdr2);
  overflow:visible;
}
body.mobile .cz-bot .field-card{
  flex:none !important;
  min-height:0 !important;
  width:100% !important;
  height:auto !important;
  max-height:100% !important;
  max-width:100% !important;
  aspect-ratio:2/3 !important;
  display:flex !important;
  flex-direction:column !important;
  overflow:hidden !important;
  border-radius:8px !important;
}
body.mobile .cz-bot .fc-img-wrap{
  flex:1;min-height:0;
  border-radius:6px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:0!important;
}
.fc-img-wrap>img,.fc-img-wrap img{
  width:100%!important;height:100%!important;
  object-fit:cover!important;
  display:block;border-radius:8px;
  flex:1;
}
/* Sur mobile terrain : contain pour voir la carte entière */
body.mobile .cz-bot .fc-img-wrap img,
body.mobile .cz-human .fc-img-wrap img{
  object-fit:contain!important;
  width:100%!important;
  height:100%!important;
  border-radius:6px;
}
body.mobile .cz-bot .fc-ph{border-radius:8px}
body.mobile .cz-human .fc-img-wrap img,
body.mobile .cz-bot .fc-img-wrap img{
  border-radius:6px;
  object-fit:cover;
  width:100%;height:100%;
}
body.mobile .cz-human .fc-img-wrap,
body.mobile .cz-bot .fc-img-wrap{
  padding:0;margin:0;
}

/* ─── COL 3 ROW 1 : ❤️ vie adversaire ─── */
body.mobile .pj-right{
  grid-column:3; grid-row:1;
  display:flex !important;
  flex-direction:column; align-items:center; justify-content:center;
  padding:3px 1px;
  border-left:1px solid var(--bdr2);
  border-bottom:1px solid var(--bdr2);
  gap:1px; overflow:hidden;
}
body.mobile .pj-right .heart-wrap{width:clamp(32px,9vw,44px);height:clamp(28px,8vw,40px);margin-top:0;flex-shrink:0}
body.mobile .pj-right .heart-txt{font-size:clamp(9px,2.8vw,13px)}
body.mobile .pj-right .pj-name{display:none}
body.mobile .pj-right .pj-deck{display:none}
body.mobile .pj-right .pj-hand-count{display:none}

/* ─── COL 1 ROW 2 : mes stats joueur ─── */
body.mobile .pj-left{
  grid-column:1; grid-row:2;
  display:flex !important;
  flex-direction:column; align-items:flex-start;
  padding:3px 3px 3px 4px;
  border-right:1px solid var(--bdr2);
  gap:1px; overflow:hidden;
}
body.mobile .pj-left .heart-wrap{display:none}
body.mobile .pj-left .pj-name{display:none}
body.mobile .pj-left .pj-deck{display:none}
body.mobile .pj-left .pj-hand-count{display:none}
body.mobile .pj-left .mob-stats-inj{display:flex;flex-direction:column;gap:1px;flex:1;min-height:0;overflow:hidden;width:100%}
body.mobile .pj-left .mob-stats-inj .sp-rar{font-size:clamp(6px,2vw,8px);letter-spacing:.1em;margin-bottom:1px}
body.mobile .pj-left .mob-stats-inj .sp-name{font-size:clamp(7.5px,2.4vw,10px);font-weight:700;line-height:1.15;white-space:normal;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:2px}
body.mobile .pj-left .mob-stats-inj .stat-row{padding:1px 2px;gap:2px;border-radius:3px;border:1px solid transparent}
body.mobile .pj-left .mob-stats-inj .sr-ico{font-size:clamp(8px,2.6vw,11px)}
body.mobile .pj-left .mob-stats-inj .sr-lbl{font-size:clamp(6px,1.9vw,8px);letter-spacing:0;letter-spacing:.02em}
body.mobile .pj-left .mob-stats-inj .sr-val{font-size:clamp(9px,2.8vw,11.5px)}
body.mobile .pj-left .mob-stats-inj .sr-dmg-hint{display:block;font-size:clamp(5px,1.6vw,7px);padding:0 2px 2px 20px;margin-top:-1px}
body.mobile .pj-left .mob-stats-inj .sr-dmg-row{display:flex}
body.mobile .pj-left .mob-stats-inj .sp-effslbl{font-size:clamp(6px,1.9vw,7.5px);margin-top:2px}
body.mobile .pj-left .mob-stats-inj .etag{font-size:clamp(6px,1.9vw,7.5px);padding:0 3px}

/* ─── COL 2 ROW 2 : ma carte terrain — remplit la cellule à 100% ─── */
body.mobile .cz-human{
  grid-column:2; grid-row:2;
  display:flex !important;
  flex-direction:column;
  align-items:center; justify-content:flex-start;
  padding:2px 2px;
  overflow:visible;
}
body.mobile .cz-human .field-card{
  flex:none !important;
  min-height:0 !important;
  width:100% !important;
  height:auto !important;
  max-height:100% !important;
  max-width:100% !important;
  aspect-ratio:2/3 !important;
  display:flex !important;
  flex-direction:column !important;
  overflow:hidden !important;
  border-radius:8px !important;
}
body.mobile .cz-human .fc-img-wrap{
  flex:1;min-height:0;
  border-radius:6px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:0!important;
}
.fc-img-wrap>img,.fc-img-wrap img{
  width:100%!important;height:100%!important;
  object-fit:cover!important;
  display:block;border-radius:8px;
  flex:1;
}
/* Sur mobile terrain : contain pour voir la carte entière */
body.mobile .cz-bot .fc-img-wrap img,
body.mobile .cz-human .fc-img-wrap img{
  object-fit:contain!important;
  width:100%!important;
  height:100%!important;
  border-radius:6px;
}
body.mobile .cz-human .fc-ph{border-radius:8px}

/* ─── COL 3 ROW 2 : ❤️ ma vie + journal ─── */
body.mobile .mob-hum-right{
  grid-column:3; grid-row:2;
  display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  padding:3px 1px;
  border-left:1px solid var(--bdr2);
  gap:1px; overflow:hidden;
}
body.mobile .mob-hum-right .heart-wrap{width:clamp(30px,8.5vw,42px);height:clamp(26px,7.5vw,38px);margin:0;flex-shrink:0}
body.mobile .mob-hum-right .heart-txt{font-size:clamp(9px,2.8vw,13px)}
body.mobile .mob-hum-right .pj-name{display:none}
body.mobile .mob-hum-right .mob-deck-info{display:flex;flex-direction:column;align-items:center;gap:1px;font-family:'DM Mono',monospace;font-size:7.5px;color:var(--sub)}

/* Journal masqué en mode téléphone */
body.mobile .logp{display:none !important}
body.mobile .logp.visible{display:none !important}
body.mobile .logp.expanded{display:none !important}

/* ── Barre instruction ── */
body.mobile .instr-bar{padding:2px 6px;flex-shrink:0}
body.mobile .instr-txt{font-size:clamp(7.5px,2.3vw,9px)}
body.mobile .instr-dot{width:4px;height:4px}

/* ── Actions (sous la main) — boutons x1.5 ── */
body.mobile .actions{
  height:auto; min-height:0;
  padding:3px 6px 4px; flex-wrap:wrap; gap:4px; flex-shrink:0;
  justify-content:center;
}
body.mobile .btn{font-size:clamp(10px,3.2vw,13px);padding:clamp(5px,1.5vw,8px) clamp(10px,3.5vw,15px);border-radius:6px}
body.mobile .btn-gold{padding:clamp(5px,1.5vw,8px) clamp(12px,4vw,18px);font-size:clamp(10px,3.2vw,13px)}
body.mobile .btn-red{font-size:clamp(10px,3.2vw,13px);padding:clamp(5px,1.5vw,8px) clamp(10px,3.5vw,15px)}
body.mobile .auto-btn{font-size:clamp(9px,2.8vw,12px);padding:clamp(4px,1.3vw,7px) clamp(8px,2.8vw,12px);border-radius:16px}
body.mobile .auto-dot{width:6px;height:6px}
body.mobile .chrono-ico{font-size:clamp(13px,4vw,18px)}
body.mobile .chrono-num{font-size:clamp(11px,3.4vw,14px);min-width:16px}
body.mobile .spd-btn{font-size:clamp(9px,2.6vw,11px);padding:2px 5px;border-radius:4px}
body.mobile .auto-speed{gap:2px}

/* ── Main ── hauteur dynamique basée sur dvh ── */
body.mobile .hand-wrap{flex-shrink:0;overflow:visible;position:relative;z-index:20}
body.mobile .hand-meta{padding:1px 7px 0;display:flex;align-items:center;justify-content:space-between}
body.mobile .hand-lbl{font-size:clamp(6.5px,2vw,8px)}
body.mobile .deck-count{font-size:clamp(6.5px,2vw,8px)}
/* Hauteur des cartes en main = ~15dvh, min 80px, max 110px */
body.mobile .hand-cards{
  height:calc(14*var(--dvh));
  min-height:75px; max-height:105px;
  gap:4px; padding:2px 7px 4px;
}
body.mobile .hcard{
  height:calc(12.5*var(--dvh));
  min-height:68px; max-height:96px;
}

/* ── Tooltip ── */
body.mobile .hcard-tooltip-img{
  padding:0!important;background:transparent!important;border:none!important;
  box-shadow:0 8px 32px rgba(0,0,0,.7)!important;
  overflow:hidden!important;
  width:160px!important;
  border-radius:10px!important;
}
body.mobile .hcard-tooltip-img>div{width:160px!important;}
body.mobile .hcard-tooltip{width:165px}
body.mobile .ht-name{font-size:11px}
body.mobile .ht-stat-val{font-size:12px}

/* ── Modale carte mobile ── */
.mob-card-modal-overlay{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
  align-items:flex-end;justify-content:center;
}
.mob-card-modal-overlay.open{display:flex}
.mob-card-modal{
  background:var(--s2);border:1px solid var(--bdr3);
  border-radius:20px 20px 0 0;
  width:100%;max-width:480px;
  max-height:92dvh;
  padding:0 0 env(safe-area-inset-bottom,12px);
  display:flex;flex-direction:column;
  animation:slideUpModal .25s cubic-bezier(.34,1.56,.64,1) both;
  overflow:hidden;
}
@keyframes slideUpModal{from{transform:translateY(100%);opacity:0}to{transform:none;opacity:1}}

/* Header : rarété + titre + bouton fermer */
.mob-card-modal-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 16px 10px;
  border-bottom:1px solid var(--bdr2);
  flex-shrink:0;
}
.mob-card-modal-title{
  font-family:'Cinzel',serif;font-weight:700;
  font-size:15px;color:var(--txt);
  line-height:1.2;margin-top:2px;
}
.mob-card-modal-rar{
  font-size:9px;letter-spacing:.2em;font-weight:700;text-transform:uppercase;
}
.mob-card-modal-close{
  background:var(--s3);border:1px solid var(--bdr2);color:var(--sub);
  width:32px;height:32px;border-radius:50%;cursor:pointer;flex-shrink:0;
  font-size:15px;display:flex;align-items:center;justify-content:center;
  margin-left:10px;
}

/* Corps scrollable */
.mob-card-modal-body{
  padding:14px 16px 8px;
  display:flex;flex-direction:column;gap:14px;
  overflow-y:auto;flex:1;
}

/* Image pleine largeur, ratio carte 410/580 */
.mob-card-modal-img{
  width:100%;
  aspect-ratio:410/580;
  border-radius:14px;overflow:hidden;
  background:var(--s3);flex-shrink:0;
}
.mob-card-modal-img img{
  width:100%;height:100%;
  object-fit:cover;object-position:center top;
  display:block;border-radius:14px;
}

/* Stats : colonnes pleine largeur */
.mob-card-modal-stats{
  display:flex;flex-direction:column;gap:8px;
}
.mob-card-modal-stats .ht-stat{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:var(--s3);font-family:'DM Mono',monospace;
}
.mob-card-modal-stats .ht-stat-ico{font-size:18px;flex-shrink:0}
.mob-card-modal-stats .ht-stat-lbl{
  font-size:11px;letter-spacing:.08em;color:var(--dim);
  text-transform:uppercase;font-weight:600;flex:1;
}
.mob-card-modal-stats .ht-stat-val{font-weight:700;font-size:20px;color:var(--txt)}
.mob-card-modal-desc{
  font-size:13px;color:var(--sub);font-style:italic;
  line-height:1.5;padding:10px 14px;
  background:var(--s3);border-radius:10px;
}

/* Boutons en bas fixe */
.mob-card-modal-actions{
  padding:12px 16px 4px;display:flex;gap:10px;flex-shrink:0;
  border-top:1px solid var(--bdr2);
}
.mob-card-modal-play{
  flex:1;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:.06em;text-transform:uppercase;
  padding:14px;border:none;border-radius:10px;cursor:pointer;

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glowGold{0%,100%{filter:none}50%{filter:none}}
@keyframes glowPur{0%,100%{filter:none}50%{filter:none}}
@keyframes glowRed{0%,100%{filter:none}50%{filter:none}}
@keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:none}}
@keyframes atkRight{0%{transform:none}38%{transform:translateX(48%) scale(1.06)}70%{transform:none}84%{transform:translateX(5px)}100%{transform:none}}
@keyframes atkLeft{0%{transform:none}38%{transform:translateX(-48%) scale(1.06)}70%{transform:none}84%{transform:translateX(-5px)}100%{transform:none}}
@keyframes hitShake{0%,100%{transform:none}18%{transform:translateX(-10px) rotate(-2deg)}36%{transform:translateX(10px) rotate(2deg)}54%{transform:translateX(-6px)}72%{transform:translateX(6px)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}25%{transform:scale(1.3)}55%{transform:scale(1.12)}}
@keyframes heartDmg{
  0%  {transform:scale(1);filter:none}
  10% {transform:scale(1.6);filter:drop-shadow(0 0 20px #ff0000) drop-shadow(0 0 50px #ff4400) brightness(1.4)}
  22% {transform:scale(.78);filter:drop-shadow(0 0 10px #ff2200)}
  38% {transform:scale(1.35);filter:drop-shadow(0 0 25px #ff2200) brightness(1.2)}
  55% {transform:scale(.9); filter:drop-shadow(0 0 6px #ff0000)}
  72% {transform:scale(1.1); filter:drop-shadow(0 0 10px #cc0000)}
  100%{transform:scale(1);  filter:none}
}
@keyframes pvLoss{
  0%  {opacity:0;transform:translateX(-50%) translateY(0) scale(.5)}
  15% {opacity:1;transform:translateX(-50%) translateY(-10px) scale(1.3)}
  50% {opacity:1;transform:translateX(-50%) translateY(-28px) scale(1.05)}
  100%{opacity:0;transform:translateX(-50%) translateY(-52px) scale(.85)}
}
@keyframes koSplash{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.15) rotate(-10deg)}
  14% {opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(4deg)}
  26% {transform:translate(-50%,-50%) scale(.9) rotate(-3deg)}
  38% {transform:translate(-50%,-50%) scale(1.1) rotate(2deg)}
  52% {transform:translate(-50%,-50%) scale(.97) rotate(0)}
  70% {opacity:1;transform:translate(-50%,-50%) scale(1)}
  88% {opacity:1;transform:translate(-50%,-50%) scale(1.02)}
  100%{opacity:0;transform:translate(-50%,-58%) scale(.92)}
}
@keyframes koFlash{
  0%{opacity:0} 8%{opacity:1} 22%{opacity:.4} 36%{opacity:.9} 55%{opacity:.3} 70%{opacity:.6} 100%{opacity:0}
}
@keyframes koShake{
  0%,100%{transform:none}
  10%{transform:translate(-8px, 4px) rotate(-1deg)}
  20%{transform:translate(8px, -4px) rotate(1deg)}
  30%{transform:translate(-10px, 2px) rotate(-.5deg)}
  40%{transform:translate(10px, -2px) rotate(.5deg)}
  50%{transform:translate(-6px, 3px)}
  60%{transform:translate(6px, -3px)}
  70%{transform:translate(-3px, 1px)}
  80%{transform:translate(3px, -1px)}
}
@keyframes coinAnim{0%{opacity:0;transform:scale(.6) rotateY(0)}20%{opacity:1;transform:scale(.9) rotateY(180deg)}50%{transform:scale(1.06) rotateY(900deg)}75%{transform:scale(1.02) rotateY(1260deg)}100%{transform:scale(1) rotateY(1440deg);opacity:1}}
@keyframes arrowPulse{0%,100%{opacity:.45;transform:scaleX(1)}50%{opacity:1;transform:scaleX(1.06)}}
@keyframes slideUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

@keyframes bubblePop{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(.15) rotate(-12deg)}
  18% {opacity:1;transform:translate(-50%,-58%) scale(1.22) rotate(5deg)}
  32% {transform:translate(-50%,-58%) scale(.93) rotate(-3deg)}
  46% {transform:translate(-50%,-58%) scale(1.08) rotate(2deg)}
  60% {opacity:1;transform:translate(-50%,-58%) scale(1) rotate(0)}
  80% {opacity:1;transform:translate(-50%,-60%) scale(1.02) rotate(0)}
  100%{opacity:0;transform:translate(-50%,-76%) scale(.88) rotate(2deg)}
}
@keyframes bubbleTxtShimmer{
  0%,100%{text-shadow:0 2px 8px rgba(0,0,0,.8),0 0 18px currentColor}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:38px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bdr2)}

.hcard:hover:not(.hc-dis){
  z-index:100;
  transform:translateY(-12px) scale(1.10);
  box-shadow:0 16px 40px rgba(0,0,0,.65),0 4px 12px rgba(0,0,0,.4);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;

<script>
/* Met à jour --dvh à chaque resize pour iOS/Android (barre URL rétractable) */
(function(){
  function setDvh(){document.documentElement.style.setProperty('--dvh',(window.innerHeight*0.01)+'px');}
  setDvh();
  window.addEventListener('resize',setDvh);
  window.addEventListener('orientationchange',function(){setTimeout(setDvh,150);});
})();
</script>
<script>
/* Détection automatique PC / Mobile au chargement et au resize */
(function(){
  var BREAKPOINT=768; /* px — en dessous = mobile */

  function applyLayout(){
    var isMobile=window.innerWidth<BREAKPOINT;
    if(typeof toggleLayout==='function'){
      toggleLayout(isMobile);
    } else {
      /* Fallback avant que toggleLayout soit défini */
      var body=document.body;
      var btn=document.getElementById('layout-btn');
      if(isMobile)body.classList.add('mobile');
      else body.classList.remove('mobile');
      if(btn)btn.textContent=isMobile?'🖥️ PC':'📱 Téléphone';
    }
  }

  /* Au chargement complet (toggleLayout est disponible) */
  window.addEventListener('DOMContentLoaded',function(){
    applyLayout();
  });

  /* Au resize (changement d'orientation, fenêtre redimensionnée) */
  var _resizeTimer=null;
  window.addEventListener('resize',function(){
    clearTimeout(_resizeTimer);
    _resizeTimer=setTimeout(applyLayout,200);
  });
  window.addEventListener('orientationchange',function(){
    setTimeout(applyLayout,300);
  });
})();
</script>

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildPioche(forBot){
  // Pour le bot : exclure les Mythiques
  const fighters = forBot ? AF.filter(c=>c.rarete!=='M') : AF;
  const spells   = AS;
  let f=[...fighters];
  if(f.length===0) return []; // deck vide si pas encore chargé
  while(f.length<10) f.push({...f[Math.floor(Math.random()*f.length)]});
  f=shuf(f).slice(0,10);
  let s=[...spells];
  while(s.length<8 && s.length>0) s.push({...s[Math.floor(Math.random()*s.length)]});
  s=shuf(s).slice(0,8);
  return shuf([...f.map(x=>({...x,ct:'fighter',hpCur:x.hp,hpBase:x.hp})),...s.map(x=>({...x,ct:'sort'}))]);
}

let _humanDeckFighters=[];
let _humanDeckSpells=[];
function buildHumanPioche(){
  if(_humanDeckFighters.length===0 && _humanDeckSpells.length===0) return buildPioche(false);
  let f=[..._humanDeckFighters];
  while(f.length<10 && f.length>0) f.push({...f[Math.floor(Math.random()*f.length)]});
  f=shuf(f).slice(0,10);
  let s=[..._humanDeckSpells];
  while(s.length<8 && s.length>0) s.push({...s[Math.floor(Math.random()*s.length)]});
  s=shuf(s).slice(0,8);
  return shuf([...f,...s]);
}

function aEff(p){if(!p.fighter)return 0;let v=p.fighter.atq;p.actives.forEach(a=>{if(a.at==='ba')v+=a.val;if(a.at==='da')v-=a.val;});return Math.max(0,v);}
function dEff(p){if(!p.fighter)return 0;let v=p.fighter.def;p.actives.forEach(a=>{if(a.at==='bd')v+=a.val;if(a.at==='dd')v-=a.val;});return Math.max(0,v);}
function precEff(p){if(!p.fighter)return p.fighter?p.fighter.prec:0.5;let v=p.fighter.prec;p.actives.forEach(a=>{if(a.at==='dp')v-=a.val/100;});return Math.max(0.05,v);}
function dEff(p){if(!p.fighter)return 0;let v=p.fighter.def;p.actives.forEach(a=>{if(a.at==='bd')v+=a.val;if(a.at==='dd')v-=a.val;});return Math.max(0,v);}
function pEff(p){
  if(!p.fighter) return 0;
  let v=p.fighter.prec;
  p.actives.forEach(a=>{
    if(a.at==='dp') v-=a.val/100;
    if(a.at==='bp') v+=a.val/100;
  });
  return Math.max(0.05,Math.min(1,v));
}
function applySort(s,cas,cib){
  // Gestion LOVE & PEACE : combo permanent
  if(s.effet==='love_peace'){
    // Vérifier si l'autre est déjà active
    const hasCombo=cas.actives.some(a=>a.at==='love_peace_pending');
    if(hasCombo){
      // Activer les deux effets combo
      cas.actives=cas.actives.filter(a=>a.at!=='love_peace_pending');
      cas.actives.push({nom:'LOVE & PEACE ATQ',at:'ba',val:s.val1||4,turns:9999,su:false,isLovePeace:true});
      cas.actives.push({nom:'LOVE & PEACE DEF',at:'bd',val:s.val2||4,turns:9999,su:false,isLovePeace:true});
      addLog('💕 LOVE & PEACE activé ! +4 ATQ +4 DEF permanent','sm');
    } else {
      cas.actives.push({nom:s.nom+'_pending',at:'love_peace_pending',val:0,turns:9999,su:false,isLovePeace:true});
    }
    return;
  }

  switch(s.effet){
    // ── Arcane : bonus sur ton héros ──
    case'buff_atq':
      cas.actives.push({nom:s.nom,at:'ba',val:s.val,turns:s.dur,su:s.survit});
      break;
    case'buff_def':
      cas.actives.push({nom:s.nom,at:'bd',val:s.val,turns:s.dur,su:s.survit});
      break;
    case'buff_atqdef':
      cas.actives.push({nom:s.nom+' ATQ',at:'ba',val:s.val,turns:s.dur,su:s.survit});
      cas.actives.push({nom:s.nom+' DEF',at:'bd',val:s.val2||s.val,turns:s.dur,su:s.survit});
      break;
    case'buff_prec':
      cas.actives.push({nom:s.nom,at:'bp',val:s.val,turns:s.dur,su:s.survit});
      break;
    case'buff_hp':
      if(cas.fighter) cas.fighter.hpCur=Math.min(cas.fighter.hpCur+(s.val||5),cas.fighter.hpBase);
      addLog(`💊 +${s.val||5} HP immédiats`,'sm');
      break;
    case'buff_atq_or_def':
      // Le joueur choisit : on applique ATQ par défaut (bot) ou on propose (humain géré côté UI)
      cas.actives.push({nom:s.nom+' (ATQ)',at:'ba',val:s.val,turns:s.dur,su:s.survit});
      break;
    case'no_spell':
      // L'adversaire ne peut jouer aucun sort ce tour
      cib.noSpellThisTurn=true;
      break;
    // ── Ruse : malus sur l'adversaire ──
    case'debuff_atq':
      cib.actives.push({nom:s.nom,at:'da',val:s.val,turns:s.dur,su:false});
      break;
    case'debuff_def':
      cib.actives.push({nom:s.nom,at:'dd',val:s.val,turns:s.dur,su:false});
      break;
    case'debuff_atqdef':
      cib.actives.push({nom:s.nom+' ATQ',at:'da',val:s.val,turns:s.dur,su:false});
      cib.actives.push({nom:s.nom+' DEF',at:'dd',val:s.val2||s.val,turns:s.dur,su:false});
      break;
    case'debuff_prec':
      cib.actives.push({nom:s.nom,at:'dp',val:s.val,turns:s.dur,su:false});
      break;
    case'skip_atq':
      cib.skipAtq=true;
      break;
    case'remove_ruse':
      // Retire 1 Ruse active sur son propre héros (malus subis)
      const ruseIdx=cas.actives.findIndex(a=>a.at==='da'||a.at==='dd'||a.at==='dp');
      if(ruseIdx>=0){cas.actives.splice(ruseIdx,1);addLog('🧹 1 Ruse retirée','sm');}
      break;
    case'remove_arcane':
      // Retire 1 Arcane adverse (buff), sauf LOVE & PEACE
      const arcIdx=cib.actives.findIndex(a=>(a.at==='ba'||a.at==='bd'||a.at==='bp')&&!a.isLovePeace);
      if(arcIdx>=0){cib.actives.splice(arcIdx,1);addLog('🧲 1 Arcane adverse annulée','sp');}
      break;
    // Anciens effets conservés
    case'cancel_magie':
      {const mi=cib.actives.findIndex(a=>a.at==='ba'||a.at==='bd');if(mi>=0)cib.actives.splice(mi,1);}
      break;
    case'cancel_all':
      cib.actives=cib.actives.filter(a=>a.su);
      cib.skipAtq=true;
      break;
  }
}

function showKOSplash(nom, side, pvPerdu, isHuman){
  // Flash écran + screen shake
  const flash=document.createElement('div');flash.className='ko-flash-bg';
  document.body.appendChild(flash);setTimeout(()=>flash.remove(),1200);

  if(!fc) return;

  // Supprimer d'éventuelles bulles KO existantes
  fc.querySelectorAll('.ko-bubble').forEach(e=>e.remove());

  // S'assurer que fc est position:relative (comme showBubble qui fonctionne)
  fc.style.position='relative';

  // Taille basée sur fc-img-wrap comme les autres bulles
  const imgWrap=fc.querySelector('.fc-img-wrap')||fc;
  const fcRect=fc.getBoundingClientRect();
  const wrapRect=imgWrap.getBoundingClientRect();

  // Offset du centre de l'image par rapport au fc
  const topOffset=wrapRect.top - fcRect.top + wrapRect.height/2;
  const leftOffset=wrapRect.left - fcRect.left + wrapRect.width/2;

  const wrap=document.createElement('div');
  wrap.className='ko-bubble';
  wrap.style.cssText=`
    position:absolute;
    top:${topOffset}px;
    left:${leftOffset}px;
    transform:translate(-50%,-50%);
    z-index:60;pointer-events:none;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    width:${wrapRect.width*0.9}px;
    animation:bubblePop 3.8s cubic-bezier(.2,0,.8,1) both;
  `;

  // Image KO
  const img=document.createElement('img');
  img.src=BUBBLE_KO_IMG;
  img.style.cssText='width:100%;height:auto;object-fit:contain;display:block;';
  img.draggable=false;

  koTxt.style.cssText=`

    margin-top:4px;

    background:rgba(0,0,0,.75);
    border-radius:6px;
    letter-spacing:.03em;
    line-height:1.5;
    white-space:normal;
  `;

function removeBlackBg(src, threshold=30){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0);
      const d=ctx.getImageData(0,0,c.width,c.height);
      const px=d.data;
      for(let i=0;i<px.length;i+=4){
        const r=px[i],g=px[i+1],b=px[i+2];
        const lum=Math.max(r,g,b);
        if(lum<threshold){px[i+3]=0;}
        else if(lum<threshold+40){px[i+3]=Math.round((lum-threshold)/40*255);}
      }
      ctx.putImageData(d,0,0);
      resolve(c.toDataURL('image/png'));
    };
    img.src=src;
  });
}

  let srcImg=null;
  if(type==='hit') srcImg=BUBBLE_HIT_IMGS[num]||null;
  else if(type==='miss') srcImg=BUBBLE_MISS_IMG;

  if(srcImg){
    // Afficher l'image PNG redimensionnée pour tenir dans l'encadré de la carte
    const fcRect=fc.getBoundingClientRect();
    const maxW=Math.min(fcRect.width*0.9, 220);

// Cache des images démagentisées
const _imgCache={};
function removeMagenta(url, cb){
  if(_imgCache[url]){cb(_imgCache[url]);return;}
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    const px=d.data;
    for(let i=0;i<px.length;i+=4){
      const r=px[i],g=px[i+1],b=px[i+2];
      // Magenta = R élevé, G bas, B élevé
      if(r>160 && g<90 && b>140){
        // Transition douce sur les bords
        const dist=Math.min(r-160, b-140, 90-g);
        px[i+3]=dist<20?0:Math.min(255,dist*8);
      }
    }
    ctx.putImageData(d,0,0);
    const url2=c.toDataURL('image/png');
    _imgCache[url]=url2;
    cb(url2);
  };
  img.onerror=()=>cb(url); // fallback URL brute
  img.src=url;
}

          showTT(ttHTML,{clientX:t.clientX,clientY:t.clientY});

}
function renderActions(){
  document.getElementById('btn-atk').disabled=G.phase!=='attack';
  document.getElementById('btn-pass').disabled=G.phase!=='sort';
  setInstr(G.phase==='choose_fighter'?'choose_fighter':G.phase==='sort'?'sort':G.phase==='attack'?'attack':'bot');
}

function humanPlayCard(idx){
  const c=G.human.hand[idx];if(!c)return;
  if(c.ct==='fighter'&&G.phase==='choose_fighter'){
    G.human.hand.splice(idx,1);G.human.fighter=c;
    addLog(`▶ ${c.nom}`,'sys','JOUEUR');
    if(!G.bot.fighter)botChooseFighter();
    if(G.fp==='bot'&&G.turn===1){G.phase='bot';render();setTimeout(()=>botTurn(),1400);}
    else{G.phase='sort';render();}
    resetChrono();if(_autoBattle)setTimeout(scheduleAutoStep,400);
    return;
  }
  if(c.ct==='sort'&&G.phase==='sort'&&!G.human.sortJoue){
    if(G.human.noSpellThisTurn){addLog('🚫 Sorts bloqués ce tour !','sys','JOUEUR');return;}
    G.human.hand.splice(idx,1);G.human.sortJoue=true;applySort(c,G.human,G.bot);
    addLog(`🃏 ${c.nom} — ${c.desc}`,c.type==='Magie'?'sm':'sp','JOUEUR');
    spellAnnounce('Joueur',c.nom,c.desc,c.type);
    G.phase='attack';render();
    resetChrono();if(_autoBattle)setTimeout(scheduleAutoStep,400);
  }
}
function humanPassSort(){if(G.phase!=='sort')return;G.human.sortJoue=true;G.phase='attack';render();resetChrono();if(_autoBattle)setTimeout(scheduleAutoStep,400);}
function humanAttack(){
  if(G.phase!=='attack')return;G.phase='bot';stopChrono();renderActions();
  if(!G.human.fighter||!G.bot.fighter){endTurn();return;}
  const bl=G.human.skipAtq,ms=!bl&&Math.random()>=pEff(G.human);
  const dmg=(!bl&&!ms)?Math.max(0,aEff(G.human)-dEff(G.bot)):0;
  playAttack('h','b',dmg,ms,bl).then(()=>{
    if(bl)addLog('💤 Bloqué','atk','JOUEUR');
    else if(ms)addLog('✗ Raté','atk','JOUEUR');
    else{G.bot.fighter.hpCur-=dmg;addLog(`⚔ ${dmg} dégâts sur ${G.bot.fighter.nom}`,'atk','JOUEUR');beatHeart('b');

      G.stats.totalDmgH+=dmg;
      const cn=G.human.fighter.nom;G.stats.dmgByCard[cn]=(G.stats.dmgByCard[cn]||0)+dmg;
    }
    if(checkKO(G.bot,'Bot'))return;render();setTimeout(()=>botTurn(),SPEED_DELAYS[_autoSpeed].atk);
  });
}
function botChooseFighter(){
  const fs=G.bot.hand.filter(c=>c.ct==='fighter');if(!fs.length)return;
  const best=fs.reduce((b,c)=>(c.atq*c.prec*c.hpCur+c.def*2)>(b.atq*b.prec*b.hpCur+b.def*2)?c:b);
  G.bot.hand=G.bot.hand.filter(c=>c!==best);G.bot.fighter=best;
  addLog(`▶ ${best.nom}`,'sys','BOT');
}
function botTurn(){
  if(G.ended)return;if(!G.bot.fighter){endTurn();return;}
  const so=G.bot.hand.filter(c=>c.ct==='sort');
  if(so.length&&!G.bot.sortJoue&&!G.bot.noSpellThisTurn){
    const s=so[0];G.bot.hand=G.bot.hand.filter(c=>c!==s);G.bot.sortJoue=true;applySort(s,G.bot,G.human);
    addLog(`🃏 ${s.nom} — ${s.desc}`,s.type==='Magie'?'sm':'sp','BOT');
    spellAnnounce('Bot',s.nom,s.desc,s.type);
  }
  if(!G.bot.skipAtq&&G.human.fighter){
    const ms=Math.random()>=pEff(G.bot),dmg=ms?0:Math.max(0,aEff(G.bot)-dEff(G.human));
    playAttack('b','h',dmg,ms,false).then(()=>{
      if(ms)addLog('✗ Raté','atk','BOT');
      else{G.human.fighter.hpCur-=dmg;addLog(`⚔ ${dmg} dégâts sur ${G.human.fighter.nom}`,'atk','BOT');beatHeart('h');
        G.stats.totalDmgB+=dmg;
        const cn=G.bot.fighter?G.bot.fighter.nom:'?';G.stats.dmgByCard[cn]=(G.stats.dmgByCard[cn]||0)+dmg;
      }
      if(checkKO(G.human,'Toi'))return;endTurn();
    });
  } else {if(checkKO(G.human,'Toi'))return;endTurn();}
}
function endTurn(){
  if(G.ended)return;tickActives(G.human);tickActives(G.bot);
  G.human.sortJoue=false;G.bot.sortJoue=false;draw(G.human);draw(G.bot);G.turn++;G.stats.turns++;
  G.phase=G.human.fighter?'sort':'choose_fighter';
  addTourLog(G.turn);render();
  if(_autoBattle)setTimeout(scheduleAutoStep,SPEED_DELAYS[_autoSpeed].auto);
  else resetChrono();
}
function draw(p){
  if(p.pioche.length){
    const c=p.pioche.shift();p.hand.push(c);
    if(p===G.human)G._newCardIdx=p.hand.length-1;
  }
}
function checkKO(player,label){
  if(!player.fighter||player.fighter.hpCur>0)return false;
  const f=player.fighter;
  const pvPerdu=f.hpBase;
  player.hp-=pvPerdu;
  heartDamage(player===G.human?'h':'b', pvPerdu);
  // Afficher la bulle KO AVANT que render() vide la carte
  showKOSplash(f.nom, player===G.human?'h':'b', pvPerdu, player===G.human);
  const cardId=player===G.human?'h':'b';
  const koBubble=document.querySelector(`#${cardId}-fc .ko-bubble`);
  addLog(`💀 ${f.nom} KO ! −${pvPerdu} PV`,'ko', player===G.human?'JOUEUR':'BOT');
  if(player.hp<=0){player.fighter=null;endGame(player===G.human?'bot':'human');return true;}
  const surv=player.actives.filter(a=>a.su);
  if(player===G.human){
    player.fighter=null;player.actives=surv;G.phase='choose_fighter';
    while(!player.hand.some(c=>c.ct==='fighter')&&player.pioche.length)player.hand.push(player.pioche.shift());
    if(!player.hand.some(c=>c.ct==='fighter')){endGame('bot');return true;}
    setInstr('ko');addLog('👆 Choisis ton prochain Héro !','sys');render();
    if(koBubble){const fc2=document.getElementById(`${cardId}-fc`);if(fc2){fc2.style.position='relative';fc2.appendChild(koBubble);}}
    if(_autoBattle)setTimeout(scheduleAutoStep,1600);
    return true;
  } else {
    player.actives=surv;
    if(!player.hand.some(c=>c.ct==='fighter')){while(player.pioche.length){const c=player.pioche.shift();player.hand.push(c);if(c.ct==='fighter')break;}}
    if(!player.hand.some(c=>c.ct==='fighter')){player.fighter=null;endGame('human');return true;}
    botChooseFighter();return false;
  }
}

const CHRONO_SEC=45;
let _chronoVal=CHRONO_SEC;
let _chronoInterval=null;
let _autoBattle=false;

function setSpeed(s){
  _autoSpeed=s;
  [1,2,3].forEach(n=>{
    const b=document.getElementById(`spd${n}`);
    if(b)b.classList.toggle('active',n===s);
  });
}
function toggleAuto(){
  _autoBattle=!_autoBattle;
  const btn=document.getElementById('auto-btn');
  btn.classList.toggle('on',_autoBattle);
  const sp=document.getElementById('auto-speed');
  if(sp)sp.classList.toggle('visible',_autoBattle);
  if(_autoBattle){
    addLog('⚡ Auto-Battle activé','sys');
    stopChrono();
    if(G.phase!=='bot'&&!G.ended) runAutoStep();
  } else {
    addLog('⚡ Auto-Battle désactivé','sys');
    startChrono();
  }
}

function startChrono(){
  stopChrono();
  if(G.ended||G.phase==='bot'||_autoBattle)return;
  _chronoVal=CHRONO_SEC;
  updateChronoUI();
  _chronoInterval=setInterval(()=>{
    _chronoVal--;
    updateChronoUI();
    if(_chronoVal<=0){
      stopChrono();

      addLog('⏱ Temps écoulé — auto','sys');
      runAutoStep();
    }
  },1000);
}
function stopChrono(){
  clearInterval(_chronoInterval);_chronoInterval=null;
}
const CLOCK_FRAMES=['🕐','🕑','🕒','🕓','🕔','🕕','🕖','🕗','🕘','🕙','🕚','🕛'];
function updateChronoUI(){
  const pct=_chronoVal/CHRONO_SEC;
  const num=document.getElementById('chrono-num');
  const ico=document.getElementById('chrono-ico');
  if(!num)return;
  const col=pct>.5?'var(--grn)':pct>.25?'var(--gold)':'var(--red)';
  num.style.color=col;
  num.textContent=_chronoVal;
  if(ico){
    const frame=Math.floor((1-pct)*CLOCK_FRAMES.length)%CLOCK_FRAMES.length;
    ico.textContent=CLOCK_FRAMES[frame];
    ico.style.opacity=pct<.25?'.5':'1';
  }
}
function resetChrono(){
  if(_autoBattle){stopChrono();return;}
  startChrono();
}

function runAutoStep(){
  if(G.ended)return;
  if(G.phase==='choose_fighter'){

    while(!G.human.hand.some(c=>c.ct==='fighter')&&G.human.pioche.length){
      G.human.hand.push(G.human.pioche.shift());
    }
    const fs=G.human.hand.filter(c=>c.ct==='fighter');
    if(fs.length) humanPlayCard(G.human.hand.indexOf(fs[0]));
    else if(_autoBattle) setTimeout(scheduleAutoStep,SPEED_DELAYS[_autoSpeed].auto); // pas de combattant, réessai
  } else if(G.phase==='sort'){
    const so=G.human.hand.filter(c=>c.ct==='sort');
    if(so.length&&!G.human.sortJoue) humanPlayCard(G.human.hand.indexOf(so[0]));
    else humanPassSort();
  } else if(G.phase==='attack'){
    humanAttack();
  }
}

function scheduleAutoStep(){
  if(!_autoBattle||G.ended)return;
  if(G.phase==='bot'){setTimeout(scheduleAutoStep,SPEED_DELAYS[_autoSpeed].auto);return;}
  setTimeout(()=>{runAutoStep();},SPEED_DELAYS[_autoSpeed].auto);
}

function resetIdle(){
  if(_autoBattle)return;
  resetChrono();
}

let _ct;
function showCoinToast(fp){

  const w=document.getElementById('coin-who');w.textContent=fp==='human'?'Tu commences !':'Le bot commence !';w.className='coin-who '+(fp==='human'?'first':'second');

  ov.style.display='flex';requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.add('show')));
  clearTimeout(_ct);_ct=setTimeout(()=>{box.classList.remove('show');setTimeout(()=>ov.style.display='none',400);},3600);
}

  document.getElementById('logp').classList.add('visible');
  _autoBattle=false;document.getElementById('auto-btn').classList.remove('on');

  // Utiliser le deck du joueur pour le human, bot aléatoire sans mythique
  const hd=buildHumanPioche();

function restartGame(){
  document.getElementById('ov-end').classList.remove('active');document.getElementById('loge').innerHTML='';
  document.getElementById('logp').classList.add('visible');
  _autoBattle=false;document.getElementById('auto-btn').classList.remove('on');

  if(G.fp==='bot'){setTimeout(()=>{botChooseFighter();render();},1800);}

}

// ── Parser valeur numérique depuis le CSV (ex: ",+5 HP" → 5, "+3" → 3, "-2" → 2) ──
function parseVal(v){
  if(v==null||v===''||v==='NaN') return 0;
  const s=String(v).replace(/[^0-9.\-]/g,'');
  const n=parseFloat(s);
  return isNaN(n)?0:Math.abs(n);
}

// ── Parser durée depuis time_played (ex: "1 tour" → 1, "3 tours" → 3, "Immédiat" → 0) ──
function parseDur(t){
  if(!t||t==='Immédiat'||t==='immédiat') return 0;
  const m=String(t).match(/\d+/);
  return m?parseInt(m[0]):1;
}

  if(s1==='spell_1ruse+') return {effet:'remove_ruse',val:0};
  if(s1==='spell_atq-' && s2==='spell_def-') return {effet:'debuff_atqdef',val:v1,val2:v2};
  if(s1==='spell_atq-') return {effet:'debuff_atq',val:v1};

  if(s1==='spell_1arcane-') return {effet:'remove_arcane',val:0};
  if(s1==='spell_nospell') return {effet:'no_spell',val:0};
  return {effet:'buff_atq',val:v1||2}; // fallback
}

// ── Convertir une carte Supabase → objet jeu ────────────────────────
function supaToGame(c){
  const rarete = RARITY_MAP[c.rarity] || 'C';
  if(c.type==='Hero' || c.type==='Héro'){
    return {
      id: c.id,
      nom: c.name,
      hp: parseFloat(c.hp)||10,
      atq: parseFloat(c.attack)||5,
      def: parseFloat(c.defense)||1,
      prec: c.precision!=null ? parseFloat(c.precision)/100 : 0.65,
      rarete,
      image_url: c.image_url||null,
      desc: c.description||'',
      ct:'fighter',
      hpCur:parseFloat(c.hp)||10,
      hpBase:parseFloat(c.hp)||10,
    };
  } else {
    // Carte sort (Arcane ou Ruse)
    const dur = parseDur(c.time_played);
    const {effet,val,val1,val2} = spellToEffet(c.name_spell_1, c.name_spell_2, c.value_spell_1, c.value_spell_2);
    return {
      id: c.id,
      nom: c.name,
      type: (c.type==='Ruse' || c.type==='Piège') ? 'Ruse' : 'Arcane',
      effet,
      val: val||0,
      val1: val1||0,
      val2: val2||0,
      dur: dur||1,
      survit: false,
      rarete,
      image_url: c.image_url||null,
      desc: c.effect||c.description||'',
      ct:'sort',
    };
  }
}

// ── Afficher une erreur sur l'écran de démarrage ─────────────────────
function showStartError(msg){
  const si=document.getElementById('si');
  const inner=si?si.querySelector('.si-inner'):null;
  if(!inner)return;
  inner.innerHTML=`
    <div style="font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin-bottom:16px;">PWL TCG</div>
    <div style="color:var(--red);font-size:.85rem;margin-bottom:20px;max-width:280px;text-align:center;line-height:1.6;">${msg}</div>
    <button onclick="window.location.href='index.html'" style="background:var(--gold);color:#000;border:none;padding:12px 28px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;">← Retour au menu</button>
  `;
}

// ── Chargement principal ──────────────────────────────────────────────
async function initSupabase(){
  // Attendre que le SDK soit prêt
  let tries=0;
  while(!window.supabase && tries++<50) await new Promise(r=>setTimeout(r,100));
  if(!window.supabase){showStartError('SDK Supabase non chargé.');return;}

  _db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{autoRefreshToken:true,persistSession:true}
  });

  // ── Récupérer la session Discord ──
  const {data:{session}}=await _db.auth.getSession();
  if(!session){
    showStartError('Tu n\'es pas connecté. Connecte-toi via Discord depuis le menu principal.');
    return;
  }
  _currentUser=session.user;

  // ── Charger TOUTES les cartes depuis Supabase ──
  const {data:allCards,error:cardErr}=await _db.from('cards')
    .select('id,name,type,rarity,hp,attack,defense,precision,description,effect,time_played,name_spell_1,value_spell_1,name_spell_2,value_spell_2,image_url')
    .order('id');
  if(cardErr||!allCards){
    showStartError('Impossible de charger les cartes depuis Supabase.');
    return;
  }

  // Remplir AF (Héros) et AS (Sorts) depuis Supabase — utilisés par le bot
  AF = allCards.filter(c=>c.type==='Hero'||c.type==='Héro').map(supaToGame);
  AS = allCards.filter(c=>c.type==='Arcane'||c.type==='Ruse').map(supaToGame);
  console.log(`[PVE] Cartes chargées — Héros: ${AF.length}, Sorts: ${AS.length}`);

  // ── Charger le deck par défaut du joueur ──
  const {data:deck}=await _db.from('decks')
    .select('id,name,is_default')
    .eq('player_id',_currentUser.id)
    .eq('is_default',true)
    .single();

  if(!deck){
    showStartError('Aucun deck par défaut trouvé.<br>Configure ton deck dans le menu principal.');
    return;
  }

  const {data:dc}=await _db.from('deck_cards')
    .select('card_id,quantity')
    .eq('deck_id',deck.id);

  const total=(dc||[]).reduce((s,c)=>s+c.quantity,0);
  if(total<30){
    showStartError(`Ton deck "${deck.name}" est incomplet (${total}/30 cartes).<br>Complète-le avant de jouer.`);
    return;
  }

  // Construire les tableaux du deck joueur (fighters + spells séparés)
  const cardMap={};
  allCards.forEach(c=>{cardMap[c.id]=c;});

  _humanDeckFighters=[];
  _humanDeckSpells=[];

  (dc||[]).forEach(entry=>{
    const raw=cardMap[entry.card_id];
    if(!raw) return;
    const game=supaToGame(raw);
    for(let i=0;i<entry.quantity;i++){
      if(game.ct==='fighter'){
        _humanDeckFighters.push({...game,hpCur:game.hp,hpBase:game.hp});
      } else {
        _humanDeckSpells.push({...game});
      }
    }
  });

  console.log(`[PVE] Deck "${deck.name}" chargé — Héros: ${_humanDeckFighters.length}, Sorts: ${_humanDeckSpells.length}`);

  // Activer le bouton Jouer
  const btn=document.querySelector('.start-btn');
  if(btn){
    btn.textContent=`Jouer`;
    btn.disabled=false;
  }

  // Afficher le nom du joueur dans l'UI
  const uname=_currentUser.user_metadata?.full_name||_currentUser.user_metadata?.name||'Joueur';
  const pjNames=document.querySelectorAll('.pj-name');
  if(pjNames[0]) pjNames[0].textContent=uname;
}

// ── Patch endGame : sauvegarder résultat + coins + XP ───────────────
const _origEndGame=endGame;
endGame=function(w){
  _origEndGame(w);
  const isWin=w==='human';
  const coins=isWin?150:75;
  const xp   =isWin?25:10;
  saveGameResult(isWin,coins,xp);
};

async function saveGameResult(isWin,coinsGained,xpGained){
  if(!_db||!_currentUser)return;
  const myId=_currentUser.id;
  try{
    const col=isWin?'wins':'losses';
    const {data:p}=await _db.from('players').select('wins,losses,coins,xp').eq('id',myId).single();
    if(p){
      const updates={[col]:(p[col]||0)+1,coins:(p.coins||0)+coinsGained,xp:(p.xp||0)+xpGained};
      await _db.from('players').update(updates).eq('id',myId);
    }
    console.log(`[PVE] ${isWin?'Victoire':'Défaite'} — +${coinsGained} coins +${xpGained} XP`);
  }catch(e){console.error('[PVE] saveGameResult:',e);}
}

// ── Démarrage ─────────────────────────────────────────────────────────
(async()=>{
  // Désactiver le bouton pendant le chargement
  const btn=document.querySelector('.start-btn');
  if(btn){btn.textContent='Chargement...';btn.disabled=true;}
  await initSupabase();
})();
</script></body></html>

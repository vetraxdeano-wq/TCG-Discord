<head>

<script>
  // ─── PWA INSTALL SYSTEM ──────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let _pwaInstallPrompt = null;
  let _pwaHideTimer = null;
  let _isInstalled = window.matchMedia('(display-mode: standalone)').matches
                  || ('standalone' in navigator && navigator.standalone);

  // Détection navigateur/plateforme
  const _ua = navigator.userAgent;
  const _isIos     = /iphone|ipad|ipod/i.test(_ua);
  const _isAndroid = /android/i.test(_ua);
  const _isOpera   = /OPR\/|Opera/i.test(_ua);
  const _isFirefox = /Firefox/i.test(_ua) && !/Seamonkey/i.test(_ua);
  const _isSamsung = /SamsungBrowser/i.test(_ua);
  const _isEdge    = /Edg\//i.test(_ua);
  const _isChrome  = /Chrome/i.test(_ua) && !_isOpera && !_isEdge && !_isSamsung;
  const _isSafari  = /Safari/i.test(_ua) && !_isChrome && !_isAndroid;
  const _isMobile  = _isIos || _isAndroid;

  function _hidePwaBtn() {
    const btn = document.getElementById('pwa-install-btn');
    if (btn) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; setTimeout(()=>{ btn.style.display='none'; }, 400); }
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaInstallPrompt = e;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    _pwaInstallPrompt = null;
    _isInstalled = true;
    _hidePwaBtn();
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  });

  // Déclencher : prompt natif si dispo, sinon overlay contextuel
  window.triggerPwaInstall = function() {
    if (_pwaInstallPrompt) {
      _pwaInstallPrompt.prompt();
      _pwaInstallPrompt.userChoice.then(() => {
        _pwaInstallPrompt = null;
        _hidePwaBtn();
      });
      return;
    }
    // iOS : essayer Web Share API pour déclencher le flow natif
    if (_isIos && navigator.share) {
      navigator.share({ title: 'Discord TCG', url: window.location.href })
        .catch(() => {});
      // Montrer quand même le guide car share ≠ install
    }
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) {
      _buildPwaOverlay(); // injecter le contenu contextualisé
      overlay.style.display = 'flex';
    }
  };

  window.closePwaOverlay = function() {
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  };

  // Construire l'overlay avec le bon contenu selon le navigateur détecté
  function _buildPwaOverlay() {
    const body = document.getElementById('pwa-overlay-body');
    if (!body) return;

    let sections = [];

    if (_isIos) {
      sections.push({
        icon:'🍎', label:'iPhone / iPad — Safari', color:'#eb459e',
        html:`1. Appuie sur l'icône <strong>⬆ Partager</strong> (en bas sur iPhone, en haut sur iPad).<br>2. Fais défiler et appuie sur <strong>« Sur l'écran d'accueil »</strong>.<br>3. Confirme avec <strong>« Ajouter »</strong> en haut à droite.<br><em style="font-size:10px;opacity:.7;">⚠ Fonctionne uniquement dans Safari, pas Chrome iOS.</em>`
      });
    } else if (_isSamsung) {
      sections.push({
        icon:'📱', label:'Samsung Internet (Android)', color:'#1e88e5',
        html:`1. Appuie sur l'icône <strong>☰</strong> en bas à droite.<br>2. Appuie sur <strong>« Ajouter page à »</strong>.<br>3. Choisis <strong>« Écran d'accueil »</strong> puis confirme.`
      });
    } else if (_isFirefox && _isAndroid) {
      sections.push({
        icon:'🦊', label:'Firefox Android', color:'#ff7139',
        html:`1. Appuie sur les <strong>⋮</strong> en haut à droite.<br>2. Appuie sur <strong>« Installer »</strong> ou <strong>« Ajouter à l'écran d'accueil »</strong>.<br><em style="font-size:10px;opacity:.7;">Si absent, utilise Chrome pour Android à la place.</em>`
      });
    } else if (_isFirefox) {
      sections.push({
        icon:'🦊', label:'Firefox (PC) — Non supporté', color:'#ff7139',
        html:`Firefox sur PC ne supporte pas l'installation d'applications web.<br>👉 Ouvre ce site dans <strong>Chrome</strong> ou <strong>Edge</strong> pour pouvoir l'installer.`
      });
    } else if (_isOpera && _isMobile) {
      sections.push({
        icon:'🎭', label:'Opera Mobile (Android)', color:'#cc0f16',
        html:`1. Appuie sur l'icône <strong>O</strong> ou les <strong>⋮</strong> en bas.<br>2. Appuie sur <strong>« Ajouter à l'écran d'accueil »</strong>.<br><em style="font-size:10px;opacity:.7;">Si l'option n'apparaît pas, utilise Chrome Android.</em>`
      });
    } else if (_isOpera) {
      sections.push({
        icon:'🎭', label:'Opera (PC)', color:'#cc0f16',
        html:`1. Regarde dans la barre d'adresse à droite — une icône <strong>📲</strong> ou <strong>⊕</strong> devrait apparaître.<br>2. Clique dessus puis sur <strong>« Installer »</strong>.<br>3. Si absent : menu Opera <strong>O</strong> en haut à gauche → <strong>« Enregistrer comme application »</strong>.<br><em style="font-size:10px;opacity:.7;">Si rien n'apparaît, utilise Chrome ou Edge qui supportent mieux l'installation.</em>`
      });
    } else if (_isEdge) {
      sections.push({
        icon:'🌐', label:'Microsoft Edge', color:'#0078d4',
        html:`1. Regarde l'icône <strong>⊕</strong> ou <strong>📲</strong> à droite de la barre d'adresse.<br>2. Clique dessus → <strong>« Installer Discord TCG »</strong>.<br>3. Ou : menu <strong>⋯</strong> en haut à droite → <strong>« Applications »</strong> → <strong>« Installer ce site en tant qu'application »</strong>.`
      });
    } else if (_isAndroid) {
      sections.push({
        icon:'📱', label:'Android — Chrome', color:'#57f287',
        html:`1. Appuie sur les <strong>⋮</strong> en haut à droite de Chrome.<br>2. Appuie sur <strong>« Ajouter à l'écran d'accueil »</strong> ou <strong>« Installer l'application »</strong>.<br>3. Confirme avec <strong>« Installer »</strong>.`
      });
    } else {
      sections.push({
        icon:'🖥', label:'Chrome / Edge (PC)', color:'#5865f2',
        html:`1. Regarde l'icône <strong>⊕</strong> ou <strong>📲</strong> à droite de la barre d'adresse.<br>2. Clique dessus → <strong>« Installer Discord TCG »</strong>.<br>3. Ou : menu <strong>⋮</strong> → <strong>« Enregistrer et partager »</strong> → <strong>« Installer la page en tant qu'application »</strong>.`
      });
    }

    if (!_isChrome || _isMobile) {
      sections.push({
        icon:'💡', label:'Conseil : Chrome ou Edge recommandé', color:'#fbbf24',
        html:`Pour une installation facile, ouvre ce site dans <strong>Chrome</strong> ou <strong>Edge</strong> — le bouton d'installation s'affiche automatiquement dans la barre d'adresse.`
      });
    }

    body.innerHTML = sections.map(s => `
      <div style="background:#0f0e17;border:2px solid ${s.color}30;padding:14px;margin-bottom:10px;">
        <div style="font-size:11px;font-weight:900;color:${s.color};letter-spacing:.8px;margin-bottom:8px;">${s.icon} ${s.label}</div>
        <div style="font-size:11px;color:#9d8ea0;line-height:1.7;">${s.html}</div>
      </div>`).join('');
  }

  // Auto-hide : montrer le bouton si pas encore installé, puis cacher après 15s
  window._startPwaAutoHide = function() {
    if (_isInstalled) return; // déjà installé, rien à faire
    if (_pwaHideTimer) return; // déjà lancé
    const btn = document.getElementById('pwa-install-btn');
    if (btn) {
      btn.style.display = 'flex';
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    }
    _pwaHideTimer = setTimeout(() => {
      _hidePwaBtn();
    }, 15000);
  };

  // Cacher si déjà installé au chargement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => _hidePwaBtn());
  }
  // Sur iOS en standalone : masquer immédiatement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
    });
  }
</script>

<!-- ── Bouton installation PWA — en haut à droite ── -->
<div id="pwa-install-btn" style="display:none;position:fixed;top:12px;right:12px;z-index:9999;align-items:center;gap:0;">
  <button onclick="window.triggerPwaInstall()" style="display:flex;align-items:center;gap:7px;padding:8px 14px;background:#5865f2;color:#fff;border:2px solid #000;border-right:none;box-shadow:3px 3px 0 #000;font-family:inherit;font-size:11px;font-weight:900;cursor:pointer;letter-spacing:.5px;white-space:nowrap;">
    📲 INSTALLER
  </button>
  <button onclick="document.getElementById('pwa-install-btn').style.display='none'" style="display:flex;align-items:center;justify-content:center;width:30px;height:100%;padding:8px 0;background:#3b3f70;color:#c4c9ff;border:2px solid #000;box-shadow:3px 3px 0 #000;font-family:inherit;font-size:13px;font-weight:900;cursor:pointer;line-height:1;">✕</button>
</div>

<!-- ── Overlay guide installation ── -->
<div id="pwa-install-overlay" onclick="if(event.target===this)window.closePwaOverlay()" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:380px;background:#1a1825;border:3px solid #000;box-shadow:6px 6px 0 #000;overflow:hidden;">
    <div style="height:4px;background:linear-gradient(90deg,#5865f2,#eb459e,#fee75c);"></div>
    <div style="padding:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:1px;">📲 INSTALLER DISCORD TCG</div>
        <button onclick="window.closePwaOverlay()" style="background:transparent;border:none;color:#9d8ea0;font-size:20px;cursor:pointer;line-height:1;padding:0 2px;">✕</button>
      </div>
      <!-- Contenu injecté dynamiquement selon le navigateur -->
      <div id="pwa-overlay-body"></div>
    </div>
  </div>
</div>

<body>
<div id="app" style="position:relative;z-index:1;"></div>
<div id="yt-audio-player" style="display:none;width:0;height:0;pointer-events:none;"></div>
<script>
// ─── THEMES ───────────────────────────────────────────────────────
const themes = {
  dark:{
    bg:"#0f0e17",bgSecondary:"#1a1825",bgTertiary:"#221f2e",
    surface:"#2a2639",accent:"#fbbf24",accentGlow:"rgba(251,191,36,0.25)",
    accentAlt:"#f43f5e",
    green:"#22c55e",red:"#ef4444",yellow:"#fbbf24",
    text:"#fffbeb",textMuted:"#9d8ea0",textFaint:"#3a3348",
    border:"rgba(0,0,0,0.9)",borderStrong:"rgba(0,0,0,1)",
    inkColor:"#000",halftone:"rgba(251,191,36,0.06)",
  },
};

const BOOSTERS = [
  {id:1,name:"Normal",price:150,color:"#9ca3af",rarity:"common",cards:5},
  {id:2,name:"Prestige",price:1000,color:"#cd7f32",rarity:"rare",cards:5},
  {id:3,name:"Légendaire",price:2000,color:"#f0c060",rarity:"mythic",cards:5},
];

// ALL_CARDS sera chargé depuis Supabase
let ALL_CARDS = [];

// ─── DAILY LIMITS ─────────────────────────────────────────────────
// Pioche & Trade : localStorage (pas cross-device mais ok)
// Boosters Prestige/Légendaire : Supabase (cross-device, par compte)
function _dailyKey(userId){ return 'daily_' + userId; }

function _weekStr(){
  const d = new Date();
  // Numéro de semaine ISO (lundi = début)
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek = new Date(jan4);
  startOfWeek.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  const weekNum = Math.floor((d - startOfWeek) / 604800000) + 1;
  return d.getFullYear() + '-W' + String(weekNum).padStart(2,'0');
}
function _weeklyKey(userId){ return 'weekly_' + userId; }
function getWeeklyData(userId){
  try{
    const raw = JSON.parse(localStorage.getItem(_weeklyKey(userId))||'{}');
    // Reset si semaine différente
    if(raw._week !== _weekStr()) return {_week: _weekStr()};
    return raw;
  }catch(e){ return {_week: _weekStr()}; }
}
function setWeeklyData(userId, patch){
  const cur = getWeeklyData(userId);
  localStorage.setItem(_weeklyKey(userId), JSON.stringify({...cur, ...patch}));
}
// FIX : on utilise la date LOCALE (et non UTC), pour que le reset de la pioche
// se cale sur minuit heure du joueur, et pas sur minuit UTC.
// Bug précédent : toISOString() = UTC → à minuit Paris (22h ou 23h UTC selon DST),
// la "date d'aujourd'hui" en UTC n'avait pas encore changé, donc la pioche
// restait bloquée 1-2h après minuit local.
function _todayStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getDailyData(userId){
  try{ return JSON.parse(localStorage.getItem(_dailyKey(userId)) || '{}'); }
  catch(e){ return {}; }
}
function setDailyData(userId, patch){
  const cur = getDailyData(userId);
  localStorage.setItem(_dailyKey(userId), JSON.stringify({...cur, ...patch}));
}

// ─── BOOSTERS DAILY LIMITS — cross-device via Supabase ────────────
// Les colonnes Supabase utilisées :
//   booster_prestige_date  DATE
//   booster_prestige_count INT DEFAULT 0
//   booster_leg_date        DATE
//   booster_leg_count       INT DEFAULT 0
// Le reset est automatique : on compare la date stockée avec aujourd'hui.
// Si différente → nouveau jour → compteur repart à zéro.

let _boosterCache = null; // { userId, prestigeDate, prestigeCount, legDate, legCount }

async function _loadBoosterCache(userId){
  if(_boosterCache && _boosterCache.userId === userId) return _boosterCache;
  try{
    const db = window.db;
    if(!db) throw new Error('db not ready');
    const { data } = await db
      .from('players')
      .select('booster_prestige_date, booster_prestige_count, booster_leg_date, booster_leg_count')
      .eq('id', userId)
      .single();
    _boosterCache = {
      userId,
      prestigeDate:  data?.booster_prestige_date  || null,
      prestigeCount: data?.booster_prestige_count  || 0,
      legDate:       data?.booster_leg_date        || null,
      legCount:      data?.booster_leg_count       || 0,
    };
  }catch(e){
    _boosterCache = { userId, prestigeDate:null, prestigeCount:0, legDate:null, legCount:0 };
  }
  return _boosterCache;
}

// Async : vérification réelle avant ouverture
async function getBoosterRemaining(userId, boosterId){
  const today = _todayStr();
  const c = await _loadBoosterCache(userId);
  if(boosterId === 2){
    if(c.prestigeDate !== today) return 2;
    return Math.max(0, 2 - (c.prestigeCount || 0));
  }
  if(boosterId === 3){
    if(c.legDate !== today) return 1;
    return Math.max(0, 1 - (c.legCount || 0));
  }
  return Infinity; // Normal : illimité
}

// Sync : affichage UI basé sur le cache déjà chargé
function getBoosterRemainingSync(userId, boosterId){
  const today = _todayStr();
  if(!_boosterCache || _boosterCache.userId !== userId){
    return boosterId === 2 ? 2 : boosterId === 3 ? 1 : Infinity;
  }
  const c = _boosterCache;
  if(boosterId === 2) return c.prestigeDate !== today ? 2 : Math.max(0, 2 - (c.prestigeCount || 0));
  if(boosterId === 3) return c.legDate !== today ? 1 : Math.max(0, 1 - (c.legCount || 0));
  return Infinity;
}

async function markBoosterUsed(userId, boosterId){
  const today = _todayStr();
  const c = await _loadBoosterCache(userId);
  let patch = {};
  if(boosterId === 2){
    const count = c.prestigeDate === today ? (c.prestigeCount || 0) : 0;
    patch = { booster_prestige_date: today, booster_prestige_count: count + 1 };
    _boosterCache = { ...c, prestigeDate: today, prestigeCount: count + 1 };
  } else if(boosterId === 3){
    const count = c.legDate === today ? (c.legCount || 0) : 0;
    patch = { booster_leg_date: today, booster_leg_count: count + 1 };
    _boosterCache = { ...c, legDate: today, legCount: count + 1 };
  }
  if(Object.keys(patch).length){
    try{
      await window.db.from('players').update(patch).eq('id', userId);
    }catch(e){ console.error('markBoosterUsed error', e); }
  }
  // ── Stats boosters ──────────────────────────────────────────────
  try{

}

// Renvoie un string "Xh Ym Zs" jusqu'au prochain minuit
function timeUntilMidnight(){
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return h + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
}

// SYSTÈME MUSIQUE — PLAYLIST ALÉATOIRE (table music_tracks Supabase)
// Comportement FIFA : piste aléatoire à chaque retour au menu, skip
// ═══════════════════════════════════════════════════════════════════

// ── État global ──────────────────────────────────────────────────
let _ytPlayer      = null;
let _ytReady       = false;
let _ytPendingPlay = false;
let _ytPlayRetryTimer = null;
let audioPlaying   = false;

// Playlist chargée depuis Supabase
let _musicTracks   = [];  // [{id, youtube_id, title, artist}, ...]
let _currentTrackIdx = -1; // index dans _musicTracks
let _loadingTrack  = false;

// ── BroadcastChannel — évite doublon audio cross-onglets ─────────
const _musicChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel('tcg_music') : null;
const _musicTabId   = Math.random().toString(36).slice(2);
if(_musicChannel){
  _musicChannel.onmessage = function(ev){
    const msg = ev.data;
    if(!msg) return;
    if(msg.type === 'playing' && msg.tabId !== _musicTabId){
      if(_ytPlayer && audioPlaying) try{ _ytPlayer.pauseVideo(); }catch(e){}
    }
    if(msg.type === 'stopped' && msg.tabId !== _musicTabId){
      if(audioPlaying && _ytPlayer) setTimeout(()=>{ if(audioPlaying) _doPlay(); }, 200);
    }
  };
}
function _broadcastPlaying(){ if(_musicChannel) _musicChannel.postMessage({type:'playing', tabId:_musicTabId}); }
function _broadcastStopped(){ if(_musicChannel) _musicChannel.postMessage({type:'stopped', tabId:_musicTabId}); }

// ── Charger la playlist depuis Supabase ──────────────────────────
async function _loadPlaylist(){
  try{
    const db = window.db;
    if(!db) return;
    const { data, error } = await db
      .from('music_tracks')
      .select('id, youtube_id, title, artist')
      .order('id');
    if(!error && data && data.length > 0){
      _musicTracks = data;
      console.log('[Music] Playlist chargée :', _musicTracks.length, 'pistes');
    }
  }catch(e){ console.warn('[Music] Impossible de charger la playlist :', e); }
}

// ── Choisir une piste aléatoire (différente de la précédente) ────
function _pickRandomTrack(){
  if(_musicTracks.length === 0) return null;
  if(_musicTracks.length === 1) return 0;
  let idx;
  do { idx = Math.floor(Math.random() * _musicTracks.length); }
  while(idx === _currentTrackIdx);
  return idx;
}

// ── Charger l'API YouTube ────────────────────────────────────────
(function loadYTApi(){
  if(window.YT && window.YT.Player){ _ytReady = true; return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function(){
  _ytReady = true;
  const container = document.getElementById('yt-audio-player');
  if(!container) return;

  // Démarrer avec une piste vide — on la changera via loadVideoById
  _ytPlayer = new YT.Player('yt-audio-player', {
    videoId: '',
    playerVars:{
      autoplay:0, controls:0, loop:0,
      modestbranding:1, rel:0, playsinline:1, mute:0,
    },
    events:{
      onReady: function(e){
        const savedVol = parseInt(localStorage.getItem('music_volume')||'25');
        e.target.setVolume(savedVol);
        if(_ytPendingPlay){ _ytPendingPlay = false; _doPlayCurrentTrack(); }
        else { try{ e.target.pauseVideo(); }catch(ex){} }
      },
      onStateChange: function(e){
        if(!audioPlaying) return;
        if(e.data === YT.PlayerState.ENDED){
          // Fin de piste → piste suivante automatiquement (comme FIFA)
          _skipToNext();
        } else if(e.data === YT.PlayerState.PAUSED){
          setTimeout(()=>{ if(audioPlaying){ try{ _ytPlayer.playVideo(); }catch(ex){} } }, 300);
        }
      },
      onError: function(){
        // Piste indisponible → skip automatique
        if(audioPlaying) setTimeout(_skipToNext, 1000);
      },
    }
  });
};

// ── Lancer la piste courante ─────────────────────────────────────
function _doPlayCurrentTrack(){
  if(!_ytPlayer || _currentTrackIdx < 0 || _currentTrackIdx >= _musicTracks.length) return;
  const track = _musicTracks[_currentTrackIdx];
  try{
    _ytPlayer.loadVideoById({ videoId: track.youtube_id, suggestedQuality: 'small' });
    _broadcastPlaying();
    _updateTrackDisplay();
  }catch(e){}
}

function _doPlay(){
  if(!_ytPlayer) return;
  try{
    const s = _ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1;
    if(s === 1) return;
    _ytPlayer.playVideo();
    _broadcastPlaying();
  }catch(e){}
}

function _ensurePlay(){
  if(_ytPlayRetryTimer) return;
  _ytPlayRetryTimer = setInterval(()=>{
    if(!audioPlaying){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; }
    const s = _ytPlayer ? (_ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1) : -1;
    if(s === 1){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; }
    _doPlay();
  }, 800);
  setTimeout(()=>{ if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; } }, 15000);
}

// ── Skip → piste suivante ────────────────────────────────────────
function _skipToNext(){
  if(_musicTracks.length === 0) return;
  _currentTrackIdx = _pickRandomTrack();
  if(_currentTrackIdx === null) return;
  if(!_ytReady || !_ytPlayer){ return; }
  _doPlayCurrentTrack();
  _ensurePlay();
  _updateTrackDisplay();
}

// Exposé globalement pour le bouton skip du popup
window.musicSkip = function(){
  _skipToNext();
};

// ── Mettre à jour l'affichage du titre dans le popup ────────────
function _updateTrackDisplay(){
  const titleEl  = document.getElementById('music-track-title');
  const artistEl = document.getElementById('music-track-artist');
  if(_currentTrackIdx >= 0 && _currentTrackIdx < _musicTracks.length){
    const t = _musicTracks[_currentTrackIdx];
    if(titleEl)  titleEl.textContent  = t.title  || '—';
    if(artistEl) artistEl.textContent = t.artist || '';
  } else {
    if(titleEl)  titleEl.textContent  = '—';
    if(artistEl) artistEl.textContent = '';
  }
}

function _saveMusicPref(on){
  try{ localStorage.setItem('music_on', on ? '1' : '0'); }catch(e){}
  const vol = parseInt(localStorage.getItem('music_volume')||'25');
  _saveMusicPrefsToSupabase(on, vol);
}
function _loadMusicPref(){ try{ var v=localStorage.getItem('music_on'); return v===null ? false : v==='1'; }catch(e){ return false; } }

async function _saveMusicPrefsToSupabase(on, vol){
  try{
    const db = window.db;
    const uid = state.currentUser?.id;
    if(!db||!uid) return;
    await db.from('players').update({ music_on: on, music_volume: vol }).eq('id', uid);
  }catch(e){}
}

async function _loadMusicPrefsFromSupabase(userId){
  try{
    const db = window.db;
    if(!db||!userId) return;
    const { data } = await db.from('players').select('music_on, music_volume').eq('id', userId).single();
    if(!data) return;
    if(data.music_on !== null && data.music_on !== undefined)
      try{ localStorage.setItem('music_on', data.music_on ? '1' : '0'); }catch(e){}
    if(data.music_volume !== null && data.music_volume !== undefined && !isNaN(data.music_volume)){
      try{ localStorage.setItem('music_volume', String(data.music_volume)); }catch(e){}
      state.musicVolume = data.music_volume;
      if(_ytPlayer && _ytPlayer.setVolume) try{ _ytPlayer.setVolume(data.music_volume); }catch(e){}
    }
    const shouldPlay = data.music_on === true || data.music_on === 1;
    state.musicOn = shouldPlay;
    // Charger la playlist et choisir une piste aléatoire
    await _loadPlaylist();
    _currentTrackIdx = _pickRandomTrack() ?? 0;
    if(shouldPlay && !audioPlaying){ audioPlay(); }
    else if(!shouldPlay && audioPlaying){ audioStop(); }
  }catch(e){}
}

// ── audioPlay / audioStop / audioToggle ─────────────────────────
function audioPlay(){
  if(audioPlaying) return;
  audioPlaying = true;
  _saveMusicPref(true);
  if(_ytPlayer && _ytPlayer.setVolume){
    const vol = parseInt(localStorage.getItem('music_volume')||'25');
    try{ _ytPlayer.setVolume(vol > 0 ? vol : 25); }catch(e){}
    state.musicVolume = vol > 0 ? vol : 25;
  }
  if(!_ytReady || !_ytPlayer){ _ytPendingPlay = true; return; }

  // Choisir une piste aléatoire à chaque fois qu'on revient au menu (comme FIFA)
  if(_currentTrackIdx < 0){
    _currentTrackIdx = _pickRandomTrack() ?? 0;
  }
  if(_musicTracks.length > 0){
    _doPlayCurrentTrack();
  } else {
    _doPlay(); // fallback si playlist pas encore chargée
  }
  _ensurePlay();
}

function audioStop(){
  audioPlaying = false;
  _ytPendingPlay = false;
  _saveMusicPref(false);
  if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; }
  if(_ytPlayer){
    try{ _ytPlayer.pauseVideo(); }catch(e){}
  }
  _broadcastStopped();
}

function audioToggle(){ if(audioPlaying) audioStop(); else audioPlay(); }

window._setMusicVolume = function(val) {
  const v = parseInt(val);

  if (_ytPlayer && _ytPlayer.setVolume) {

  try { localStorage.setItem('music_volume', v); } catch(e) {}

  const span = document.querySelector('#music-volume-slider + span, span:has(+ #music-volume-slider)');

    if (label) label.textContent = v + '%';
  }
};

// ─── TRADE MODAL FILTER HELPERS (global, appelés depuis les boutons inline) ───
window._tradeRarityFilter = new Set();
window._tradeDoublesOnly = false;
window._tradeApplyFilters = function(){
  var q = (document.getElementById('trade-search-input') ? document.getElementById('trade-search-input').value : '').toLowerCase();
  document.querySelectorAll('.trade-pick-card').forEach(function(el){
    var name = (el.dataset.name||'').toLowerCase();
    var id = (el.dataset.cardid||'');
    var rarity = el.dataset.rarity||'';
    var count = parseInt(el.dataset.count||'1');
    var matchSearch = q===''||name.includes(q)||id.includes(q);
    var matchRarity = window._tradeRarityFilter.size===0||window._tradeRarityFilter.has(rarity);
    var matchDoubles = !window._tradeDoublesOnly||count>=2;
    el.style.display = (matchSearch&&matchRarity&&matchDoubles)?'':'none';
  });
};
window._tradeToggleRarity = function(r){
  if(window._tradeRarityFilter.has(r)) window._tradeRarityFilter.delete(r);
  else window._tradeRarityFilter.add(r);
  var RC={mythic:'#f43f5e',rare:'#a78bfa',uncommon:'#38bdf8',common:'#64748b'};
  var btn=document.getElementById('trade-filter-'+r);
  if(btn){
    var active=window._tradeRarityFilter.has(r);
    btn.style.background=active?(RC[r]+'28'):'transparent';
    btn.style.borderColor=active?RC[r]:(RC[r]+'55');
    btn.style.color=active?RC[r]:'#6b7280';
  }
  window._tradeApplyFilters();
};
window._tradeToggleDoubles = function(){
  window._tradeDoublesOnly=!window._tradeDoublesOnly;
  var btn=document.getElementById('trade-filter-doubles');
  if(btn){
    btn.style.background=window._tradeDoublesOnly?'rgba(251,191,36,.18)':'transparent';
    btn.style.borderColor=window._tradeDoublesOnly?'#fbbf24':'rgba(251,191,36,.4)';
    btn.style.color=window._tradeDoublesOnly?'#fbbf24':'#6b7280';
  }
  window._tradeApplyFilters();
};
// Reset filters when trade modal opens
window._tradeResetFilters = function(){
  window._tradeRarityFilter = new Set();
  window._tradeDoublesOnly = false;
};

function render(){
  window._mktRerender = render; // expose pour les filtres stand detail
  const app = document.getElementById('app');
  const th = t();
  // Body background = couleur de la nav (bgSecondary) pour qu'aucune bande différente
  // ne soit visible sur Android/iOS autour de l'app (safe-area, barre système, etc.)
  document.body.style.background = th.bgSecondary;
  document.documentElement.style.background = th.bgSecondary;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
    if(window._lbPreviewRestart) window._lbPreviewRestart();
  }
}

function bindSplash(){
  document.getElementById('splash').addEventListener('click', ()=>{
    const cta = document.querySelector('.cta-pulse');
    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Animate logo glow pulse
    const logo = document.getElementById('splash-logo');
    if(logo){
      const glow = 0.25 + Math.sin(splashTick * 0.04) * 0.1;
      logo.style.filter = `drop-shadow(0 0 ${18+Math.sin(splashTick*.04)*6}px rgba(251,191,36,${glow})) drop-shadow(0 0 6px rgba(251,191,36,.15))`;
    }
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

async function subscribeNotifications() {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Charger les combat requests en attente
  const { data: combatNotifs } = await db.from('notifications')
    .select('id, from_id, read')
    .eq('user_id', myId).eq('type', 'combat_request').eq('read', false);

  if (combatNotifs && combatNotifs.length > 0) {
    const fromIds = [...new Set(combatNotifs.map(n => n.from_id))];
    const { data: senders } = await db.from('players').select('id, discord_username, avatar_url').in('id', fromIds);
    const senderMap = {};
    (senders||[]).forEach(s => { senderMap[s.id] = s; });
    const combatReqs = combatNotifs.map(n => ({
      request_id: n.id,
      from_id: n.from_id,
      discord_username: senderMap[n.from_id]?.discord_username || 'Joueur',
      avatar_url: senderMap[n.from_id]?.avatar_url || null,
    }));
    setState({ combatRequestsIn: combatReqs });
  }

  // Charger les notifications non lues (type message)
  const { data: notifs } = await db.from('notifications')
    .select('id, type, from_id, text, created_at, read')
    .eq('user_id', myId)
    .eq('read', false)
    .order('created_at', { ascending: false });

  // Filtrer celles de la conv déjà ouverte (si on revient d'une conv)
  // et les marquer lues en base pour éviter qu'elles réapparaissent au prochain refresh
  const activeConv = state.activeConvId;
  const allMsgNotifs = (notifs||[]).filter(n => n.type === 'message');

  // Notifs de convs déjà actives → marquer lues silencieusement
  const toMarkRead = activeConv ? allMsgNotifs.filter(n => n.from_id === activeConv) : [];
  if (toMarkRead.length > 0) {
    try { await db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', activeConv)
      .eq('read', false); } catch(e) {}
  }

  const msgNotifs = allMsgNotifs.filter(n => !activeConv || n.from_id !== activeConv);
  setState({ msgNotifCount: msgNotifs.length, pendingMsgNotifs: msgNotifs });

  // Charger les récompenses de niveau non réclamées (coins ET boosters)
  const { data: lvlAllNotifs } = await db.from('notifications')
    .select('id, type, text, meta, created_at')
    .eq('user_id', myId)
    .in('type', ['level_reward', 'level_reward_booster'])
    .eq('read', false);
  if (lvlAllNotifs && lvlAllNotifs.length > 0) {
    // Charger les levels déjà réclamés (table claimed_rewards — source de vérité)
    const { data: claimedRows } = await db.from('claimed_rewards')
      .select('level').eq('player_id', myId);
    const claimedLevels = new Set((claimedRows || []).map(r => r.level));

    const existing = state.pendingLevelRewards || [];
    const existingIds = new Set(existing.map(r => r.notifId));
    const newOnes = [];
    lvlAllNotifs.forEach(n => {
      if (existingIds.has(n.id)) return;
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      const lvl = meta.level || 0;
      if (claimedLevels.has(lvl)) return; // déjà réclamée définitivement
      if (n.type === 'level_reward') {
        const amount = meta.amount || 300;
        newOnes.push({ notifId: n.id, level: lvl, type: 'coins', amount });
      } else {
        newOnes.push({ notifId: n.id, level: lvl, type: meta.rewardType || 'booster_prestige', label: n.text });
      }
    });
    if (newOnes.length > 0) {
      setState({ pendingLevelRewards: [...existing, ...newOnes] });
    }
  }

  // Charger les notifications trade_accepted non lues (expéditeur hors-ligne au moment de l'acceptation)
  const { data: _pendingTradeNotifs } = await db.from('notifications')
    .select('id, from_id, text, meta, read')
    .eq('user_id', myId)
    .eq('type', 'trade_accepted')
    .eq('read', false)
    .order('created_at', { ascending: true });

  if (_pendingTradeNotifs && _pendingTradeNotifs.length > 0) {
    // On ne montre que la plus récente pour ne pas spammer si plusieurs échanges en attente
    const _tn = _pendingTradeNotifs[_pendingTradeNotifs.length - 1];
    let _tnMeta = {};
    try { _tnMeta = JSON.parse(_tn.meta || '{}'); } catch(e) {}
    const _tnObtainedName = _tnMeta.to_card   || null; // carte que l'expéditeur REÇOIT
    const _tnGivenName    = _tnMeta.from_card  || null; // carte que l'expéditeur a DONNÉE

    // Marquer toutes lues immédiatement (une seule animation, pas de replay)
    try {
      await db.from('notifications')
        .update({ read: true })
        .eq('user_id', myId)
        .eq('type', 'trade_accepted')
        .eq('read', false);
    } catch(e) {}

    if (_tnObtainedName) {
      // Attendre que ALL_CARDS soit chargé (loadCollection peut être asynchrone)
      const _runTradeAnim = () => {
        const _tcOb = ALL_CARDS.find(c => c.name === _tnObtainedName);
        const _tcGv = ALL_CARDS.find(c => c.name === _tnGivenName);
        const _tcAccepterName = (state.friends || []).find(f => f.id === _tn.from_id)?.discord_username || 'Ton ami';
        if (_tcOb) {
          showTradeCompleteAnimation({
            obtainedCard: _tcOb,
            givenCard:    _tcGv || _tcOb,
            senderName:   _tcAccepterName,
          });
        }
      };
      // Si les cartes sont déjà chargées, on lance directement, sinon on attend
      if (ALL_CARDS.length > 0) {
        setTimeout(_runTradeAnim, 600);
      } else {
        // Polling léger : toutes les 500ms jusqu'à 8s max
        let _waitCount = 0;
        const _waitCards = setInterval(() => {
          _waitCount++;
          if (ALL_CARDS.length > 0) { clearInterval(_waitCards); setTimeout(_runTradeAnim, 300); }
          else if (_waitCount >= 16) { clearInterval(_waitCards); } // abandon après 8s
        }, 500);
      }
    }

    // Afficher aussi dans le panneau notifs (résumé textuel) pour les échanges manqués
    const _notifTexts = _pendingTradeNotifs.map(n => {
      let m = {}; try { m = JSON.parse(n.meta||'{}'); } catch(e) {}
      return { id: n.id, accepted: true, from_id: n.from_id, text: n.text || `Tu as reçu "${m.to_card||'?'}"` };
    });
    setState({ tradeResultNotifs: [...(state.tradeResultNotifs||[]), ..._notifTexts] });
  }

  // Realtime : écouter les nouvelles notifications
  if (_notifRealtimeSub) { try { db.removeChannel(_notifRealtimeSub); } catch(e){} }
  _notifRealtimeSub = db.channel('notif-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myId}`,
    }, payload => {
      const n = payload.new;
      if (!n) return;
      // Si la conv de cet expéditeur est déjà ouverte → marquer lu directement, pas de badge
      if (state.activeConvId && n.from_id === state.activeConvId) {
        markMsgNotifsRead(n.from_id);
        return;
      }
      if (n.type === 'trade_accepted' || n.type === 'trade_declined') {
        const isAccepted = n.type === 'trade_accepted';
        // Enrichir le texte si absent : charger les cartes depuis le trade
        let notifText = n.text || '';
        if (!notifText && isAccepted) {
          try {
            let meta = {};
            try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
            const fromCard = meta.from_card || null;
            const toCard   = meta.to_card   || null;
            if (fromCard && toCard) {
              notifText = `Tu as donné "${fromCard}" et reçu "${toCard}"`;
            } else {
              notifText = 'Échange complété avec succès.';
            }
          } catch(e) { notifText = 'Échange complété.'; }
        }
        const prev = state.tradeResultNotifs || [];
        setState({ tradeResultNotifs: [...prev, { id: n.id, accepted: isAccepted, from_id: n.from_id, text: notifText }] });
        showToast(notifText || (isAccepted ? 'Échange accepté !' : 'Échange refusé'), isAccepted ? '🔄' : '✗');

        // Animation côté expéditeur (il reçoit la carte to_card)
        if (isAccepted) {
          try {
            let meta = {};
            try { meta = JSON.parse(n.meta || '{}'); } catch(e2) {}
            // meta.from_card = carte que l'expéditeur a DONNÉE  → ce que le receveur a reçu
            // meta.to_card   = carte que le receveur a DONNÉE   → ce que l'expéditeur reçoit
            const _senderObtainedName = meta.to_card || null;
            const _senderGivenName    = meta.from_card || null;
            if (_senderObtainedName) {
              const _tcOb = ALL_CARDS.find(c=>c.name===_senderObtainedName);
              const _tcGv = ALL_CARDS.find(c=>c.name===_senderGivenName);
              const _tcAccepterName = (state.friends||[]).find(f=>f.id===n.from_id)?.discord_username || 'Ton ami';
              if (_tcOb) {
                setTimeout(()=>showTradeCompleteAnimation({
                  obtainedCard: _tcOb,
                  givenCard:    _tcGv || _tcOb,
                  senderName:   _tcAccepterName,
                }), 350);
              }
            }
          } catch(e3) {}
        }
        return;
      }
      if (n.type === 'combat_request') {
        // Charger l'avatar/nom de l'expéditeur
        db.from('players').select('discord_username, avatar_url').eq('id', n.from_id).single()
          .then(({ data: sender }) => {
            const req = {
              request_id: n.id,
              from_id: n.from_id,
              discord_username: sender?.discord_username || 'Joueur',
              avatar_url: sender?.avatar_url || null,
            };
            setState({ combatRequestsIn: [...(state.combatRequestsIn||[]), req] });
            showToast(n.text || 'Défi en combat reçu !', '⚔️');
          });
        return;
      }
      if (n.type === 'combat_accepted') {
        // Nouveau flow : rediriger vers PVP.html, qui gère la sélection de deck synchronisée
        let matchId = state.pendingMatchId || null;
        try { if (n.meta) matchId = JSON.parse(n.meta)?.match_id || matchId; } catch(e) {}
        if (matchId) {
          try { sessionStorage.setItem('pvp_pending_match_id', matchId); } catch(e) {}
        }
        showToast(n.text || 'Défi accepté !', '⚔');
        window.location.href = 'PVP.html';
        return;
      }
      if (n.type === 'combat_cancelled') {
        showToast(n.text || 'Le combat a été annulé.', '✗');
        return;
      }
      if (n.type === 'combat_declined') {
        showToast('Ton défi a été refusé.', '✗');
        return;
      }
      // Récompense de niveau reçue en temps réel
      if (n.type === 'level_reward' || n.type === 'level_reward_booster') {
        const alreadyPending = (state.pendingLevelRewards||[]).some(r => r.notifId === n.id);
        if (!alreadyPending) {
          let meta = {};
          try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
          const lvl = meta.level || 0;
          // Vérifier que ce niveau n'est pas déjà réclamé
          const alreadyClaimed = (state._claimedLevels || new Set()).has(lvl);
          if (!alreadyClaimed) {
            let reward;
            if (n.type === 'level_reward') {
              const amount = meta.amount || 300;
              reward = { notifId: n.id, level: lvl, type: 'coins', amount };
            } else {
              reward = { notifId: n.id, level: lvl, type: meta.rewardType || 'booster_prestige', label: n.text };
            }
            setState({ pendingLevelRewards: [...(state.pendingLevelRewards||[]), reward] });
            const icon = reward.type === 'coins' ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="#fbbf24" style="flex-shrink:0;vertical-align:middle;"><circle cx="12" cy="12" r="10" opacity=".4"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.5h-2v-1.8c-1.4-.3-2.5-1.3-2.5-2.7h2c0 .6.7 1 1.5 1s1.5-.4 1.5-1c0-.7-.6-1-1.8-1.3C10.1 10.3 9 9.4 9 8c0-1.3 1-2.3 2.5-2.6V3.5h2v1.9c1.3.4 2.2 1.4 2.2 2.6h-2c0-.6-.6-1-1.5-1s-1.4.4-1.4 1c0 .6.5.9 1.7 1.2 1.8.4 3 1.4 3 3 0 1.4-1 2.5-2.5 2.8v1.5z"/></svg>' : reward.type === 'booster_legendaire' ? '⚡' : '📦';
            showToast(n.text || `Niveau ${lvl} — récompense disponible !`, icon);
          }
        }
        return;
      }
      const prev = state.pendingMsgNotifs || [];
      setState({
        msgNotifCount: (state.msgNotifCount || 0) + 1,
        pendingMsgNotifs: [n, ...prev],
      });
      showToast(n.text || 'Nouveau message !', '💬');
    })
    .subscribe();
}

async function subscribeFriendRequests() {

  const myId = state.currentUser?.id;

let _notifPollInterval = null;
async function pollNotificationsAndTrades() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  // Vérifier si un combat_accepted est arrivé pour moi (challenger)
  const { data: acceptedNotifs } = await db.from('notifications')
    .select('id, from_id, meta')
    .eq('user_id', myId).eq('type', 'combat_accepted').eq('read', false);
  if (acceptedNotifs && acceptedNotifs.length > 0) {
    const n = acceptedNotifs[0];
    // Marquer comme lu immédiatement pour éviter double déclenchement
    try { await db.from('notifications').update({ read: true }).eq('id', n.id) } catch(e) {};
    let matchId = state.pendingMatchId || null;
    try { if (n.meta) matchId = JSON.parse(n.meta)?.match_id || matchId; } catch(e) {}
    if (matchId) {
      try { sessionStorage.setItem('pvp_pending_match_id', matchId); } catch(e) {}
    }
    showToast('Défi accepté !', '⚔');
    window.location.href = 'PVP.html';
    return;
  }

  // Re-charger les combat requests non lus
  const { data: combatNotifs } = await db.from('notifications')
    .select('id, from_id, read')
    .eq('user_id', myId).eq('type', 'combat_request').eq('read', false);
  if (combatNotifs && combatNotifs.length > 0) {
    const existing = new Set((state.combatRequestsIn||[]).map(r=>r.request_id));
    const newOnes = combatNotifs.filter(n=>!existing.has(n.id));
    if (newOnes.length > 0) {
      const fromIds = [...new Set(newOnes.map(n=>n.from_id))];
      const { data: senders } = await db.from('players').select('id, discord_username, avatar_url').in('id', fromIds);
      const senderMap = {};
      (senders||[]).forEach(s=>{ senderMap[s.id]=s; });
      const addReqs = newOnes.map(n=>({
        request_id: n.id, from_id: n.from_id,
        discord_username: senderMap[n.from_id]?.discord_username||'Joueur',
        avatar_url: senderMap[n.from_id]?.avatar_url||null,
      }));
      setState({ combatRequestsIn: [...(state.combatRequestsIn||[]), ...addReqs] });
    }
  }

  // Re-charger les trades entrants en attente (non encore vus)
  const { data: pendingTrades } = await db.from('trades')
    .select('*').eq('to_id', myId).eq('status', 'pending');
  // Filtrer les trades que l'utilisateur a fermé sans répondre
  const _dismissed = (() => { try { return JSON.parse(sessionStorage.getItem('_dismissedTrades')||'[]'); } catch(e) { return []; } })();
  const _pendingVisible = (pendingTrades||[]).filter(t => !_dismissed.includes(String(t.id)));
  if (_pendingVisible.length > 0 && !state.tradeIncoming) {
    const trade = _pendingVisible[0];
    const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
    setState({
      showTrade: true,
      tradeIncoming: { ...trade, from_name: sender?.discord_username || 'Un joueur' },
      tradeMyCard: null,
    });
  }

  // Re-charger le badge messages
  const { data: msgNotifs } = await db.from('notifications')
    .select('id, from_id').eq('user_id', myId).eq('type', 'message').eq('read', false);
  const activeConv = state.activeConvId;
  const filtered = (msgNotifs||[]).filter(n=>!activeConv||n.from_id!==activeConv);
  if (filtered.length !== state.msgNotifCount) {
    setState({ msgNotifCount: filtered.length });
  }

  // Re-charger les récompenses de niveau non réclamées (coins + boosters)
  const { data: lvlPollNotifs } = await db.from('notifications')
    .select('id, type, text, meta')
    .eq('user_id', myId)
    .in('type', ['level_reward', 'level_reward_booster'])
    .eq('read', false);
  if (lvlPollNotifs && lvlPollNotifs.length > 0) {
    const { data: claimedRowsPoll } = await db.from('claimed_rewards')
      .select('level').eq('player_id', myId);
    const claimedLevelsPoll = new Set((claimedRowsPoll || []).map(r => r.level));

    const existing = state.pendingLevelRewards || [];
    const existingIds = new Set(existing.map(r => r.notifId));
    const newOnes = [];
    lvlPollNotifs.forEach(n => {
      if (existingIds.has(n.id)) return;
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      const lvl = meta.level || 0;
      if (claimedLevelsPoll.has(lvl)) return; // déjà réclamée définitivement
      if (n.type === 'level_reward') {
        newOnes.push({ notifId: n.id, level: lvl, type: 'coins', amount: meta.amount || 300 });
      } else {
        newOnes.push({ notifId: n.id, level: lvl, type: meta.rewardType || 'booster_prestige', label: n.text });
      }
    });
    if (newOnes.length > 0) {
      setState({ pendingLevelRewards: [...existing, ...newOnes] });
    }
  }
}
function startNotifPolling() {
  if (_notifPollInterval) clearInterval(_notifPollInterval);
  // Polling rapide (3s) : fallback au realtime Supabase pour que les invitations
  // PVP / défis en combat apparaissent quasi-instantanément même si la
  // connexion realtime a sauté (reconnexion WebSocket, onglet en arrière-plan, etc.).
  _notifPollInterval = setInterval(pollNotificationsAndTrades, 3000);
}
window.startNotifPolling = startNotifPolling;

async function respondCombatRequest(notifId, fromId, accept) {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Récupérer le meta (match_id + match_key) de la notif — nouveau flow PvP
  let matchId = null, matchKey = null;
  try {
    const { data: notifData } = await db.from('notifications').select('meta').eq('id', notifId).single();
    if (notifData?.meta) {
      const meta = JSON.parse(notifData.meta);
      matchId  = meta?.match_id  || null;
      matchKey = meta?.match_key || null;
    }
  } catch(e) {}

  // Marquer la notif comme lue
  await db.from('notifications').update({ read: true }).eq('id', notifId);

  // Retirer de la liste locale
  const updated = (state.combatRequestsIn || []).filter(r => r.request_id !== notifId);
  setState({ combatRequestsIn: updated, showNotif: false });

  if (!accept) {
    showToast('Défi refusé', '✗');
    // Annuler le match côté DB (nouveau système pvp_matches)
    if (matchId) {
      try {
        await db.from('pvp_matches')
          .update({ phase: 'cancelled', end_reason: 'declined' })
          .eq('id', matchId);
      } catch(e) {}
    }
    // Prévenir l'expéditeur du refus
    if (fromId) {
      try { await db.from('notifications').insert({
        user_id: fromId,
        type: 'combat_declined',
        from_id: myId,
        text: 'Ton défi a été refusé.',
        read: false,
      }) } catch(e) {};
    }
    return;
  }

  // Accepté : vérifier qu'on a au moins un deck complet
  const { data: decksData } = await db.from('decks').select('id').eq('player_id', myId);
  if (!decksData || decksData.length === 0) {
    showToast('Crée d\'abord un deck dans le Deck Builder', '🗂️');
    return;
  }
  const deckIds = decksData.map(d => d.id);
  const { data: dc } = await db.from('deck_cards').select('deck_id, quantity').in('deck_id', deckIds);
  const totals = {};
  (dc||[]).forEach(c => { totals[c.deck_id] = (totals[c.deck_id]||0) + c.quantity; });
  const hasComplete = Object.values(totals).some(t => t >= 30);
  if (!hasComplete) {
    showToast('Complète au moins un deck (30 cartes) avant de combattre', '⚠');
    return;
  }

  // Nouveau flow : passer le match en phase 'deck_selection' et rediriger vers PVP.html
  // qui affichera la sélection de deck simultanée pour les 2 joueurs.
  if (matchId) {
    try {
      await db.from('pvp_matches')
        .update({ phase: 'deck_selection' })
        .eq('id', matchId);
    } catch(e) { console.error('pvp_matches update', e); }

    // Stocker l'ID du match en session — PVP.html le lira via checkPendingMatch()
    try {
      sessionStorage.setItem('pvp_pending_match_id', matchId);
    } catch(e) {}
    window.location.href = 'PVP.html';
    return;
  }

  // ── Fallback ancien flow (ne devrait plus se produire avec le nouveau système) ──
  // Envoyer combat_accepted à l'expéditeur
  if (fromId) {
    try { await db.from('notifications').insert({
      user_id: fromId,
      type: 'combat_accepted',
      from_id: myId,
      text: 'Ton défi a été accepté !',
      read: false,
    }) } catch(e) {};
  }
  showToast('Défi accepté — en route vers la sélection de deck', '⚔');
  window.location.href = 'PVP.html';
}

function showPvpCountdown(seconds, onDone) {
  // Supprimer un éventuel countdown existant
  const existing = document.getElementById('pvp-countdown-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pvp-countdown-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:rgba(0,0,0,0.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    font-family:'Oswald',sans-serif;
  `;
  overlay.innerHTML = `
    <div style="font-size:18px;color:#fbbf24;font-weight:900;letter-spacing:3px;text-transform:uppercase;">⚔️ COMBAT PvP</div>
    <div style="font-size:14px;color:#9d8ea0;text-align:center;padding:0 30px;">Redirection vers le champ de bataille…</div>
    <div id="pvp-count-num" style="font-family:'Luckiest Guy',cursive;font-size:96px;font-weight:400;color:#f43f5e;line-height:1;text-shadow:0 0 40px rgba(244,63,94,0.6);">${seconds}</div>
    <div style="width:200px;height:4px;background:#1a1825;overflow:hidden;">
      <div id="pvp-count-bar" style="height:100%;background:linear-gradient(90deg,#f43f5e,#fbbf24);width:100%;transition:width ${seconds}s linear;"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Déclencher l'animation de la barre
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const bar = document.getElementById('pvp-count-bar');
      if (bar) bar.style.width = '0%';
    });
  });

  let n = seconds;
  const numEl = () => document.getElementById('pvp-count-num');
  const iv = setInterval(() => {
    n--;
    const el = numEl();
    if (el) el.textContent = n > 0 ? n : '⚔️';
    if (n <= 0) {
      clearInterval(iv);
      onDone();
    }
  }, 1000);
}

/*
  SQL À EXÉCUTER DANS SUPABASE (SQL Editor) :

  CREATE TABLE IF NOT EXISTS decks (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
    name TEXT NOT NULL DEFAULT 'Deck #01',

  );

    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    deck_id UUID NOT NULL REFERENCES decks(id) ON DELETE CASCADE,
    card_id INTEGER NOT NULL REFERENCES cards(id) ON DELETE CASCADE,
    quantity INTEGER NOT NULL DEFAULT 1 CHECK (quantity >= 1 AND quantity <= 2),
    UNIQUE(deck_id, card_id)
  );

  CREATE POLICY "Users manage own decks" ON decks FOR ALL USING (player_id = auth.uid());
  CREATE POLICY "Users manage own deck_cards" ON deck_cards FOR ALL
    USING (deck_id IN (SELECT id FROM decks WHERE player_id = auth.uid()));
*/

async function loadDecks() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  const { data: decksData } = await db.from('decks')
    .select('id, name, is_default, created_at')
    .eq('player_id', myId)
    .order('created_at', { ascending: true });

  if (!decksData) return;

  // Charger les cartes de chaque deck
  const deckIds = decksData.map(d=>d.id);
  let allDeckCards = [];
  if (deckIds.length > 0) {
    const { data: dc } = await db.from('deck_cards')
      .select('deck_id, card_id, quantity')
      .in('deck_id', deckIds);
    allDeckCards = dc || [];
  }

  const decks = decksData.map(d=>({
    ...d,
    cards: allDeckCards.filter(c=>c.deck_id===d.id)
  }));

  setState({ decks });
}

// Ajoute une carte au deck. L'UX (explication des limites) est portée par
// openDeckCardPreview qui grise le bouton et affiche la raison. Les checks
// ci-dessous restent comme filet de sécurité (double-clic, appels programmatiques).
function addCardToDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return false;

  const card = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(cardId));
  if (!card || !card.owned) return false;

  const deckCards = deck.cards || [];
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  if (deckTotal >= 30) { showToast('30 cartes max dans un deck', '⚠'); return false; }

  const mythCount = deckCards.reduce((s,c)=>{
    const cd=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(cd&&cd.rarity==='mythic'?c.quantity:0);
  },0);

  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  const currentQty = existing ? existing.quantity : 0;

  if (currentQty >= card.count) {
    showToast(`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''} de cette carte`, '⚠'); return false;
  }
  if (currentQty >= 2) {
    showToast(`Max 2 exemplaires par carte dans un deck`, '⚠'); return false;
  }
  if (card.rarity==='mythic' && mythCount >= 2) {
    showToast('Max 2 Mythiques par deck', '⚠'); return false;
  }

  let newCards;
  if (existing) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity+1}:c);
  } else {
    newCards = [...deckCards, {card_id: parseInt(cardId), quantity:1, deck_id: deck.id}];
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
  return true;
}

function removeCardFromDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const deckCards = deck.cards || [];
  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  if (!existing) return;

  let newCards;
  if (existing.quantity > 1) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity-1}:c);
  } else {
    newCards = deckCards.filter(c=>parseInt(c.card_id)!==parseInt(cardId));
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

// ─── AUTO-FILL DECK ───────────────────────────────────────────────
// Complète le deck existant (sans écraser) en respectant les règles :
//   - 30 cartes max au total
//   - max 2 exemplaires d'une même carte (toutes raretés)
//   - max 2 Mythiques au total
function autoFillDeck() {
  const decks = state.decks || [];
  const deck = decks.find(d => d.id === state.activeDeckId);
  if (!deck) return;

  // Point de départ : on CLONE le deck existant (quitte à le corriger
  // s'il viole déjà une règle — ex. anciennement sauvegardé invalide).
  const existingCards = (deck.cards || []).map(c => ({ ...c }));

  // 1) Corriger les violations existantes : clamp à 2 exemplaires max (toutes raretés)
  let clampedDuplicates = 0;
  for (const c of existingCards) {
    const card = ALL_CARDS.find(x => parseInt(x.id) === parseInt(c.card_id));
    if (!card) continue;
    const maxCopies = Math.min(2, card.count);
    if (c.quantity > maxCopies) {
      clampedDuplicates += (c.quantity - maxCopies);
      c.quantity = maxCopies;
    }
  }

  // 2) Si on a > 2 Mythiques au total, on garde les 2 premières rencontrées,
  //    et on retire les autres.
  let removedExtraMythics = 0;
  let mythSeen = 0;
  const keptCards = [];
  for (const c of existingCards) {
    const card = ALL_CARDS.find(x => parseInt(x.id) === parseInt(c.card_id));
    if (card && card.rarity === 'mythic') {
      if (mythSeen >= 2) {
        removedExtraMythics += c.quantity;
        continue; // on drop cette carte mythique en trop
      }
      // Accepter jusqu'à compléter 2 mythiques — si une seule mythique différente
      // a 2 exemplaires ça compte pour 2 du compteur
      const remainingMyth = 2 - mythSeen;
      if (c.quantity > remainingMyth) {
        removedExtraMythics += (c.quantity - remainingMyth);
        c.quantity = remainingMyth;
      }
      mythSeen += c.quantity;
    }
    if (c.quantity > 0) keptCards.push(c);
  }

  // 3) Clamp sur la taille totale à 30 (retirer depuis la fin si trop)
  let total = keptCards.reduce((s, c) => s + c.quantity, 0);
  let trimmedOverflow = 0;
  while (total > 30 && keptCards.length > 0) {
    const last = keptCards[keptCards.length - 1];
    last.quantity -= 1;
    trimmedOverflow += 1;
    total -= 1;
    if (last.quantity <= 0) keptCards.pop();
  }

  let mythCount = keptCards.reduce((s, c) => {
    const card = ALL_CARDS.find(x => parseInt(x.id) === parseInt(c.card_id));
    return s + (card && card.rarity === 'mythic' ? c.quantity : 0);
  }, 0);

  // 4) Complétion : ajouter des cartes possédées pour atteindre 30
  const rarityPriority = { mythic: 0, rare: 1, uncommon: 2, common: 3 };
  const ownedCards = ALL_CARDS
    .filter(c => c.owned && c.count > 0)
    .sort((a, b) => {
      const rDiff = rarityPriority[a.rarity] - rarityPriority[b.rarity];
      if (rDiff !== 0) return rDiff;
      return b.count - a.count; // à rareté égale, cartes les plus nombreuses d'abord
    });

  const qtyInKept = (cardId) => {
    const e = keptCards.find(c => parseInt(c.card_id) === parseInt(cardId));
    return e ? e.quantity : 0;
  };

  for (const card of ownedCards) {
    if (total >= 30) break;
    const already = qtyInKept(card.id);
    let maxAdd = card.count - already; // on ne dépasse pas ce qu'on possède
    // Max 2 exemplaires par carte, quelle que soit la rareté
    maxAdd = Math.min(maxAdd, 2 - already);
    if (card.rarity === 'mythic') {
      maxAdd = Math.min(maxAdd, 2 - mythCount);
    }
    if (maxAdd <= 0) continue;
    const toAdd = Math.min(maxAdd, 30 - total);
    if (toAdd <= 0) continue;

    const existing = keptCards.find(c => parseInt(c.card_id) === parseInt(card.id));
    if (existing) {
      existing.quantity += toAdd;
    } else {
      keptCards.push({ card_id: parseInt(card.id), quantity: toAdd, deck_id: deck.id });
    }
    total += toAdd;
    if (card.rarity === 'mythic') mythCount += toAdd;
  }

  const newCards = keptCards;

  if (total === 0) {
    showDeckRuleModal({
      title: 'Aucune carte à ajouter',
      icon: '📭',
      message: 'Tu ne possèdes encore aucune carte pour remplir ce deck. Ouvre des boosters dans la boutique pour obtenir tes premières cartes !',
      confirmLabel: 'Compris'
    });
    return;
  }

  const updatedDecks = decks.map(d => d.id === deck.id ? { ...d, cards: newCards } : d);
  setState({ decks: updatedDecks });

  // Feedback clair au joueur (modale si on a corrigé des violations, sinon toast simple)
  const corrections = [];
  if (clampedDuplicates > 0) corrections.push(`${clampedDuplicates} exemplaire${clampedDuplicates>1?'s':''} en trop retiré${clampedDuplicates>1?'s':''} (max 2 par carte)`);
  if (removedExtraMythics > 0) corrections.push(`${removedExtraMythics} Mythique${removedExtraMythics>1?'s':''} retirée${removedExtraMythics>1?'s':''} (max 2 Mythiques par deck)`);
  if (trimmedOverflow > 0) corrections.push(`${trimmedOverflow} carte${trimmedOverflow>1?'s':''} en trop retirée${trimmedOverflow>1?'s':''} (30 cartes max)`);

  if (corrections.length > 0) {
    // Il y avait des violations → on le signale clairement
    showDeckRuleModal({
      title: 'Deck corrigé et complété',
      icon: '✨',
      message: `Ton deck a été <b>ajusté pour respecter les règles</b> puis complété automatiquement (${total}/30 cartes, ${mythCount}/2 Mythiques).`,
      lines: corrections,
      confirmLabel: 'Parfait !'
    });
  } else if (total < 30) {
    // Remplissage partiel (pas assez de cartes possédées)
    showDeckRuleModal({
      title: 'Deck partiellement rempli',
      icon: '⚠️',
      message: `Seulement <b>${total}/30 cartes</b> ajoutées — tu n'as pas encore assez de cartes dans ta collection pour remplir un deck complet.`,
      lines: [
        `${mythCount}/2 Mythiques dans le deck`,
        'Ouvre plus de boosters pour obtenir de nouvelles cartes.'
      ],
      confirmLabel: 'Compris'
    });
  } else {
    showToast(`Deck rempli automatiquement (${total}/30 · ${mythCount}/2 Myth.)`, '✨');
  }
}

async function saveDeck() {
  const db = window.db;
  if (!db) return;
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const cards = deck.cards || [];
  const deckTotal = cards.reduce((s,c)=>s+c.quantity,0);

  // ── Validation préalable des règles (hors "30 cartes" — un deck partiel
  //    reste sauvegardable, mais pas avec des violations de mythique/doublons).
  const validation = validateDeck(deck);
  const structuralErrors = validation.errors.filter(e => e.code !== 'total');
  if (structuralErrors.length > 0) {
    // Bloquer la sauvegarde et proposer une correction automatique
    showDeckRuleModal({
      title: 'Deck invalide — impossible de sauvegarder',
      icon: '⚠️',
      message: `Ton deck ne respecte pas les règles. Tu peux le <b>corriger automatiquement</b> (les excédents seront retirés et le deck sera complété si possible), ou retourner l'ajuster toi-même.`,
      lines: structuralErrors.map(e => e.msg),
      confirmLabel: '✨ Corriger auto',
      cancelLabel: 'Je corrige moi-même',
      onConfirm: () => {
        autoFillDeck();
        // Relancer la sauvegarde après correction
        setTimeout(() => saveDeck(), 300);
      }
    });
    return;
  }

  try {
    // Supprimer toutes les cartes existantes
    const { error: delErr } = await db.from('deck_cards').delete().eq('deck_id', deck.id);
    if (delErr) throw delErr;

    // Réinsérer si des cartes sont présentes
    // quantity est clampée à 2 max (contrainte DB deck_cards_quantity_check)
    if (cards.length > 0) {
      const rows = cards.map(c=>({
        deck_id: deck.id,
        card_id: parseInt(c.card_id),
        quantity: Math.min(c.quantity, 2)
      }));
      const { error: insErr } = await db.from('deck_cards').insert(rows);
      if (insErr) throw insErr;
    }

    if (deckTotal < 30) {
      showToast(`${deck.name} sauvegardé (${deckTotal}/30 cartes)`, '💾');
    } else {
      // Si c'est le seul deck et qu'aucun n'est par défaut → le mettre par défaut automatiquement
      const allDecks = state.decks || [];
      const hasDefault = allDecks.some(d => d.is_default);
      if (allDecks.length === 1 && !hasDefault) {
        await db.from('decks').update({ is_default: true }).eq('id', deck.id);
        const updated = allDecks.map(d => d.id===deck.id ? {...d, is_default:true} : d);
        setState({ decks: updated });
        showToast(`${deck.name} sauvegardé et mis par défaut !`, '⭐');
      } else {
        showToast(`${deck.name} sauvegardé !`, '✓');
      }
    }
  } catch(e) {
    console.error('[saveDeck]', e);
    // Si c'est une erreur de contrainte check, le delete a réussi mais l'insert a échoué partiellement
    // → recharger le deck depuis la DB pour avoir l'état réel
    if (e.message && e.message.includes('check constraint')) {
      await loadDecks();
      showToast('Sauvegarde partielle — modifie la contrainte SQL (voir console)', '⚠');
    } else {
      showToast('Erreur sauvegarde : ' + (e.message || 'inconnue'), '✗');
    }
  }
}

// Envoyer l'offre de trade en DB
async function sendTradeOffer(theirCardId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  const toId = state.tradeWithId;
  const myCard = state.tradeMyCard;
  if (!db || !myId || !toId || !myCard || !theirCardId) {
    showToast('Données manquantes pour le trade', '⚠'); return;
  }

  const theirCard = ALL_CARDS.find(c => parseInt(c.id) === parseInt(theirCardId));
  if (!theirCard) {
    showToast('Carte demandée introuvable', '✗'); return;
  }
  if (theirCard.rarity !== myCard.rarity) {
    showToast('Échange de même rareté uniquement', '⚠'); return;
  }
  if (parseInt(theirCard.id) === parseInt(myCard.id)) {
    showToast('Tu ne peux pas échanger une carte contre elle-même', '⚠'); return;
  }
  // Limite 1 trade par jour
  if (!canTradeToday(myId)) {
    showToast('Tu as déjà effectué un échange aujourd\'hui ! ⏳ ' + timeUntilMidnight(), '🔄');
    return;
  }

  try {
    const { data, error } = await db.from('trades').insert({
      from_id: myId,
      to_id: toId,
      from_card_id: parseInt(myCard.id),
      to_card_id: parseInt(theirCardId),
      status: 'pending',
    }).select().single();

    if (error) {
      console.error('[sendTradeOffer]', error);
      showToast('Erreur envoi trade : ' + (error.message || 'inconnue'), '✗'); return;
    }

    // Notifier l'ami
    try { await db.from('notifications').insert({
      user_id: toId, type: 'trade', from_id: myId,
      text: `Échange proposé : carte #${String(myCard.id).replace(/^0+/,'')} ↔ carte #${String(theirCardId).replace(/^0+/,'')}`,
      read: false,
    }).then(()=>{}) } catch(e) {};

    markTradeUsed(myId);
    startDailyTicker();
    setState({ showTrade: false, tradeMyCard: null, tradeStep: null, tradeWantedNum: null });
    showToast('Proposition envoyée !', '🔄');
    progressDailyQuest('trade');
    progressWeeklyQuest('trades_5');
    // Rafraîchir les trades dans la conv si elle est ouverte
    if (state.activeConvId === toId) loadConvTrades(toId);
  } catch(e) {
    console.error('[sendTradeOffer] exception', e);
    showToast('Erreur envoi trade', '✗');
  }
}

// ── Retirer une carte de tous les decks d'un joueur après perte de possession ──
// Appelée dès qu'un joueur perd une carte (trade, etc.)
// Si le retrait rend un deck incomplet (<30 cartes), le joueur le verra au
// prochain lancement (notification déjà gérée par validateDeckForPlay).
async function _removeCardFromAllDecks(db, playerId, cardId) {
  try {
    const cid = parseInt(cardId);
    // 1. Récupérer tous les decks du joueur
    const { data: decks, error: de } = await db.from('decks')
      .select('id').eq('player_id', playerId);
    if (de || !decks || decks.length === 0) return;

    const deckIds = decks.map(d => d.id);

    // 2. Trouver les deck_cards concernées (quantity ≥ 1 pour cette carte)
    const { data: rows, error: re } = await db.from('deck_cards')
      .select('deck_id, quantity')
      .in('deck_id', deckIds)
      .eq('card_id', cid);
    if (re || !rows || rows.length === 0) return;

    // 3. Pour chaque deck contenant la carte, la retirer (quantity - 1, ou delete si = 1)
    for (const row of rows) {
      if (row.quantity > 1) {
        await db.from('deck_cards')
          .update({ quantity: row.quantity - 1 })
          .eq('deck_id', row.deck_id)
          .eq('card_id', cid);
      } else {
        await db.from('deck_cards')
          .delete()
          .eq('deck_id', row.deck_id)
          .eq('card_id', cid);
      }
    }
  } catch(e) {
    console.warn('[_removeCardFromAllDecks]', e);
  }
}

window.respondTrade = async function respondTrade(tradeId, accept) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !tradeId) return;

  const incoming = state.tradeIncoming;
  if (!incoming) return;

  if (accept) {
    // Vérifier que les deux joueurs possèdent encore les cartes
    const { data: myCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', myId).eq('card_id', incoming.to_card_id).single();
    const { data: theirCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id).single();

    if (!myCards || myCards.quantity < 1) { showToast('Tu ne possèdes plus cette carte', '✗'); return; }
    if (!theirCards || theirCards.quantity < 1) { showToast("L'autre joueur ne possède plus sa carte", '✗'); return; }

    // Exécuter l'échange
    // Retirer les cartes des deux joueurs
    if (myCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: myCards.quantity - 1 }).eq('player_id', myId).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', myId).eq('card_id', incoming.to_card_id);
    }
    // Retirer la carte cédée de tous les decks du joueur
    await _removeCardFromAllDecks(db, myId, incoming.to_card_id);

    if (theirCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: theirCards.quantity - 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    }
    // Retirer la carte cédée de tous les decks de l'expéditeur
    await _removeCardFromAllDecks(db, incoming.from_id, incoming.from_card_id);

    // Donner les cartes aux deux joueurs
    const upsertMy = await db.from('player_cards').select('quantity').eq('player_id', myId).eq('card_id', incoming.from_card_id).single();
    if (upsertMy.data) {
      await db.from('player_cards').update({ quantity: upsertMy.data.quantity + 1 }).eq('player_id', myId).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: myId, card_id: incoming.from_card_id, quantity: 1 });
    }
    const upsertTheir = await db.from('player_cards').select('quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id).single();
    if (upsertTheir.data) {
      await db.from('player_cards').update({ quantity: upsertTheir.data.quantity + 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: incoming.from_id, card_id: incoming.to_card_id, quantity: 1 });
    }

    await db.from('trades').update({ status: 'accepted' }).eq('id', tradeId);

    // Récap des cartes échangées pour la notification
    const fromCardName = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.from_card_id))?.name || ('#'+incoming.from_card_id);
    const toCardName   = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.to_card_id))?.name   || ('#'+incoming.to_card_id);
    const tradeRecap = `Tu as donné "${toCardName}" et reçu "${fromCardName}"`;
    const tradeMeta  = JSON.stringify({ from_card: fromCardName, to_card: toCardName });

    // Notifier l'expéditeur avec récap
    try { await db.from('notifications').insert({
      user_id: incoming.from_id, type: 'trade_accepted', from_id: myId,
      text: `Échange accepté ! Tu as donné "${fromCardName}" et reçu "${toCardName}"`,
      meta: JSON.stringify({ from_card: toCardName, to_card: fromCardName }),
      read: false,
    }).then(()=>{}) } catch(e) {};

    // Recharger la collection
    if (window.loadCollection) window.loadCollection();
    showToast('Échange effectué ! Tu as reçu : ' + fromCardName, '🔄');

    // Animation de finalisation d'échange
    const _tcObtained = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.from_card_id));
    const _tcGiven    = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.to_card_id));
    const _tcSender   = incoming.from_name || (state.friends||[]).find(f=>f.id===incoming.from_id)?.discord_username || 'Ton ami';
    if (_tcObtained) {
      setTimeout(()=>showTradeCompleteAnimation({
        obtainedCard: _tcObtained,
        givenCard:    _tcGiven || _tcObtained,
        senderName:   _tcSender,
      }), 350);
    }
  } else {
    await db.from('trades').update({ status: 'declined' }).eq('id', tradeId);
    // Notifier l'expéditeur du refus
    if (incoming.from_id) {
      try { await db.from('notifications').insert({
        user_id: incoming.from_id, type: 'trade_declined', from_id: myId,
        text: 'Ton échange a été refusé.', read: false,
      }).then(()=>{}) } catch(e) {};
    }
    showToast('Échange refusé', '✗');
  }

  setState({ showTrade: false, tradeIncoming: null, tradeStep: null, tradeWantedNum: null });
  // Rafraîchir les trades dans la conv si elle est ouverte avec cet ami
  const partnerId = incoming?.from_id;
  if (partnerId && state.activeConvId === partnerId) loadConvTrades(partnerId);
};

// Écouter les trades entrants en realtime
async function subscribeTradeNotifications() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  // Charger immédiatement les trades entrants en attente (au cas où reçus hors ligne)
  const { data: pendingTrades } = await db.from('trades')
    .select('*').eq('to_id', myId).eq('status', 'pending');
  const _dismissed2 = (() => { try { return JSON.parse(sessionStorage.getItem('_dismissedTrades')||'[]'); } catch(e) { return []; } })();
  const _pendingVisible2 = (pendingTrades||[]).filter(t => !_dismissed2.includes(String(t.id)));
  if (_pendingVisible2.length > 0 && !state.tradeIncoming) {
    const trade = _pendingVisible2[0];
    const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
    setState({
      showTrade: true,
      tradeIncoming: { ...trade, from_name: sender?.discord_username || 'Un joueur' },
      tradeMyCard: null,
    });
    showToast(`${sender?.discord_username||'Un joueur'} t'a proposé un échange !`, '🔄');
  }

  if (_tradeRealtimeSub) { try { db.removeChannel(_tradeRealtimeSub); } catch(e){} }

  _tradeRealtimeSub = db.channel('trades-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'trades',
      filter: `to_id=eq.${myId}`,
    }, async payload => {
      const trade = payload.new;
      if (!trade || trade.status !== 'pending') return;

      // Charger le nom de l'expéditeur
      const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
      const fromName = sender?.discord_username || 'Un joueur';

      setState({
        showTrade: true,
        tradeIncoming: { ...trade, from_name: fromName },
        tradeMyCard: null,
      });
      showToast(`${fromName} propose un échange !`, '🔄');
    })
    .subscribe();
}

const _CARD_BACK_MARKET = 'https://i.goopics.net/iic46c.png';
// Recherches market — variables locales pour éviter re-render sur chaque frappe
let _mktOfferQ = '';
let _mktWantQ  = '';
let _mktOfferDoubles = false;   // filtre "doubles uniquement" pour propose
let _mktOfferRarity  = '';      // filtre rareté pour propose ('common'|'uncommon'|'rare'|'mythic'|'')
let _mktWantMissing  = false;   // filtre "manquantes seulement" pour recherche
let _mktWantRarity   = '';      // filtre rareté pour recherche

// Handlers directs (oninput HTML) — mise à jour immédiate sans re-render
// Filtrage partagé pour propose
function _mktApplyOfferFilter(){
  const q = _mktOfferQ.toLowerCase().trim();
  const th = t();
  const grid = document.getElementById('mkt-offer-grid');
  if(!grid) return;
  const offerIds = state.marketOfferIds||[];
  const RARITY_O = {common:0,uncommon:1,rare:2,mythic:3};
  let filtered = ALL_CARDS.filter(c=>{
    if(!_mOwned(c.id)) return false;
    if(_mktOfferDoubles && (c.count||1) < 2) return false;
    if(_mktOfferRarity && c.rarity !== _mktOfferRarity) return false;
    if(!q) return true;
    return String(parseInt(c.id)).includes(q)||c.name.toLowerCase().includes(q);
  });
  filtered.sort((a,b)=>(RARITY_O[b.rarity]??0)-(RARITY_O[a.rarity]??0)||parseInt(a.id)-parseInt(b.id));
  filtered = filtered.slice(0,150);
  grid.innerHTML = filtered.length
    ? filtered.map(c=>_mEditorThumb(c,offerIds.includes(String(parseInt(c.id))),true,th)).join('')
    : '<div style="font-size:10px;color:'+th.textFaint+';padding:16px;grid-column:1/-1;text-align:center;">'+(q||_mktOfferDoubles||_mktOfferRarity?'Aucune carte ne correspond aux filtres':'Tu ne poss\u00e8des aucune carte')+'</div>';
  ['common','uncommon','rare','mythic'].forEach(r=>{const b=document.getElementById('mkt-offer-rar-'+r);if(b)b.style.opacity=(_mktOfferRarity&&_mktOfferRarity!==r)?'0.38':'1';});
  const bd=document.getElementById('mkt-offer-doubles');
  if(bd){bd.style.background=_mktOfferDoubles?'rgba(251,191,36,.25)':'rgba(255,255,255,.05)';bd.style.borderColor=_mktOfferDoubles?'rgba(251,191,36,.7)':'rgba(255,255,255,.15)';bd.style.color=_mktOfferDoubles?'#fbbf24':'#94a3b8';}
}

window._mktSetOfferDoubles = function(){ _mktOfferDoubles=!_mktOfferDoubles; _mktApplyOfferFilter(); };
window._mktSetOfferRarity = function(r){ _mktOfferRarity=(_mktOfferRarity===r?'':r); _mktApplyOfferFilter(); };

// Icône trade sous une carte du stand
// section='offer' : la carte est proposée par l'autre → je veux la recevoir → je choisis ce que j'offre en retour
// section='want'  : la carte est recherchée par l'autre → je possède cette carte → je propose la mienne, je choisis ce que je veux en retour
window._mktTradeCard=function(cardId,section){
  // Trouver le stand auquel appartient cette carte
  const myId=state.currentUser?.id;
  const stands=state.marketStands||[];
  const stand=stands.find(s=>{
    if(s.player_id===myId) return false; // pas son propre stand
    const ids=section==='offer'?(s.offer_ids||[]):(s.want_ids||[]);
    return ids.some(id=>String(parseInt(id))===String(parseInt(cardId)));
  });
  if(!stand) return;

  const card=ALL_CARDS.find(c=>String(parseInt(c.id))===String(parseInt(cardId)));
  if(!card) return;

  if(section==='offer'){
    // La carte est PROPOSÉE → je veux la recevoir → skip ma carte, choisir ce que j'offre
    setState({
      showTrade:true,
      showFriends:false,
      tradeWithId:stand.player_id,
      tradeMyCard:null,        // à choisir
      tradeTheirCard:card,     // pré-rempli : la carte que je veux recevoir
      tradeStep:'pick_my_card',
      tradeSearch:'',
      tradeStandWantIds:(stand.want_ids||[]).map(id=>String(parseInt(id))),
    });
  } else {
    // La carte est RECHERCHÉE par le stand → je la possède et veux la proposer
    // Je dois choisir quelle carte offer du stand je veux recevoir en retour
    if(!card.owned) return;
    const standOfferIds = (stand.offer_ids||[]).map(id=>String(parseInt(id)));
    setState({
      showTrade:true,
      showFriends:false,
      tradeWithId:stand.player_id,
      tradeMyCard:card,               // je donne cette carte (celle qu'ils recherchent)
      tradeTheirCard:null,            // à choisir parmi les offer du stand
      tradeStandOfferIds:standOfferIds,
      tradeStep:'pick_their_from_stand',
      tradeSearch:'',
      tradeStandFilter:'stand',
    });
  }
};

      +'<div style="width:56px;height:84px;overflow:hidden;border:2px solid '+borderCol+';position:relative;">'
      +'<img src="'+img+'" style="width:56px;height:84px;object-fit:cover;display:block;" onerror="this.src=\''+_CARD_BACK_MARKET+'\'" />'
      +'<div style="position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.8);border:1px solid '+borderCol+';display:flex;align-items:center;justify-content:center;">'
      +'<span style="font-size:9px;color:'+borderCol+';line-height:1;font-weight:900;">✕</span></div></div>'
      +'<div style="font-size:7px;color:'+col+';font-weight:700;text-align:center;">#'+parseInt(cid)+'</div></div>';
  };
  if(type==='offer'){
    const chipsEl=document.getElementById('mkt-offer-chips');
    const countEl=document.getElementById('mkt-offer-count');
    if(chipsEl) chipsEl.innerHTML=arr.length?arr.map(i=>chip(i,'offer')).join(''):'<span style="font-size:9px;color:'+th.textFaint+';font-style:italic;padding:8px 0;">Clique sur une carte ci-dessous…</span>';
    if(countEl) countEl.textContent='('+arr.length+')';
    _mktApplyOfferFilter();
  } else {
    const chipsEl=document.getElementById('mkt-want-chips');
    const countEl=document.getElementById('mkt-want-count');
    if(chipsEl) chipsEl.innerHTML=arr.length?arr.map(i=>chip(i,'want')).join(''):'<span style="font-size:9px;color:'+th.textFaint+';font-style:italic;padding:8px 0;">Tape un nom ou active un filtre…</span>';
    if(countEl) countEl.textContent='('+arr.length+')';
    _mktApplyWantFilter();
  }
};

function _mCardThumb(id, isOffer, isMe, fromSection){
  const card=_mGetCard(id); const owned=_mOwned(id);
  const imgSrc=owned&&card?.image_url?card.image_url:_CARD_BACK_MARKET;
  const rarCol=card?(RARITY_COLOR[card.rarity]||'#94a3b8'):'#64748b';
  const count=owned&&card?(card.count||1):0;
  // Taille fixe : largeur 88px, hauteur 132px (ratio 2:3) — dos ET PNG identiques
  const CARD_W=88, CARD_H=132;
  const imgClick=owned&&card?`onclick="event.stopPropagation();window._mktOpenCard('${id}')" style="cursor:pointer;"`:`style="cursor:default;"`;
  const canTrade = !isMe && card && (fromSection==='offer' || (fromSection==='want' && owned));
  const tradeBtn = canTrade
    ? `<button onclick="event.stopPropagation();window._mktTradeCard('${id}','${fromSection||'offer'}')"
        title="Proposer un échange"
        style="width:100%;margin-top:3px;padding:4px 0;background:transparent;color:#a78bfa;border:1.5px solid rgba(167,139,250,.4);font-size:9px;font-weight:800;cursor:pointer;letter-spacing:.3px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px;"
        onmouseover="this.style.background='rgba(167,139,250,.12)';this.style.borderColor='rgba(167,139,250,.7)'"
        onmouseout="this.style.background='transparent';this.style.borderColor='rgba(167,139,250,.4)'">
        <span style="font-size:11px;">⇄</span>
      </button>`
    : `<div style="height:26px;"></div>`;
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;width:${CARD_W}px;">
    <div style="width:${CARD_W}px;height:${CARD_H}px;border:2px solid ${rarCol}55;overflow:hidden;line-height:0;flex-shrink:0;">
      <img src="${imgSrc}" ${imgClick} onerror="this.src='${_CARD_BACK_MARKET}'"
        style="width:${CARD_W}px;height:${CARD_H}px;object-fit:cover;display:block;" />
    </div>
    <div style="font-size:7px;font-weight:700;color:${rarCol};text-align:center;white-space:nowrap;">#${parseInt(id)}</div>
    <div style="font-size:6px;font-weight:900;padding:1px 5px;text-align:center;${owned?'background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.5);color:#22c55e;':'background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);color:#ef4444;'}">${owned?`✓ ${count}×`:'✗ Manq.'}</div>
    ${tradeBtn}
  </div>`;
}

function _mEditorThumb(card,selected,isOffer,th){
  const id=String(parseInt(card.id));
  const rarCol=RARITY_COLOR[card.rarity]||'#94a3b8';
  const owned=_mOwned(id);
  const imgSrc=isOffer
    ? (card.image_url||_CARD_BACK_MARKET)
    : (owned && card.image_url ? card.image_url : _CARD_BACK_MARKET);
  const count=isOffer?(card.count||1):null;
  // Taille fixe 56×84 (ratio 2:3), pas d'étirement — object-fit:cover
  return `<div onclick="window._mToggle('${id}','${isOffer?'offer':'want'}')" style="display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px;position:relative;border:${selected?'2px solid '+rarCol:'2px solid rgba(255,255,255,.06)'};background:${selected?rarCol+'22':'rgba(255,255,255,.02)'};transition:all .1s;">
    <div style="width:56px;height:84px;overflow:hidden;border:1px solid ${rarCol}${selected?'99':'40'};position:relative;flex-shrink:0;">
      <img src="${imgSrc}" style="width:56px;height:84px;object-fit:cover;display:block;" onerror="this.src='${_CARD_BACK_MARKET}'" />
      ${selected?`<div style="position:absolute;inset:0;background:rgba(34,197,94,.18);display:flex;align-items:center;justify-content:center;"><span style="font-size:18px;">✓</span></div>`:''}
      ${isOffer&&count>1?`<div style="position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.85);color:#fbbf24;font-size:8px;font-weight:900;padding:0 3px;line-height:14px;">×${count}</div>`:''}
    </div>
    <div style="font-size:7px;color:${selected?rarCol:th.textMuted};font-weight:700;text-align:center;">#${parseInt(id)}</div>
    ${isOffer&&count?`<div style="font-size:6px;color:#94a3b8;font-weight:600;">×${count} ex.</div>`:''}
  </div>`;
}

function renderMarket(th){
  const myId=state.currentUser?.id;
  const stands=state.marketStands||[];
  const myStand=stands.find(s=>s.player_id===myId);

  // ── VUE LISTE ──────────────────────────────────────────────────────
  if(state.marketView!=='edit'){
    const me=myStand; const others=stands.filter(s=>s.player_id!==myId);
    window._mktExpandData = window._mktExpandData || {};

    const standRow=(ids,isOffer,isMe)=>{
      const MAX=5;
      const shown=ids.slice(0,MAX); const extra=ids.length-MAX;
      const section=isOffer?'offer':'want';
      const dataKey='mkt_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      if(extra>0) window._mktExpandData[dataKey]={ids,isOffer,isMe,section};
      // Cartes fixes 88×132 + bouton + de même taille, flex nowrap, scroll horizontal si débord

      return '<div style="display:flex;flex-wrap:nowrap;gap:8px;align-items:flex-start;overflow-x:auto;padding-bottom:4px;">'

        + (extra>0?`<button onclick="window._mktExpandRowByKey(this,'${dataKey}')" style="width:${CARD_W}px;height:${CARD_H}px;background:rgba(255,255,255,.06);border:2px dashed rgba(255,255,255,.2);color:${th.textMuted};font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:5px;flex-shrink:0;"><span>+${extra}</span><span style="font-size:9px;font-weight:600;">voir tout</span></button>`:'')
        + '</div>';
    };

    const standCard=(stand,isMe)=>{
      const player=stand.players||{};
      const allOfferIds=(stand.offer_ids||[]).map(id=>String(parseInt(id)));
      const allWantIds=(stand.want_ids||[]).map(id=>String(parseInt(id)));
      const avatarUrl=player.avatar_url||'';
      const username=player.discord_username||'?';
      const standName=stand.stand_name||'';
      const previewOfferIds=allOfferIds.slice(0,9);
      const previewWantIds=allWantIds.slice(0,9);
      const MINI_W=48, MINI_H=72;
      const miniCard=(id,isOffer)=>{
        const c=_mGetCard(id); const owned=_mOwned(id);
        const src=owned&&c?.image_url?c.image_url:_CARD_BACK_MARKET;
        const rarCol=c?(RARITY_COLOR[c.rarity]||'#64748b'):'#64748b';
        const ownedCount=c?(c.count||1):1;
        const ownedBadge=owned
          ?'<div style="font-size:6px;font-weight:900;color:#22c55e;text-align:center;line-height:1.1;margin-top:1px;">✓ '+ownedCount+'×</div>'
          :'<div style="font-size:6px;font-weight:900;color:#ef4444;text-align:center;line-height:1.1;margin-top:1px;">✗</div>';

      const offerPreviews=previewOfferIds.map(id=>miniCard(id,true)).join('');
      const wantPreviews=previewWantIds.map(id=>miniCard(id,false)).join('');
      return `<div onclick="${isMe?'window._mktOpenEdit()':'window._mktOpenStand(\''+stand.id+'\')'}" style="cursor:pointer;background:${isMe?'#1a1710':th.bgSecondary};border:${isMe?'2px solid #fbbf24':'1.5px solid rgba(255,255,255,.1)'};overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;"

          <div style="width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid ${isMe?'#fbbf24':'rgba(255,255,255,.2)'};flex-shrink:0;background:${th.bgTertiary};display:flex;align-items:center;justify-content:center;">
            ${avatarUrl?`<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'" />`:'<span style="font-size:17px;">👤</span>'}

            <div style="flex:1;min-width:0;">
              <div style="font-family:'Luckiest Guy',cursive;font-size:14px;color:#fbbf24;letter-spacing:1px;">MARCHÉ DES ÉCHANGES</div>
            </div>
            ${isMe?`<button onclick="window._mktOpenEdit()" style="padding:7px 14px;background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.4);font-size:10px;font-weight:800;cursor:pointer;">✏ MON STAND</button>`:''}
          </div>
          <!-- Corps -->
          <div style="flex:1;overflow-y:auto;padding:0;">
            <!-- Profil du joueur -->
            <div style="display:flex;flex-direction:column;align-items:center;padding:24px 16px 16px;background:${th.bgSecondary};border-bottom:2px solid #000;gap:6px;">
              <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid ${isMe?'#fbbf24':'rgba(255,255,255,.25)'};background:${th.bgTertiary};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                ${player.avatar_url?`<img src="${player.avatar_url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'" />`:'<span style="font-size:32px;">👤</span>'}

// ─── DECK BUILDER — APERÇU CARTE EN GRAND ──────────────────────────
// Modale plein écran : carte en grand au centre, compteurs, bouton Ajouter,
// flèches de navigation. La liste de cartes navigables = collection possédée
// triée/filtrée selon l'état courant du deck builder (même que la grille).
let _deckPreviewIdx = 0;
let _deckPreviewList = [];

function _buildDeckPreviewList() {
  // Reproduit la même logique de filtre/tri que la grille du deck builder
  const ownedCards = ALL_CARDS.filter(c => c.owned);
  const typeFiltered = state.deckTypeFilter
    ? ownedCards.filter(c => (c.type || 'Héro') === state.deckTypeFilter)
    : ownedCards;
  const searchQ = (state.deckSearch || '').toLowerCase().trim();
  const _normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const searchFiltered = searchQ
    ? typeFiltered.filter(c =>
        _normalize(c.name.toLowerCase()).includes(_normalize(searchQ)) ||
        String(parseInt(c.id)).includes(searchQ) ||
        (c.id || '').toLowerCase().includes(searchQ)
      )
    : typeFiltered;
  const RARITY_O = { mythic: 0, legendary: 1, epic: 2, rare: 3, uncommon: 4, common: 5 };
  const sorted = [...searchFiltered].sort((a, b) => {
    const dir = state.deckSortDir === 'asc' ? 1 : -1;
    const numSort = (field) => {
      const va = a[field] ?? -1, vb = b[field] ?? -1;
      return dir * (vb - va) || a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' });
    };
    switch (state.deckSortBy) {
      case 'name':      return dir * (a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' }));
      case 'type':      return dir * (a.type || '').localeCompare(b.type || '', 'fr', { sensitivity: 'base' }) || (RARITY_O[a.rarity] ?? 9) - (RARITY_O[b.rarity] ?? 9);
      case 'id':        return dir * (parseInt(a.id) - parseInt(b.id));
      case 'attack':    return numSort('attack');
      case 'defense':   return numSort('defense');
      case 'precision': return numSort('precision');
      case 'hp':        return numSort('hp');
      default:          return dir * ((RARITY_O[a.rarity] ?? 9) - (RARITY_O[b.rarity] ?? 9)) || a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' });
    }
  });
  return sorted;
}

// Calcule l'état d'ajout d'une carte donnée (compteurs, raison si bloqué)
function _getDeckPreviewStatus(card) {
  const deck = (state.decks || []).find(d => d.id === state.activeDeckId);
  const deckCards = (deck && deck.cards) || [];
  const deckTotal = deckCards.reduce((s, c) => s + c.quantity, 0);
  const mythCount = deckCards.reduce((s, c) => {
    const cd = ALL_CARDS.find(x => parseInt(x.id) === parseInt(c.card_id));
    return s + (cd && cd.rarity === 'mythic' ? c.quantity : 0);
  }, 0);
  const existing = deckCards.find(c => parseInt(c.card_id) === parseInt(card.id));
  const inDeck = existing ? existing.quantity : 0;
  const maxInDeck = Math.min(2, card.count);

  let canAdd = true;
  let reason = '';
  if (deckTotal >= 30) { canAdd = false; reason = 'Deck plein (30/30)'; }
  else if (inDeck >= card.count) { canAdd = false; reason = `Tu n'as que ${card.count} exemplaire${card.count > 1 ? 's' : ''}`; }
  else if (inDeck >= 2) { canAdd = false; reason = 'Max 2 exemplaires par carte'; }
  else if (card.rarity === 'mythic' && mythCount >= 2) { canAdd = false; reason = 'Max 2 Mythiques dans le deck'; }

  return { inDeck, maxInDeck, owned: card.count, deckTotal, mythCount, canAdd, reason };
}

function openDeckCardPreview(cardId) {
  // Si déjà ouvert, on saute juste à la bonne carte
  const existingEl = document.getElementById('deck-card-preview');
  _deckPreviewList = _buildDeckPreviewList();
  const idx = _deckPreviewList.findIndex(c => parseInt(c.id) === parseInt(cardId));
  if (idx < 0) return;
  _deckPreviewIdx = idx;

  if (existingEl) {
    _renderDeckPreviewContent();
    return;
  }

  const wrap = document.createElement('div');
  wrap.id = 'deck-card-preview';
  wrap.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease-out;';
  wrap.innerHTML = '<div id="dcp-content" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;"></div>';
  document.body.appendChild(wrap);

  // Fermeture sur fond (hors contenu)
  wrap.addEventListener('click', (e) => {
    if (e.target === wrap) closeDeckCardPreview();
  });

  // Navigation clavier
  const onKey = (e) => {
    if (!document.getElementById('deck-card-preview')) { document.removeEventListener('keydown', onKey); return; }
    if (e.key === 'Escape') closeDeckCardPreview();
    else if (e.key === 'ArrowLeft') _deckPreviewNav(-1);
    else if (e.key === 'ArrowRight') _deckPreviewNav(1);
    else if (e.key === 'Enter' || e.key === ' ') _deckPreviewTryAdd();
  };
  document.addEventListener('keydown', onKey);
  wrap._onKey = onKey;

  // Swipe tactile pour navigation (mobile)
  let touchStartX = null;
  wrap.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
  wrap.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = (e.changedTouches[0].clientX - touchStartX);
    touchStartX = null;
    if (Math.abs(dx) > 60) _deckPreviewNav(dx < 0 ? 1 : -1);
  }, { passive: true });

  _renderDeckPreviewContent();
}

function closeDeckCardPreview() {
  const el = document.getElementById('deck-card-preview');
  if (!el) return;
  if (el._onKey) document.removeEventListener('keydown', el._onKey);
  el.style.animation = 'fadeOut .15s ease both';
  setTimeout(() => el.remove(), 160);
}

function _deckPreviewNav(dir) {
  if (_deckPreviewList.length === 0) return;
  _deckPreviewIdx = (_deckPreviewIdx + dir + _deckPreviewList.length) % _deckPreviewList.length;
  _renderDeckPreviewContent();
}

function _deckPreviewTryAdd() {
  const card = _deckPreviewList[_deckPreviewIdx];
  if (!card) return;
  const status = _getDeckPreviewStatus(card);
  if (!status.canAdd) return;
  const ok = addCardToDeck(card.id);
  if (ok) {
    // Re-render pour mettre à jour les compteurs + petit feedback visuel
    _renderDeckPreviewContent(true);
  }
}

// ─── CARD 3D VIEWER ──────────────────────────────────────────────
function openCard3DViewer(card) {
  if(document.getElementById('card-3d-viewer')) return;

  const imgSrc = card.image_url || null;
  const rarity = card.rarity || 'common';
  const rarCol = RARITY_COLOR[rarity] || '#a78bfa';

  // Effets premium selon rareté — présents pour toutes, intensité croissante
  const rarityFX = {
    mythic: {
      holoAlpha: .22, specAlpha: .30, rarAlpha: .65,
      rainbow: true,
      holoColors: `rgba(255,80,80,.18) 0%, rgba(255,200,50,.22) 20%, rgba(80,255,160,.18) 40%, rgba(80,160,255,.22) 60%, rgba(200,80,255,.18) 80%, rgba(255,80,80,.18) 100%`,
      glowShadow: `0 0 32px ${rarCol}88, 0 0 64px ${rarCol}44`,
    },
    rare: {
      holoAlpha: .14, specAlpha: .22, rarAlpha: .48,
      rainbow: false,
      holoColors: `rgba(167,139,250,.12) 20%, rgba(255,255,255,.18) 50%, rgba(167,139,250,.12) 80%`,
      glowShadow: `0 0 20px ${rarCol}66, 0 0 40px ${rarCol}33`,
    },
    uncommon: {
      holoAlpha: .09, specAlpha: .15, rarAlpha: .32,
      rainbow: false,
      holoColors: `rgba(56,189,248,.09) 25%, rgba(255,255,255,.13) 50%, rgba(56,189,248,.09) 75%`,
      glowShadow: `0 0 12px ${rarCol}44`,
    },
    common: {
      holoAlpha: .05, specAlpha: .09, rarAlpha: .18,
      rainbow: false,
      holoColors: `rgba(200,200,200,.05) 30%, rgba(255,255,255,.09) 50%, rgba(200,200,200,.05) 70%`,
      glowShadow: `0 0 6px rgba(150,150,150,.25)`,
    },
  };
  const fx = rarityFX[rarity] || rarityFX.common;

  const viewer = document.createElement('div');
  viewer.id = 'card-3d-viewer';
  viewer.style.cssText = `
    position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,.92);backdrop-filter:blur(18px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:grab;user-select:none;-webkit-user-select:none;
    animation:fadeIn .2s ease both;
  `;

  // Taille de la carte
  const vw = window.innerWidth, vh = window.innerHeight;
  const maxH = Math.round(vh * 0.78);
  const maxW = Math.round(vw * 0.82);
  const cardH = Math.min(maxH, Math.round(maxW / 0.667));
  const cardW = Math.round(cardH * 0.667);

  viewer.innerHTML = `
    <div id="c3d-wrap" style="
      width:${cardW}px;height:${cardH}px;
      perspective:900px;position:relative;flex-shrink:0;
    ">
      <div id="c3d-card" style="
        width:100%;height:100%;
        position:relative;transform-style:preserve-3d;
        background:transparent;
        will-change:transform;transition:transform .08s ease-out;
      ">
        ${imgSrc
          ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;-webkit-user-drag:none;" draggable="false" />`
          : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${rarCol}40,${rarCol}15);display:flex;align-items:center;justify-content:center;font-size:80px;">🃏</div>`}
        <!-- Overlay reflet holographique -->
        <div id="c3d-holo" style="
          position:absolute;inset:0;
          background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%);
          mix-blend-mode:screen;pointer-events:none;opacity:0;transition:opacity .15s;
        "></div>
        <!-- Brillance spéculaire -->
        <div id="c3d-spec" style="
          position:absolute;inset:0;
          background:radial-gradient(circle at 50% 50%,rgba(255,255,255,${fx.specAlpha}) 0%,transparent 65%);
          mix-blend-mode:screen;pointer-events:none;opacity:0;transition:opacity .1s;
        "></div>
        <!-- Reflet de rareté -->
        <div id="c3d-rar" style="
          position:absolute;inset:0;
          background:linear-gradient(135deg,${rarCol}30,transparent 50%,${rarCol}20);
          mix-blend-mode:color-dodge;pointer-events:none;opacity:0;transition:opacity .15s;
        "></div>
      </div>
    </div>
    <div style="margin-top:18px;font-family:'Luckiest Guy',cursive;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,.35);">MAINTENIR APPUYÉ · BOUGER POUR PIVOTER</div>
    <div style="position:absolute;top:max(env(safe-area-inset-top,16px),16px);right:16px;">
      <button id="c3d-close" style="width:44px;height:44px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>
  `;

  document.body.appendChild(viewer);

  const card3d = document.getElementById('c3d-card');
  const holo   = document.getElementById('c3d-holo');
  const spec   = document.getElementById('c3d-spec');
  const rar    = document.getElementById('c3d-rar');

  let pressed = false;
  let currentRX = 0, currentRY = 0;
  const MAX_TILT = 18; // moins sensible qu'avant (était 22-28)

  function applyTilt(nx, ny) {
    // nx, ny : -1 à 1 (position normalisée dans la carte)
    const rx = -ny * MAX_TILT;
    const ry =  nx * MAX_TILT;
    currentRX = rx; currentRY = ry;
    card3d.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.03,1.03,1.03)`;

    // Reflet : se déplace avec la position
    const hx = (nx * 0.5 + 0.5) * 100;
    const hy = (ny * 0.5 + 0.5) * 100;

    if(fx.rainbow) {
      const ang = 105 + ry * 1.2;
      holo.style.background = `linear-gradient(${ang}deg, ${fx.holoColors})`;
    } else {
      holo.style.background = `linear-gradient(${105 + ry}deg, transparent 35%, rgba(255,255,255,${fx.holoAlpha * 1.5}) 50%, transparent 65%)`;
    }
    spec.style.background = `radial-gradient(circle at ${hx}% ${hy}%, rgba(255,255,255,${fx.specAlpha}) 0%, transparent 60%)`;

    holo.style.opacity = '1';
    spec.style.opacity = '1';
    rar.style.opacity  = String(fx.rarAlpha);
    viewer.style.cursor = 'grabbing';
  }

  function releaseTilt() {
    pressed = false;
    card3d.style.transition = 'transform .45s cubic-bezier(.25,.46,.45,.94)';
    card3d.style.transform = 'rotateX(0) rotateY(0) scale3d(1,1,1)';
    holo.style.opacity = '0';
    spec.style.opacity = '0';
    rar.style.opacity  = '0';
    viewer.style.cursor = 'grab';
    setTimeout(() => { card3d.style.transition = 'transform .08s ease-out'; }, 460);
  }

  function getRelative(el, cx, cy) {
    const r = el.getBoundingClientRect();
    const nx = ((cx - r.left) / r.width)  * 2 - 1;
    const ny = ((cy - r.top)  / r.height) * 2 - 1;
    return { nx: Math.max(-1, Math.min(1, nx)), ny: Math.max(-1, Math.min(1, ny)) };
  }

  // Mouse
  viewer.addEventListener('mousedown', (e) => {
    if(e.target === document.getElementById('c3d-close')) return;
    pressed = true;
    card3d.style.transition = 'transform .08s ease-out';
    const {nx, ny} = getRelative(card3d, e.clientX, e.clientY);
    applyTilt(nx, ny);
  });
  viewer.addEventListener('mousemove', (e) => {
    if(!pressed) return;
    const {nx, ny} = getRelative(card3d, e.clientX, e.clientY);
    applyTilt(nx, ny);
  });
  viewer.addEventListener('mouseup', releaseTilt);
  viewer.addEventListener('mouseleave', () => { if(pressed) releaseTilt(); });

  // Touch
  viewer.addEventListener('touchstart', (e) => {
    if(e.target === document.getElementById('c3d-close')) return;
    e.preventDefault();
    pressed = true;
    card3d.style.transition = 'transform .08s ease-out';
    const t = e.touches[0];
    const {nx, ny} = getRelative(card3d, t.clientX, t.clientY);
    applyTilt(nx, ny);
  }, {passive:false});
  viewer.addEventListener('touchmove', (e) => {
    if(!pressed) return;
    e.preventDefault();
    const t = e.touches[0];
    const {nx, ny} = getRelative(card3d, t.clientX, t.clientY);
    applyTilt(nx, ny);
  }, {passive:false});
  viewer.addEventListener('touchend', releaseTilt);

  // Fermer — clic sur fond ou bouton ✕
  document.getElementById('c3d-close').addEventListener('click', () => closeViewer());
  viewer.addEventListener('click', (e) => {
    if(e.target === viewer) closeViewer();
  });

  // Échap
  function onKey(e) { if(e.key === 'Escape') closeViewer(); }
  document.addEventListener('keydown', onKey);

  function closeViewer() {
    viewer.style.animation = 'fadeOut .18s ease both';
    setTimeout(() => { viewer.remove(); document.removeEventListener('keydown', onKey); }, 190);
  }
}

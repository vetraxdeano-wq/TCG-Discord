<script>
  // ─── PWA INSTALL SYSTEM ──────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let _pwaInstallPrompt = null;
  let _pwaHideTimer = null;
  let _isInstalled = window.matchMedia('(display-mode: standalone)').matches
                  || ('standalone' in navigator && navigator.standalone);

  // Détection navigateur/plateforme
  const _ua = navigator.userAgent;
  const _isIos     = /iphone|ipad|ipod/i.test(_ua);
  const _isAndroid = /android/i.test(_ua);
  const _isOpera   = /OPR\/|Opera/i.test(_ua);
  const _isFirefox = /Firefox/i.test(_ua) && !/Seamonkey/i.test(_ua);
  const _isSamsung = /SamsungBrowser/i.test(_ua);
  const _isEdge    = /Edg\//i.test(_ua);
  const _isChrome  = /Chrome/i.test(_ua) && !_isOpera && !_isEdge && !_isSamsung;
  const _isSafari  = /Safari/i.test(_ua) && !_isChrome && !_isAndroid;
  const _isMobile  = _isIos || _isAndroid;

  function _hidePwaBtn() {
    const btn = document.getElementById('pwa-install-btn');
    if (btn) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; setTimeout(()=>{ btn.style.display='none'; }, 400); }
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaInstallPrompt = e;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    _pwaInstallPrompt = null;
    _isInstalled = true;
    _hidePwaBtn();
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  });

  // Déclencher : prompt natif si dispo, sinon overlay contextuel
  window.triggerPwaInstall = function() {
    if (_pwaInstallPrompt) {
      _pwaInstallPrompt.prompt();
      _pwaInstallPrompt.userChoice.then(() => {
        _pwaInstallPrompt = null;
        _hidePwaBtn();
      });
      return;
    }
    // iOS : essayer Web Share API pour déclencher le flow natif
    if (_isIos && navigator.share) {
      navigator.share({ title: 'Discord TCG', url: window.location.href })
        .catch(() => {});
      // Montrer quand même le guide car share ≠ install
    }
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) {
      _buildPwaOverlay(); // injecter le contenu contextualisé
      overlay.style.display = 'flex';
    }
  };

  window.closePwaOverlay = function() {
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  };

  // Construire l'overlay avec le bon contenu selon le navigateur détecté
  function _buildPwaOverlay() {
    const body = document.getElementById('pwa-overlay-body');
    if (!body) return;

    let sections = [];

    if (_isIos) {
      sections.push({
        icon:'🍎', label:'iOS SAFARI', color:'#eb459e',
        html:`Appuie sur <strong>⬆ Partager</strong> en bas de Safari, puis <strong>« Sur l'écran d'accueil »</strong>.`
      });
    } else if (_isSamsung) {
      sections.push({
        icon:'📱', label:'SAMSUNG INTERNET', color:'#1e88e5',
        html:`Menu <strong>⋮</strong> → <strong>« Ajouter page à »</strong> → <strong>« Écran d'accueil »</strong>.`
      });
    } else if (_isFirefox && _isAndroid) {
      sections.push({
        icon:'🦊', label:'FIREFOX ANDROID', color:'#ff7139',
        html:`Menu <strong>⋮</strong> → <strong>« Installer »</strong> ou <strong>« Ajouter à l'écran d'accueil »</strong>.`
      });
    } else if (_isFirefox) {
      sections.push({
        icon:'🦊', label:'FIREFOX (PC)', color:'#ff7139',
        html:`Firefox ne supporte pas l'installation PWA. Utilise <strong>Chrome</strong> ou <strong>Edge</strong> pour installer l'app.`
      });
    } else if (_isOpera && _isMobile) {
      sections.push({
        icon:'🎭', label:'OPERA MOBILE', color:'#cc0f16',
        html:`Menu <strong>⋮</strong> → <strong>« Page d'accueil »</strong> → <strong>« Ajouter à l'écran d'accueil »</strong>.`
      });
    } else if (_isOpera) {
      sections.push({
        icon:'🎭', label:'OPERA (PC)', color:'#cc0f16',
        html:`Dans la barre d'adresse, clique sur l'icône <strong>⊕</strong> ou le menu <strong>≡</strong> → <strong>« Installer Discord TCG »</strong>.`
      });
    } else if (_isEdge) {
      sections.push({
        icon:'🌐', label:'MICROSOFT EDGE', color:'#0078d4',
        html:`Dans la barre d'adresse, clique sur l'icône <strong>⊕</strong> à droite → <strong>« Installer Discord TCG »</strong>.`
      });
    } else if (_isAndroid) {
      sections.push({
        icon:'📱', label:'ANDROID (Chrome)', color:'#57f287',
        html:`Menu <strong>⋮</strong> en haut à droite → <strong>« Ajouter à l'écran d'accueil »</strong>.`
      });
    } else {
      // Défaut : Chrome / PC
      sections.push({
        icon:'🖥', label:'CHROME / EDGE (PC)', color:'#5865f2',
        html:`Dans la barre d'adresse, clique sur l'icône <strong>⊕</strong> ou <strong>⬇</strong> à droite → <strong>« Installer Discord TCG »</strong>.`
      });
    }

    // Toujours ajouter Chrome PC en bas sauf si c'est le principal
    if (!_isChrome || _isMobile) {
      sections.push({
        icon:'💡', label:'RECOMMANDÉ : Chrome ou Edge', color:'#fbbf24',
        html:`Pour une expérience optimale, ouvre cette page dans <strong>Chrome</strong> ou <strong>Edge</strong> — le bouton d'installation apparaît automatiquement.`
      });
    }

    body.innerHTML = sections.map(s => `
      <div style="background:#0f0e17;border:2px solid ${s.color}30;padding:14px;margin-bottom:10px;">
        <div style="font-size:11px;font-weight:900;color:${s.color};letter-spacing:.8px;margin-bottom:8px;">${s.icon} ${s.label}</div>
        <div style="font-size:11px;color:#9d8ea0;line-height:1.7;">${s.html}</div>
      </div>`).join('');
  }

  // Auto-hide : montrer le bouton si pas encore installé, puis cacher après 15s
  window._startPwaAutoHide = function() {
    if (_isInstalled) return; // déjà installé, rien à faire
    if (_pwaHideTimer) return; // déjà lancé
    const btn = document.getElementById('pwa-install-btn');
    if (btn) {
      btn.style.display = 'flex';
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    }
    _pwaHideTimer = setTimeout(() => {
      _hidePwaBtn();
    }, 15000);
  };

  // Cacher si déjà installé au chargement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => _hidePwaBtn());
  }
  // Sur iOS en standalone : masquer immédiatement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
    });
  }
</script>

<!-- ── Bouton installation PWA — en haut à droite ── -->

    <div style="height:4px;background:linear-gradient(90deg,#5865f2,#eb459e,#fee75c);"></div>
    <div style="padding:20px;">

        <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:1px;">📲 INSTALLER DISCORD TCG</div>
        <button onclick="window.closePwaOverlay()" style="background:transparent;border:none;color:#9d8ea0;font-size:20px;cursor:pointer;line-height:1;padding:0 2px;">✕</button>
      </div>
      <!-- Contenu injecté dynamiquement selon le navigateur -->
      <div id="pwa-overlay-body"></div>
    </div>
  </div>
</div>

// loadCollection défini plus bas dans le bloc principal

function fmtDate(iso){if(!iso)return"—";return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"});}
function fmtTime(iso){if(!iso)return"—";return new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}

// ─── AMBIENT MUSIC ────────────────────────────────────────────────
// ─── YOUTUBE AUDIO PLAYER ─────────────────────────────────────────
// Musique : https://www.youtube.com/watch?v=niReTZnphks (départ à 7:05 = 425s)
const YT_VIDEO_ID = 'niReTZnphks';
const YT_START_SEC = 425;
let _ytPlayer = null;
let _ytReady = false;
let _ytPendingPlay = false;
let _ytPlayRetryTimer = null;
let audioPlaying = false;

(function loadYTApi(){
  if(window.YT && window.YT.Player){ _ytReady = true; return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function(){
  _ytReady = true;
  const container = document.getElementById('yt-audio-player');
  if(!container) return;
  _ytPlayer = new YT.Player('yt-audio-player', {
    videoId: YT_VIDEO_ID,
    playerVars:{
      autoplay: 0,
      controls: 0,
      loop: 1,
      playlist: YT_VIDEO_ID,
      start: YT_START_SEC,
      modestbranding: 1,
      rel: 0,
      playsinline: 1,
      mute: 0,
    },
    events:{
      onReady: function(e){
        e.target.setVolume(25);
        if(_ytPendingPlay){ _ytPendingPlay = false; _doPlay(); }
      },
      onStateChange: function(e){
        // Relancer si stoppé/mis en pause alors qu'on veut jouer
        if(audioPlaying && (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.PAUSED)){
          setTimeout(()=>{ try{ _ytPlayer.playVideo(); }catch(ex){} }, 200);
        }
      },
      onError: function(){
        // Retry après erreur réseau
        if(audioPlaying) setTimeout(_doPlay, 2000);
      },
    }
  });
};

function _doPlay(){
  if(!_ytPlayer) return;
  try{
    const s = _ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1;
    // -1=unstarted, 1=playing, 2=paused, 3=buffering, 5=video cued
    if(s === 1) return; // déjà en train de jouer
    _ytPlayer.playVideo();
  }catch(e){}
}

function _ensurePlay(){
  // Polling léger : reessaie toutes les 800ms si pas encore en lecture
  if(_ytPlayRetryTimer) return;
  _ytPlayRetryTimer = setInterval(()=>{
    if(!audioPlaying){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; }
    const s = _ytPlayer ? (_ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1) : -1;
    if(s === 1){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; } // joue, ok
    _doPlay();
  }, 800);
  // Arrêter le polling après 15s max (éviter boucle infinie)
  setTimeout(()=>{ if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; } }, 15000);
}

function audioPlay(){
  if(audioPlaying) return;
  audioPlaying = true;
  if(!_ytReady || !_ytPlayer){ _ytPendingPlay = true; return; }
  _doPlay();
  _ensurePlay();
}
function audioStop(){
  audioPlaying = false;
  _ytPendingPlay = false;
  if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; }
  if(_ytPlayer){ try{ _ytPlayer.pauseVideo(); } catch(e){} }
}
function audioToggle(){ if(audioPlaying) audioStop(); else audioPlay(); }

// Unlock audio dès la première interaction utilisateur (contourne la politique autoplay)
(function(){
  const unlock = ()=>{
    if(audioPlaying && _ytPlayer){
      try{ const s=_ytPlayer.getPlayerState(); if(s!==1) _doPlay(); }catch(e){}
    }
  };
  document.addEventListener('touchstart', unlock, {once:true, passive:true});
  document.addEventListener('click', unlock, {once:true});
})();

  // Trade

function render(){
  const app = document.getElementById('app');
  const th = t();
  // Body background = couleur de la nav (bgSecondary) pour qu'aucune bande différente
  // ne soit visible sur Android/iOS autour de l'app (safe-area, barre système, etc.)
  document.body.style.background = th.bgSecondary;
  document.documentElement.style.background = th.bgSecondary;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
  }
}

function bindSplash(){
  document.getElementById('splash').addEventListener('click', ()=>{
    const cta = document.querySelector('.cta-pulse');
    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Animate logo glow pulse
    const logo = document.getElementById('splash-logo');
    if(logo){
      const glow = 0.25 + Math.sin(splashTick * 0.04) * 0.1;
      logo.style.filter = `drop-shadow(0 0 ${18+Math.sin(splashTick*.04)*6}px rgba(251,191,36,${glow})) drop-shadow(0 0 6px rgba(251,191,36,.15))`;
    }
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

              <span style="font-size:14px;font-weight:900;color:${th.accent};">${ownedCards}<span style="font-size:10px;color:${th.textMuted};font-weight:600;">/${totalCards}</span></span>
              <span style="font-size:9px;color:${th.textMuted};background:${th.accent}12;border:1px solid ${th.accent}25;padding:1px 7px;">${pct}%</span>
            </div>

          <div style="height:5px;background:${th.bg};overflow:hidden;">

          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;">
            <span style="font-size:9px;color:${th.textMuted};">${ownedCards} obtenues</span>

  </div>`;
}

      ${decks.length===0?`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px 20px;">
          <div style="width:72px;height:72px;background:${th.bgTertiary};border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.4;">🗂️</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:${th.text};margin-bottom:6px;">Aucun deck</div>

          <!-- main content -->

function renderDeckEdit(th){
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if(!deck) return renderDeckList(th);
  const deckCards = deck.cards || []; // [{card_id, quantity}]
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  const isPlayable = deckTotal===30;

  // Compter mythiques dans le deck
  const mythCount = deckCards.reduce((s,c)=>{
    const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(card&&card.rarity==='mythic'?c.quantity:0);
  },0);

  // Cartes possédées triées
  const ownedCards = ALL_CARDS.filter(c=>c.owned).sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  // Helper: quantité d'une carte dans le deck
  const qtyInDeck = (cardId)=>{
    const e=deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
    return e?e.quantity:0;
  };

  // Helper: peut-on ajouter cette carte ?
  const canAdd = (card)=>{
    if(deckTotal>=30) return {ok:false,reason:'30 cartes max'};
    const qty=qtyInDeck(card.id);
    // Ne pas mettre plus que ce qu'on possède
    if(qty>= card.count) return {ok:false,reason:`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''}`};
    // Rare/Mythic : max 2 exemplaires dans le deck
    if(card.rarity==='mythic'||card.rarity==='rare'){
      if(qty>=2) return {ok:false,reason:'2 exemplaires max (Rare/Myth)'};
    }
    // Max 2 Mythiques au total dans le deck
    if(card.rarity==='mythic'&&mythCount>=2&&qty===0) return {ok:false,reason:'2 Mythiques max dans le deck'};
    return {ok:true};
  };

  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px 12px;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-back" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;">${deck.name}</div>
          <button id="db-rename-edit" data-deckid="${deck.id}" data-deckname="${deck.name}" style="width:22px;height:22px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✏️</button>
        </div>
        <div style="font-size:9px;color:${isPlayable?th.green:th.textMuted};font-weight:700;margin-top:1px;">${isPlayable?'✓ Deck prêt':deckTotal+'/30'} · ${mythCount}/2 Myth.</div>
      </div>
      <button id="db-autofill" style="padding:6px 12px;background:${th.accentAlt}18;color:${th.accentAlt};border:1px solid ${th.accentAlt}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">✨ AUTO</button>
      <button id="db-save" style="padding:6px 14px;background:${th.green};color:#000;border:none;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">💾 SAVE</button>
    </div>

    <div style="background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;padding:10px 16px;">
      <div style="font-size:9px;color:${th.textMuted};margin-bottom:6px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Cartes du deck (${deckTotal}/30)</div>
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;min-height:60px;align-items:center;">
        ${deckTotal===0?`<div style="color:${th.textFaint};font-size:11px;padding:0 8px;">Aucune carte — ajoute des cartes ci-dessous</div>`
          :deckCards.map(entry=>{
            const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(entry.card_id));
            if(!card) return '';
            return `<div class="db-deck-card" data-cardid="${card.id}" style="flex-shrink:0;width:36px;height:50px;background:linear-gradient(135deg,${card.color}40,${card.color}15);border:1px solid ${card.color}70;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;" title="${card.name}">
              🃏
              ${entry.quantity>1?`<div style="position:absolute;top:-4px;right:-4px;width:13px;height:13px;background:${th.accent};color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;">×${entry.quantity}</div>`:''}
              <div style="position:absolute;bottom:2px;font-size:6px;color:${card.color};font-weight:700;">◆</div>
            </div>`;
          }).join('')}
      </div>
    </div>

    <div style="flex:1;overflow-y:auto;padding:10px 16px;">
      <div style="font-size:9px;color:${th.textMuted};margin-bottom:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Ma collection (${ownedCards.length} cartes)</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;">
        ${ownedCards.map(card=>{
          const qty=qtyInDeck(card.id);
          const chk=canAdd(card);
          return `<div class="${chk.ok?'db-add-card':'db-add-card-disabled'}" data-cardid="${card.id}" style="background:${qty>0?card.color+'25':th.bgSecondary};border:1px solid ${qty>0?card.color+'80':th.border};aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;padding:5px 3px 3px;cursor:${chk.ok?'pointer':'default'};opacity:${chk.ok?1:.45};position:relative;overflow:hidden;gap:2px;" title="${chk.ok?'Ajouter':chk.reason}">

// ─── TAB COLLECTION ───────────────────────────────────────────────
function renderTabCollection(th){
  const owned = ALL_CARDS.filter(c=>c.owned).length;
  let cards = [...ALL_CARDS]
    .filter(c=>state.collFilterSet==="all"||c.set===state.collFilterSet)
    .filter(c=>state.collFilterRarity==="all"||c.rarity===state.collFilterRarity)
    .filter(c=>state.collShowOwned==="all"||(state.collShowOwned==="owned"&&c.owned)||(state.collShowOwned==="missing"&&!c.owned))
    .filter(c=>state.collFilterType==="all"||c.type===state.collFilterType)
    .filter(c=>{
      if(!state.collSearch) return true;
      const q=state.collSearch.trim().toLowerCase();
      if(!q) return true;
      // Recherche par ID (toujours, même cartes non possédées)
      if(String(parseInt(c.id))===q || c.id.toLowerCase().includes(q)) return true;
      // Recherche par nom uniquement si la carte est possédée
      if(c.owned && c.name.toLowerCase().includes(q)) return true;
      return false;
    })
    .sort((a,b)=>state.collSortBy==="id"?a.id.localeCompare(b.id):RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));
  const pct = ALL_CARDS.length>0?Math.round(owned/ALL_CARDS.length*100):0;

  return `
  <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;background:transparent;">
    <!-- Deck builder banner -->
    <div style="flex-shrink:0;padding:12px 14px 8px;">
      <div style="background:linear-gradient(135deg,${th.accent}12,${th.accentAlt}08);border:2px solid #000;padding:12px 16px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${th.accent}50,transparent);"></div>
        <div style="position:absolute;right:-4px;top:-4px;font-size:48px;opacity:.04;pointer-events:none;">🗂️</div>
        <div style="width:40px;height:40px;flex-shrink:0;background:${th.accent}18;border:1px solid ${th.accent}40;display:flex;align-items:center;justify-content:center;font-size:18px;">🗂️</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Bangers',cursive;font-size:12px;font-weight:700;color:${th.text};letter-spacing:.5px;">Deck Builder</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:2px;">${owned} carte${owned>1?'s':''} disponible${owned>1?'s':''} · ${pct}% de la collection</div>
          <div style="height:2px;background:${th.bg};margin-top:6px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${th.accent},${th.accentAlt});"></div>
          </div>
        </div>
        <button id="btn-open-deckbuilder" style="padding:7px 14px;flex-shrink:0;background:${th.accent};color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:800;letter-spacing:.5px;">OUVRIR</button>
      </div>
    </div>
    <!-- Filters -->
    <div style="padding:0 14px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;gap:6px;background:${th.bgSecondary};border:2px solid #000;padding:4px 10px;">
        <span style="font-size:14px;color:${th.textMuted};">🔍</span>
        <input id="coll-search-input" type="text" placeholder="Rechercher par ID ou nom…" value="${state.collSearch||''}"
          style="flex:1;background:transparent;border:none;outline:none;font-size:11px;color:${th.text};font-family:inherit;"
          oninput="window._collSearchHandler && window._collSearchHandler(this.value)"/>
        ${state.collSearch?`<button onclick="state.collSearch='';render();" style="background:none;border:none;color:${th.textMuted};font-size:14px;cursor:pointer;padding:0;">✕</button>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:9px;color:${th.textMuted};white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;">Tri</span>
        <button class="sort-btn" data-sort="id" style="padding:5px 12px;font-size:10px;font-weight:700;background:${state.collSortBy==='id'?th.accent+'22':'transparent'};color:${state.collSortBy==='id'?th.accent:th.textMuted};border:1px solid ${state.collSortBy==='id'?th.accent+'50':th.border};transition:all .15s;">ID</button>
        <button class="sort-btn" data-sort="rarity" style="padding:5px 12px;font-size:10px;font-weight:700;background:${state.collSortBy==='rarity'?th.accent+'22':'transparent'};color:${state.collSortBy==='rarity'?th.accent:th.textMuted};border:1px solid ${state.collSortBy==='rarity'?th.accent+'50':th.border};transition:all .15s;">Rareté</button>
        <div style="margin-left:auto;position:relative;">
          <div style="display:flex;gap:4px;margin-bottom:4px;">
            <button class="owned-filter-btn" data-val="all" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='all'?th.accent+'50':th.border};background:${state.collShowOwned==='all'?th.accent+'18':'transparent'};color:${state.collShowOwned==='all'?th.accent:th.textMuted};transition:all .15s;">Toutes</button>
            <button class="owned-filter-btn" data-val="owned" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='owned'?th.green+'50':th.border};background:${state.collShowOwned==='owned'?th.green+'18':'transparent'};color:${state.collShowOwned==='owned'?th.green:th.textMuted};transition:all .15s;">Possédées</button>
            <button class="owned-filter-btn" data-val="missing" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='missing'?th.red+'50':th.border};background:${state.collShowOwned==='missing'?th.red+'18':'transparent'};color:${state.collShowOwned==='missing'?th.red:th.textMuted};transition:all .15s;">Manquantes</button>
          </div>
          <button id="set-filter-btn" style="display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:9px;font-weight:700;background:${state.collFilterSet!=='all'?th.accent+'18':'transparent'};color:${state.collFilterSet!=='all'?th.accent:th.textMuted};border:1px solid ${state.collFilterSet!=='all'?th.accent+'50':th.border};white-space:nowrap;transition:all .15s;">
            ${state.collFilterSet === "all" ? "Tous les Sets" : state.collFilterSet}
            <span style="display:inline-block;transform:${state.collSetOpen?'rotate(180deg)':'none'};transition:transform .2s;">${SVG.chevron}</span>
          </button>
          ${state.collSetOpen?`
          <div id="set-dropdown" style="position:absolute;right:0;top:calc(100% + 6px);background:${th.bgSecondary};border:2px solid #000;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5);z-index:50;min-width:150px;">
            <button class="set-opt" data-val="all" style="display:block;width:100%;text-align:left;padding:10px 14px;font-size:11px;font-weight:700;background:${state.collFilterSet==='all'?th.accent+'18':'transparent'};color:${state.collFilterSet==='all'?th.accent:th.text};border:none;border-bottom:1px solid ${th.border};">Tous les Sets</button>
            ${[...new Set(ALL_CARDS.map(c=>c.set))].sort().map(s=>`
              <button class="set-opt" data-val="${s}" style="display:block;width:100%;text-align:left;padding:10px 14px;font-size:11px;font-weight:700;background:${state.collFilterSet===s?th.accent+'18':'transparent'};color:${state.collFilterSet===s?th.accent:th.text};border:none;border-bottom:1px solid ${th.border};">${s}</button>`).join('')}
          </div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;">
        <button class="rar-btn" data-rar="all" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterRarity==='all'?th.borderStrong:th.border};background:${state.collFilterRarity==='all'?th.accent+'18':'transparent'};color:${state.collFilterRarity==='all'?th.accent:th.textMuted};transition:all .15s;">Tout</button>
        ${RARITY_ORDER.map(r=>`<button class="rar-btn" data-rar="${r}" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterRarity===r?RARITY_COLOR[r]+'80':th.border};background:${state.collFilterRarity===r?RARITY_COLOR[r]+'18':'transparent'};color:${state.collFilterRarity===r?RARITY_COLOR[r]:th.textMuted};transition:all .15s;">${RARITY_LABEL[r]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;">
        <button class="type-btn" data-type="all" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='all'?th.borderStrong:th.border};background:${state.collFilterType==='all'?th.accent+'18':'transparent'};color:${state.collFilterType==='all'?th.accent:th.textMuted};transition:all .15s;flex-shrink:0;">Tous</button>
        <button class="type-btn" data-type="Hero" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Hero'?'#f59e0b80':th.border};background:${state.collFilterType==='Hero'?'rgba(245,158,11,.12)':'transparent'};color:${state.collFilterType==='Hero'?'#f59e0b':th.textMuted};transition:all .15s;flex-shrink:0;">⚔ Héros</button>
        <button class="type-btn" data-type="Ruse" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Ruse'?'#10b98180':th.border};background:${state.collFilterType==='Ruse'?'rgba(16,185,129,.12)':'transparent'};color:${state.collFilterType==='Ruse'?'#10b981':th.textMuted};transition:all .15s;flex-shrink:0;">🃏 Ruse</button>
        <button class="type-btn" data-type="Arcane" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Arcane'?'#8b5cf680':th.border};background:${state.collFilterType==='Arcane'?'rgba(139,92,246,.12)':'transparent'};color:${state.collFilterType==='Arcane'?'#8b5cf6':th.textMuted};transition:all .15s;flex-shrink:0;">✦ Arcane</button>
      </div>
      <div style="font-size:9px;color:${th.textFaint};letter-spacing:.3px;">${owned}/${ALL_CARDS.length} obtenues · ${cards.length} affichées</div>
    </div>
    <!-- Grid -->
    ${(()=>{
      const GAP=6, PAD=10;
      const availW = window.innerWidth - PAD*2;
      const COLS = Math.min(8, Math.max(3, Math.floor(availW / 130)));
      const CW = Math.floor((availW - GAP*(COLS-1)) / COLS);
      const CH = Math.round(CW * 1.5);
      const ROWS = Math.ceil(cards.length / COLS);
      const gridH = ROWS * CH + (ROWS-1) * GAP;
      if(cards.length===0) return `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:${th.textMuted};font-size:12px;"><div style="font-size:32px;">🔍</div>Aucune carte</div>`;
      return `<div style="flex:1;overflow-y:auto;padding:${PAD}px;">
        <div style="position:relative;width:${availW}px;height:${gridH}px;">
          ${cards.map((c,i)=>{
            const col=i%COLS, row=Math.floor(i/COLS);
            const x=col*(CW+GAP), y=row*(CH+GAP);
            return renderCollCard(c,th,x,y,CW,CH);
          }).join('')}
        </div>
      </div>`;
    })()}
  </div>`;
}

function renderCollCard(card,th,x,y,CW,CH){
  if(!card.owned){
    return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;overflow:hidden;border:2px solid #000;">
      ${card.image_url
        ? `<img src="${card.image_url}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:.55;" />`
        : `<img src="https://i.goopics.net/iic46c.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;opacity:.75;" />`}
      <div style="position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:10px;font-weight:800;color:rgba(255,255,255,.95);text-shadow:0 1px 4px #000,0 0 8px #000;">#${card.id}</div>
    </div>`;
  }
  const rarCol = card.color;
  const artH = CH - 20;
  return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;overflow:hidden;border:2px solid #000;background:${th.bgSecondary};">
    ${card.count>1?`<div style="position:absolute;top:2px;right:2px;min-width:13px;height:13px;background:${th.accent};color:#fff;font-size:6px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 2px;z-index:1;">×${card.count}</div>`:''}
    <div style="position:absolute;top:0;left:0;right:0;height:${artH}px;overflow:hidden;">
      ${card.image_url
        ? `<img src="${card.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />`

// ─── TAB MESSAGES ────────────────────────────────────────────────
function renderMessagesModal(th){
  const friends = state.friends || [];
  const activeId = state.activeConvId;
  const msgs = (state.messages[activeId] || []);
  const myId = state.currentUser?.id;

  const innerContent = activeId && friends.find(f=>f.id===activeId) ? (() => {
    const friend = friends.find(f=>f.id===activeId);
    return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button id="msg-back" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">←</button>
      <div style="width:30px;height:30px;overflow:hidden;background:${th.surface};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${friend.avatar_url?`<img src="${friend.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:14px;">👤</span>'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${friend.discord_username||'Ami'}</div>
        <div style="font-size:9px;color:${th.textMuted};margin-top:1px;letter-spacing:.3px;">Conversation privée</div>
      </div>
    </div>
    <div id="msg-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;min-height:0;">
      ${(()=>{
        const trades = (state.convTrades[activeId] || []).map(t=>({...t, _type:'trade', _ts: t.created_at}));
        const allItems = [...msgs.map(m=>({...m, _type:'msg', _ts: m.ts})), ...trades]
          .sort((a,b)=>new Date(a._ts)-new Date(b._ts));

        if(allItems.length===0) return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:30px 20px;"><div style="font-size:36px;opacity:.2;">✉️</div><div style="font-size:12px;font-weight:700;color:${th.text};">Pas encore de messages</div><div style="font-size:10px;color:${th.textMuted};">Envoie le premier !</div></div>`;

        return allItems.map(item=>{
          if(item._type === 'msg') return `
            <div style="display:flex;flex-direction:${item.from===myId?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:75%;background:${item.from===myId?th.accent:th.bgTertiary};color:${item.from===myId?'#fff':th.text};padding:8px 12px;border-radius:${item.from===myId?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${item.text}</div>
            </div>`;

          // ── Trade card ──
          const isMine = item.from_id === myId;
          const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.from_card_id));
          const toCard   = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.to_card_id));
          // Spoil : on ne révèle une carte que si l'utilisateur actuel la possède OU s'il en est l'auteur
          // fromCard = carte que l'expéditeur propose → visible si isMine OU si le receveur la possède
          // toCard = carte que l'expéditeur veut → visible si !isMine (receveur) OU si l'expéditeur la possède
          const showFromCard = isMine || (fromCard && fromCard.owned);
          const showToCard   = !isMine || (toCard && toCard.owned);

          const STATUS = {
            pending:  { label:'En attente…',   color:'#fee75c', icon:'⏳', bg:'rgba(254,231,92,.08)',  border:'rgba(254,231,92,.25)' },
            accepted: { label:'Échange accepté !', color:'#57f287', icon:'✓',  bg:'rgba(87,242,135,.08)', border:'rgba(87,242,135,.25)' },
            declined: { label:'Refusé',          color:'#ed4245', icon:'✕',  bg:'rgba(237,66,69,.08)',  border:'rgba(237,66,69,.25)'  },
            cancelled:{ label:'Annulé',          color:'#96989d', icon:'—',  bg:'rgba(150,152,157,.08)',border:'rgba(150,152,157,.2)' },
          };
          const st = STATUS[item.status] || STATUS.pending;
          const tradeLabel = isMine ? 'Tu proposes' : 'Proposition reçue';

          const cardBox = (card, show, isLeft) => {
            const col = card ? RARITY_COLOR[card.rarity] : '#96989d';
            if(show && card) return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;background:linear-gradient(135deg,${col}30,${col}10);border:1px solid ${col}60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
                  <div style="font-size:18px;">🃏</div>
                  <div style="font-size:6px;color:${col};font-weight:800;">◆</div>
                </div>
                <div style="font-size:8px;font-weight:700;color:${th.text};text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${card.name}</div>
                <div style="font-size:7px;color:${th.textMuted};">#${card.id}</div>
              </div>`;
            return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;border:2px solid #000;overflow:hidden;position:relative;opacity:.65;">
                  <img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:cover;display:block;" />
                  <div style="position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:6px;font-weight:700;color:rgba(255,255,255,.85);text-shadow:0 1px 2px #000;">#${isLeft?item.from_card_id:item.to_card_id}</div>
                </div>
                <div style="font-size:7px;color:${th.textMuted};text-align:center;">Mystère</div>
              </div>`;
          };

          // Boutons accepter/refuser : seulement si pending ET c'est moi le receveur
          const isPendingForMe = item.status === 'pending' && item.to_id === myId;
          const receiverOwnsCard = toCard && toCard.owned;

          return `
            <div style="display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:88%;background:${st.bg};border:1px solid ${st.border};padding:10px 12px;min-width:200px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                  <div style="font-size:9px;font-weight:700;color:${th.textMuted};text-transform:uppercase;letter-spacing:1px;">🔄 ${tradeLabel}</div>
                  <div style="display:flex;align-items:center;gap:4px;background:${st.bg};border:1px solid ${st.border};padding:2px 7px;">
                    <span style="font-size:10px;">${st.icon}</span>
                    <span style="font-size:9px;font-weight:700;color:${st.color};">${st.label}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu donnes':'Il donne'}</div>
                    ${cardBox(fromCard, showFromCard, true)}
                  </div>
                  <div style="font-size:16px;color:${th.textMuted};">⇄</div>
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu reçois':'Il veut'}</div>
                    ${cardBox(toCard, showToCard, false)}
                  </div>
                </div>
                <div style="margin-top:6px;font-size:8px;color:${th.textFaint};text-align:center;">${new Date(item.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
                ${isPendingForMe ? `
                <div style="margin-top:10px;display:flex;gap:6px;">
                  ${!receiverOwnsCard ? `<div style="width:100%;padding:6px;background:rgba(237,66,69,.1);border:1px solid rgba(237,66,69,.3);font-size:9px;color:#ed4245;text-align:center;font-weight:700;">Tu ne possèdes pas la carte #${item.to_card_id}</div>` : `
                  <button class="dm-trade-accept" data-tradeid="${item.id}" style="flex:1;padding:8px 6px;background:#57f287;color:#000;border:none;font-size:10px;font-weight:900;cursor:pointer;letter-spacing:.5px;">✓ Accepter</button>`}
                  <button class="dm-trade-decline" data-tradeid="${item.id}" style="flex:${receiverOwnsCard?1:0};padding:8px ${receiverOwnsCard?'6':'14'}px;background:transparent;color:#ed4245;border:1px solid rgba(237,66,69,.4);font-size:10px;font-weight:900;cursor:pointer;letter-spacing:.5px;">✕ Refuser</button>
                </div>` : ''}
              </div>
            </div>`;
        }).join('');
      })()}
    </div>
    <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0;align-items:center;">
      <button id="msg-trade-btn" data-fid="${friend.id}" style="width:36px;height:36px;background:${th.accent}15;color:${th.accent};border:1px solid ${th.accent}40;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;" title="Proposer un échange">🔄</button>
      <input id="msg-input" placeholder="Message..." style="flex:1;padding:10px 14px;background:${th.bgTertiary};border:2px solid #000;color:${th.text};font-size:12px;outline:none;transition:border-color .18s;" onfocus="this.style.borderColor='rgba(56,189,248,.35)'" onblur="this.style.borderColor=''"/>
      <button id="msg-send" style="width:36px;height:36px;background:${th.accent};color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;">↑</button>
    </div>`;
  })() : `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-family:'Bangers',cursive;font-size:14px;font-weight:700;color:${th.text};letter-spacing:1px;">Messages</div>
      <div style="font-size:9px;color:${th.textMuted};letter-spacing:.5px;text-transform:uppercase;">${friends.length} ami${friends.length>1?'s':''}</div>
    </div>
    ${friends.length===0
      ? `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px 0;">
           <div style="font-size:40px;opacity:.25;">💬</div>
           <div style="font-size:13px;font-weight:700;color:${th.text};">Aucun message</div>
           <div style="font-size:11px;color:${th.textMuted};">Ajoute des amis pour commencer !</div>
         </div>`
      : friends.map(f=>`
      <div class="conv-item btn-hover" data-fid="${f.id}" style="display:flex;align-items:center;gap:12px;padding:12px;background:${th.bgTertiary};border:2px solid #000;cursor:pointer;margin-bottom:6px;position:relative;overflow:hidden;transition:all .18s;">
        <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${th.accent};opacity:0;"></div>
        <div style="width:40px;height:40px;overflow:hidden;background:${th.surface};flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid #000;">
          ${f.avatar_url?`<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:18px;">👤</span>'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.discord_username||'Ami'}</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:1px;">Appuyer pour écrire</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${th.textFaint}" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('')}
  `;

  return `
  <div id="messages-bg" style="position:absolute;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:100;">
    <div class="slide-up" style="width:100%;max-width:420px;height:93%;background:${th.bgSecondary};padding:12px 16px 24px;box-shadow:0 -24px 80px rgba(0,0,0,.7);display:flex;flex-direction:column;border-top:1px solid ${th.borderStrong};">
      <div style="width:40px;height:4px;background:rgba(255,255,255,.12);margin:0 auto 14px;flex-shrink:0;"></div>
      ${innerContent}
    </div>
  </div>`;
}

// ─── PIOCHE MECHANIC ──────────────────────────────────────────────
function renderPiocheMechanic(th){
  const TOTAL=50, GAP=4, PAD=12;
  const ROWS=5;
  const headerH=80;
  const availH=window.innerHeight-headerH-PAD*2-GAP*(ROWS-1);
  const availW=Math.min(window.innerWidth,720)-PAD*2;
  let COLS=Math.ceil(TOTAL/ROWS);
  let CW=Math.floor((availW-GAP*(COLS-1))/COLS);
  const CH=Math.round(CW*1.43);
  return `
  <div id="pioche-overlay" style="position:absolute;inset:0;z-index:200;background:rgba(4,8,18,.97);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:${PAD}px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:680px;flex-shrink:0;">
      <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:#e8f4ff;letter-spacing:2px;text-transform:uppercase;">Pioche Classique</div>
      <button id="pioche-close" style="width:32px;height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#5e7d9a;display:flex;align-items:center;justify-content:center;cursor:pointer;">${SVG.x}</button>
    </div>
    <div style="font-size:10px;color:#5e7d9a;text-align:center;letter-spacing:1px;flex-shrink:0;">${state.piocheChosen===null?"✦ Choisissez une carte face cachée ✦":"Retournement en cours…"}</div>
    ${!state.piocheResult?`
    <div style="position:relative;width:${CW*COLS+GAP*(COLS-1)}px;height:${CH*ROWS+GAP*(ROWS-1)}px;flex-shrink:0;margin:0 auto;">
      ${Array.from({length:TOTAL},(_,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const rot=(((i*37+13)%20)-10)*0.5;
        const isChosen=state.piocheChosen===i;
        const isFlipped=state.piocheFlipped[i];
        return `<div class="pioche-card" data-idx="${i}" style="position:absolute;left:${col*(CW+GAP)}px;top:${row*(CH+GAP)}px;width:${CW}px;height:${CH}px;cursor:${state.piocheChosen===null?'pointer':'default'};perspective:300px;">
          <div style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:${isFlipped?'rotateY(180deg)':`rotate(${rot}deg)`};transition:transform .6s ease;">
            <div style="position:absolute;inset:0;backface-visibility:hidden;border:1px solid ${isChosen?'#5865f2':'rgba(255,255,255,.12)'};overflow:hidden;box-shadow:${isChosen?'0 0 16px #5865f280':'none'};transform:${isChosen?'scale(1.1)':'scale(1)'};transition:all .2s;">
              <img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:cover;display:block;opacity:${isChosen?1:.8};filter:${isChosen?'brightness(1.1)':'none'};" />
              ${isChosen?'<div style="position:absolute;inset:0;background:rgba(88,101,242,.25);"></div>':''}
            </div>
            <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#5865f230,#eb459e20);border:1px solid #5865f260;display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    ${state.piocheResult?`
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:110px;aspect-ratio:2/3;background:linear-gradient(160deg,${state.piocheResult.color}30,#2b2d31);border:2px solid ${state.piocheResult.color}80;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px ${state.piocheResult.color}50;">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,${state.piocheResult.color}30,${state.piocheResult.color}10);">🃏</div>
        <div style="padding:6px 8px;background:#2b2d31;">
          <div style="font-family:'Bangers',cursive;font-size:9px;font-weight:700;color:#f2f3f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.piocheResult.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:2px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]}</div>
        </div>
      </div>
      <!-- Badge : nouvelle ou déjà possédée -->
      <div style="display:flex;align-items:center;gap:6px;padding:6px 16px;background:${state.piocheResult.owned?'rgba(251,191,36,.12)':'rgba(34,197,94,.12)'};border:1.5px solid ${state.piocheResult.owned?'rgba(251,191,36,.4)':'rgba(34,197,94,.4)'};">
        <span style="font-size:14px;">${state.piocheResult.owned?'♻️':'✨'}</span>
        <div>
          <div style="font-size:10px;font-weight:900;color:${state.piocheResult.owned?'#fbbf24':'#22c55e'};letter-spacing:.5px;">${state.piocheResult.owned?'DÉJÀ POSSÉDÉE':'NOUVELLE CARTE !'}</div>
          <div style="font-size:9px;color:#8a9ab5;margin-top:1px;">${state.piocheResult.owned?'Sera ajoutée à tes doublons':'Première fois dans ta collection'}</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Bangers',cursive;font-size:15px;font-weight:700;color:#f2f3f5;">${state.piocheResult.name}</div>
        <div style="font-size:11px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:3px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]} · ${state.piocheResult.type}</div>
      </div>
      <button id="pioche-collect" style="padding:10px 28px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 20px rgba(56,189,248,.3);">AJOUTER À LA COLLECTION</button>
    </div>`:''}
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────
function renderNotifModal(th){
  const reqs = state.friendRequestsIn || [];
  const combatReqs = state.combatRequestsIn || [];
  const levelRewards = state.pendingLevelRewards || [];
  const allEmpty = reqs.length === 0 && combatReqs.length === 0 && levelRewards.length === 0;
  return `
  <div id="notif-bg" style="position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;">
    <div id="notif-sheet" style="width:100%;max-width:420px;background:${th.bgSecondary};padding:20px 20px 36px;box-shadow:0 -16px 60px rgba(0,0,0,.6);border-top:1px solid ${th.borderStrong};max-height:80vh;overflow-y:auto;">
      <div style="width:36px;height:4px;background:rgba(255,255,255,.1);margin:0 auto 20px;"></div>

      ${allEmpty ? `
        <div style="text-align:center;padding:32px 0;color:${th.textMuted};">
          <div style="font-size:32px;margin-bottom:10px;opacity:.5;">🔔</div>
          <div style="font-size:12px;">Aucune notification.</div>
        </div>` : ''}
      ${levelRewards.map(r => {
        const isLegend = r.type === 'booster_legendaire';
        const accentCol = isLegend ? '#eb459e' : '#fee75c';
        const icon = isLegend ? '⚡' : '📦';
        const label = isLegend ? 'Booster Légendaire' : 'Booster Prestige';
        return `

      <div style="display:flex;justify-content:center;padding:10px 0 0;">

        <div style="flex:1;">
          <div style="font-family:'Bangers',cursive;font-size:16px;font-weight:700;color:${th.text};letter-spacing:1.5px;">CLASSEMENT</div>

        <button id="lb-close" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;">✕</button>

        ${tabs.map(tab=>`
          <button class="lb-tab" data-period="${tab.id}" style="flex:1;padding:6px 4px;font-size:9px;font-weight:800;border:${period===tab.id?'2px solid #000':'2px solid transparent'};background:${period===tab.id?th.bg:'transparent'};color:${period===tab.id?th.text:th.textMuted};cursor:pointer;box-shadow:${period===tab.id?'2px 2px 0 #000':'none'};transition:all .15s;letter-spacing:.3px;text-transform:uppercase;">

      <!-- Table header -->
      <div style="display:grid;grid-template-columns:32px 1fr 70px 70px 60px;gap:4px;padding:6px 16px;flex-shrink:0;border-bottom:2px solid #000;margin:0 0 0;">
        ${['#','Joueur','Victoires','Win Rate','Coins'].map(h=>`<div style="font-size:8px;font-weight:900;color:${th.textMuted};letter-spacing:.6px;text-transform:uppercase;${h==='Joueur'?'':'text-align:center;'}">${h}</div>`).join('')}
      </div>

      <!-- Rows -->
      <div style="flex:1;overflow-y:auto;padding:0 16px 8px;">
        ${loading ? `
          <div style="display:flex;align-items:center;justify-content:center;padding:40px 0;gap:10px;">
            <div style="width:20px;height:20px;border:2px solid ${th.accent};border-top-color:transparent;animation:spinRing1 .8s linear infinite;"></div>

          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:10px;text-align:center;">
            <div style="font-size:36px;opacity:.25;">📊</div>

          data.map((row, i) => {

            const medal = medals[i] || '';
            const wr = (row.wins + row.losses) > 0 ? Math.round(row.wins/(row.wins+row.losses)*100) : 0;
            const rankColor = i === 0 ? '#fbbf24' : i === 1 ? '#94a3b8' : i === 2 ? '#f97316' : th.textMuted;
            return `
            <div style="display:grid;grid-template-columns:32px 1fr 70px 70px 60px;gap:4px;padding:9px 0;border-bottom:1px solid ${isMe?th.accent+'30':th.border};background:${isMe?th.accent+'08':'transparent'};${isMe?'position:relative;':''}align-items:center;">

              <div style="display:flex;align-items:center;gap:7px;min-width:0;">
                <div style="width:26px;height:26px;overflow:hidden;background:${th.surface};border:${isMe?'2px solid '+th.accent:'1px solid #000'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                  ${row.avatar_url?`<img src="${row.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:12px;">👤</span>'}
                </div>
                <div style="min-width:0;">
                  <div style="font-size:11px;font-weight:${isMe?'900':'700'};color:${isMe?th.accent:th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${row.discord_username||'Joueur'}${isMe?' (Toi)':''}</div>
                </div>
              </div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.green};">${row.wins}</div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.yellow};">${wr}%</div>
              <div style="text-align:center;font-size:10px;font-weight:900;color:${th.accent};">${(row.coins||0).toLocaleString('fr-FR')}</div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  </div>`;
}

function renderQuestsModal(th){
  const streak = state.loginStreak || 0;
  const STREAK_COINS = [25,50,75,100,125,150,200];
  const todayDone = state.firstWinTodayDone || false;

  // Streak jours visuels
  const days = Array.from({length:7},(_,i)=>{
    const dayNum = i+1;
    const done = streak > i;
    const isToday = streak === i; // prochain jour à réclamer
    const coins = STREAK_COINS[i];
    return {dayNum, done, isToday, coins};
  });

  return `

// ─── BIND EVENTS ──────────────────────────────────────────────────
function bindGame(){
  const th = t();

  // Tab nav — touch-friendly, pas de swipe, juste clic/tap direct
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const tab = parseInt(btn.dataset.tab);
      if (tab === state.tab) return; // pas de re-render si même tab
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click',()=>{
    audioToggle();
    setState({musicOn:!state.musicOn});
  });

  const btnSettings = document.getElementById('btn-settings');
  if(btnSettings) btnSettings.addEventListener('click',()=>setState({showSettings:true,showFriends:false,showNotif:false}));

  const btnFriends = document.getElementById('btn-friends');
  if(btnFriends) btnFriends.addEventListener('click',()=>{
    setState({showFriends:true,showSettings:false,showNotif:false,showMessages:false});
    loadFriends();
  });

  const btnNotif = document.getElementById('btn-notif');
  if(btnNotif) btnNotif.addEventListener('click',()=>setState({showNotif:true,showSettings:false,showFriends:false,showMessages:false}));

  const btnQuests = document.getElementById('btn-quests');
  if(btnQuests) btnQuests.addEventListener('click',()=>setState({showQuests:true}));
  const questsBg = document.getElementById('quests-bg');
  if(questsBg) questsBg.addEventListener('click',(e)=>{if(e.target===questsBg)setState({showQuests:false});});
  const questsClose = document.getElementById('quests-close');
  if(questsClose) questsClose.addEventListener('click',()=>setState({showQuests:false}));

  const btnMessages = document.getElementById('btn-messages');
  if(btnMessages) btnMessages.addEventListener('click',()=>{
    setState({showMessages:true,showSettings:false,showFriends:false,showNotif:false});
    if((state.friends||[]).length===0) loadFriends();
    // Si une conv est déjà ouverte, effacer son badge
    if (state.activeConvId) markMsgNotifsRead(state.activeConvId);
  });

  const messagesBg = document.getElementById('messages-bg');
  if(messagesBg) messagesBg.addEventListener('click',(e)=>{if(e.target===messagesBg)setState({showMessages:false,activeConvId:null});});

  const btnProfile = document.getElementById('btn-profile');
  if(btnProfile) btnProfile.addEventListener('click',()=>setState({showProfile:true,showSettings:false,showFriends:false,showNotif:false}));

  const profileBg = document.getElementById('profile-bg');
  if(profileBg) profileBg.addEventListener('click',(e)=>{if(e.target===profileBg)setState({showProfile:false});});

  const btnLogout = document.getElementById('btn-logout');
  if(btnLogout) btnLogout.addEventListener('click', ()=>{ if(window.logoutUser) window.logoutUser(); });

  // Collection filters
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collSortBy:btn.dataset.sort}));
  });

  // Recherche collection : mutater state directement sans re-render pour garder le focus
  window._collSearchHandler = function(val) {
    state.collSearch = val;
    // Re-render uniquement la grille, pas tout le DOM
    const grid = document.querySelector('#tab-slider .coll-grid-inner');
    if (grid) {
      // Filtrer et re-render juste la grille si on peut l'identifier
    }
    // Sinon render complet mais restaurer le focus
    const inp = document.getElementById('coll-search-input');
    const pos = inp ? inp.selectionStart : null;
    render();
    const inp2 = document.getElementById('coll-search-input');
    if (inp2) { inp2.focus(); try { inp2.setSelectionRange(pos, pos); } catch(e){} }
  };
  document.querySelectorAll('.rar-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterRarity:btn.dataset.rar}));
  });
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterType:btn.dataset.type}));
  });

  // Filtre possédées/toutes/manquantes
  document.querySelectorAll('.owned-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collShowOwned:btn.dataset.val}));
  });

  // Messages : liste conversations
  document.querySelectorAll('.conv-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const fid = el.dataset.fid;
      setState({activeConvId:fid});
      loadMessages(fid);
      loadConvTrades(fid);
      markMsgNotifsRead(fid);
    });
  });

  // Messages : retour liste
  const msgBack = document.getElementById('msg-back');
  if(msgBack) msgBack.addEventListener('click',()=>{ _activeConvFriendId=null; setState({activeConvId:null}); });

  // Messages : envoi
  const msgSend = document.getElementById('msg-send');
  const msgInput = document.getElementById('msg-input');
  if(msgSend && msgInput){
    const sendMsg = () => {
      const text = msgInput.value.trim();
      if(!text) return;
      msgInput.value='';
      sendMessage(state.activeConvId, text);
    };
    msgSend.addEventListener('click', sendMsg);
    msgInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter') sendMsg(); });
  }

  // Boutons accepter/refuser trade dans les DMs
  document.querySelectorAll('.dm-trade-accept').forEach(btn=>{
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const tradeId = btn.dataset.tradeid;
      // Charger le trade complet depuis la conv pour nourrir tradeIncoming
      const convId = state.activeConvId;
      const trades = state.convTrades[convId] || [];
      const trade = trades.find(t => t.id === tradeId);
      if (!trade) { showToast('Trade introuvable', '✗'); return; }
      const db = window.db;
      const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
      setState({ tradeIncoming: { ...trade, from_name: sender?.discord_username || 'Ami' } });
      await window.respondTrade(tradeId, true);
    });
  });
  document.querySelectorAll('.dm-trade-decline').forEach(btn=>{
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const tradeId = btn.dataset.tradeid;
      const convId = state.activeConvId;

// ─── LOAD PLAYER RANK (silencieux, au démarrage) ──────────────────
async function loadPlayerRankOnly(userId) {
  const db = window.db;
  if (!db || !userId) return;
  try {
    // Récupérer les wins du joueur
    const { data: me } = await db.from('players').select('wins').eq('id', userId).single();
    if (!me) return;
    // Compter combien de joueurs ont PLUS de victoires
    const { count } = await db.from('players')
      .select('*', { count: 'exact', head: true })
      .gt('wins', me.wins ?? 0);
    const rank = (count ?? 0) + 1;
    setState({ playerRank: rank });
  } catch(e) { /* silencieux */ }
}

// ─── LOAD LEADERBOARD ─────────────────────────────────────────────
async function loadLeaderboard(period){
  const db = window.db;
  if(!db){ setState({leaderboardLoading:false,leaderboardData:[]}); return; }

  try {
    let query = db.from('players')
      .select('id, discord_username, avatar_url, wins, losses, coins')
      .order('wins', {ascending:false})
      .limit(50); // récupérer plus pour calculer le rang

    if(period === 'week'){
      const d = new Date(); d.setDate(d.getDate()-7);
      query = query.gte('updated_at', d.toISOString());
    } else if(period === 'month'){
      const d = new Date(); d.setMonth(d.getMonth()-1);
      query = query.gte('updated_at', d.toISOString());
    }

    const { data, error } = await query;
    if(error || !data){ setState({leaderboardLoading:false, leaderboardData:[]}); return; }

    // Calculer le rang du joueur connecté
    const myId = state.currentUser?.id;
    let playerRank = null;
    if(myId){
      const idx = data.findIndex(r => r.id === myId);
      if(idx !== -1) playerRank = idx + 1;
    }

    setState({leaderboardLoading:false, leaderboardData: data.slice(0,20), playerRank});
  } catch(e){
    console.error('[loadLeaderboard]', e);
    setState({leaderboardLoading:false, leaderboardData:[]});
  }
}

    if(header && header.contains(el)) return true;
    return false;
  }

  document.addEventListener('touchstart', e => {
    if(anyModalOpen()) return;
    if(isInNav(e.target)) return;
    const touch = e.touches[0];
    _t0x = touch.clientX;
    _t0y = touch.clientY;
    _locked = null;
    _startEl = e.target;
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if(_t0x === null || anyModalOpen()) return;
    const dx = e.touches[0].clientX - _t0x;
    const dy = e.touches[0].clientY - _t0y;
    if(_locked === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      // Ratio plus strict : 2:1 horizontal/vertical pour éviter les faux positifs lors du scroll
      _locked = Math.abs(dx) > Math.abs(dy) * 2 ? 'h' : 'v';
    }
  }, {passive: true});

  document.addEventListener('touchend', e => {
    if(_t0x === null) return;
    const dx = e.changedTouches[0].clientX - _t0x;
    const wasH = _locked === 'h';
    _t0x = null; _t0y = null; _locked = null; _startEl = null;

    if(!wasH) return;
    if(anyModalOpen()) return;

    // Seuil : 55px ou 16% de la largeur — volontaire
    const threshold = Math.max(55, window.innerWidth * 0.16);
    if(Math.abs(dx) < threshold) return;

    if(dx < 0 && state.tab < 2){
      setState({tab: state.tab + 1});
      if(state.tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    } else if(dx > 0 && state.tab > 0){
      setState({tab: state.tab - 1});
    }
  }, {passive: true});
})();
</script>

const STREAK_REWARDS = [25, 50, 75, 100, 125, 150, 200]; // J1→J7

// ─── SYSTÈME XP & NIVEAUX ─────────────────────────────────────────
// Coût en XP pour passer du niveau N au niveau N+1
function xpToNextLevel(level) {
  if (level <= 0) return 250;
  // Dizaine de transition (X9 → X0 suivant) : coût élevé
  // Sauf si c'est une centaine (99→100, 199→200, etc.)
  const isCentury   = (level % 100) === 99; // 99,199,299…
  const isDecade    = (level % 10)  === 9;  // 9,19,29… (inclut 99 donc on check d'abord century)
  if (isCentury) return 3000;
  if (isDecade)  return 1500; // 9→10, 19→20, 29→30…
  if (level < 9) return 250;  // niveaux 1–8 → 9 (palette initiale)
  return 500;                 // tout le reste (10–98, 100–198, etc.)
}

// Calcule le niveau et l'XP restante à partir d'un total d'XP brut
function computeLevel(totalXp) {
  let lvl = 1;
  let remaining = totalXp;
  while (true) {
    const cost = xpToNextLevel(lvl);
    if (remaining < cost) break;
    remaining -= cost;
    lvl++;
  }
  return { level: lvl, xpInLevel: remaining, xpNeeded: xpToNextLevel(lvl) };
}

// XP total cumulé pour atteindre le début du niveau N (sans compter le dernier palier)
function totalXpForLevel(level) {
  let total = 0;
  for (let l = 1; l < level; l++) total += xpToNextLevel(l);
  return total;
}

async function checkLoginStreak(userId) {
  const db = window.db;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

  // Lire le streak depuis Supabase (lié au compte, pas au device)
  const { data: playerRow } = await db
    .from('players')
    .select('streak, last_streak_date, first_win_date')
    .eq('id', userId)
    .single();

  if (!playerRow) return;

  const lastStreakDate = playerRow.last_streak_date;
  const firstWinDate = playerRow.first_win_date;

  // Déjà récompensé aujourd'hui → juste afficher
  if (lastStreakDate === today) {
    setState({ loginStreak: playerRow.streak || 1, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });
    return;
  }

  // Calculer le nouveau streak
  let newStreak = 1;
  if (lastStreakDate) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastStreakDate === yesterday.toISOString().slice(0, 10)) {
      newStreak = ((playerRow.streak || 0) % 7) + 1;
    }
  }

  // Accorder la récompense coins
  const coinsEarned = STREAK_REWARDS[newStreak - 1];
  await grantCoins(userId, coinsEarned, `Connexion Jour ${newStreak}`);
  showRewardToast(`🔥 Streak Jour ${newStreak} !`, coinsEarned, '🔥');

  // +10 XP connexion quotidienne
  await grantXp(userId, 10, 'Connexion quotidienne');
  showXpToast(10, 'Connexion du jour');

  // Sauvegarder dans Supabase
  await db.from('players').update({
    streak: newStreak,
    last_streak_date: today,
  }).eq('id', userId);

  setState({ loginStreak: newStreak, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });
}

  if (window.grantXp) {

    return;
  }

  // Session déjà stockée → entrer auto sans clic
  const stored = getStoredSession();
  if (stored && stored.user) {
    db.from('players').select('coins').eq('id', stored.user.id).single()
      .then(({ data }) => {
        enterGame(stored.user, data ? data.coins : 0);
      });
  }
});

let _msgRealtimeSub = null;
let _notifRealtimeSub = null;
let _activeConvFriendId = null; // ref globale stable, survit aux re-renders

// Souscription globale aux messages — s'active une seule fois à l'entrée dans le jeu
async function subscribeMessagesGlobal(myId) {
  const db = window.db;
  if (!db || !myId) return;
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} _msgRealtimeSub = null; }

  // Fonction commune pour traiter un message entrant dans l'UI
  function handleIncomingMsg(m, isOutgoing) {
    if (!m) return;
    const convPartnerId = isOutgoing ? m.to_id : m.from_id;
    const displayFromId = m.from_id;
    // Éviter les doublons
    const prev = state.messages[convPartnerId] || [];
    if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
    const updated = [...prev, { from: displayFromId, text: m.text, ts: m.created_at }];
    state.messages = { ...state.messages, [convPartnerId]: updated };
    // Conv active et visible → append direct au DOM
    if (convPartnerId === _activeConvFriendId && state.activeConvId === convPartnerId && state.showMessages) {
      const list = document.getElementById('msg-list');
      if (list) {
        const div = document.createElement('div');
        const th = t();
        const isMine = displayFromId === myId;
        div.style.cssText = `display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;`;
        div.innerHTML = `<div style="max-width:75%;background:${isMine?th.accent:th.bgTertiary};color:${isMine?'#fff':th.text};padding:8px 12px;border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${m.text.replace(/</g,'&lt;')}</div>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
      }
      if (!isOutgoing) markMsgNotifsRead(convPartnerId);
      return;
    }
    if (!isOutgoing) setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
  }

  // Canal 1 : messages reçus (to_id = moi)
  _msgRealtimeSub = db.channel('messages-rt-in-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, false))
    .subscribe();

  // Canal 2 : messages envoyés (from_id = moi) — pour les voir en temps réel de son côté
  const _msgSentSub = db.channel('messages-rt-out-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `from_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, true))
    .subscribe();
}
window.subscribeMessagesGlobal = subscribeMessagesGlobal;

async function loadMessages(friendId) {
  const db = window.db;
  if (!db || !friendId) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  const { data } = await db.from('messages')

    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  const msgs = (data||[]).map(m=>({ from: m.from_id, text: m.text, ts: m.created_at }));
  const newMessages = { ...state.messages, [friendId]: msgs };

  setTimeout(()=>{
    const list = document.getElementById('msg-list');
    if(list) list.scrollTop = list.scrollHeight;

async function loadConvTrades(friendId) {

    .order('created_at', { ascending: true });

  if (!window._tradeConvSub) {
    window._tradeConvSub = db.channel('trade-conv-rt-' + myId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `from_id=eq.${myId}` }, async () => {
        if (state.activeConvId) await loadConvTrades(state.activeConvId);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `to_id=eq.${myId}` }, async () => {

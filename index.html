*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#fbbf24;}
#app{width:100%;height:100vh;display:flex;flex-direction:column;font-family:'Oswald',sans-serif;}

@keyframes ctaPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes shakePack{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes floatPack{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes spinRing1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinRing2{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(251,191,36,.2)}50%{box-shadow:0 0 40px rgba(251,191,36,.4)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes tabSlideFromRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes tabSlideFromLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}
.tab-enter-right{animation:tabSlideFromRight .26s cubic-bezier(.22,.68,0,1.1) both;}
.tab-enter-left{animation:tabSlideFromLeft .26s cubic-bezier(.22,.68,0,1.1) both;}
@keyframes cardLift{to{transform:translateY(-3px) scale(1.02);box-shadow:3px 3px 0 #000;}}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.cta-pulse{animation:ctaPulse 2s ease-in-out infinite;}
.arrow-bounce{animation:arrowBounce 1.6s ease-in-out infinite;}
.fade-up{animation:fadeUp .4s cubic-bezier(.22,.68,0,1.2) both;}
.ring1{animation:spinRing1 10s linear infinite;}
.ring2{animation:spinRing2 7s linear infinite;}
.btn-hover{transition:all .15s;}
.btn-hover:active{transform:scale(.95);}
.glass{background:rgba(13,10,28,0.82);backdrop-filter:blur(12px);}
.pill{display:inline-flex;align-items:center;padding:2px 8px;font-size:9px;font-weight:800;letter-spacing:.6px;}
.tab-underline{animation:tabUnderline .2s ease both;}
.pulse-dot{animation:pulseDot 2s ease-in-out infinite;}
.slide-up{animation:slideUp .3s cubic-bezier(.22,.68,0,1.1) both;}
.fade-in{animation:fadeIn .25s ease both;}
.count-up{animation:countUp .3s ease both;}

/* Comics ink borders - applied globally to all panels/buttons */
.cmx-panel{border:3px solid #000 !important;box-shadow:4px 4px 0 #000 !important;border-radius:0 !important;}
.cmx-btn{border:2.5px solid #000 !important;box-shadow:2px 2px 0 #000 !important;border-radius:0 !important;}

// ─── AMBIENT MUSIC ────────────────────────────────────────────────
let audioCtx=null, audioNodes=[], audioPlaying=false;

function audioPlay(){
  if(audioPlaying)return;
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  audioPlaying=true;
  const ctx=audioCtx;

  // ── Master + compresseur doux ──
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.22,ctx.currentTime+4);
  master.connect(ctx.destination);
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.knee.value=12;comp.ratio.value=3;
  comp.attack.value=0.1;comp.release.value=0.4;
  comp.connect(master);

  // ── Filtre passe-bas global (coupe tous les aigus stridents) ──
  const lpf=ctx.createBiquadFilter();
  lpf.type='lowpass';lpf.frequency.value=700;lpf.Q.value=0.4;
  lpf.connect(comp);

  // ── Grande reverb douce ──
  const irLen=ctx.sampleRate*4;
  const ir=ctx.createBuffer(2,irLen,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=ir.getChannelData(ch);
    for(let i=0;i<irLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,1.6);
  }
  const reverb=ctx.createConvolver();reverb.buffer=ir;
  const rvGain=ctx.createGain();rvGain.gain.value=0.5;
  reverb.connect(rvGain);rvGain.connect(master);
  lpf.connect(reverb);

  // ── Pads continus Am9 (A2 C3 E3 G3 B3) — sine pur, très doux ──
  const padFreqs=[110,130.81,164.81,196.00,246.94];
  padFreqs.forEach((freq,i)=>{
    const osc=ctx.createOscillator();
    const env=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    osc.detune.value=(i%2===0?-5:6);
    // Respiration ultra-lente
    const lfo=ctx.createOscillator();
    const lfoG=ctx.createGain();
    lfo.type='sine';lfo.frequency.value=0.025+i*0.006;
    lfoG.gain.value=0.006;
    lfo.connect(lfoG);lfoG.connect(env.gain);
    lfo.start();audioNodes.push(lfo);
    const vol=0.048-i*0.007;
    env.gain.setValueAtTime(0,ctx.currentTime);
    env.gain.linearRampToValueAtTime(vol,ctx.currentTime+5+i*1.8);
    osc.connect(env);env.connect(lpf);
    osc.start();audioNodes.push(osc);
  });

  // ── Basse profonde A1 (55 Hz) ──
  const bassOsc=ctx.createOscillator();
  const bassEnv=ctx.createGain();
  bassOsc.type='sine';bassOsc.frequency.value=55;
  bassEnv.gain.setValueAtTime(0,ctx.currentTime);
  bassEnv.gain.linearRampToValueAtTime(0.09,ctx.currentTime+6);
  const bLfo=ctx.createOscillator();const bLfoG=ctx.createGain();
  bLfo.type='sine';bLfo.frequency.value=0.02;bLfoG.gain.value=0.01;
  bLfo.connect(bLfoG);bLfoG.connect(bassEnv.gain);bLfo.start();audioNodes.push(bLfo);
  bassOsc.connect(bassEnv);bassEnv.connect(comp);
  bassOsc.start();audioNodes.push(bassOsc);

  // ── Mélodie lo-fi espacée (Am pentatonique, sine pur, notes longues) ──
  const scale=[220,261.63,293.66,329.63,392.00,440.00,392.00,329.63,261.63,220];
  const noteDur=3.8;
  const noteGap=3.0;
  const loopLen=scale.length*(noteDur+noteGap)+8;
  let mt=ctx.currentTime+10;
  const scheduleMelody=()=>{
    if(!audioPlaying) return;
    scale.forEach((freq,i)=>{
      const t=mt+i*(noteDur+noteGap);
      const o=ctx.createOscillator();const e=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=3;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(0.022,t+noteDur*0.3);
      e.gain.setValueAtTime(0.022,t+noteDur*0.65);
      e.gain.linearRampToValueAtTime(0,t+noteDur);
      o.connect(e);e.connect(lpf);
      o.start(t);o.stop(t+noteDur+0.1);audioNodes.push(o);
    });
    mt+=loopLen;
    if(audioPlaying) setTimeout(scheduleMelody,(loopLen-1)*1000);
  };
  scheduleMelody();

  // ── Accords qui évoluent toutes les 16s ──
  const chords=[
    [110,164.81,220,261.63],   // Am
    [87.31,130.81,174.61,220], // Fm
    [65.41,130.81,164.81,196], // C
    [82.41,123.47,164.81,196], // Em
  ];
  let ci=0;
  const chordOscs=[];
  const scheduleChord=()=>{
    if(!audioPlaying) return;
    // Fade out anciens
    chordOscs.forEach(({o,g})=>{
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.5);
      setTimeout(()=>{try{o.stop();}catch(e){}},2700);
    });
    chordOscs.length=0;
    chords[ci%chords.length].forEach((freq,i)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=i%2===0?-4:5;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.018-i*0.003,ctx.currentTime+3);
      o.connect(g);g.connect(lpf);o.start();
      audioNodes.push(o);chordOscs.push({o,g});
    });
    ci++;
    if(audioPlaying) setTimeout(scheduleChord,16000);
  };
  setTimeout(scheduleChord,3000);
}
function audioStop(){
  audioNodes.forEach(n=>{try{n.stop();}catch(e){}});
  audioNodes=[];audioPlaying=false;
}

// ─── RENDER ───────────────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  const th = t();
  app.style.background = th.bg;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
  }
}

// ─── SPLASH ───────────────────────────────────────────────────────
function renderSplash(th){
  return `
  <div id="splash" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${th.bg};cursor:pointer;user-select:none;overflow:hidden;transition:opacity .5s;"><div style="position:absolute;inset:0;background-image:radial-gradient(circle,rgba(251,191,36,0.07) 1px,transparent 1px);background-size:8px 8px;pointer-events:none;z-index:0;"></div>

    <!-- Layered atmosphere -->
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 35%,rgba(56,189,248,0.06) 0%,transparent 70%);pointer-events:none;"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 80%,rgba(129,140,248,0.04) 0%,transparent 60%);pointer-events:none;"></div>

function bindSplash(){
  document.getElementById('splash').addEventListener('click', ()=>{
    const cta = document.querySelector('.cta-pulse');
    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Update conic ring
    const ring = document.getElementById('conic-ring');
    if(ring) ring.style.background = `conic-gradient(from ${angle}deg,#5865f2,#eb459e,#fee75c,#57f287,#5865f2)`;
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

}


function renderDeckEdit(th){
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if(!deck) return renderDeckList(th);
  const deckCards = deck.cards || []; // [{card_id, quantity}]
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  const isPlayable = deckTotal===30;

  // Compter mythiques dans le deck
  const mythCount = deckCards.reduce((s,c)=>{
    const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(card&&card.rarity==='mythic'?c.quantity:0);
  },0);

  // Cartes possédées triées
  const ownedCards = ALL_CARDS.filter(c=>c.owned).sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  // Helper: quantité d'une carte dans le deck
  const qtyInDeck = (cardId)=>{
    const e=deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
    return e?e.quantity:0;
  };

  // Helper: peut-on ajouter cette carte ?
  const canAdd = (card)=>{
    if(deckTotal>=30) return {ok:false,reason:'30 cartes max'};
    const qty=qtyInDeck(card.id);
    // Ne pas mettre plus que ce qu'on possède
    if(qty>= card.count) return {ok:false,reason:`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''}`};
    // Rare/Mythic : max 2 exemplaires dans le deck
    if(card.rarity==='mythic'||card.rarity==='rare'){
      if(qty>=2) return {ok:false,reason:'2 exemplaires max (Rare/Myth)'};
    }
    // Max 2 Mythiques au total dans le deck
    if(card.rarity==='mythic'&&mythCount>=2&&qty===0) return {ok:false,reason:'2 Mythiques max dans le deck'};
    return {ok:true};
  };

  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px 12px;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-back" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;">${deck.name}</div>
          <button id="db-rename-edit" data-deckid="${deck.id}" data-deckname="${deck.name}" style="width:22px;height:22px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✏️</button>
        </div>
        <div style="font-size:9px;color:${isPlayable?th.green:th.textMuted};font-weight:700;margin-top:1px;">${isPlayable?'✓ Deck prêt':deckTotal+'/30'} · ${mythCount}/2 Myth.</div>
      </div>
      <button id="db-autofill" style="padding:6px 12px;background:${th.accentAlt}18;color:${th.accentAlt};border:1px solid ${th.accentAlt}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">✨ AUTO</button>
      <button id="db-save" style="padding:6px 14px;background:${th.green};color:#000;border:none;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">💾 SAVE</button>
    </div>

    <div style="background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;padding:10px 16px;">
      <div style="font-size:9px;color:${th.textMuted};margin-bottom:6px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Cartes du deck (${deckTotal}/30)</div>
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;min-height:60px;align-items:center;">
        ${deckTotal===0?`<div style="color:${th.textFaint};font-size:11px;padding:0 8px;">Aucune carte — ajoute des cartes ci-dessous</div>`
          :deckCards.map(entry=>{
            const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(entry.card_id));
            if(!card) return '';
            return `<div class="db-deck-card" data-cardid="${card.id}" style="flex-shrink:0;width:36px;height:50px;background:linear-gradient(135deg,${card.color}40,${card.color}15);border:1px solid ${card.color}70;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;" title="${card.name}">
              🃏
              ${entry.quantity>1?`<div style="position:absolute;top:-4px;right:-4px;width:13px;height:13px;background:${th.accent};color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;">×${entry.quantity}</div>`:''}
              <div style="position:absolute;bottom:2px;font-size:6px;color:${card.color};font-weight:700;">◆</div>
            </div>`;
          }).join('')}
      </div>
    </div>

    <div style="flex:1;overflow-y:auto;padding:10px 16px;">
      <div style="font-size:9px;color:${th.textMuted};margin-bottom:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Ma collection (${ownedCards.length} cartes)</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;">
        ${ownedCards.map(card=>{
          const qty=qtyInDeck(card.id);
          const chk=canAdd(card);
          return `<div class="${chk.ok?'db-add-card':'db-add-card-disabled'}" data-cardid="${card.id}" style="background:${qty>0?card.color+'25':th.bgSecondary};border:1px solid ${qty>0?card.color+'80':th.border};aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;padding:5px 3px 3px;cursor:${chk.ok?'pointer':'default'};opacity:${chk.ok?1:.45};position:relative;overflow:hidden;gap:2px;" title="${chk.ok?'Ajouter':chk.reason}">
            <div style="flex:1;width:100%;border-radius:4px;background:linear-gradient(135deg,${card.color}30,${card.color}10);display:flex;align-items:center;justify-content:center;font-size:16px;">🃏</div>
            <div style="font-size:7px;font-weight:700;color:${th.text};text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%;">${card.name.slice(0,9)}</div>
            <div style="font-size:7px;color:${RARITY_COLOR[card.rarity]};">◆</div>
            ${qty>0?`<div style="position:absolute;top:2px;right:2px;width:14px;height:14px;background:${th.accent};color:#fff;font-size:7px;font-weight:800;display:flex;align-items:center;justify-content:center;">${qty}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ─── TRADE MODAL ──────────────────────────────────────────────────
function renderTradeModal(th){

  const friendName = friend?.discord_username || 'Ami';
  const ownedCards = ALL_CARDS.filter(c=>c.owned);

  const incoming = state.tradeIncoming;

  // Vue : offre entrante à accepter/refuser
  if (incoming && incoming.status === 'pending' && incoming.to_id === state.currentUser?.id) {
    const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.from_card_id));
    const toCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.to_card_id));

            <div style="font-size:10px;color:${th.textMuted};margin-bottom:4px;">Il propose</div>
            <div style="width:70px;height:98px;background:${fromCard?`linear-gradient(135deg,${fromCard.color}30,${fromCard.color}10)`:th.surface};border:1px solid ${fromCard?fromCard.color+'60':th.border};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
              <div style="font-size:22px;">🃏</div>

          <div style="text-align:center;">

            ${receiverOwnsToCard

            <div style="flex:1;width:100%;border-radius:4px;background:linear-gradient(135deg,${card.color}30,${card.color}10);display:flex;align-items:center;justify-content:center;font-size:16px;">🃏</div>

          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ─── TAB COLLECTION ───────────────────────────────────────────────
function renderTabCollection(th){

    .filter(c=>state.collFilterSet==="all"||c.set===state.collFilterSet)
    .filter(c=>state.collFilterRarity==="all"||c.rarity===state.collFilterRarity)

    .filter(c=>state.collFilterType==="all"||c.type===state.collFilterType)
    .sort((a,b)=>state.collSortBy==="id"?a.id.localeCompare(b.id):RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

        <div style="flex:1;min-width:0;">
          <div style="font-family:'Bangers',cursive;font-size:12px;font-weight:700;color:${th.text};letter-spacing:.5px;">Deck Builder</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:2px;">${owned} carte${owned>1?'s':''} disponible${owned>1?'s':''} · ${pct}% de la collection</div>
          <div style="height:2px;background:${th.bg};margin-top:6px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${th.accent},${th.accentAlt});"></div>
          </div>
        </div>
        <button id="btn-open-deckbuilder" style="padding:7px 14px;flex-shrink:0;background:${th.accent};color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:800;letter-spacing:.5px;">OUVRIR</button>
      </div>

    <div style="padding:0 14px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;">

        <button class="sort-btn" data-sort="id" style="padding:5px 12px;font-size:10px;font-weight:700;background:${state.collSortBy==='id'?th.accent+'22':'transparent'};color:${state.collSortBy==='id'?th.accent:th.textMuted};border:1px solid ${state.collSortBy==='id'?th.accent+'50':th.border};transition:all .15s;">ID</button>
        <button class="sort-btn" data-sort="rarity" style="padding:5px 12px;font-size:10px;font-weight:700;background:${state.collSortBy==='rarity'?th.accent+'22':'transparent'};color:${state.collSortBy==='rarity'?th.accent:th.textMuted};border:1px solid ${state.collSortBy==='rarity'?th.accent+'50':th.border};transition:all .15s;">Rareté</button>
        <div style="margin-left:auto;position:relative;">
          <div style="display:flex;gap:4px;margin-bottom:4px;">
            <button class="owned-filter-btn" data-val="all" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='all'?th.accent+'50':th.border};background:${state.collShowOwned==='all'?th.accent+'18':'transparent'};color:${state.collShowOwned==='all'?th.accent:th.textMuted};transition:all .15s;">Toutes</button>
            <button class="owned-filter-btn" data-val="owned" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='owned'?th.green+'50':th.border};background:${state.collShowOwned==='owned'?th.green+'18':'transparent'};color:${state.collShowOwned==='owned'?th.green:th.textMuted};transition:all .15s;">Possédées</button>
            <button class="owned-filter-btn" data-val="missing" style="padding:4px 10px;font-size:9px;font-weight:700;border:1px solid ${state.collShowOwned==='missing'?th.red+'50':th.border};background:${state.collShowOwned==='missing'?th.red+'18':'transparent'};color:${state.collShowOwned==='missing'?th.red:th.textMuted};transition:all .15s;">Manquantes</button>

          </div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;">
        <button class="rar-btn" data-rar="all" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterRarity==='all'?th.borderStrong:th.border};background:${state.collFilterRarity==='all'?th.accent+'18':'transparent'};color:${state.collFilterRarity==='all'?th.accent:th.textMuted};transition:all .15s;">Tout</button>

      <div style="display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;">

        <button class="type-btn" data-type="Hero" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Hero'?'#f59e0b80':th.border};background:${state.collFilterType==='Hero'?'rgba(245,158,11,.12)':'transparent'};color:${state.collFilterType==='Hero'?'#f59e0b':th.textMuted};transition:all .15s;flex-shrink:0;">⚔ Héros</button>
        <button class="type-btn" data-type="Ruse" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Ruse'?'#10b98180':th.border};background:${state.collFilterType==='Ruse'?'rgba(16,185,129,.12)':'transparent'};color:${state.collFilterType==='Ruse'?'#10b981':th.textMuted};transition:all .15s;flex-shrink:0;">🃏 Ruse</button>
        <button class="type-btn" data-type="Arcane" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Arcane'?'#8b5cf680':th.border};background:${state.collFilterType==='Arcane'?'rgba(139,92,246,.12)':'transparent'};color:${state.collFilterType==='Arcane'?'#8b5cf6':th.textMuted};transition:all .15s;flex-shrink:0;">✦ Arcane</button>
      </div>
      <div style="font-size:9px;color:${th.textFaint};letter-spacing:.3px;">${owned}/${ALL_CARDS.length} obtenues · ${cards.length} affichées</div>
    </div>
    <!-- Grid -->
    <div style="flex:1;overflow-y:auto;padding:0 14px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-content:start;">
      ${cards.map(c=>renderCollCard(c,th)).join('')}

    </div>

function renderCollCard(card,th){
  if(!card.owned){
    return `<div class="coll-card" data-cardid="${card.id}" style="background:${th.bgTertiary};border:2px solid #000;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:.22;filter:grayscale(1);cursor:pointer;transition:all .2s;">
      <div style="font-size:22px;">🂠</div>
      <div style="font-size:7px;font-weight:700;color:${th.textMuted};">#${card.id}</div>
    </div>`;
  }
  const rarCol = card.color;
  return `<div class="coll-card" data-cardid="${card.id}" style="background:linear-gradient(160deg,${rarCol}14,${th.bgSecondary} 70%);border:2.5px solid #000;box-shadow:3px 3px 0 #000;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);overflow:hidden;padding:6px 5px 5px;gap:3px;position:relative;">

    ${card.count>1?`<div style="position:absolute;top:4px;right:4px;min-width:16px;height:16px;background:${th.accent};color:#fff;font-size:7px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 3px;z-index:1;">×${card.count}</div>`:''}
    <!-- card art area -->
    <div style="flex:1;width:100%;background:linear-gradient(135deg,${rarCol}20,${rarCol}06);display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;overflow:hidden;">
      🃏
      <!-- rarity glow -->
      <div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:60%;height:12px;background:${rarCol}30;filter:blur(6px);pointer-events:none;"></div>
    </div>
    <!-- name -->
    <div style="font-size:7px;font-weight:800;color:${th.text};text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px;line-height:1.2;">${card.name}</div>

// ─── TAB MESSAGES ────────────────────────────────────────────────
function renderMessagesModal(th){
  const friends = state.friends || [];
  const activeId = state.activeConvId;
  const msgs = (state.messages[activeId] || []);
  const myId = state.currentUser?.id;

  const innerContent = activeId && friends.find(f=>f.id===activeId) ? (() => {
    const friend = friends.find(f=>f.id===activeId);
    return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button id="msg-back" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">←</button>
      <div style="width:30px;height:30px;overflow:hidden;background:${th.surface};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${friend.avatar_url?`<img src="${friend.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:14px;">👤</span>'}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${friend.discord_username||'Ami'}</div>
        <div style="font-size:9px;color:${th.textMuted};margin-top:1px;letter-spacing:.3px;">Conversation privée</div>
      </div>
    </div>
    <div id="msg-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;min-height:0;">
      ${(()=>{
        const trades = (state.convTrades[activeId] || []).map(t=>({...t, _type:'trade', _ts: t.created_at}));
        const allItems = [...msgs.map(m=>({...m, _type:'msg', _ts: m.ts})), ...trades]
          .sort((a,b)=>new Date(a._ts)-new Date(b._ts));

        if(allItems.length===0) return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:30px 20px;"><div style="font-size:36px;opacity:.2;">✉️</div><div style="font-size:12px;font-weight:700;color:${th.text};">Pas encore de messages</div><div style="font-size:10px;color:${th.textMuted};">Envoie le premier !</div></div>`;

        return allItems.map(item=>{
          if(item._type === 'msg') return `
            <div style="display:flex;flex-direction:${item.from===myId?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:75%;background:${item.from===myId?th.accent:th.bgTertiary};color:${item.from===myId?'#fff':th.text};padding:8px 12px;border-radius:${item.from===myId?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${item.text}</div>
            </div>`;

          // ── Trade card ──
          const isMine = item.from_id === myId;
          const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.from_card_id));
          const toCard   = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.to_card_id));
          // Le propriétaire voit ses propres cartes, l'autre voit en mystère si non possédée
          const showFromCard = isMine || (fromCard && fromCard.owned);
          const showToCard   = !isMine || (toCard && toCard.owned);

          const STATUS = {
            pending:  { label:'En attente…',   color:'#fee75c', icon:'⏳', bg:'rgba(254,231,92,.08)',  border:'rgba(254,231,92,.25)' },
            accepted: { label:'Échange accepté !', color:'#57f287', icon:'✓',  bg:'rgba(87,242,135,.08)', border:'rgba(87,242,135,.25)' },
            declined: { label:'Refusé',          color:'#ed4245', icon:'✕',  bg:'rgba(237,66,69,.08)',  border:'rgba(237,66,69,.25)'  },
            cancelled:{ label:'Annulé',          color:'#96989d', icon:'—',  bg:'rgba(150,152,157,.08)',border:'rgba(150,152,157,.2)' },
          };
          const st = STATUS[item.status] || STATUS.pending;
          const tradeLabel = isMine ? 'Tu proposes' : 'Proposition reçue';

          const cardBox = (card, show, isLeft) => {
            const col = card ? RARITY_COLOR[card.rarity] : '#96989d';
            if(show && card) return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;border-radius:7px;background:linear-gradient(135deg,${col}30,${col}10);border:1px solid ${col}60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
                  <div style="font-size:18px;">🃏</div>
                  <div style="font-size:6px;color:${col};font-weight:800;">◆</div>
                </div>
                <div style="font-size:8px;font-weight:700;color:${th.text};text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${card.name}</div>
                <div style="font-size:7px;color:${th.textMuted};">#${card.id}</div>
              </div>`;
            return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;border-radius:7px;background:${th.surface};border:2px solid #000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:.65;">
                  <div style="font-size:18px;">🂠</div>
                  <div style="font-size:7px;font-weight:700;color:${th.textMuted};">#${isLeft?item.from_card_id:item.to_card_id}</div>
                </div>
                <div style="font-size:7px;color:${th.textMuted};text-align:center;">Mystère</div>
              </div>`;
          };

          return `
            <div style="display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:88%;background:${st.bg};border:1px solid ${st.border};border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};padding:10px 12px;min-width:200px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                  <div style="font-size:9px;font-weight:700;color:${th.textMuted};text-transform:uppercase;letter-spacing:1px;">🔄 ${tradeLabel}</div>
                  <div style="display:flex;align-items:center;gap:4px;background:${st.bg};border:1px solid ${st.border};padding:2px 7px;">
                    <span style="font-size:10px;">${st.icon}</span>
                    <span style="font-size:9px;font-weight:700;color:${st.color};">${st.label}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu donnes':'Il donne'}</div>
                    ${cardBox(fromCard, showFromCard, true)}
                  </div>
                  <div style="font-size:16px;color:${th.textMuted};">⇄</div>
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu reçois':'Il veut'}</div>
                    ${cardBox(toCard, showToCard, false)}
                  </div>
                </div>

      <div style="width:110px;aspect-ratio:2/3;background:linear-gradient(160deg,${state.piocheResult.color}30,#2b2d31);border:2px solid ${state.piocheResult.color}80;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px ${state.piocheResult.color}50;">

function renderLeaderboardModal(th){

  const loading = state.leaderboardLoading;
  const myId = state.currentUser?.id;

  const tabs = [
    {id:'week', label:'Cette semaine'},

    {id:'all',  label:'All Time'},
  ];

  const medals = ['🥇','🥈','🥉'];

  return `

    <div class="slide-up" style="width:100%;max-width:420px;background:${th.bgSecondary};border-top:4px solid #000;border-left:3px solid #000;border-right:3px solid #000;box-shadow:-4px -4px 0 #000;display:flex;flex-direction:column;max-height:88vh;padding-bottom:max(env(safe-area-inset-bottom,0px),16px);">

        <div style="flex:1;">
          <div style="font-family:'Bangers',cursive;font-size:16px;font-weight:700;color:${th.text};letter-spacing:1.5px;">CLASSEMENT</div>
          <div style="font-size:9px;color:${th.textMuted};margin-top:1px;letter-spacing:.5px;">Meilleurs joueurs · ${period==='week'?'Cette semaine':period==='month'?'Ce mois':'Depuis toujours'}</div>
        </div>
        <button id="lb-close" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;">✕</button>

      <!-- Period tabs -->
      <div style="display:flex;gap:0;margin:0 16px 12px;background:${th.bgTertiary};border:2px solid #000;padding:3px;flex-shrink:0;">
        ${tabs.map(tab=>`
          <button class="lb-tab" data-period="${tab.id}" style="flex:1;padding:6px 4px;font-size:9px;font-weight:800;border:${period===tab.id?'2px solid #000':'2px solid transparent'};background:${period===tab.id?th.bg:'transparent'};color:${period===tab.id?th.text:th.textMuted};cursor:pointer;box-shadow:${period===tab.id?'2px 2px 0 #000':'none'};transition:all .15s;letter-spacing:.3px;text-transform:uppercase;">
            ${tab.label}
          </button>`).join('')}
      </div>

      <!-- Table header -->
      <div style="display:grid;grid-template-columns:32px 1fr 70px 70px 60px;gap:4px;padding:6px 16px;flex-shrink:0;border-bottom:2px solid #000;margin:0 0 0;">
        ${['#','Joueur','Victoires','Win Rate','Coins'].map(h=>`<div style="font-size:8px;font-weight:900;color:${th.textMuted};letter-spacing:.6px;text-transform:uppercase;${h==='Joueur'?'':'text-align:center;'}">${h}</div>`).join('')}
      </div>

      <!-- Rows -->
      <div style="flex:1;overflow-y:auto;padding:0 16px 8px;">
        ${loading ? `
          <div style="display:flex;align-items:center;justify-content:center;padding:40px 0;gap:10px;">
            <div style="width:20px;height:20px;border:2px solid ${th.accent};border-top-color:transparent;animation:spinRing1 .8s linear infinite;"></div>
            <span style="font-size:11px;color:${th.textMuted};">Chargement…</span>

          data.length === 0 ? `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:10px;text-align:center;">
            <div style="font-size:36px;opacity:.25;">📊</div>
            <div style="font-size:12px;font-weight:700;color:${th.text};">Aucune donnée disponible</div>
            <div style="font-size:10px;color:${th.textMuted};">Jouez des parties pour apparaître ici !</div>
          </div>` :
          data.map((row, i) => {
            const isMe = row.id === myId;
            const medal = medals[i] || '';
            const wr = (row.wins + row.losses) > 0 ? Math.round(row.wins/(row.wins+row.losses)*100) : 0;
            const rankColor = i === 0 ? '#fbbf24' : i === 1 ? '#94a3b8' : i === 2 ? '#f97316' : th.textMuted;
            return `
            <div style="display:grid;grid-template-columns:32px 1fr 70px 70px 60px;gap:4px;padding:9px 0;border-bottom:1px solid ${isMe?th.accent+'30':th.border};background:${isMe?th.accent+'08':'transparent'};${isMe?'position:relative;':''}align-items:center;">
              ${isMe?`<div style="position:absolute;left:-16px;top:0;bottom:0;width:3px;background:${th.accent};"></div>`:''}
              <div style="text-align:center;font-size:${medal?'14px':'11px'};font-weight:900;color:${rankColor};">${medal||('#'+(i+1))}</div>
              <div style="display:flex;align-items:center;gap:7px;min-width:0;">
                <div style="width:26px;height:26px;overflow:hidden;background:${th.surface};border:${isMe?'2px solid '+th.accent:'1px solid #000'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                  ${row.avatar_url?`<img src="${row.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:12px;">👤</span>'}
                </div>
                <div style="min-width:0;">
                  <div style="font-size:11px;font-weight:${isMe?'900':'700'};color:${isMe?th.accent:th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${row.discord_username||'Joueur'}${isMe?' (Toi)':''}</div>
                </div>
              </div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.green};">${row.wins}</div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.yellow};">${wr}%</div>
              <div style="text-align:center;font-size:10px;font-weight:900;color:${th.accent};">${(row.coins||0).toLocaleString('fr-FR')}</div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  </div>`;
}

// ─── BIND EVENTS ──────────────────────────────────────────────────
function bindGame(){
  const th = t();

  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tab = parseInt(btn.dataset.tab);
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click',()=>{
    audioToggle();
    setState({musicOn:!state.musicOn});
  });

  const btnSettings = document.getElementById('btn-settings');
  if(btnSettings) btnSettings.addEventListener('click',()=>setState({showSettings:true,showFriends:false,showNotif:false}));

  const btnFriends = document.getElementById('btn-friends');
  if(btnFriends) btnFriends.addEventListener('click',()=>{
    setState({showFriends:true,showSettings:false,showNotif:false,showMessages:false});
    loadFriends();
  });

  const btnNotif = document.getElementById('btn-notif');
  if(btnNotif) btnNotif.addEventListener('click',()=>setState({showNotif:true,showSettings:false,showFriends:false,showMessages:false}));

  const btnQuests = document.getElementById('btn-quests');
  if(btnQuests) btnQuests.addEventListener('click',()=>setState({showQuests:true}));
  const questsBg = document.getElementById('quests-bg');
  if(questsBg) questsBg.addEventListener('click',(e)=>{if(e.target===questsBg)setState({showQuests:false});});
  const questsClose = document.getElementById('quests-close');
  if(questsClose) questsClose.addEventListener('click',()=>setState({showQuests:false}));

  const btnMessages = document.getElementById('btn-messages');
  if(btnMessages) btnMessages.addEventListener('click',()=>{
    setState({showMessages:true,showSettings:false,showFriends:false,showNotif:false});
    if((state.friends||[]).length===0) loadFriends();
    // Si une conv est déjà ouverte, effacer son badge
    if (state.activeConvId) markMsgNotifsRead(state.activeConvId);
  });

  const messagesBg = document.getElementById('messages-bg');
  if(messagesBg) messagesBg.addEventListener('click',(e)=>{if(e.target===messagesBg)setState({showMessages:false,activeConvId:null});});

  const btnProfile = document.getElementById('btn-profile');
  if(btnProfile) btnProfile.addEventListener('click',()=>setState({showProfile:true,showSettings:false,showFriends:false,showNotif:false}));

  const profileBg = document.getElementById('profile-bg');
  if(profileBg) profileBg.addEventListener('click',(e)=>{if(e.target===profileBg)setState({showProfile:false});});

  const btnLogout = document.getElementById('btn-logout');
  if(btnLogout) btnLogout.addEventListener('click', ()=>{ if(window.logoutUser) window.logoutUser(); });

  // Collection filters
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collSortBy:btn.dataset.sort}));
  });
  document.querySelectorAll('.rar-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterRarity:btn.dataset.rar}));
  });
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterType:btn.dataset.type}));
  });

// ─── SWIPE (initialisé une seule fois, hors bindGame) ─────────────
function initSwipe(){
  const appEl = document.getElementById('app');
  let _startX = null;
  let _startY = null;
  let _isHorizontal = null;
  let _slider = null;
  let _baseTranslatePx = 0;

  appEl.addEventListener('touchstart',(e)=>{
    if(state.showSettings||state.showFriends||state.showNotif||state.showMessages||state.showPioche||state.showLeaderboard||state.showTutorial||state.showDeckBuilder||state.collSelectedCard||state.showTrade||state.showProfile||state.showAddFriend||state.showQuests) return;
    _startX = e.touches[0].clientX;
    _startY = e.touches[0].clientY;
    _isHorizontal = null;
    _slider = document.getElementById('tab-slider');
    // Position de base en px (chaque tab = 1 viewport width)
    _baseTranslatePx = -state.tab * window.innerWidth;
  },{passive:true});

  appEl.addEventListener('touchmove',(e)=>{
    if(_startX===null||!_slider) return;
    const dx = e.touches[0].clientX - _startX;
    const dy = e.touches[0].clientY - _startY;
    if(_isHorizontal === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)){
      _isHorizontal = Math.abs(dx) >= Math.abs(dy);
    }
    if(!_isHorizontal) return;
    // Limiter à max 1 tab d'avance (pas de saut de 2)
    const maxDrag = window.innerWidth * 0.85;
    const clampedDx = Math.max(-maxDrag, Math.min(maxDrag, dx));
    // Résistance aux bords (tab 0 : pas vers droite, tab 2 : pas vers gauche)
    let finalDx = clampedDx;
    if(state.tab === 0 && dx > 0) finalDx = dx * 0.15;
    if(state.tab === 2 && dx < 0) finalDx = dx * 0.15;
    const translatePx = _baseTranslatePx + finalDx;
    _slider.style.transition = 'none';
    _slider.style.transform = `translateX(${translatePx}px)`;
  },{passive:true});

  appEl.addEventListener('touchend',(e)=>{
    if(_startX===null) return;
    const dx = e.changedTouches[0].clientX - _startX;
    const dy = e.changedTouches[0].clientY - (_startY||0);
    if(_slider){ _slider.style.transition = ''; _slider.style.transform = ''; }
    const wasHorizontal = _isHorizontal;
    _startX = null; _startY = null; _slider = null; _isHorizontal = null;
    if(!wasHorizontal) return;
    // Seuil : 20% du viewport ou vélocité (dist > 50px)
    const threshold = Math.min(window.innerWidth * 0.2, 80);
    if(Math.abs(dx) > threshold){
      if(dx < 0 && state.tab < 2) setState({tab: state.tab + 1});
      else if(dx > 0 && state.tab > 0) setState({tab: state.tab - 1});
    }
  },{passive:true});
}

// ─── LOAD PLAYER RANK (silencieux, au démarrage) ──────────────────
async function loadPlayerRankOnly(userId) {
  const db = window.db;
  if (!db || !userId) return;
  try {
    // Récupérer les wins du joueur
    const { data: me } = await db.from('players').select('wins').eq('id', userId).single();
    if (!me) return;
    // Compter combien de joueurs ont PLUS de victoires
    const { count } = await db.from('players')
      .select('*', { count: 'exact', head: true })
      .gt('wins', me.wins ?? 0);
    const rank = (count ?? 0) + 1;
    setState({ playerRank: rank });
  } catch(e) { /* silencieux */ }
}

// ─── LOAD LEADERBOARD ─────────────────────────────────────────────
async function loadLeaderboard(period){
  const db = window.db;
  if(!db){ setState({leaderboardLoading:false,leaderboardData:[]}); return; }

  try {
    let query = db.from('players')
      .select('id, discord_username, avatar_url, wins, losses, coins')
      .order('wins', {ascending:false})
      .limit(50); // récupérer plus pour calculer le rang

    if(period === 'week'){
      const d = new Date(); d.setDate(d.getDate()-7);
      query = query.gte('updated_at', d.toISOString());
    } else if(period === 'month'){
      const d = new Date(); d.setMonth(d.getMonth()-1);
      query = query.gte('updated_at', d.toISOString());
    }

    const { data, error } = await query;
    if(error || !data){ setState({leaderboardLoading:false, leaderboardData:[]}); return; }

    // Calculer le rang du joueur connecté
    const myId = state.currentUser?.id;
    let playerRank = null;
    if(myId){
      const idx = data.findIndex(r => r.id === myId);
      if(idx !== -1) playerRank = idx + 1;
    }

    setState({leaderboardLoading:false, leaderboardData: data.slice(0,20), playerRank});
  } catch(e){
    console.error('[loadLeaderboard]', e);
    setState({leaderboardLoading:false, leaderboardData:[]});
  }
}

function waitForSupabase(cb) {
  if (window.supabase && window.supabase.createClient) {
    window.db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
    });
    cb();
  } else {
    setTimeout(() => waitForSupabase(cb), 50);
  }
}

function showToast(msg, icon='ℹ') {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(13,18,32,0.95);color:#e8f4ff;padding:10px 20px;font-size:12px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(56,189,248,0.15);transition:opacity .3s;white-space:nowrap;backdrop-filter:blur(8px);';
  el.innerHTML = '<span style="font-size:14px;">'+icon+'</span> '+msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 2500);
}

function enterGame(user, coins) {
  const s = document.getElementById('splash');
  if (s) s.style.opacity = '0';
  setTimeout(() => {
    setState({ screen: 'game', musicOn: true, currentUser: user, coins: coins });
    audioPlay();
    loadCollection();
    if (window.subscribeNotifications) window.subscribeNotifications();
    if (window.subscribeTradeNotifications) window.subscribeTradeNotifications();
    // Souscrire aux messages en realtime dès l'entrée (pas seulement à l'ouverture d'une conv)
    subscribeMessagesGlobal(user.id);
    // Lancer le rafraîchissement automatique des coins toutes les 30s
    startCoinsPolling(user.id);
    // Charger les stats V/D
    loadPlayerStats(user.id);
    // Système de récompenses
    checkLoginStreak(user.id);
    // Pré-charger le rang (all time, silencieux)
    loadPlayerRankOnly(user.id);
  }, 450);
}

let _coinsInterval = null;

async function refreshCoins(userId) {
  const db = window.db;
  if (!db || !userId) return;
  const { data } = await db.from('players').select('coins').eq('id', userId).single();
  if (data && data.coins !== state.coins) {
    setState({ coins: data.coins });
  }
}

function startCoinsPolling(userId) {
  if (_coinsInterval) clearInterval(_coinsInterval);
  _coinsInterval = setInterval(() => refreshCoins(userId), 30000);
}

async function loadPlayerStats(userId) {
  const db = window.db;
  if (!db || !userId) return;
  const { data } = await db.from('players').select('wins, losses').eq('id', userId).single();
  if (data) setState({ wins: data.wins ?? 0, losses: data.losses ?? 0 });
}

const STREAK_REWARDS = [25, 50, 75, 100, 125, 150, 200]; // J1→J7

function showRewardToast(msg, coins, icon='🎁') {
  // Toast spécial récompense — plus grand et coloré
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:linear-gradient(135deg,rgba(15,14,23,.97),rgba(26,24,37,.97));color:#fffbeb;padding:14px 22px;font-size:12px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 0 0 2px #000,4px 4px 0 #000,0 12px 40px rgba(0,0,0,.7);transition:opacity .4s,transform .4s;opacity:0;white-space:nowrap;backdrop-filter:blur(12px);border:2px solid #fbbf2440;';
  el.innerHTML = `<span style="font-size:20px;">${icon}</span><div><div style="font-size:12px;font-weight:800;letter-spacing:.3px;">${msg}</div><div style="font-size:11px;color:#fbbf24;font-weight:900;margin-top:2px;">+${coins} <span style="font-weight:600;color:#9d8ea0;">coins</span></div></div>`;

async function grantCoins(userId, amount, reason) {
  const db = window.db;
  if (!db || !userId || !amount) return;
  // Récupérer les coins actuels puis incrémenter
  const { data } = await db.from('players').select('coins').eq('id', userId).single();
  const current = data?.coins ?? 0;
  await db.from('players').update({ coins: current + amount }).eq('id', userId);
  setState({ coins: current + amount });

  // Notification in-game dans la table notifications
  try {
    await db.from('notifications').insert({
      user_id: userId, type: 'reward', from_id: userId,
      text: reason + ' : +' + amount + ' coins',
      read: false,
    });
  } catch(e) {}
}

async function checkLoginStreak(userId) {
  const db = window.db;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

  // On stocke le streak dans localStorage pour la rapidité
  // Format: { date: 'YYYY-MM-DD', streak: N, lastRewardDate: 'YYYY-MM-DD' }
  let streakData = { date: null, streak: 0, lastRewardDate: null };
  try {
    const raw = localStorage.getItem('dcg_streak_' + userId);
    if (raw) streakData = JSON.parse(raw);
  } catch(e) {}

  const lastDate = streakData.date;
  const lastRewardDate = streakData.lastRewardDate;

  // Déjà récompensé aujourd'hui → juste mettre à jour l'état
  if (lastRewardDate === today) {
    setState({ loginStreak: streakData.streak, lastLoginDate: today });
    // Charger firstWinToday depuis localStorage aussi
    const fwt = localStorage.getItem('dcg_firstwin_' + userId + '_' + today);
    setState({ firstWinTodayDone: fwt === '1' });
    return;
  }

  // Calculer le nouveau streak
  let newStreak = 1;
  if (lastDate) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toISOString().slice(0, 10);
    if (lastDate === yesterdayStr) {
      // Connexion consécutive
      newStreak = (streakData.streak % 7) + 1; // cycle de 7
    }
    // Sinon (break) on repart à 1
  }

  // Accorder la récompense
  const coinsEarned = STREAK_REWARDS[newStreak - 1];
  await grantCoins(userId, coinsEarned, `Connexion Jour ${newStreak}`);
  showRewardToast(`🔥 Streak Jour ${newStreak} !`, coinsEarned, '🔥');

  // Sauvegarder
  streakData = { date: today, streak: newStreak, lastRewardDate: today };
  try { localStorage.setItem('dcg_streak_' + userId, JSON.stringify(streakData)); } catch(e) {}

  setState({ loginStreak: newStreak, lastLoginDate: today });

  // firstWinToday
  const fwt = localStorage.getItem('dcg_firstwin_' + userId + '_' + today);
  setState({ firstWinTodayDone: fwt === '1' });
}

// Appelée par le système de jeu après chaque victoire
window.onPlayerWin = async function() {
  const db = window.db;
  const userId = state.currentUser?.id;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10);
  const key = 'dcg_firstwin_' + userId + '_' + today;

  if (state.firstWinTodayDone || localStorage.getItem(key) === '1') return;

  // 1ère victoire du jour !
  await grantCoins(userId, 100, '1ère victoire du jour');
  showRewardToast('1ère victoire du jour !', 100, '🏆');
  localStorage.setItem(key, '1');
  setState({ firstWinTodayDone: true });
};

window.checkLoginStreak = checkLoginStreak;
window.onPlayerWin = window.onPlayerWin;

// Vérifie qu'un deck par défaut jouable (30 cartes) existe — affiche un toast sinon
async function checkDefaultDeck() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) { showToast('Non connecté', '✗'); return false; }

  const { data: deck } = await db.from('decks')
    .select('id, name, is_default')
    .eq('player_id', myId)
    .eq('is_default', true)
    .single();

  if (!deck) {
    showToast('Aucun deck par défaut — configure un deck dans le Deck Builder', '🗂️');
    return false;
  }

  const { data: dc } = await db.from('deck_cards')
    .select('quantity')
    .eq('deck_id', deck.id);

  const total = (dc || []).reduce((s, c) => s + c.quantity, 0);
  if (total < 30) {
    showToast(`Deck "${deck.name}" incomplet (${total}/30) — complète-le avant de jouer`, '⚠');
    return false;
  }

  return true;
}

window.checkAuthAndEnter = async function() {
  // 1. Lire la session stockée directement — instantané, pas de réseau
  const stored = getStoredSession();
  if (stored && stored.user) {
    const user = stored.user;
    // Récupérer les vraies coins avant d'entrer (évite le flash à 100)
    waitForSupabase(async () => {
      const { data } = await window.db.from('players').select('coins').eq('id', user.id).single();
      enterGame(user, data ? data.coins : 0);
    });
    return;
  }
  // 2. Pas de session stockée → afficher bouton Discord
  showDiscordLoginBtn();
};

window.loginDiscord = function() {
  waitForSupabase(() => {
    window.db.auth.signInWithOAuth({
      provider: 'discord',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  });
};

window.logoutUser = function() {
  waitForSupabase(() => { window.db.auth.signOut(); });
  // Vider la session du localStorage
  try {
    const key = 'sb-' + SUPABASE_URL.split('//')[1].split('.')[0] + '-auth-token';
    localStorage.removeItem(key);
  } catch(e) {}
  setState({ showProfile: false, currentUser: null, screen: 'splash' });
  render();
};

// Au chargement : vérifier si retour OAuth Discord (hash dans l'URL)
waitForSupabase(() => {
  const db = window.db;

  // Si retour depuis Discord OAuth
  if (window.location.hash.includes('access_token')) {
    db.auth.onAuthStateChange(async (event, session) => {
      if ((event === 'SIGNED_IN') && session) {
        history.replaceState(null, '', window.location.pathname);
        const user = session.user;
        await db.from('players').upsert({
          id: user.id,
          discord_username: user.user_metadata.full_name || user.user_metadata.name,
          avatar_url: user.user_metadata.avatar_url,
        }, { onConflict: 'id' });
        const { data: playerData } = await db.from('players').select('coins').eq('id', user.id).single();
        enterGame(user, playerData ? playerData.coins : 100);
      }
    });
    return;
  }

  // Session déjà stockée → entrer auto sans clic
  const stored = getStoredSession();
  if (stored && stored.user) {
    db.from('players').select('coins').eq('id', stored.user.id).single()
      .then(({ data }) => {
        enterGame(stored.user, data ? data.coins : 0);
      });
  }
});

async function loadCollection() {
  // Attendre db
  let tries = 0;
  while (!window.db && tries++ < 50) await new Promise(r => setTimeout(r, 100));
  const db = window.db;
  if (!db) { console.error('[Collection] db indispo'); return; }

  // Récupérer l'user depuis la session active
  const userId = state.currentUser?.id;
  if (!userId) { console.warn('[Collection] pas de currentUser'); return; }

  const { data: allCards, error } = await db.from('cards').select('*').order('id');
  if (error) { console.error('[Collection]', error.message); return; }
  console.log('[Collection]', allCards?.length, 'cartes');

  const { data: playerCards } = await db.from('player_cards')
    .select('card_id, quantity, created_at').eq('player_id', userId);

  const ownedMap = {};
  if (playerCards) playerCards.forEach(pc => { ownedMap[pc.card_id] = pc; });

  ALL_CARDS = (allCards || []).map(c => ({
    id: String(c.id).padStart(3,'0'),
    name: c.name,
    set: c.set_name || 'SET-1',
    rarity: c.rarity || 'common',
    type: c.type || 'Héro',
    color: RARITY_COLOR[c.rarity] || '#9ca3af',
    owned: !!ownedMap[c.id],
    count: ownedMap[c.id] ? ownedMap[c.id].quantity : 0,
    obtainedAt: ownedMap[c.id] ? ownedMap[c.id].created_at : null,
  }));
  render();
}

async function loadFriends() {
  const db = window.db;
  if (!db) return;
  const userId = state.currentUser?.id;
  if (!userId) return;

  const { data: inReqs } = await db
    .from('friend_requests')
    .select('id, sender_id, players!friend_requests_sender_id_fkey(discord_username, avatar_url)')
    .eq('receiver_id', userId).eq('status', 'pending');

  const friendRequestsIn = (inReqs||[]).map(r=>({
    request_id: r.id,
    discord_username: r.players?.discord_username,
    avatar_url: r.players?.avatar_url,
  }));

  const { data: friendsData } = await db
    .from('friend_requests')
    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url)')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
    .eq('status', 'accepted');

  const friends = (friendsData||[]).map(f=>{
    const other = f.sender_id === userId ? f.receiver : f.players;
    return { id: other?.id, discord_username: other?.discord_username, avatar_url: other?.avatar_url };
  }).filter(f=>f.id);

  setState({ friends, friendRequestsIn });
}

  setState({ showNotif: false });

let _msgRealtimeSub = null;
let _notifRealtimeSub = null;
let _activeConvFriendId = null; // ref globale stable, survit aux re-renders

// Souscription globale aux messages — s'active une seule fois à l'entrée dans le jeu
async function subscribeMessagesGlobal(myId) {
  const db = window.db;
  if (!db || !myId) return;
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} _msgRealtimeSub = null; }

  _msgRealtimeSub = db.channel('messages-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => {
      const m = payload.new;
      if (!m) return;
      const fromId = m.from_id;
      // Éviter les doublons
      const prev = state.messages[fromId] || [];
      if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
      const updated = [...prev, { from: fromId, text: m.text, ts: m.created_at }];
      // Toujours stocker dans state pour que la conv soit à jour quand on l'ouvre
      state.messages = { ...state.messages, [fromId]: updated };

      // Conv active et visible → append direct au DOM (pas de re-render = pas de destruction du canal)
      if (fromId === _activeConvFriendId && state.activeConvId === fromId && state.showMessages) {
        const list = document.getElementById('msg-list');
        if (list) {
          const div = document.createElement('div');
          const th = t();
          div.style.cssText = `display:flex;flex-direction:row;gap:6px;align-items:flex-end;`;
          div.innerHTML = `<div style="max-width:75%;background:${th.bgTertiary};color:${th.text};padding:8px 12px;border-radius:14px 14px 14px 4px;font-size:12px;line-height:1.4;">${m.text.replace(/</g,'&lt;')}</div>`;
          list.appendChild(div);
          list.scrollTop = list.scrollHeight;
        }
        markMsgNotifsRead(fromId);
        return;
      }
      // Sinon badge de notif
      setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
    })
    .subscribe();
}
window.subscribeMessagesGlobal = subscribeMessagesGlobal;

async function loadMessages(friendId) {
  const db = window.db;
  if (!db || !friendId) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  _activeConvFriendId = friendId; // mémoriser avant tout re-render

  const { data } = await db.from('messages')
    .select('id, from_id, to_id, text, created_at')
    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  const msgs = (data||[]).map(m=>({ from: m.from_id, text: m.text, ts: m.created_at }));
  const newMessages = { ...state.messages, [friendId]: msgs };
  setState({ messages: newMessages });

  setTimeout(()=>{
    const list = document.getElementById('msg-list');
    if(list) list.scrollTop = list.scrollHeight;
  }, 50);
  // Le canal realtime est géré globalement par subscribeMessagesGlobal (appelé à l'entrée dans le jeu)
}

async function loadConvTrades(friendId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !friendId) return;

  const { data } = await db.from('trades')
    .select('id, from_id, to_id, from_card_id, to_card_id, status, created_at')
    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  setState({ convTrades: { ...state.convTrades, [friendId]: data || [] } });

  // Realtime sur les trades de cette conv (UPDATE de status)
  if (!window._tradeConvSub) {
    window._tradeConvSub = db.channel('trade-conv-rt-' + myId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `from_id=eq.${myId}` }, async () => {
        if (state.activeConvId) await loadConvTrades(state.activeConvId);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `to_id=eq.${myId}` }, async () => {
        if (state.activeConvId) await loadConvTrades(state.activeConvId);
      })
      .subscribe();
  }
}

async function subscribeNotifications() {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Charger les notifications non lues (type message)
  const { data: notifs } = await db.from('notifications')
    .select('id, type, from_id, text, created_at, read')
    .eq('user_id', myId)
    .eq('read', false)
    .order('created_at', { ascending: false });

  // Filtrer celles de la conv déjà ouverte (si on revient d'une conv)
  // et les marquer lues en base pour éviter qu'elles réapparaissent au prochain refresh
  const activeConv = state.activeConvId;
  const allMsgNotifs = (notifs||[]).filter(n => n.type === 'message');

  // Notifs de convs déjà actives → marquer lues silencieusement
  const toMarkRead = activeConv ? allMsgNotifs.filter(n => n.from_id === activeConv) : [];
  if (toMarkRead.length > 0) {
    db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', activeConv)
      .eq('read', false)
      .then(()=>{}).catch(()=>{});
  }

  const msgNotifs = allMsgNotifs.filter(n => !activeConv || n.from_id !== activeConv);
  setState({ msgNotifCount: msgNotifs.length, pendingMsgNotifs: msgNotifs });

  // Realtime : écouter les nouvelles notifications
  if (_notifRealtimeSub) { try { db.removeChannel(_notifRealtimeSub); } catch(e){} }
  _notifRealtimeSub = db.channel('notif-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myId}`,
    }, payload => {
      const n = payload.new;
      if (!n) return;
      // Si la conv de cet expéditeur est déjà ouverte → marquer lu directement, pas de badge
      if (state.activeConvId && n.from_id === state.activeConvId) {
        markMsgNotifsRead(n.from_id);
        return;
      }
      const prev = state.pendingMsgNotifs || [];
      setState({
        msgNotifCount: (state.msgNotifCount || 0) + 1,
        pendingMsgNotifs: [n, ...prev],
      });
      showToast(n.text || 'Nouveau message !', '💬');
    })
    .subscribe();
}

async function loadDecks() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  const { data: decksData } = await db.from('decks')
    .select('id, name, is_default, created_at')
    .eq('player_id', myId)
    .order('created_at', { ascending: true });

  if (!decksData) return;

  // Charger les cartes de chaque deck
  const deckIds = decksData.map(d=>d.id);
  let allDeckCards = [];
  if (deckIds.length > 0) {
    const { data: dc } = await db.from('deck_cards')
      .select('deck_id, card_id, quantity')
      .in('deck_id', deckIds);
    allDeckCards = dc || [];
  }

  const decks = decksData.map(d=>({
    ...d,
    cards: allDeckCards.filter(c=>c.deck_id===d.id)
  }));

  setState({ decks });
}

function addCardToDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const card = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(cardId));
  if (!card || !card.owned) return;

  const deckCards = deck.cards || [];
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  if (deckTotal >= 30) { showToast('30 cartes max dans un deck', '⚠'); return; }

  const mythCount = deckCards.reduce((s,c)=>{
    const cd=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(cd&&cd.rarity==='mythic'?c.quantity:0);
  },0);

  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  const currentQty = existing ? existing.quantity : 0;

  // Ne pas dépasser le nombre d'exemplaires possédés
  if (currentQty >= card.count) {
    showToast(`Tu ne possèdes que ${card.count} exemplaire${card.count>1?'s':''} de cette carte`, '⚠'); return;
  }
  // Règles de limite Rare/Mythic
  if ((card.rarity==='mythic'||card.rarity==='rare') && currentQty >= 2) {
    showToast(`Max 2 exemplaires pour les ${card.rarity==='mythic'?'Mythiques':'Rares'}`, '⚠'); return;
  }
  if (card.rarity==='mythic' && mythCount >= 2 && currentQty === 0) {
    showToast('Max 2 cartes Mythiques par deck', '⚠'); return;
  }

  let newCards;
  if (existing) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity+1}:c);
  } else {
    newCards = [...deckCards, {card_id: parseInt(cardId), quantity:1, deck_id: deck.id}];
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

function removeCardFromDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const deckCards = deck.cards || [];
  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  if (!existing) return;

  let newCards;
  if (existing.quantity > 1) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity-1}:c);
  } else {
    newCards = deckCards.filter(c=>parseInt(c.card_id)!==parseInt(cardId));
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

// ─── AUTO-FILL DECK ───────────────────────────────────────────────
function autoFillDeck() {
  const decks = state.decks || [];
  const deck = decks.find(d => d.id === state.activeDeckId);
  if (!deck) return;

  // Cartes possédées, triées par rareté décroissante (mythic > rare > uncommon > common)
  const rarityPriority = { mythic: 0, rare: 1, uncommon: 2, common: 3 };
  const ownedCards = ALL_CARDS
    .filter(c => c.owned && c.count > 0)
    .sort((a, b) => {
      const rDiff = rarityPriority[a.rarity] - rarityPriority[b.rarity];
      if (rDiff !== 0) return rDiff;
      // À rareté égale, prioriser les cartes avec plus d'exemplaires
      return b.count - a.count;
    });

  // Construire le deck en appliquant toutes les règles
  let newCards = []; // [{card_id, quantity}]
  let total = 0;
  let mythCount = 0;

  const qtyInNew = (cardId) => {
    const e = newCards.find(c => parseInt(c.card_id) === parseInt(cardId));
    return e ? e.quantity : 0;
  };

  for (const card of ownedCards) {
    if (total >= 30) break;

    // Combien d'exemplaires peut-on ajouter ?
    let maxAdd = card.count; // limité par ce qu'on possède

    // Rare/Mythic : max 2 exemplaires dans le deck
    if (card.rarity === 'mythic' || card.rarity === 'rare') {
      maxAdd = Math.min(maxAdd, 2);
    }

    // Mythic : max 2 au total dans le deck
    if (card.rarity === 'mythic') {
      maxAdd = Math.min(maxAdd, 2 - mythCount);
    }

    if (maxAdd <= 0) continue;

    // Limiter à ce qu'il reste à remplir
    const toAdd = Math.min(maxAdd, 30 - total);
    if (toAdd <= 0) continue;

    newCards.push({ card_id: parseInt(card.id), quantity: toAdd, deck_id: deck.id });
    total += toAdd;
    if (card.rarity === 'mythic') mythCount += toAdd;
  }

  if (total === 0) {
    showToast('Aucune carte possédée pour remplir le deck', '⚠');
    return;
  }

  const updatedDecks = decks.map(d => d.id === deck.id ? { ...d, cards: newCards } : d);
  setState({ decks: updatedDecks });
  showToast(`Deck rempli automatiquement (${total}/30 cartes)`, total === 30 ? '✨' : '⚠');
}

async function saveDeck() {
  const db = window.db;
  if (!db) return;
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const cards = deck.cards || [];
  const deckTotal = cards.reduce((s,c)=>s+c.quantity,0);

  try {
    // Supprimer toutes les cartes existantes
    const { error: delErr } = await db.from('deck_cards').delete().eq('deck_id', deck.id);
    if (delErr) throw delErr;

    // Réinsérer si des cartes sont présentes
    // quantity est clampée à 2 max (contrainte DB deck_cards_quantity_check)
    if (cards.length > 0) {
      const rows = cards.map(c=>({
        deck_id: deck.id,
        card_id: parseInt(c.card_id),
        quantity: Math.min(c.quantity, 2)
      }));
      const { error: insErr } = await db.from('deck_cards').insert(rows);
      if (insErr) throw insErr;
    }

    if (deckTotal < 30) {
      showToast(`${deck.name} sauvegardé (${deckTotal}/30 cartes)`, '💾');
    } else {
      // Si c'est le seul deck et qu'aucun n'est par défaut → le mettre par défaut automatiquement
      const allDecks = state.decks || [];
      const hasDefault = allDecks.some(d => d.is_default);
      if (allDecks.length === 1 && !hasDefault) {
        await db.from('decks').update({ is_default: true }).eq('id', deck.id);
        const updated = allDecks.map(d => d.id===deck.id ? {...d, is_default:true} : d);
        setState({ decks: updated });
        showToast(`${deck.name} sauvegardé et mis par défaut !`, '⭐');
      } else {
        showToast(`${deck.name} sauvegardé !`, '✓');
      }
    }
  } catch(e) {
    console.error('[saveDeck]', e);
    // Si c'est une erreur de contrainte check, le delete a réussi mais l'insert a échoué partiellement
    // → recharger le deck depuis la DB pour avoir l'état réel
    if (e.message && e.message.includes('check constraint')) {
      await loadDecks();
      showToast('Sauvegarde partielle — modifie la contrainte SQL (voir console)', '⚠');
    } else {
      showToast('Erreur sauvegarde : ' + (e.message || 'inconnue'), '✗');
    }
  }
}

// Envoyer l'offre de trade en DB
async function sendTradeOffer(theirCardId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  const toId = state.tradeWithId;
  const myCard = state.tradeMyCard;
  if (!db || !myId || !toId || !myCard || !theirCardId) {
    showToast('Données manquantes pour le trade', '⚠'); return;
  }

  const theirCard = ALL_CARDS.find(c => parseInt(c.id) === parseInt(theirCardId));
  if (!theirCard) {
    showToast('Carte demandée introuvable', '✗'); return;
  }
  if (theirCard.rarity !== myCard.rarity) {
    showToast('Échange de même rareté uniquement', '⚠'); return;
  }
  if (parseInt(theirCard.id) === parseInt(myCard.id)) {
    showToast('Tu ne peux pas échanger une carte contre elle-même', '⚠'); return;
  }

  try {
    const { data, error } = await db.from('trades').insert({
      from_id: myId,
      to_id: toId,
      from_card_id: parseInt(myCard.id),
      to_card_id: parseInt(theirCardId),
      status: 'pending',
    }).select().single();

    if (error) {
      console.error('[sendTradeOffer]', error);
      showToast('Erreur envoi trade : ' + (error.message || 'inconnue'), '✗'); return;
    }

    // Notifier l'ami
    await db.from('notifications').insert({
      user_id: toId, type: 'trade', from_id: myId,
      text: `Échange proposé : carte #${String(myCard.id).replace(/^0+/,'')} ↔ carte #${String(theirCardId).replace(/^0+/,'')}`,
      read: false,
    }).then(()=>{}).catch(()=>{});

    setState({ showTrade: false, tradeMyCard: null, tradeStep: null, tradeWantedNum: null });
    showToast('Proposition envoyée !', '🔄');
    // Rafraîchir les trades dans la conv si elle est ouverte
    if (state.activeConvId === toId) loadConvTrades(toId);
  } catch(e) {
    console.error('[sendTradeOffer] exception', e);
    showToast('Erreur envoi trade', '✗');
  }
}

// Accepter ou refuser un trade entrant
window.respondTrade = async function respondTrade(tradeId, accept) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !tradeId) return;

  const incoming = state.tradeIncoming;
  if (!incoming) return;

  if (accept) {
    // Vérifier que les deux joueurs possèdent encore les cartes
    const { data: myCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', myId).eq('card_id', incoming.to_card_id).single();
    const { data: theirCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id).single();

    if (!myCards || myCards.quantity < 1) { showToast('Tu ne possèdes plus cette carte', '✗'); return; }
    if (!theirCards || theirCards.quantity < 1) { showToast("L'autre joueur ne possède plus sa carte", '✗'); return; }

    // Exécuter l'échange
    // Retirer les cartes des deux joueurs
    if (myCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: myCards.quantity - 1 }).eq('player_id', myId).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', myId).eq('card_id', incoming.to_card_id);
    }
    if (theirCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: theirCards.quantity - 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    }

    // Donner les cartes aux deux joueurs
    const upsertMy = await db.from('player_cards').select('quantity').eq('player_id', myId).eq('card_id', incoming.from_card_id).single();
    if (upsertMy.data) {
      await db.from('player_cards').update({ quantity: upsertMy.data.quantity + 1 }).eq('player_id', myId).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: myId, card_id: incoming.from_card_id, quantity: 1 });
    }
    const upsertTheir = await db.from('player_cards').select('quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id).single();
    if (upsertTheir.data) {
      await db.from('player_cards').update({ quantity: upsertTheir.data.quantity + 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: incoming.from_id, card_id: incoming.to_card_id, quantity: 1 });
    }

    await db.from('trades').update({ status: 'accepted' }).eq('id', tradeId);

    // Notifier l'expéditeur
    await db.from('notifications').insert({
      user_id: incoming.from_id, type: 'trade_accepted', from_id: myId,
      text: 'Ton échange a été accepté !', read: false,
    }).then(()=>{}).catch(()=>{});

    // Recharger la collection
    if (window.loadCollection) window.loadCollection();
    showToast('Échange effectué !', '🔄');
  } else {
    await db.from('trades').update({ status: 'declined' }).eq('id', tradeId);
    showToast('Échange refusé', '✗');
  }

  setState({ showTrade: false, tradeIncoming: null, tradeStep: null, tradeWantedNum: null });
  // Rafraîchir les trades dans la conv si elle est ouverte avec cet ami
  const partnerId = incoming?.from_id;
  if (partnerId && state.activeConvId === partnerId) loadConvTrades(partnerId);
};

// Écouter les trades entrants en realtime
async function subscribeTradeNotifications() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  if (_tradeRealtimeSub) { try { db.removeChannel(_tradeRealtimeSub); } catch(e){} }

  _tradeRealtimeSub = db.channel('trades-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'trades',
      filter: `to_id=eq.${myId}`,
    }, async payload => {
      const trade = payload.new;
      if (!trade || trade.status !== 'pending') return;

      // Charger le nom de l'expéditeur
      const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
      const fromName = sender?.discord_username || 'Un joueur';

      setState({
        showTrade: true,
        tradeIncoming: { ...trade, from_name: fromName },
        tradeMyCard: null,
      });
      showToast(`${fromName} propose un échange !`, '🔄');
    })
    .subscribe();
}

window.subscribeTradeNotifications = subscribeTradeNotifications;
</script>
</body>
</html>

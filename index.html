function renderDeckEdit(th){
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if(!deck) return renderDeckList(th);
  const deckCards = deck.cards || []; // [{card_id, quantity}]
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  const isPlayable = deckTotal===30;

  // Compter mythiques dans le deck
  const mythCount = deckCards.reduce((s,c)=>{
    const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(card&&card.rarity==='mythic'?c.quantity:0);
  },0);

  // Cartes possédées triées
  const ownedCards = ALL_CARDS.filter(c=>c.owned).sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  // Helper: quantité d'une carte dans le deck
  const qtyInDeck = (cardId)=>{
    const e=deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
    return e?e.quantity:0;
  };

  // Helper: peut-on ajouter cette carte ?
  const canAdd = (card)=>{
    if(deckTotal>=30) return {ok:false,reason:'30 cartes max'};
    const qty=qtyInDeck(card.id);
    // Ne pas mettre plus que ce qu'on possède
    if(qty>= card.count) return {ok:false,reason:`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''}`};
    // Max 2 exemplaires d'une même carte, quelle que soit la rareté
    if(qty>=2) return {ok:false,reason:'2 exemplaires max par carte'};
    // Max 2 Mythiques au total dans le deck (doublons compris)
    if(card.rarity==='mythic'&&mythCount>=2) return {ok:false,reason:'2 Mythiques max dans le deck'};
    return {ok:true};
  };

  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px 12px;padding-top:max(env(safe-area-inset-top,12px),12px);background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-back" style="width:44px;height:44px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-family:'Luckiest Guy',cursive;font-size:13px;font-weight:400;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;">${deck.name}</div>
          <button id="db-rename-edit" data-deckid="${deck.id}" data-deckname="${deck.name}" style="width:22px;height:22px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✏️</button>
        </div>
        <div style="font-size:9px;color:${isPlayable?th.green:th.textMuted};font-weight:700;margin-top:1px;">${isPlayable?'✓ Deck prêt':deckTotal+'/30'} · ${mythCount}/2 Myth.</div>
      </div>
      <button id="db-autofill" style="padding:6px 12px;background:${th.accentAlt}18;color:${th.accentAlt};border:1px solid ${th.accentAlt}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">✨ AUTO</button>
      <button id="db-clear-all" style="padding:6px 10px;background:${th.red}18;color:${th.red};border:1px solid ${th.red}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;" title="Retirer toutes les cartes">🗑 VIDER</button>
      <button id="db-save" style="padding:6px 14px;background:${th.green};color:#000;border:none;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">💾 SAVE</button>
    </div>

    <!-- Bande deck : plus haute -->
    <div style="background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;padding:8px 12px 6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-size:9px;color:${th.textMuted};font-weight:700;letter-spacing:1px;text-transform:uppercase;">Deck (${deckTotal}/30)</div>
        <div style="font-size:9px;color:${th.textMuted};font-weight:600;">Clique sur une carte du deck pour la retirer</div>
      </div>
      <div style="display:flex;gap:${window.innerWidth<600?'6':'8'}px;overflow-x:auto;padding-bottom:4px;min-height:${window.innerWidth<600?'138':'190'}px;align-items:center;">
        ${deckTotal===0?`<div style="color:${th.textFaint};font-size:10px;padding:0 8px;font-style:italic;">Ajoute des cartes ci-dessous</div>`
          :deckCards.map(entry=>{
            const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(entry.card_id));
            if(!card) return '';
            const dcW = window.innerWidth<600 ? 90 : 126;
            const dcH = window.innerWidth<600 ? 128 : 178;
            return `<div class="db-deck-card" data-cardid="${card.id}" style="flex-shrink:0;width:${dcW}px;height:${dcH}px;background:linear-gradient(135deg,${card.color}40,${card.color}15);border:1px solid ${card.color}70;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;overflow:visible;" title="${card.name} — clic pour retirer">
              ${card.image_url
                ? `<img src="${card.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;position:absolute;inset:0;" />`
                : `🃏`}
              ${entry.quantity>1?`<div style="position:absolute;top:-3px;right:-3px;width:${window.innerWidth<600?14:18}px;height:${window.innerWidth<600?14:18}px;background:${th.accent};color:#000;font-size:${window.innerWidth<600?7:9}px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:2;">×${entry.quantity}</div>`:''}
              <div style="position:absolute;bottom:2px;font-size:${window.innerWidth<600?6:8}px;color:${card.color};font-weight:700;z-index:2;${card.image_url?'text-shadow:0 0 4px #000;':''}">◆</div>
            </div>`;
          }).join('')}
      </div>
    </div>

    <!-- Collection : plus de colonnes, sans titres, avec "DÉJÀ" et exemplaires -->
    <div style="flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;min-height:0;">

      <!-- ── Barre de recherche + tri + filtres type ── -->
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:6px;flex-shrink:0;">

        <!-- Ligne 0 : recherche -->
        <div style="display:flex;align-items:center;gap:6px;background:${th.bgTertiary};border:1px solid ${th.border};padding:5px 10px;">
          <span style="font-size:11px;color:${th.textMuted};flex-shrink:0;">🔍</span>
          <input id="db-search-input" type="text" placeholder="Nom ou #ID…"
            value="${state.deckSearch||''}"
            style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:11px;font-family:inherit;font-weight:600;"
          />
          ${state.deckSearch ? `<button id="db-search-clear" style="background:none;border:none;color:${th.textMuted};font-size:13px;cursor:pointer;padding:0 2px;flex-shrink:0;">✕</button>` : ''}
        </div>

        <!-- Ligne 1 : compteur + tri -->
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
          <div style="font-size:8px;color:${th.textMuted};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-right:4px;">Collection (${ownedCards.length})</div>
          ${[
            {k:'rarity',    label:'Rareté'},
            {k:'name',      label:'Nom'},
            {k:'id',        label:'ID'},
            {k:'attack',    label:'ATK'},
            {k:'defense',   label:'DEF'},
            {k:'precision', label:'PREC'},
            {k:'hp',        label:'HP'},
          ].map(opt=>{
            const active  = state.deckSortBy===opt.k;
            const dir     = state.deckSortDir;
            const arrow   = active ? (dir==='asc'?' ↑':' ↓') : '';
            const isStat  = ['attack','defense','precision','hp'].includes(opt.k);
            const hasData = !isStat || ownedCards.some(c=>c[opt.k]!=null);
            if(!hasData) return '';
            return `<button class="db-sort-btn" data-sortby="${opt.k}"
              style="padding:3px 7px;font-size:8px;font-weight:${active?'900':'700'};
              background:${active?th.accent+'22':th.bgTertiary};
              color:${active?th.accent:th.textMuted};
              border:1px solid ${active?th.accent+'60':th.border};
              cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;"
            >${opt.label}${arrow}</button>`;
          }).join('')}
        </div>

        <!-- Ligne 2 : filtres par type -->
        ${(()=>{
          const types = [...new Set(ownedCards.map(c=>c.type||'Héro'))].sort();
          if(types.length <= 1) return '';
          const typeColors = {'Héro':'#60a5fa','Arcane':'#c084fc','Ruse':'#34d399'};
          return `<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
            <div style="font-size:7px;color:${th.textFaint};font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-right:2px;flex-shrink:0;">Type</div>
            <button class="db-type-filter" data-type=""
              style="padding:3px 7px;font-size:8px;font-weight:${!state.deckTypeFilter?'900':'700'};
              background:${!state.deckTypeFilter?th.accent+'22':th.bgTertiary};
              color:${!state.deckTypeFilter?th.accent:th.textMuted};
              border:1px solid ${!state.deckTypeFilter?th.accent+'60':th.border};
              cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;">Tous</button>
            ${types.map(t=>{
              const active = state.deckTypeFilter===t;
              const col = typeColors[t] || th.accentAlt;
              return `<button class="db-type-filter" data-type="${t}"
                style="padding:3px 7px;font-size:8px;font-weight:${active?'900':'700'};
                background:${active?col+'22':th.bgTertiary};
                color:${active?col:th.textMuted};
                border:1px solid ${active?col+'60':th.border};
                cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;"
              >${t}</button>`;
            }).join('')}
          </div>`;
        })()}
      </div>

      <div style="display:grid;grid-template-columns:repeat(${window.innerWidth<600?5:7},1fr);gap:5px;">
        ${(()=>{
          const RARITY_O = {mythic:0,legendary:1,epic:2,rare:3,uncommon:4,common:5};
          // Appliquer le filtre de type si actif
          const typeFiltered = state.deckTypeFilter
            ? ownedCards.filter(c=>(c.type||'Héro')===state.deckTypeFilter)
            : ownedCards;
          // Appliquer la recherche textuelle
          const searchQ = (state.deckSearch||'').toLowerCase().trim();
          const _normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          const searchFiltered = searchQ
            ? typeFiltered.filter(c=>
                _normalize(c.name.toLowerCase()).includes(_normalize(searchQ)) ||
                String(parseInt(c.id)).includes(searchQ) ||
                (c.id||'').toLowerCase().includes(searchQ)
              )
            : typeFiltered;
          const sortedOwned = [...searchFiltered].sort((a,b)=>{
            const dir = state.deckSortDir==='asc'?1:-1;
            const numSort = (field) => {
              const va = a[field]??-1, vb = b[field]??-1;
              return dir*(vb-va) || a.name.localeCompare(b.name,'fr',{sensitivity:'base'});
            };
            switch(state.deckSortBy){
              case 'name':      return dir*(a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));
              case 'type':      return dir*(a.type||'').localeCompare(b.type||'','fr',{sensitivity:'base'}) || (RARITY_O[a.rarity]??9)-(RARITY_O[b.rarity]??9);
              case 'id':        return dir*(parseInt(a.id)-parseInt(b.id));
              case 'attack':    return numSort('attack');
              case 'defense':   return numSort('defense');
              case 'precision': return numSort('precision');
              case 'hp':        return numSort('hp');
              default:          return dir*((RARITY_O[a.rarity]??9)-(RARITY_O[b.rarity]??9)) || a.name.localeCompare(b.name,'fr',{sensitivity:'base'});
            }
          });
          return sortedOwned;
        })().map(card=>{
          const qty=qtyInDeck(card.id);
          const chk=canAdd(card);
          // Calcul exemplaires max ajoutables : 2 max par carte, quelle que soit la rareté
          const maxCopies = Math.min(2, card.count);
          const canAddMore = chk.ok;
          const alreadyFull = !canAddMore && qty>0;
          return `<div class="db-card-cell" data-cardid="${card.id}" data-name="${card.name.toLowerCase().replace(/'/g,'&#39;').replace(/"/g,'&quot;')}" style="display:flex;flex-direction:column;gap:3px;">
            <div class="${canAddMore?'db-add-card':'db-add-card-disabled'}" data-cardid="${card.id}" data-name="${card.name.toLowerCase().replace(/'/g,'&#39;').replace(/"/g,'&quot;')}" style="background:${qty>0?card.color+'25':th.bgSecondary};border:1px solid ${qty>0?card.color+'80':th.border};aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;padding:0;cursor:pointer;position:relative;overflow:visible;" title="${canAddMore?'Voir la carte & ajouter':'Voir la carte — '+chk.reason}">
              <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;${card.image_url?'':'background:linear-gradient(135deg,'+card.color+'30,'+card.color+'10);'}overflow:visible;">
                ${card.image_url
                  ? `<img src="${card.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />`
                  : `🃏`}
              </div>
              <!-- Compteur deck (en haut à droite) -->
              ${qty>0?`<div style="position:absolute;top:1px;right:1px;min-width:clamp(13px,2.2vw,18px);height:clamp(13px,2.2vw,18px);background:${th.accent};color:#000;font-size:clamp(7px,1.4vw,10px);font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 2px;z-index:3;">${qty}</div>`:''}
              <!-- Exemplaires possédés (en bas à gauche) -->
              <div style="position:absolute;bottom:1px;left:1px;font-size:clamp(7px,1.4vw,10px);font-weight:800;color:rgba(255,255,255,.85);text-shadow:0 0 3px #000;z-index:3;">×${card.count}</div>
              <!-- Overlay DÉJÀ DANS LE DECK -->
              ${alreadyFull?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;z-index:4;"><div style="width:100%;text-align:center;font-size:clamp(7px,1.8vw,13px);font-weight:900;color:#fff;letter-spacing:.5px;line-height:1.3;padding:4px 2px;background:transparent;">DÉJÀ<br>DANS<br>LE DECK</div></div>`
              :!canAddMore?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;z-index:4;"><div style="width:100%;text-align:center;font-size:clamp(7px,1.8vw,13px);font-weight:900;color:#fbbf24;letter-spacing:.5px;line-height:1.3;padding:4px 2px;background:transparent;">DECK<br>PLEIN</div></div>`:``}
            </div>
            <!-- Bouton Ajout Rapide sous la carte -->
            ${canAddMore
              ? `<button class="db-quick-add" data-cardid="${card.id}" style="padding:3px 2px;background:${th.accent};color:#000;border:none;font-size:clamp(7px,1.3vw,9px);font-weight:900;cursor:pointer;letter-spacing:.3px;line-height:1;text-transform:uppercase;white-space:nowrap;" title="Ajouter directement au deck">+ Ajout rapide</button>`
              : qty>0
                ? `<button class="db-quick-remove" data-cardid="${card.id}" style="padding:3px 2px;background:transparent;color:#ef4444;border:1px solid rgba(239,68,68,.5);font-size:clamp(7px,1.3vw,9px);font-weight:900;cursor:pointer;letter-spacing:.3px;line-height:1;text-transform:uppercase;white-space:nowrap;" title="Retirer du deck">− Retirer</button>`
                : `<div style="padding:3px 2px;background:${th.bgTertiary};color:${th.textFaint};font-size:clamp(7px,1.3vw,9px);font-weight:700;letter-spacing:.3px;line-height:1;text-transform:uppercase;text-align:center;white-space:nowrap;border:1px solid ${th.border};">— —</div>`}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ─── TRADE MODAL ──────────────────────────────────────────────────
function renderTradeModal(th){
  const friend = (state.friends||[]).find(f=>f.id===state.tradeWithId);
  const friendName = friend?.discord_username || 'Ami';
  const ownedCards = ALL_CARDS.filter(c=>c.owned);
  const myCard = state.tradeMyCard;
  const incoming = state.tradeIncoming;
  // Reset filtres à chaque ouverture (myCard null = sélection initiale)
  if(!myCard) window._tradeResetFilters && window._tradeResetFilters();

  // Vue : offre entrante à accepter/refuser
  if (incoming && incoming.status === 'pending' && incoming.to_id === state.currentUser?.id) {
    const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.from_card_id));
    const toCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.to_card_id));
    // Le receveur voit la vraie carte demandée seulement s'il la possède
    const receiverOwnsToCard = toCard && toCard.owned;

    // Bloc info carte : image + infos à côté (HTML concaténé, pas de template literal imbriqué)
    function cardInfoBlock(card, cardId, label, isFrom){
      const col = card ? RARITY_COLOR[card.rarity] : th.textMuted;
      // Pour la carte proposée (isFrom) : mystère si non possédée par le receveur
      const showReal = card && card.owned && card.image_url;
      const countHtml = card && card.owned && card.count > 0
        ? '<div style="font-size:9px;margin-top:1px;color:' + th.green + ';font-weight:800;">✓ Tu la possèdes ' + card.count + ' fois</div>'
        : '';
      const notOwnedHtml = card && !card.owned
        ? '<div style="font-size:9px;margin-top:1px;color:' + th.red + ';font-weight:800;">✗ Non possédée</div>'
        : '';
      const ownedHtml = isFrom
        ? notOwnedHtml  // carte proposée : signaler si le receveur ne la possède pas encore
        : (card ? (card.owned ? countHtml : notOwnedHtml) : '<div style="font-size:9px;margin-top:1px;color:' + th.red + ';">Inconnue</div>');
      const imgHtml = showReal
        ? '<img src="' + card.image_url + '" style="width:100%;height:100%;object-fit:cover;display:block;" />'
          + '<div onclick="openCard3DViewer(' + JSON.stringify({id:card.id,name:card.name,rarity:card.rarity,image_url:card.image_url,owned:card.owned,color:RARITY_COLOR[card.rarity]}) + ')" style="position:absolute;inset:0;z-index:2;cursor:zoom-in;"></div>'
        : '<img src="' + _CARD_BACK_MARKET + '" style="width:100%;height:100%;object-fit:cover;display:block;" />';
      const displayName = card && card.owned ? card.name : '— — — —';
      return '<div style="display:flex;gap:8px;align-items:flex-start;">'
        + '<div style="position:relative;width:60px;height:84px;flex-shrink:0;overflow:hidden;'
        + 'border:1px solid ' + (card ? col + '60' : th.border) + ';'
        + 'background:' + (card ? 'linear-gradient(135deg,' + col + '25,' + col + '08)' : th.surface) + ';">'
        + imgHtml
        + '</div>'
        + '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding-top:2px;">'
        + '<div style="font-size:8px;color:' + th.textMuted + ';text-transform:uppercase;letter-spacing:.5px;">' + label + '</div>'
        + '<div style="font-size:11px;font-weight:800;color:' + th.text + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + displayName + '</div>'
        + (card ? '<div style="font-size:9px;color:' + col + ';font-weight:700;">◆ ' + RARITY_LABEL[card.rarity] + '</div>' : '')
        + '<div style="font-size:9px;color:' + th.textFaint + ';">#' + cardId + '</div>'
        + ownedHtml
        + (isFrom && card && card.owned ? countHtml : '')
        + '</div>'
        + '</div>';
    }

    const tradeHtml = '<div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;">'
      + '<div style="width:100%;max-width:340px;background:' + th.bgSecondary + ';padding:16px 18px 18px;box-shadow:0 24px 80px rgba(0,0,0,.7);border:2px solid #000;position:relative;">'
      + '<button onclick="window._dismissTradePopup && window._dismissTradePopup(\'' + incoming.id + '\')"'
      + ' style="position:absolute;top:10px;right:10px;width:24px;height:24px;background:' + th.bgTertiary + ';border:1px solid ' + th.border + ';color:' + th.textMuted + ';cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:2;"'
      + ' title="Fermer sans répondre">✕</button>'
      + '<div style="font-family:\'Luckiest Guy\',cursive;font-size:14px;font-weight:400;color:' + th.text + ';margin-bottom:2px;letter-spacing:.5px;padding-right:28px;">Offre d\'échange</div>'
      + '<div style="font-size:11px;color:' + th.textMuted + ';margin-bottom:14px;">de <b>' + (incoming.from_name||'Ami') + '</b></div>'
      + '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">'
      + cardInfoBlock(fromCard, incoming.from_card_id, 'Il propose', true)
      + '<div style="text-align:center;font-size:16px;color:' + th.textMuted + ';">⇄</div>'
      + cardInfoBlock(toCard, incoming.to_card_id, 'Il veut ta carte', false)
      + '</div>'
      + (!receiverOwnsToCard ? '<div style="font-size:10px;color:' + th.red + ';background:' + th.red + '15;border:1px solid ' + th.red + '30;padding:7px 10px;margin-bottom:10px;text-align:center;">Tu ne possèdes pas cette carte — tu peux seulement décliner.</div>' : '')
      + '<div style="display:flex;gap:8px;">'
      + '<button id="trade-accept" onclick="window.respondTrade && window.respondTrade(\'' + incoming.id + '\', true)"'
      + (receiverOwnsToCard ? '' : ' disabled')
      + ' style="flex:1;padding:10px;background:' + (receiverOwnsToCard?th.green:th.surface) + ';color:' + (receiverOwnsToCard?'#000':th.textMuted) + ';border:none;font-size:12px;font-weight:700;cursor:' + (receiverOwnsToCard?'pointer':'default') + ';opacity:' + (receiverOwnsToCard?1:.5) + ';">'
      + (receiverOwnsToCard ? '✓ Accepter' : '🚫 Carte manquante') + '</button>'
      + '<button id="trade-decline" onclick="window.respondTrade && window.respondTrade(\'' + incoming.id + '\', false)"'
      + ' style="flex:1;padding:10px;background:' + th.surface + ';color:' + th.red + ';border:1px solid ' + th.red + '40;font-size:12px;font-weight:700;cursor:pointer;">Refuser</button>'
      + '</div>'
      + '</div>'
      + '</div>';
    return tradeHtml;
  }

  // ── Step pick_my_card : je veux recevoir theirCard, je choisis ma carte à donner ──
  if (state.tradeStep === 'pick_my_card' && state.tradeTheirCard) {
    const theirC = state.tradeTheirCard;
    const col2 = RARITY_COLOR[theirC.rarity] || th.textMuted;
    const myOwned = ALL_CARDS.filter(c => c.owned && c.rarity === theirC.rarity && String(parseInt(c.id)) !== String(parseInt(theirC.id)));
    return `
    <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px;">
      <div style="width:100%;max-width:360px;background:${th.bgSecondary};border:2px solid #000;display:flex;flex-direction:column;max-height:85vh;overflow:hidden;">
        <div style="padding:14px 16px 10px;border-bottom:1px solid ${th.border};flex-shrink:0;">
          <div style="font-family:'Luckiest Guy',cursive;font-size:13px;color:${th.text};letter-spacing:.5px;margin-bottom:6px;">Que proposes-tu en échange ?</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:48px;height:68px;overflow:hidden;border:2px solid ${col2}60;flex-shrink:0;">
              ${theirC.owned && theirC.image_url ? `<img src="${theirC.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />` : `<img src="${_CARD_BACK_MARKET}" style="width:100%;height:100%;object-fit:cover;display:block;" />`}
            </div>
            <div>
              <div style="font-size:8px;color:${th.textMuted};text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Tu recevras</div>
              <div style="font-size:11px;font-weight:800;color:${theirC.owned?th.text:th.textMuted};">${theirC.owned ? theirC.name : '— — — —'}</div>
              <div style="font-size:9px;color:${col2};">◆ ${RARITY_LABEL[theirC.rarity]} · #${parseInt(theirC.id)}</div>
              ${!theirC.owned ? `<div style="font-size:8px;color:${th.textMuted};margin-top:1px;">Non possédée</div>` : ''}
            </div>
          </div>
        </div>
        <div style="font-size:9px;color:${th.textMuted};padding:8px 16px 4px;flex-shrink:0;">Choisis une de tes cartes de même rareté :</div>
        <div style="flex:1;overflow-y:auto;padding:6px 12px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;align-content:start;">
          ${myOwned.length ? myOwned.map(c => {
            const col = RARITY_COLOR[c.rarity]||'#94a3b8';
            const isWanted = (state.tradeStandWantIds||[]).includes(String(parseInt(c.id)));
            return `<div onclick="setState({tradeMyCard:ALL_CARDS.find(x=>String(parseInt(x.id))===String(parseInt('${c.id}'))),tradeStep:'confirm'})" style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;">
              <div style="width:60px;height:88px;overflow:hidden;border:2px solid ${isWanted?th.accent:col+'55'};position:relative;">
                ${c.image_url ? `<img src="${c.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:18px;">🃏</div>'}
                ${c.count > 1 ? `<div style="position:absolute;top:2px;right:2px;min-width:14px;height:14px;background:rgba(0,0,0,.8);color:#fff;font-size:7px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 2px;border:1px solid rgba(255,255,255,.2);">×${c.count}</div>` : ''}
              </div>
              <div style="font-size:7px;color:${col};font-weight:700;">#${parseInt(c.id)}</div>
              ${isWanted ? `<div style="font-size:6px;font-weight:900;color:${th.accent};letter-spacing:.3px;">🔍 Recherchée</div>` : ''}
            </div>`;
          }).join('') : `<div style="grid-column:1/-1;text-align:center;padding:20px;font-size:10px;color:${th.textFaint};">Aucune carte de rareté ${RARITY_LABEL[theirC.rarity]} à proposer</div>`}
        </div>
        <div style="padding:10px 14px;border-top:1px solid ${th.border};flex-shrink:0;">
          <button id="trade-step-back-close" style="width:100%;padding:9px;background:${th.surface};color:${th.textMuted};border:1px solid ${th.border};font-size:11px;font-weight:700;cursor:pointer;">← Retour</button>
        </div>
      </div>
    </div>`;
  }

  // ── Step pick_their_from_stand : j'ai ma carte, je choisis parmi les offer du stand ──
  if (state.tradeStep === 'pick_their_from_stand' && state.tradeMyCard) {
    const myC = state.tradeMyCard;
    const col1 = RARITY_COLOR[myC.rarity] || th.textMuted;
    const standOfferCards = (state.tradeStandOfferIds||[]).map(id => ALL_CARDS.find(c=>String(parseInt(c.id))===String(parseInt(id)))).filter(Boolean);
    const sameRarity = standOfferCards.filter(c => c.rarity === myC.rarity);
    const standDisplay = sameRarity.length ? sameRarity : standOfferCards;
    const filter = state.tradeStandFilter || 'stand';
    // Cartes manquantes : toutes les cartes non possédées du jeu
    const missingCards = ALL_CARDS.filter(c => !c.owned);
    const displayCards = filter === 'missing' ? missingCards : standDisplay;
    return `
    <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px;">
      <div style="width:100%;max-width:360px;background:${th.bgSecondary};border:2px solid #000;display:flex;flex-direction:column;max-height:85vh;overflow:hidden;">
        <div style="padding:14px 16px 10px;border-bottom:1px solid ${th.border};flex-shrink:0;">
          <div style="font-family:'Luckiest Guy',cursive;font-size:13px;color:${th.text};letter-spacing:.5px;margin-bottom:6px;">Que veux-tu recevoir ?</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:48px;height:68px;overflow:hidden;border:2px solid ${col1}60;flex-shrink:0;">
              ${myC.image_url ? `<img src="${myC.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:20px;">🃏</div>'}
            </div>
            <div>
              <div style="font-size:8px;color:${th.textMuted};text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Tu donnes</div>
              <div style="font-size:11px;font-weight:800;color:${th.text};">${myC.name}</div>
              <div style="font-size:9px;color:${col1};">◆ ${RARITY_LABEL[myC.rarity]}</div>
            </div>
          </div>
          ${filter === 'stand' && sameRarity.length === 0 && standOfferCards.length > 0 ? `<div style="font-size:9px;color:${th.red};margin-top:8px;">⚠ Aucune carte de même rareté dans ce stand — l'échange sera refusé</div>` : ''}
        </div>
        <!-- Toggle Stand / Manquantes -->
        <div style="display:flex;gap:0;flex-shrink:0;border-bottom:1px solid ${th.border};">
          <button onclick="setState({tradeStandFilter:'stand'})" style="flex:1;padding:8px 4px;font-size:10px;font-weight:800;border:none;cursor:pointer;background:${filter==='stand'?th.accent:'transparent'};color:${filter==='stand'?'#000':th.textMuted};border-right:1px solid ${th.border};transition:background .15s;">🏪 Stand (${standDisplay.length})</button>
          <button onclick="setState({tradeStandFilter:'missing'})" style="flex:1;padding:8px 4px;font-size:10px;font-weight:800;border:none;cursor:pointer;background:${filter==='missing'?th.red:('transparent')};color:${filter==='missing'?'#fff':th.textMuted};transition:background .15s;">✗ Manquantes (${missingCards.length})</button>
        </div>
        <div style="flex:1;overflow-y:auto;padding:6px 12px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:8px;align-content:start;">
          ${displayCards.length ? displayCards.map(c => {
            const col = RARITY_COLOR[c.rarity]||'#94a3b8';
            const rarOk = c.rarity === myC.rarity;
            return `<div onclick="setState({tradeTheirCard:ALL_CARDS.find(x=>String(parseInt(x.id))===String(parseInt('${c.id}'))),tradeStep:'confirm'})" style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:${rarOk?1:.45};" title="${rarOk?'':'Rareté différente'}">
              <div style="width:60px;height:88px;overflow:hidden;border:2px solid ${col}${rarOk?'99':'33'};">
                ${filter === 'stand' && c.owned && c.image_url ? `<img src="${c.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />` : `<img src="${_CARD_BACK_MARKET}" style="width:100%;height:100%;object-fit:cover;display:block;" />`}
              </div>
              <div style="font-size:7px;color:${col};font-weight:700;">#${parseInt(c.id)}</div>
              ${filter === 'stand' ? (rarOk ? `<div style="font-size:6px;font-weight:800;color:${c.owned?th.green:th.textMuted};">${c.owned?'✓ Possédée':'✗ Non poss.'}</div>` : '<div style="font-size:6px;color:'+th.red+';">≠ rareté</div>') : (rarOk ? '' : '<div style="font-size:6px;color:'+th.red+';">≠ rareté</div>')}
            </div>`;
          }).join('') : `<div style="grid-column:1/-1;text-align:center;padding:20px;font-size:10px;color:${th.textFaint};">${filter==='missing'?'Aucune carte manquante 🎉':'Ce stand ne propose aucune carte'}</div>`}
        </div>
        <div style="padding:10px 14px;border-top:1px solid ${th.border};flex-shrink:0;display:flex;gap:8px;">
          <button id="trade-step-back-close" style="flex:1;padding:9px;background:${th.surface};color:${th.textMuted};border:1px solid ${th.border};font-size:11px;font-weight:700;cursor:pointer;">← Retour</button>
          <button id="trade-stand-free-id" style="flex:2;padding:9px;background:${th.accent};color:#000;border:none;font-size:11px;font-weight:800;cursor:pointer;">⌨ Saisir un ID précis</button>
        </div>
      </div>
    </div>`;
  }

  // Vue confirm : trade direct (carte à donner pré-remplie, carte à recevoir pré-remplie)
  if (state.tradeStep === 'confirm' && state.tradeMyCard) {
    const myC = state.tradeMyCard;
    const theirC = state.tradeTheirCard;
    const col1 = RARITY_COLOR[myC.rarity] || th.textMuted;
    const col2 = theirC ? (RARITY_COLOR[theirC.rarity] || th.textMuted) : th.textMuted;
    const rarityMatch = !theirC || myC.rarity === theirC.rarity;
    const canSend = !!myC && rarityMatch;
    return `
    <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="width:100%;max-width:340px;background:${th.bgSecondary};padding:16px 18px 18px;border:2px solid #000;">
        <div style="font-family:'Luckiest Guy',cursive;font-size:14px;color:${th.text};margin-bottom:14px;letter-spacing:.5px;">Confirmer l'échange</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <div style="flex:1;text-align:center;">
            <div style="font-size:8px;color:${th.textMuted};margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;">Tu donnes</div>
            <div style="width:80px;height:112px;margin:0 auto;overflow:hidden;border:2px solid ${col1}60;background:linear-gradient(135deg,${col1}20,${col1}08);">
              ${myC.image_url ? `<img src="${myC.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:24px;">🃏</div>`}
            </div>
            <div style="font-size:9px;font-weight:800;color:${th.text};margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${myC.name}</div>
            <div style="font-size:8px;color:${col1};">◆ ${RARITY_LABEL[myC.rarity]}</div>
          </div>
          <div style="font-size:20px;color:${th.textMuted};flex-shrink:0;">⇄</div>
          <div style="flex:1;text-align:center;">
            <div style="font-size:8px;color:${th.textMuted};margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;">Tu reçois</div>
            ${theirC ? `
            <div style="width:80px;height:112px;margin:0 auto;overflow:hidden;border:2px solid ${col2}60;background:linear-gradient(135deg,${col2}20,${col2}08);">
              ${theirC.owned && theirC.image_url ? `<img src="${theirC.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />` : `<img src="${_CARD_BACK_MARKET}" style="width:100%;height:100%;object-fit:cover;display:block;" />`}
            </div>
            <div style="font-size:9px;font-weight:800;color:${th.text};margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${theirC.owned ? theirC.name : '— — — —'}</div>
            <div style="font-size:8px;color:${col2};">◆ ${RARITY_LABEL[theirC.rarity]} · #${parseInt(theirC.id)}</div>
            ` : `<div style="width:80px;height:112px;margin:0 auto;border:2px dashed ${th.border};display:flex;align-items:center;justify-content:center;font-size:10px;color:${th.textMuted};">?</div>`}
          </div>
        </div>
        ${!rarityMatch ? `<div style="font-size:10px;color:${th.red};background:${th.red}15;border:1px solid ${th.red}30;padding:7px 10px;margin-bottom:10px;text-align:center;">⚠ Raretés différentes</div>` : ''}
        <div style="display:flex;gap:8px;">
          <button id="trade-step-back-close" style="flex:1;padding:10px;background:${th.surface};color:${th.textMuted};border:1px solid ${th.border};font-size:12px;font-weight:700;cursor:pointer;">✕ Annuler</button>
          <button id="trade-send" ${canSend?'':'disabled'} style="flex:2;padding:10px;background:${canSend?th.green:th.surface};color:${canSend?'#000':th.textMuted};border:none;font-size:12px;font-weight:800;cursor:${canSend?'pointer':'default'};opacity:${canSend?1:.5};">⇄ Envoyer</button>
        </div>
      </div>
    </div>`;
  }

  // Vue step 2 : saisir le numéro de la carte voulue en échange
  if (state.tradeStep === 'pick_their_card' && state.tradeMyCard) {
    const wantedNum = state.tradeWantedNum ? String(state.tradeWantedNum).replace(/[^0-9]/g,'') : '';
    const wantedCard = wantedNum && parseInt(wantedNum) > 0 ? ALL_CARDS.find(c=>parseInt(c.id)===parseInt(wantedNum)) : null;
    const tradeSearch = state.tradeSearch || '';
    const rarityOk = wantedCard && wantedCard.rarity === state.tradeMyCard.rarity;
    const notSame = wantedCard && parseInt(wantedCard.id) !== parseInt(state.tradeMyCard.id);
    const canSend = wantedCard && rarityOk && notSame;
    // Suggestions : si recherche par nom → cartes possédées uniquement (pas de spoil)
    //               si recherche par ID pur (chiffres) → toutes raretés (l'ID est public)
    const suggestions = tradeSearch.length >= 1
      ? ALL_CARDS.filter(c => {
          const q = tradeSearch.toLowerCase();
          const isIdSearch = /^\d+$/.test(tradeSearch.trim());
          const matchId   = String(parseInt(c.id)).includes(q) || c.id.toLowerCase().includes(q);
          const matchName = c.name.toLowerCase().includes(q);
          // Nom → seulement les possédées. ID → toutes.
          if(matchName && !isIdSearch && !c.owned) return false;
          return (matchId || matchName) && parseInt(c.id) !== parseInt(state.tradeMyCard.id);
        }).slice(0, 8)
      : [];
    return `
    <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;">
      <div style="width:100%;max-width:420px;background:${th.bgSecondary};padding:16px;display:flex;flex-direction:column;box-shadow:0 -20px 60px rgba(0,0,0,.7);border-top:1px solid ${th.borderStrong};max-height:90vh;overflow-y:auto;">
        <div style="width:36px;height:4px;background:${th.border};margin:0 auto 14px;flex-shrink:0;"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0;">
          <button id="trade-step-back" style="width:28px;height:28px;background:${th.surface};border:2px solid #000;color:${th.textMuted};font-size:14px;cursor:pointer;">←</button>
          <div>
            <div style="font-family:'Luckiest Guy',cursive;font-size:12px;font-weight:400;color:${th.text};">Quelle carte veux-tu ?</div>
            <div style="font-size:10px;color:${th.textMuted};">Même rareté que ta carte — ${RARITY_LABEL[state.tradeMyCard.rarity]}</div>
          </div>
        </div>

        <!-- Barre de recherche nom ou ID -->
        <div style="background:${th.bgTertiary};border:2px solid #000;padding:0;margin-bottom:2px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;">
          <span style="font-size:13px;color:${th.textMuted};">🔍</span>
          <input id="trade-wanted-search" type="text" value="${tradeSearch}"
            placeholder="Nom ou #ID de la carte…"
            style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:12px;font-family:inherit;font-weight:600;"/>
          ${tradeSearch ? `<button id="trade-search-clear" style="background:transparent;border:none;color:${th.textMuted};font-size:14px;cursor:pointer;padding:0 2px;line-height:1;">✕</button>` : ''}
        </div>

        <!-- Suggestions dropdown -->
        ${suggestions.length > 0 ? `
        <div style="background:${th.bgTertiary};border:2px solid #000;border-top:none;margin-bottom:10px;flex-shrink:0;max-height:220px;overflow-y:auto;">
          ${suggestions.map(c => {
            const col = RARITY_COLOR[c.rarity];
            const isSelected = wantedCard && parseInt(wantedCard.id) === parseInt(c.id);
            const rOk = c.rarity === state.tradeMyCard.rarity;
            const isOwned = c.owned;
            return `
            <div class="trade-wanted-suggestion" data-cardid="${c.id}"
              style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;background:${isSelected ? col+'18' : 'transparent'};border-bottom:1px solid ${th.border};transition:background .15s;">
              <div style="width:30px;height:42px;flex-shrink:0;overflow:hidden;position:relative;border:1px solid ${col}50;background:linear-gradient(135deg,${col}25,${col}08);">
                ${isOwned && c.image_url
                  ? `<img src="${c.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
                  : `<img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:cover;display:block;opacity:.75;" />`}
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:11px;font-weight:700;color:${isOwned?th.text:th.textMuted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${isOwned ? c.name : '— — — —'}</div>
                <div style="font-size:9px;color:${col};margin-top:1px;">◆ ${RARITY_LABEL[c.rarity]} · #${c.id}${!isOwned?' · Non possédée':''}</div>
              </div>
              ${isSelected ? `<span style="font-size:10px;color:${th.green};font-weight:900;">✓</span>` : ''}
              ${!rOk ? `<span style="font-size:8px;color:${th.red};font-weight:700;">≠ rareté</span>` : ''}
            </div>`;
          }).join('')}
        </div>` : tradeSearch.length >= 1 ? `
        <div style="padding:10px 12px;font-size:10px;color:${th.textMuted};background:${th.bgTertiary};border:2px solid #000;border-top:none;margin-bottom:10px;">Aucune carte trouvée pour « ${tradeSearch} »</div>` : `
        <div style="margin-bottom:10px;font-size:10px;color:${th.textMuted};padding:2px 0;">Tape un nom ou un numéro de carte pour rechercher.</div>`}

        <!-- Carte sélectionnée + validation -->
        ${wantedCard ? `
        <div style="background:${th.bgTertiary};padding:10px 12px;margin-bottom:12px;flex-shrink:0;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:40px;height:56px;flex-shrink:0;overflow:hidden;position:relative;border:2px solid ${rarityOk ? th.green : th.red};background:linear-gradient(135deg,${RARITY_COLOR[wantedCard.rarity]}25,${RARITY_COLOR[wantedCard.rarity]}08);">
              ${wantedCard.owned && wantedCard.image_url
                ? `<img src="${wantedCard.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
                : `<img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:cover;display:block;opacity:.75;" />`}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:700;color:${wantedCard.owned?th.text:th.textMuted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${wantedCard.owned ? wantedCard.name : '— — — —'}</div>
              <div style="font-size:9px;color:${RARITY_COLOR[wantedCard.rarity]};margin-top:1px;">◆ ${RARITY_LABEL[wantedCard.rarity]} · #${wantedCard.id}${!wantedCard.owned?' · <span style="color:'+th.textMuted+';">Non possédée</span>':''}</div>
              ${!rarityOk ? `<div style="font-size:9px;color:${th.red};margin-top:3px;font-weight:700;">⚠ Rareté différente — tu proposes du ${RARITY_LABEL[state.tradeMyCard.rarity]}</div>` : ''}
              ${!notSame ? `<div style="font-size:9px;color:${th.red};margin-top:3px;font-weight:700;">⚠ C'est la même carte que tu proposes</div>` : ''}
              ${canSend ? `<div style="font-size:9px;color:${th.green};margin-top:3px;font-weight:700;">✓ Échange valide — même rareté</div>` : ''}
            </div>
          </div>
        </div>` : ''}

        <button id="trade-confirm-send" ${canSend?'':'disabled'} style="padding:12px;background:${canSend?th.accent:th.surface};color:${canSend?'#000':th.textMuted};border:none;font-size:12px;font-weight:700;cursor:${canSend?'pointer':'default'};opacity:${canSend?1:.5};flex-shrink:0;">
          Proposer l'échange →
        </button>
        <div style="margin-top:10px;font-size:9px;color:${th.textFaint};text-align:center;">Si ${friendName} ne possède pas la carte demandée, il ne pourra que décliner.</div>
      </div>
    </div>`;
  }
  // ── Calcul grille adaptatif (style pioche) ──
  const _vw = window.innerWidth;
  const _vh = window.innerHeight;
  const _PAD = 8, _GAP = 4;
  // Colonnes : assez pour que les cartes soient petites et tout tienne sans scroll horizontal
  const _COLS = Math.min(10, Math.max(5, Math.floor((_vw - _PAD*2 + _GAP) / 56)));
  // CW calculé pour remplir exactement la largeur disponible
  const _CW = Math.floor((_vw - _PAD*2 - _GAP*(_COLS-1)) / _COLS);
  const _CH = Math.round(_CW * 1.43);

  return `
  <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;">
    <!-- Header fixe -->
    <div style="width:100%;max-width:680px;flex-shrink:0;padding:${_PAD}px ${_PAD}px 8px;padding-top:max(env(safe-area-inset-top,${_PAD}px),${_PAD}px);display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="trade-close" style="width:44px;height:44px;background:${th.surface};border:2px solid #000;color:${th.textMuted};font-size:14px;cursor:pointer;flex-shrink:0;">✕</button>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Luckiest Guy',cursive;font-size:13px;font-weight:400;color:${th.text};letter-spacing:.5px;">Proposer un échange</div>
          <div style="font-size:9px;color:${th.textMuted};">avec ${friendName} · même rareté · 1 contre 1</div>
        </div>
        ${myCard ? `<button id="trade-send" style="padding:7px 14px;background:${th.accent};color:#000;border:none;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;">Envoyer →</button>` : ''}
      </div>
      ${myCard ? `
      <div style="background:${th.bgTertiary};padding:8px 10px;display:flex;align-items:center;gap:8px;border:1px solid ${myCard.color}50;">
        <div style="width:32px;height:45px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;${myCard.image_url?'cursor:zoom-in;':''}" ${myCard.image_url?`onclick="event.stopPropagation();openCard3DViewer(${JSON.stringify({id:myCard.id,name:myCard.name,rarity:myCard.rarity,image_url:myCard.image_url,owned:myCard.owned,color:RARITY_COLOR[myCard.rarity]})})"`:''}> 
          ${myCard.image_url
            ? `<img src="${myCard.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />`
            : `<span style="font-size:20px;">🃏</span>`}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:10px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${myCard.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[myCard.rarity]};">◆ ${RARITY_LABEL[myCard.rarity]}</div>
        </div>
        <button id="trade-clear-card" style="padding:3px 7px;font-size:8px;background:${th.surface};color:${th.textMuted};border:2px solid #000;cursor:pointer;flex-shrink:0;">Changer</button>
      </div>` : `<div style="font-size:10px;color:${th.textMuted};">Sélectionne une de tes cartes à proposer :</div>`}
      <!-- Barre de recherche -->
      <div style="display:flex;align-items:center;gap:6px;background:${th.bgTertiary};border:2px solid #000;padding:5px 10px;">
        <span style="font-size:12px;color:${th.textMuted};">🔍</span>
        <input id="trade-search-input" type="text" placeholder="Nom ou #ID…"
          style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:11px;font-family:inherit;font-weight:600;"
          oninput="window._tradeApplyFilters()" />
      </div>
      <!-- Filtres rarité + doubles -->
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
        ${['common','uncommon','rare','mythic'].map(r=>`
        <button onclick="window._tradeToggleRarity('${r}')"
          id="trade-filter-${r}"
          style="padding:3px 8px;font-size:8px;font-weight:800;cursor:pointer;letter-spacing:.3px;border:1.5px solid ${RARITY_COLOR[r]}55;background:transparent;color:#6b7280;transition:all .15s;"
          data-rarity="${r}">${RARITY_LABEL[r].toUpperCase()}
        </button>`).join('')}
        <button onclick="window._tradeToggleDoubles()"
          id="trade-filter-doubles"
          style="padding:3px 8px;font-size:8px;font-weight:800;cursor:pointer;letter-spacing:.3px;border:1.5px solid rgba(251,191,36,.4);background:transparent;color:#6b7280;margin-left:2px;">
          ×2+ DOUBLES
        </button>
      </div>
    </div>
    <!-- Grille cartes scrollable, style pioche -->
    <div style="flex:1;overflow-y:auto;width:100%;padding:0 ${_PAD}px ${_PAD}px;overflow-x:hidden;">
      <div style="display:grid;grid-template-columns:repeat(${_COLS},1fr);gap:${_GAP}px;align-content:start;">
        ${ownedCards.map(card=>{

      const ROWS = Math.ceil(cards.length / COLS);
      const gridH = ROWS * CH + (ROWS-1) * GAP;
      if(cards.length===0) return `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:${th.textMuted};font-size:12px;"><div style="font-size:32px;">🔍</div>Aucune carte</div>`;
      return `<div id="coll-grid-scroll" style="flex:1;overflow-y:auto;padding:${PAD}px;">
        <div style="position:relative;width:${availW}px;height:${gridH}px;">
          ${cards.map((c,i)=>{
            const col=i%COLS, row=Math.floor(i/COLS);
            const x=col*(CW+GAP), y=row*(CH+GAP);
            return renderCollCard(c,th,x,y,CW,CH);
          }).join('')}
        </div>
      </div>`;
    })()}
  </div>`;
}

function renderCollCard(card,th,x,y,CW,CH){
  if(!card.owned){
    const pngW = Math.round(CW * 0.88);
    const pngH = Math.round(CH * 0.88);
    const pngOffX = Math.round((CW - pngW) / 2);
    const pngOffY = Math.round((CH - pngH) / 2);
    return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;background:transparent;border:none;overflow:visible;">
      <div style="position:absolute;left:${pngOffX}px;top:${pngOffY}px;width:${pngW}px;height:${pngH}px;">
        <img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:contain;display:block;opacity:.75;" />
        <div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:${Math.max(4, Math.round(CW*0.055))}px;font-weight:700;color:rgba(255,255,255,.70);text-shadow:0 1px 3px #000,0 0 6px #000;line-height:1;">#${card.id}</div>
      </div>
    </div>`;
  }
  const rarCol = card.color;
  // Cartes possédées : plus grandes (120% de la cellule, centrées), sans glow
  const oversize = 1.18;
  const imgW = Math.round(CW * oversize);
  const imgH = Math.round(CH * oversize);
  return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;background:transparent;border:none;overflow:visible;display:flex;align-items:center;justify-content:center;">
    ${card.count>1?`<div style="position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;background:${th.accent};color:#000;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.5);">x${card.count}</div>`:''}
    ${card.image_url
      ? `<img src="${card.image_url}" style="width:${imgW}px;height:${imgH}px;object-fit:contain;display:block;flex-shrink:0;" />`
      : `<div style="width:${imgW}px;height:${imgH}px;background:linear-gradient(135deg,${rarCol}25,${rarCol}08);display:flex;align-items:center;justify-content:center;font-size:${Math.round(CW*0.38)}px;">🃏</div>`}
  </div>`;
}

// ─── TAB BOOSTERS ─────────────────────────────────────────────────
function renderTabBoosters(th){
  const isMobile = window.innerWidth < 600;
  const selectedIdx = state.boosterSelectedIdx ?? 1; // défaut : booster du milieu
  const prevIdx = state.boosterPrevIdx ?? selectedIdx;
  const slideDir = selectedIdx > prevIdx ? 'right' : 'left'; // new center came from right or left

  // ── Taille des cartes booster calculée dynamiquement selon la fenêtre ──
  // On réserve de la place pour : header (~50px), label (~32px), infos+bouton (~90px),
  // flèches nav desktop (~52px), pioche (~60px), marges (~20px)
  const _vw = window.innerWidth;
  const _vh = window.innerHeight;
  const _reservedH = isMobile ? 210 : 254; // px réservés hors carrousel
  const _availH    = _vh - _reservedH;     // hauteur disponible pour le booster central
  const _availW    = _vw;
  // Ratio booster PNG ≈ 0.54 (largeur/hauteur)
  const _boosterRatio = 0.54;
  // Taille maximale : ne pas dépasser 85% de la hauteur dispo, ni 42% de la largeur sur desktop
  const _maxByH  = Math.floor(_availH * 0.85);
  const _maxByW  = isMobile ? Math.floor(_availW * 0.72) : Math.floor(_availW * 0.36);
  const _cenH    = Math.min(_maxByH, Math.round(_maxByW / _boosterRatio));
  const _cenW    = Math.round(_cenH * _boosterRatio);
  // Éléments latéraux : 74% de la taille centrale
  const _sideScale = 0.74;
  const cardW    = _cenW;
  const cardH    = _cenH;
  // Décalage du track entre deux boosters (largeur centrale × 0.56 pour overlap naturel)
  const _trackStep = Math.round(_cenW * (isMobile ? 0.70 : 0.58));
  // Margin négatif pour overlap des éléments latéraux
  const marginH  = -Math.round(_cenW * (isMobile ? 0.08 : 0.14));
  const boosterMeta = [
    {
      desc:"",
      gradient:`linear-gradient(160deg,#9ca3af20,#9ca3af06)`,
      src:"https://i.goopics.net/ueiki4.png",
      rates:"Common 65% · Uncommon 28% · Rare 6% · Mythic 1%",
    },
    {
      desc:"",
      gradient:`linear-gradient(160deg,#cd7f3222,#cd7f3206)`,
      src:"https://i.goopics.net/61e1o1.png",
      rates:"Common 25% · Uncommon 52% · Rare 18% · Mythic 5%",
    },
    {
      desc:"",
      gradient:`linear-gradient(160deg,#f0c06022,#f0c06006)`,
      src:"https://i.goopics.net/cussu4.png",
      rates:"Common 12% · Uncommon 38% · Rare 35% · Mythic 15%",
    },
  ];
  const b = BOOSTERS[selectedIdx];
  const meta = boosterMeta[selectedIdx];
  const isOpen = state.boosterOpening === b.id;

  // Construire l'inner HTML du booster (effets visuels par id)
  function boosterInner(bid, bMeta, bIsOpen) {
    const shimmer = bid===1
      ? `<div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(209,213,219,.12) 0%,transparent 65%);animation:normalSparkle 2s ease-in-out infinite;pointer-events:none;z-index:0;"></div>
         <img src="https://i.goopics.net/5f52vt.png" style="position:absolute;left:-10%;top:5%;width:50%;height:88%;object-fit:contain;pointer-events:none;z-index:2;animation:normalSparkle 2.6s ease-in-out infinite;filter:drop-shadow(0 0 5px #9ca3af) grayscale(1) brightness(1.4);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);"/>
         <img src="https://i.goopics.net/5f52vt.png" style="position:absolute;right:-10%;top:5%;width:50%;height:88%;object-fit:contain;pointer-events:none;z-index:2;animation:normalSparkle 2.6s ease-in-out .4s infinite;filter:drop-shadow(0 0 5px #9ca3af) grayscale(1) brightness(1.4);transform:scaleX(-1);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);"/>`
      : bid===2
      ? `<div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(205,127,50,.22) 0%,transparent 65%);animation:normalSparkle 1.8s ease-in-out infinite;pointer-events:none;z-index:0;"></div>
         <img src="https://i.goopics.net/k7jl1r.png" style="position:absolute;left:-10%;top:5%;width:50%;height:88%;object-fit:contain;pointer-events:none;z-index:2;animation:prestigeShine 2.6s ease-in-out infinite;filter:drop-shadow(0 0 6px #cd7f32) sepia(1) saturate(2.5) hue-rotate(5deg) brightness(.9);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);"/>
         <img src="https://i.goopics.net/k7jl1r.png" style="position:absolute;right:-10%;top:5%;width:50%;height:88%;object-fit:contain;pointer-events:none;z-index:2;animation:prestigeShine 2.6s ease-in-out .5s infinite;filter:drop-shadow(0 0 6px #cd7f32) sepia(1) saturate(2.5) hue-rotate(5deg) brightness(.9);transform:scaleX(-1);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);"/>`
      : `<div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(240,192,96,.25) 0%,transparent 70%);animation:legendGlow 1.6s ease-in-out infinite;pointer-events:none;z-index:0;"></div>

         <img src="https://i.goopics.net/9uldrt.png" style="position:absolute;right:-8%;top:0;width:55%;height:100%;object-fit:contain;pointer-events:none;z-index:2;animation:boltFlash 2.2s ease-in-out .7s infinite;filter:drop-shadow(0 0 8px #fde68a) sepia(1) saturate(4) hue-rotate(-20deg) brightness(1.15);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.95) 20%,rgba(0,0,0,.95) 70%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.95) 20%,rgba(0,0,0,.95) 70%,transparent 100%);"/>`;
    const glow = bid===1 ? 'drop-shadow(0 0 8px #9ca3af50) brightness(1.05)'
                : bid===2 ? 'drop-shadow(0 0 10px #cd7f3270) brightness(1.08)'
                :           'drop-shadow(0 0 14px #f0c06090) drop-shadow(0 0 28px #fbbf2450) brightness(1.12)';

        draggable="false" ondragstart="return false;"
        style="width:95%;height:95%;object-fit:contain;display:block;position:relative;z-index:1;
               filter:${glow};
               transition:transform .35s cubic-bezier(.34,1.56,.64,1),filter .25s;

               cursor:pointer;user-select:none;-webkit-user-drag:none;"/>
    </div>`;
  }

  return `

    <!-- ═══ CARROUSEL ═══ -->

      <!-- Fond glow centré -->

      <!-- Track (3 cartes, centré sur la sélectionnée) -->
      <div id="booster-carousel-track"
        style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;gap:0;padding:0;
               touch-action:pan-y;user-select:none;cursor:grab;
               transform:translateX(${-(selectedIdx-1)*_trackStep}px);
">

        ${BOOSTERS.map((bx, ix) => {
          const mx = boosterMeta[ix];
          const isCen = ix === selectedIdx;
          const dist = ix - selectedIdx;
          const scale = isCen ? 1 : _sideScale;

// ─── TAB STATS ────────────────────────────────────────────────────
function renderTabStats(th){
  const isMobile = window.innerWidth < 600;

  // ══ Helpers ════════════════════════════════════════════════════════════════
  const n = (v) => (v === undefined || v === null || v === '' ? '—' : v);
  const num = (v) => (v === undefined || v === null || v === '' ? '—' : Number(v).toLocaleString('fr-FR'));

  // Formatter une carte top : "#ID Nom (×count)"
  const fmtTopCard = (entry) => {
    if (!entry || !entry.card_id) return '—';
    const card = (typeof ALL_CARDS !== 'undefined')
      ? ALL_CARDS.find(c => parseInt(c.id) === parseInt(entry.card_id))
      : null;
    const name = card?.name || 'Carte inconnue';
    return `#${entry.card_id} · ${name} (×${entry.value})`;
  };

  // Formatter durée en secondes -> "Xh Ym" ou "Xm Ys"
  const fmtDuration = (sec) => {
    if (sec === undefined || sec === null || sec === '' || isNaN(Number(sec))) return '—';
    sec = Math.max(0, Math.floor(Number(sec)));
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  };

  // ══ Personnel (state) ═════════════════════════════════════════════════════
  const winsPvp   = state.winsPvp   ?? 0;
  const lossesPvp = state.lossesPvp ?? 0;
  const winsPve   = state.winsPve   ?? 0;
  const lossesPve = state.lossesPve ?? 0;
  const wins10    = state.wins10v10   ?? 0;
  const losses10  = state.losses10v10 ?? 0;

  const gamesPvp   = winsPvp   + lossesPvp;
  const gamesPve   = winsPve   + lossesPve;
  const games10v10 = wins10    + losses10;
  const gamesTotal = gamesPvp + gamesPve + games10v10;

  // Plus longues séries
  const longStreakTotal = state.longestWinStreak       ?? 0;
  const longStreakPvp   = state.longestWinStreakPvp    ?? 0;
  const longStreakPve   = state.longestWinStreakPve    ?? 0;
  const longStreak10    = state.longestWinStreak10v10  ?? 0;

  // Cartes jouées — totales et par mode
  const cardsTotal   = state.statsTotalCardsPlayed ?? 0;
  const cardsPvp     = state.statsCardsPvp         ?? 0;
  const cardsPve     = state.statsCardsPve         ?? 0;

  const fightersTotal = state.statsFightersPlayed ?? 0;

  const spells10      = state.statsSpells10v10    ?? 0;

  // Raretés totales
  const cTotal  = state.statsCommonPlayed    ?? 0;
  const ucTotal = state.statsUncommonPlayed  ?? 0;
  const rTotal  = state.statsRarePlayed      ?? 0;
  const mTotal  = state.statsMythicPlayed    ?? 0;

  // Raretés PVP
  const cPvp  = state.statsCommonPvp   ?? 0;
  const ucPvp = state.statsUncommonPvp ?? 0;
  const rPvp  = state.statsRarePvp     ?? 0;
  const mPvp  = state.statsMythicPvp   ?? 0;

  // Raretés PVE
  const cPve  = state.statsCommonPve   ?? 0;
  const ucPve = state.statsUncommonPve ?? 0;
  const rPve  = state.statsRarePve     ?? 0;
  const mPve  = state.statsMythicPve   ?? 0;

  const uc10 = state.statsUncommon10v10 ?? 0;
  const r10  = state.statsRare10v10     ?? 0;

  }

        const allItems = [...msgs.map(m=>({...m, _type:'msg', _ts: m.ts})), ...trades]
          .sort((a,b)=>new Date(a._ts)-new Date(b._ts));

        if(allItems.length===0) return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;text-align:center;padding:30px 20px;"><div style="font-size:36px;opacity:.2;">✉️</div><div style="font-size:12px;font-weight:700;color:${th.text};">Pas encore de messages</div><div style="font-size:10px;color:${th.textMuted};">Envoie le premier !</div></div>`;

        return allItems.map(item=>{
          if(item._type === 'msg') return `
            <div style="display:flex;flex-direction:${item.from===myId?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:75%;background:${item.from===myId?th.accent:th.bgTertiary};color:${item.from===myId?'#000':th.text};padding:8px 12px;border-radius:${item.from===myId?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${item.text}</div>
            </div>`;

          // ── Trade card ──
          const isMine = item.from_id === myId;
          const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.from_card_id));
          const toCard   = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.to_card_id));
          // fromCard = carte que l'expéditeur propose :
          //   - si c'est MOI l'expéditeur → je la possède forcément, afficher le vrai PNG
          //   - si c'est l'ami l'expéditeur → afficher seulement si je la possède aussi
          // toCard = carte que l'expéditeur veut :
          //   - si c'est MOI l'expéditeur → c'est la carte que je veux recevoir, mystère pour moi aussi
          //   - si c'est l'ami l'expéditeur → c'est MA carte qu'il veut, afficher si je la possède
          const showFromCard = isMine ? !!(fromCard) : !!(fromCard && fromCard.owned);
          const showToCard   = isMine ? !!(toCard && toCard.owned) : !!(toCard && toCard.owned);

            accepted: { label:'Échange accepté !', color:'#57f287', icon:'✓',  bg:'rgba(87,242,135,.08)', border:'rgba(87,242,135,.25)' },

            cancelled:{ label:'Annulé',          color:'#96989d', icon:'—',  bg:'rgba(150,152,157,.08)',border:'rgba(150,152,157,.2)' },
          };

                </div>
                <div style="font-size:7px;color:${th.textMuted};text-align:center;">Mystère</div>
              </div>`;
          };

          // Boutons accepter/refuser : seulement si pending ET c'est moi le receveur

    {id:'level',  label:'⭐ Niveau'},

  const sorted = [...data].sort((a,b)=>{

    const wrB = (b.wins+b.losses)>0 ? b.wins/(b.wins+b.losses) : 0;
    const gA  = (a.wins||0)+(a.losses||0);
    const gB  = (b.wins||0)+(b.losses||0);
    if(sort==='wins')   return (b.wins||0)-(a.wins||0) || (b.cards||0)-(a.cards||0);
    if(sort==='wr')     return wrB-wrA || gB-gA;
    if(sort==='games')  return gB-gA || (b.wins||0)-(a.wins||0);
    if(sort==='coins')  return (b.coins||0)-(a.coins||0);
    if(sort==='level')  return (b.xp||0)-(a.xp||0);
    return (b.cards||0)-(a.cards||0) || (b.coins||0)-(a.coins||0); // default: cartes
  });

  const medals = ['🥇','🥈','🥉'];

  return `

        <div style="width:34px;height:34px;background:linear-gradient(135deg,${th.accent},${th.accentAlt});display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #000;box-shadow:2px 2px 0 #000;flex-shrink:0;">🏆</div>
        <div style="flex:1;">
          <div style="font-family:'Luckiest Guy',cursive;font-size:15px;font-weight:400;color:${th.text};letter-spacing:1.5px;">CLASSEMENT</div>
          <div style="font-size:9px;color:${th.textMuted};margin-top:1px;">${period==='week'?'Cette semaine':period==='month'?'Ce mois':'Depuis toujours'} · Trié par ${sortOpts.find(s=>s.id===sort)?.label||'Cartes'}</div>
        </div>
        <button id="lb-close" style="width:30px;height:30px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;">✕</button>
      </div>

      <!-- Period tabs -->
      <div style="display:flex;gap:0;margin:0 16px 8px;background:${th.bgTertiary};border:2px solid #000;padding:3px;flex-shrink:0;">
        ${periodTabs.map(tab=>`
          <button class="lb-tab" data-period="${tab.id}" style="flex:1;padding:5px 4px;font-size:8px;font-weight:800;border:${period===tab.id?'2px solid #000':'2px solid transparent'};background:${period===tab.id?th.bg:'transparent'};color:${period===tab.id?th.text:th.textMuted};cursor:pointer;box-shadow:${period===tab.id?'2px 2px 0 #000':'none'};transition:all .15s;letter-spacing:.3px;text-transform:uppercase;">
            ${tab.label}

      <!-- Sort buttons -->
      <div style="display:flex;gap:4px;margin:0 16px 8px;flex-shrink:0;overflow-x:auto;padding-bottom:2px;">
        ${sortOpts.map(opt=>`
          <button class="lb-sort" data-sort="${opt.id}" style="flex-shrink:0;padding:4px 8px;font-size:8px;font-weight:800;border:2px solid ${sort===opt.id?'#000':th.border};background:${sort===opt.id?th.accent+'22':th.bgTertiary};color:${sort===opt.id?th.accent:th.textMuted};cursor:pointer;white-space:nowrap;letter-spacing:.3px;box-shadow:${sort===opt.id?'1px 1px 0 #000':'none'};transition:all .15s;">
            ${opt.label}
          </button>`).join('')}
      </div>

      <!-- Table header -->
      ${sort==='cards' ? `

      </div>` : `
      <div style="display:grid;grid-template-columns:28px 1fr 36px 36px 36px 36px 36px 36px;gap:2px;padding:5px 16px;flex-shrink:0;border-bottom:2px solid #000;">
        ${['#','Joueur','🃏','⚔️','📊','🎮','<svg width="10" height="10" viewBox="0 0 24 24" fill="#fbbf24"><circle cx="12" cy="12" r="10" opacity=".4"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.5h-2v-1.8c-1.4-.3-2.5-1.3-2.5-2.7h2c0 .6.7 1 1.5 1s1.5-.4 1.5-1c0-.7-.6-1-1.8-1.3C10.1 10.3 9 9.4 9 8c0-1.3 1-2.3 2.5-2.6V3.5h2v1.9c1.3.4 2.2 1.4 2.2 2.6h-2c0-.6-.6-1-1.5-1s-1.4.4-1.4 1c0 .6.5.9 1.7 1.2 1.8.4 3 1.4 3 3 0 1.4-1 2.5-2.5 2.8v1.5z"/></svg>','⭐'].map((h,i)=>`<div style="font-size:8px;font-weight:900;color:${

      <!-- Rows -->
      <div style="flex:1;overflow-y:auto;padding:0 16px 8px;">
        ${loading ? `

            <div style="font-size:12px;font-weight:700;color:${th.text};">Aucune donnée</div>
          </div>` :
          sorted.map((row, i) => {
            const isMe = row.id === myId;
            const medal = medals[i] || '';
            const games = (row.wins||0)+(row.losses||0);
            const wr = games > 0 ? Math.round(row.wins/games*100) : 0;
            const rankColor = i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#f97316':th.textMuted;
            const lvlInfo = computeLevel(row.xp||0);

            const topBg = i===0 ? 'linear-gradient(90deg,rgba(251,191,36,.13) 0%,rgba(251,191,36,.04) 60%,transparent 100%)'
                         : i===1 ? 'linear-gradient(90deg,rgba(148,163,184,.11) 0%,rgba(148,163,184,.03) 60%,transparent 100%)'
                         : i===2 ? 'linear-gradient(90deg,rgba(249,115,22,.11) 0%,rgba(249,115,22,.03) 60%,transparent 100%)'
                         : isMe  ? th.accent+'08' : 'transparent';
            const topBorder = i===0 ? th.accent+'40' : i===1 ? 'rgba(148,163,184,.3)' : i===2 ? 'rgba(249,115,22,.3)' : isMe ? th.accent+'30' : th.border;
            return `
            <div style="display:grid;grid-template-columns:${sort==='cards'?'28px 1fr 24px 24px 24px 24px 36px':'28px 1fr 36px 36px 36px 36px 36px 36px'};gap:2px;padding:7px 0;border-bottom:1px solid ${topBorder};background:${topBg};position:relative;align-items:center;">
              ${isMe?`<div style="position:absolute;left:-16px;top:0;bottom:0;width:3px;background:${th.accent};"></div>`:''}
              <div style="text-align:center;font-size:${medal?'13px':'10px'};font-weight:900;color:${rankColor};">${medal||('#'+(i+1))}</div>
              <div style="display:flex;flex-direction:column;min-width:0;gap:1px;">
                <div style="display:flex;align-items:center;gap:5px;">
                  <div style="width:20px;height:20px;overflow:hidden;background:${th.surface};border:${isMe?'2px solid '+th.accent:'1px solid #000'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                    ${row.avatar_url?`<img src="${row.avatar_url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<span style=\\'font-size:9px;\\'>👤</span>'">`:'<span style="font-size:9px;">👤</span>'}

                  <div style="font-size:10px;font-weight:${isMe?'900':'700'};color:${isMe?th.accent:th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${(row.discord_username||'Joueur').slice(0,11)}${isMe?' ✦':''}</div>
                </div>
              </div>
              ${sort==='cards' ? `
              <div style="text-align:center;font-size:9px;font-weight:600;color:#64748b;" title="Communes">${row.rc_common||0}</div>
              <div style="text-align:center;font-size:9px;font-weight:600;color:#38bdf8;" title="Peu communes">${row.rc_uncommon||0}</div>

              <div style="text-align:center;font-size:9px;font-weight:700;color:#f43f5e;" title="Mythiques">${row.rc_mythic||0}</div>
              <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:10px;font-weight:900;color:#818cf8;">${row.cards||0}</span>
                <span style="font-size:7px;color:${th.textMuted};font-weight:600;">(${row.coll_pct||0}%)</span>
              </div>
              ` : `
              <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <span style="font-size:10px;font-weight:${sort==='cards'?'900':'600'};color:${sort==='cards'?'#818cf8':th.textMuted};">${row.cards||0}</span>
                <span style="font-size:7px;color:${th.textFaint};font-weight:500;">(${row.coll_pct||0}%)</span>
              </div>
              <div style="text-align:center;font-size:10px;font-weight:${sort==='wins'?'900':'600'};color:${sort==='wins'?th.green:th.textMuted};">${row.wins||0}</div>
              <div style="text-align:center;font-size:9px;font-weight:${sort==='wr'?'900':'600'};color:${sort==='wr'?'#fbbf24':th.textMuted};">${wr}%</div>
              <div style="text-align:center;font-size:9px;font-weight:${sort==='games'?'900':'600'};color:${sort==='games'?th.accent:th.textMuted};">${games}</div>
              <div style="text-align:center;font-size:9px;font-weight:${sort==='coins'?'900':'600'};color:${sort==='coins'?'#f59e0b':th.textMuted};">${(row.coins||0)>999?((row.coins/1000).toFixed(1)+'k'):(row.coins||0)}</div>
              <div style="text-align:center;font-size:10px;font-weight:${sort==='level'?'900':'600'};color:${sort==='level'?'#a78bfa':th.textMuted};">Niv ${lvl}</div>
              `}
            </div>`;
          }).join('')
        }
      </div>
    </div>
  </div>`;
}

      progress: (d['dq_'+questId+'_date']===today2) ? (d['dq_'+questId]||0) : 0,
      done:     (d['dq_'+questId+'_done_date']===today2) ? !!d['dq_'+questId+'_done'] : false,

function bindGame(){
  const th = t();

  // Tab nav — touch-friendly, pas de swipe, juste clic/tap direct
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const tab = parseInt(btn.dataset.tab);
      if (tab === state.tab) return; // pas de re-render si même tab
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons — Music : ouvre un popup volume au lieu de muter directement
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click', (e) => {
    e.stopPropagation();
    const existing = document.getElementById('music-vol-popup');
    if(existing){ existing.remove(); return; }

    const rect = btnMusic.getBoundingClientRect();
    const th = t();
    const vol = state.musicVolume ?? 25;
    const on  = state.musicOn;

    const pop = document.createElement('div');
    pop.id = 'music-vol-popup';
    pop.style.cssText = `position:fixed;top:${rect.bottom+6}px;right:${window.innerWidth-rect.right}px;z-index:10002;background:#1a1825;border:2px solid #000;box-shadow:3px 3px 0 #000,0 0 20px rgba(0,0,0,.6);padding:0;min-width:200px;opacity:0;transform:translateY(-6px) scale(.97);transition:opacity .18s,transform .18s;`;

    // Piste en cours
    const track = (_musicTracks && _currentTrackIdx >= 0 && _currentTrackIdx < _musicTracks.length)
      ? _musicTracks[_currentTrackIdx] : null;

    pop.innerHTML = `

  (function setupLbPreviewRotation(){
    const SORTS  = ['cards','wins','level','coins','wr'];
    const LABELS = {cards:'🃏 Cartes',wins:'⚔️ Victoires',level:'⭐ Niveau',coins:'💰 Coins',wr:'📊 Win Rate'};

    // Timer global — une seule instance active à la fois
    if(window._lbPreviewTimer) clearInterval(window._lbPreviewTimer);
    window._lbPreviewIdx = 0;

    function getContainer(){ return document.getElementById('lb-preview-slides'); }

    function applySlide(i){
      const container = getContainer();
      if(!container) return;
      const slides = container.querySelectorAll('.lb-preview-slide');
      const dots   = document.querySelectorAll('.lb-dot');
      const label  = document.getElementById('lb-preview-label-text');
      slides.forEach((s,si)=>{ s.style.display = si===i ? 'flex' : 'none'; });
      dots.forEach((d,di)=>{
        d.style.width  = di===i ? '12px' : '5px';
        d.style.background = di===i ? '#38bdf8' : 'rgba(255,255,255,.15)';
      });
      if(label) label.textContent = LABELS[SORTS[i]];
    }

    function rotate(){
      if(!getContainer()) { clearInterval(window._lbPreviewTimer); window._lbPreviewTimer=null; return; }
      window._lbPreviewIdx = (window._lbPreviewIdx + 1) % SORTS.length;
      applySlide(window._lbPreviewIdx);
    }

    function start(){
      if(window._lbPreviewTimer) clearInterval(window._lbPreviewTimer);
      window._lbPreviewIdx = 0;
      applySlide(0);
      window._lbPreviewTimer = setInterval(rotate, 4500);
    }

    start();
    // Debounce restart — évite les démarrages multiples en rafale lors de setState rapides
    let _restartDebounce = null;
    window._lbPreviewRestart = function(){
      clearTimeout(_restartDebounce);
      _restartDebounce = setTimeout(start, 50);
    };
  })();

        0%,100%{transform:translateY(0) rotate(-.7deg) scale(1);}
        33%{transform:translateY(-12px) rotate(.5deg) scale(1.01);}
        66%{transform:translateY(-5px) rotate(-.3deg) scale(.99);}
      }
      @keyframes boosterIdleLegend{
        0%   {transform:translateY(0) rotate(-1.2deg) scale(1);}
        15%  {transform:translateY(-4px) rotate(1.4deg) scale(1.015);}
        30%  {transform:translateY(-14px) rotate(-1deg) scale(1.02);}
        50%  {transform:translateY(-8px) rotate(1.8deg) scale(1.01);}
        70%  {transform:translateY(-16px) rotate(-1.5deg) scale(1.025);}
        85%  {transform:translateY(-6px) rotate(.8deg) scale(1.01);}
        100% {transform:translateY(0) rotate(-1.2deg) scale(1);}
      }
      @keyframes legendAura{
        0%,100%{opacity:.4;transform:scale(1);}
        50%{opacity:.85;transform:scale(1.06);}
      }
      @keyframes tensionShakePrestige{
        0%,100%{transform:rotate(0);}
        20%{transform:rotate(-1.2deg) scaleX(.993);}
        40%{transform:rotate(1.2deg) scaleX(1.007);}
        60%{transform:rotate(-.9deg);}
        80%{transform:rotate(.7deg);}
      }
      @keyframes tensionShakeLegend{
        0%,100%{transform:rotate(0) scale(1);}
        10%{transform:rotate(-2deg) scale(.992);}
        25%{transform:rotate(2.5deg) scale(1.008);}
        40%{transform:rotate(-2deg) scale(.994);}
        55%{transform:rotate(3deg) scale(1.01);}
        70%{transform:rotate(-1.5deg) scale(.996);}
        85%{transform:rotate(2deg) scale(1.006);}
      }
      /* Flap haut : se replie vers l'arrière et monte */
      @keyframes flapUp{
        0%  {transform:rotateX(0deg) translateY(0);opacity:1;}
        25% {transform:rotateX(-35deg) translateY(-4%);opacity:1;}
        60% {transform:rotateX(-95deg) translateY(-12%);opacity:.85;}
        100%{transform:rotateX(-145deg) translateY(-22%);opacity:0;}
      }
      /* Corps du booster : glisse doucement vers le bas */
      @keyframes tearBodyDrop{
        0%   {transform:translateY(0) scaleX(1);opacity:1;}
        20%  {transform:translateY(0) scaleX(1);opacity:1;}
        65%  {transform:translateY(8%) scaleX(.98);opacity:.9;}
        100% {transform:translateY(26%) scaleX(.96);opacity:0;}
      }
      /* Ligne de déchirure : trait SVG qui se trace de gauche à droite */
      @keyframes tearLineGrow{
        0%  {stroke-dashoffset:var(--tear-len);}
        100%{stroke-dashoffset:0;}
      }
      @keyframes tearLinePulse{
        0%,100%{opacity:.35;transform:scaleX(.3);}
        50%{opacity:.9;transform:scaleX(1);}
      }
      @keyframes tensionShake{
        0%,100%{transform:rotate(0) scaleX(1);}
        20%{transform:rotate(-.6deg) scaleX(.995);}
        40%{transform:rotate(.6deg) scaleX(1.005);}
        60%{transform:rotate(-.4deg) scaleX(.997);}
        80%{transform:rotate(.3deg) scaleX(1.003);}
      }
      @keyframes swipeHintArrow{
        0%,100%{opacity:.5;transform:translateX(0);}
        50%{opacity:1;transform:translateX(8px);}
      }
      @keyframes bgBlurIn{
        from{backdrop-filter:blur(0px);background:rgba(0,0,0,0);}
        to{backdrop-filter:blur(16px);background:rgba(4,8,18,.88);}
      }
      @keyframes cardFanOut{
        0%  {opacity:0;transform:var(--cf-start);}
        30% {opacity:.9;}
        100%{opacity:1;transform:var(--cf-end);}
      }
      @keyframes cardFanFade{
        0%,65%{opacity:1;}
        100%{opacity:0;}
      }
    </style>
  </div>`;
}

// ─── PIOCHE MECHANIC ──────────────────────────────────────────────
function renderPiocheMechanic(th){
  const TOTAL=50, GAP=4, PAD=12;
  const COLS=7;
  const ROWS=Math.ceil(TOTAL/COLS);
  const headerH=80;
  const availH=window.innerHeight-headerH-PAD*2-GAP*(ROWS-1);
  const availW=Math.min(window.innerWidth,720)-PAD*2;
  let CW=Math.floor((availW-GAP*(COLS-1))/COLS);
  const CH=Math.round(CW*1.43);
  return `
  <div id="pioche-overlay" style="position:absolute;inset:0;z-index:200;background:rgba(4,8,18,.97);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:${PAD}px;overflow:hidden;">
    <!-- Barre accent violette -->
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a78bfa,#818cf8,#6366f1);flex-shrink:0;z-index:1;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:680px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:#e8f4ff;letter-spacing:2px;text-transform:uppercase;">Pioche Classique</div>
        <span style="font-size:7px;font-weight:900;color:#a78bfa;background:#a78bfa14;border:1px solid #a78bfa35;padding:2px 7px;letter-spacing:.6px;">1× PAR JOUR</span>
      </div>
      <button id="pioche-close" style="width:32px;height:32px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#5e7d9a;display:flex;align-items:center;justify-content:center;cursor:pointer;">${SVG.x}</button>
    </div>
    <div style="font-size:10px;color:#5e7d9a;text-align:center;letter-spacing:1px;flex-shrink:0;">${state.piocheChosen===null?"✦ Choisissez une carte face cachée ✦":"Retournement en cours…"}</div>
    ${!state.piocheResult?`
    <div style="position:relative;width:${CW*COLS+GAP*(COLS-1)}px;height:${CH*ROWS+GAP*(ROWS-1)}px;flex-shrink:0;margin:0 auto;">
      ${Array.from({length:TOTAL},(_,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const rot=(((i*37+13)%20)-10)*0.5;
        const isChosen=state.piocheChosen===i;
        const isFlipped=state.piocheFlipped[i];
        return `<div class="pioche-card" data-idx="${i}" style="position:absolute;left:${col*(CW+GAP)}px;top:${row*(CH+GAP)}px;width:${CW}px;height:${CH}px;cursor:${state.piocheChosen===null?'pointer':'default'};perspective:300px;">
          <div style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:${isFlipped?'rotateY(180deg)':`rotate(${rot}deg)`};transition:transform .6s ease;">
            <div style="position:absolute;inset:0;backface-visibility:hidden;border:1px solid ${isChosen?'#5865f2':'rgba(255,255,255,.12)'};overflow:hidden;box-shadow:${isChosen?'0 0 16px #5865f280':'none'};transform:${isChosen?'scale(1.1)':'scale(1)'};transition:all .2s;">
              <img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:cover;display:block;opacity:${isChosen?1:.8};filter:${isChosen?'brightness(1.1)':'none'};" />
              ${isChosen?'<div style="position:absolute;inset:0;background:rgba(88,101,242,.25);"></div>':''}
            </div>
            <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#5865f230,#eb459e20);border:1px solid #5865f260;display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    ${state.piocheResult?`
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:110px;aspect-ratio:2/3;background:linear-gradient(160deg,${state.piocheResult.color}30,#2b2d31);border:2px solid ${state.piocheResult.color}80;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px ${state.piocheResult.color}50;">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,${state.piocheResult.color}30,${state.piocheResult.color}10);">🃏</div>
        <div style="padding:6px 8px;background:#2b2d31;">
          <div style="font-family:'Bangers',cursive;font-size:9px;font-weight:700;color:#f2f3f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.piocheResult.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:2px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]}</div>
        </div>
      </div>
      <!-- Badge : nouvelle ou déjà possédée -->
      <div style="display:flex;align-items:center;gap:6px;padding:6px 16px;background:${state.piocheResult.owned?'rgba(251,191,36,.12)':'rgba(34,197,94,.12)'};border:1.5px solid ${state.piocheResult.owned?'rgba(251,191,36,.4)':'rgba(34,197,94,.4)'};">
        <span style="font-size:14px;">${state.piocheResult.owned?'♻️':'✨'}</span>
        <div>
          <div style="font-size:10px;font-weight:900;color:${state.piocheResult.owned?'#fbbf24':'#22c55e'};letter-spacing:.5px;">${state.piocheResult.owned?'DÉJÀ POSSÉDÉE':'NOUVELLE CARTE !'}</div>
          <div style="font-size:9px;color:#8a9ab5;margin-top:1px;">${state.piocheResult.owned?'Sera ajoutée à tes doublons':'Première fois dans ta collection'}</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Bangers',cursive;font-size:15px;font-weight:700;color:#f2f3f5;">${state.piocheResult.name}</div>
        <div style="font-size:11px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:3px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]} · ${state.piocheResult.type}</div>
      </div>
      <button id="pioche-collect" style="padding:10px 28px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 20px rgba(56,189,248,.3);">AJOUTER À LA COLLECTION</button>
    </div>`:''}
  </div>`;
}

        <div style="flex:1;">
          <div style="font-family:'Bangers',cursive;font-size:16px;font-weight:700;color:${th.text};letter-spacing:1.5px;">CLASSEMENT</div>

        <button id="lb-close" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;">✕</button>

        ${['#','Joueur','Victoires','Win Rate','Coins'].map(h=>`<div style="font-size:8px;font-weight:900;color:${th.textMuted};letter-spacing:.6px;text-transform:uppercase;${h==='Joueur'?'':'text-align:center;'}">${h}</div>`).join('')}

      <!-- Rows -->
      <div style="flex:1;overflow-y:auto;padding:0 16px 8px;">

          <div style="display:flex;align-items:center;justify-content:center;padding:40px 0;gap:10px;">

              <div style="text-align:center;font-size:${medal?'14px':'11px'};font-weight:900;color:${rankColor};">${medal||('#'+(i+1))}</div>
              <div style="display:flex;align-items:center;gap:7px;min-width:0;">
                <div style="width:26px;height:26px;overflow:hidden;background:${th.surface};border:${isMe?'2px solid '+th.accent:'1px solid #000'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                  ${row.avatar_url?`<img src="${row.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:12px;">👤</span>'}

              </div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.green};">${row.wins}</div>
              <div style="text-align:center;font-size:12px;font-weight:900;color:${th.yellow};">${wr}%</div>
              <div style="text-align:center;font-size:10px;font-weight:900;color:${th.accent};">${(row.coins||0).toLocaleString('fr-FR')}</div>
            </div>`;
          }).join('')
        }
      </div>
    </div>
  </div>`;
}

// ─── BIND EVENTS ──────────────────────────────────────────────────
function bindGame(){
  const th = t();

  // Tab nav — touch-friendly, pas de swipe, juste clic/tap direct
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const tab = parseInt(btn.dataset.tab);
      if (tab === state.tab) return; // pas de re-render si même tab
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons — Music : ouvre un popup volume au lieu de muter directement
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click', (e) => {
    e.stopPropagation();
    const existing = document.getElementById('music-vol-popup');
    if(existing){ existing.remove(); return; }

    const rect = btnMusic.getBoundingClientRect();
    const th = t();
    const vol = state.musicVolume ?? 25;
    const on  = state.musicOn;

    const pop = document.createElement('div');
    pop.id = 'music-vol-popup';
    pop.style.cssText = `position:fixed;top:${rect.bottom+6}px;right:${window.innerWidth-rect.right}px;z-index:10002;background:#1a1825;border:2px solid #000;box-shadow:3px 3px 0 #000,0 0 20px rgba(0,0,0,.6);padding:0;min-width:200px;opacity:0;transform:translateY(-6px) scale(.97);transition:opacity .18s,transform .18s;`;

    pop.innerHTML = `
      <div style="height:2px;background:linear-gradient(90deg,#fbbf24,#f59e0b);"></div>
      <div style="padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.6);">
        <div style="font-size:8px;color:#9d8ea0;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px;">🎵 Musique Ambiante</div>
        <!-- Toggle ON/OFF -->
        <button id="music-toggle-btn" onclick="window._toggleMusicFromPopup()" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:${on?'rgba(251,191,36,.12)':'rgba(255,255,255,.04)'};border:1px solid ${on?'rgba(251,191,36,.3)':'rgba(255,255,255,.08)'};color:${on?'#fbbf24':'#9d8ea0'};cursor:pointer;font-size:10px;font-weight:900;letter-spacing:.5px;transition:all .15s;">
          <span>${on ? '▶ EN LECTURE' : '⏸ EN PAUSE'}</span>
          <span style="font-size:14px;">${on ? '🔊' : '🔇'}</span>
        </button>
      </div>
      <!-- Volume slider -->
      <div style="padding:12px 12px 10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:8px;color:#9d8ea0;text-transform:uppercase;letter-spacing:1px;font-weight:700;">Volume</span>
          <span id="music-vol-label" style="font-size:10px;font-weight:900;color:#fbbf24;min-width:32px;text-align:right;">${vol}%</span>
        </div>
        <!-- Icônes + slider -->
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;opacity:.5;">🔈</span>
          <div style="flex:1;position:relative;height:20px;display:flex;align-items:center;">
            <input id="music-vol-slider" type="range" min="0" max="100" value="${vol}"
              oninput="window._previewMusicVolume(this.value)"
              onchange="window._applyMusicVolume(this.value)"
              style="width:100%;-webkit-appearance:none;appearance:none;height:4px;background:linear-gradient(90deg,#fbbf24 ${vol}%,rgba(255,255,255,.1) ${vol}%);outline:none;border:none;cursor:pointer;accent-color:#fbbf24;">
          </div>
          <span style="font-size:11px;opacity:.8;">🔊</span>
        </div>
        <!-- Presets rapides -->
        <div style="display:flex;gap:4px;margin-top:10px;">
          ${[0,25,50,75,100].map(v=>`<button onclick="window._applyMusicVolume(${v})" style="flex:1;padding:4px 0;background:${vol===v?'rgba(251,191,36,.2)':'rgba(255,255,255,.04)'};border:1px solid ${vol===v?'rgba(251,191,36,.4)':'rgba(255,255,255,.07)'};color:${vol===v?'#fbbf24':'#9d8ea0'};font-size:9px;font-weight:700;cursor:pointer;">${v}%</button>`).join('')}
        </div>
      </div>
    `;

    document.body.appendChild(pop);
    requestAnimationFrame(()=>{ pop.style.opacity='1'; pop.style.transform='translateY(0) scale(1)'; });

    // Fermer si on clique ailleurs
    const closeVol = (ev) => { if(!pop.contains(ev.target) && ev.target !== btnMusic){ pop.remove(); document.removeEventListener('click', closeVol); } };
    setTimeout(()=>document.addEventListener('click', closeVol), 50);
  });

  // Helpers exposés globalement pour les handlers inline du popup volume
  window._toggleMusicFromPopup = function() {
    audioToggle();
    const nowOn = !state.musicOn;
    setState({ musicOn: nowOn });
    // Mettre à jour le bouton dans le popup sans le fermer
    const btn = document.getElementById('music-toggle-btn');
    if(btn){ btn.innerHTML = `<span>${nowOn ? '▶ EN LECTURE' : '⏸ EN PAUSE'}</span><span style="font-size:14px;">${nowOn ? '🔊' : '🔇'}</span>`; btn.style.background = nowOn?'rgba(251,191,36,.12)':'rgba(255,255,255,.04)'; btn.style.borderColor = nowOn?'rgba(251,191,36,.3)':'rgba(255,255,255,.08)'; btn.style.color = nowOn?'#fbbf24':'#9d8ea0'; }
  };
  window._previewMusicVolume = function(val) {
    const v = parseInt(val);
    const label = document.getElementById('music-vol-label');
    if(label) label.textContent = v + '%';
    // Mettre à jour la couleur du track
    const slider = document.getElementById('music-vol-slider');
    if(slider) slider.style.background = `linear-gradient(90deg,#fbbf24 ${v}%,rgba(255,255,255,.1) ${v}%)`;
    if(_ytPlayer && _ytPlayer.setVolume){ try{ _ytPlayer.setVolume(v); }catch(e){} }
  };
  window._applyMusicVolume = function(val) {
    const v = parseInt(val);
    state.musicVolume = v;
    if(_ytPlayer && _ytPlayer.setVolume){ try{ _ytPlayer.setVolume(v); }catch(e){} }
    // Mettre à jour le slider + label si popup encore ouverte
    const slider = document.getElementById('music-vol-slider');
    const label  = document.getElementById('music-vol-label');
    if(slider){ slider.value = v; slider.style.background = `linear-gradient(90deg,#fbbf24 ${v}%,rgba(255,255,255,.1) ${v}%)`; }
    if(label) label.textContent = v + '%';
    // Mettre à jour les presets
    const pop = document.getElementById('music-vol-popup');

  // Boosters
  // ── Synthèse sonore Web Audio (déchirure + ouverture) ──────────────
  function playTearSound(tier) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Bruit blanc filtré → son de déchirure
      function tearNoise(startT, dur, vol, hifreq) {
        const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
        const d = buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.setValueAtTime(hifreq, ctx.currentTime);
        filt.Q.value = 0.8;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
        src.start(ctx.currentTime + startT);
        src.stop(ctx.currentTime + startT + dur + 0.05);
      }
      // Thump grave = impact d'ouverture
      function thump(startT, freq, dur, vol) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq * 2.2, ctx.currentTime + startT);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + startT + dur * 0.6);
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + startT);
        osc.stop(ctx.currentTime + startT + dur + 0.05);
      }
      // Shimmer haute fréquence (légendaire)
      function shimmer(startT, freq, dur, vol) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + startT);
        osc.frequency.linearRampToValueAtTime(freq * 1.5, ctx.currentTime + startT + dur);
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + startT);
        osc.stop(ctx.currentTime + startT + dur + 0.05);
      }
      if(tier === 1) {
        // Normal : déchirure courte, thump léger
        tearNoise(0,    0.18, 0.55, 2200);
        tearNoise(0.05, 0.14, 0.35, 3800);
        thump(0.14, 90, 0.22, 0.5);
      } else if(tier === 2) {
        // Prestige : déchirure plus longue, thump plus profond
        tearNoise(0,    0.22, 0.75, 1800);
        tearNoise(0.04, 0.18, 0.55, 3200);
        tearNoise(0.12, 0.12, 0.4,  5000);
        thump(0.18, 70, 0.30, 0.75);
        shimmer(0.22, 800, 0.35, 0.15);
      } else {
        // Légendaire : déchirure lente et puissante, thump grave, shimmer épique
        tearNoise(0,    0.35, 1.1,  1200);
        tearNoise(0.06, 0.28, 0.85, 2500);
        tearNoise(0.15, 0.22, 0.65, 4500);
        tearNoise(0.28, 0.18, 0.5,  7000);
        thump(0.28, 55, 0.45, 1.0);
        thump(0.32, 110, 0.35, 0.5);
        shimmer(0.35, 600, 0.55, 0.22);
        shimmer(0.42, 1200, 0.45, 0.18);
      }
    } catch(e){}
  }

  // ── Animation d'ouverture booster — Phase 1 : focus + Phase 2 : déchirure par le haut ──
  function triggerBoosterOpen(bid, color, imgSrc, href) {
    if(document.getElementById('booster-focus-overlay')) return;

    // Fade out musique progressif
    (function fadeOutMusic(){
      if(!_ytPlayer || !audioPlaying) return;
      let vol = typeof state.musicVolume === 'number' ? state.musicVolume : 60;
      try { vol = _ytPlayer.getVolume ? _ytPlayer.getVolume() : vol; } catch(e){}
      let step = 0;
      const interval = setInterval(()=>{
        step++;
        const newVol = Math.max(0, vol - step * (vol / 18));
        try { _ytPlayer.setVolume(newVol); } catch(e){}
        if(newVol <= 0){ clearInterval(interval); try{ _ytPlayer.pauseVideo(); }catch(e){} }
      }, 50);
    })();

    const centralImg = document.querySelector('.booster-img.open-booster[data-bid="'+bid+'"]');
    if(!centralImg){ window.location.href = href; return; }
    const rect = centralImg.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    const vw = window.innerWidth, vh = window.innerHeight;

    // Tier : 1=Normal, 2=Prestige, 3=Légendaire
    const tier = bid; // bid 1/2/3 correspond directement

    // Paramètres selon le tier
    const tierCfg = {
      1: { sizeRatio:.78, maxW:330, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdle 2.4s ease-in-out .45s infinite',
           tensionAnim:'tensionShake .20s ease both', tensionDur:210, tearDur:820, totalDur:2400,
           flapSpeed:'.72s', bottomSpeed:'.72s', auraColor:'rgba(156,163,175,.10)' },
      2: { sizeRatio:.80, maxW:345, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdlePrestige 2.0s ease-in-out .45s infinite',
           tensionAnim:'tensionShakePrestige .28s ease both', tensionDur:240, tearDur:920, totalDur:2600,
           flapSpeed:'.85s', bottomSpeed:'.85s', auraColor:'rgba(205,127,50,.14)' },
      3: { sizeRatio:.82, maxW:360, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdleLegend 1.6s ease-in-out .45s infinite',
           tensionAnim:'tensionShakeLegend .38s ease both', tensionDur:300, tearDur:1150, totalDur:3000,
           flapSpeed:'1.05s', bottomSpeed:'1.05s', auraColor:'rgba(240,192,96,.20)' },
    }[tier] || {};

    const targetW = Math.min(vw * tierCfg.sizeRatio, tierCfg.maxW);
    const targetH = targetW * (h / w);
    const targetX = (vw - targetW) / 2;
    const targetY = (vh - targetH) / 2 - vh * .04;

    // ── Overlay principal ──
    const overlay = document.createElement('div');
    overlay.id = 'booster-focus-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;animation:bgBlurIn .38s ease both;backdrop-filter:blur(16px);background:rgba(4,8,18,.90);user-select:none;';

    // Aura de fond spécifique au tier
    const aura = document.createElement('div');
    aura.style.cssText = `position:absolute;left:${targetX - targetW*.25}px;top:${targetY - targetH*.1}px;`
      +`width:${targetW*1.5}px;height:${targetH*1.2}px;`
      +`background:radial-gradient(ellipse at center,${tierCfg.auraColor} 0%,transparent 70%);`
      +`animation:legendAura ${tier===3?'1.4':'2.0'}s ease-in-out infinite;pointer-events:none;`;
    overlay.appendChild(aura);

    // ── Wrapper booster ──
    const boosterWrap = document.createElement('div');
    boosterWrap.id = 'booster-focus-wrap';
    boosterWrap.style.cssText = `position:absolute;left:${targetX}px;top:${targetY}px;width:${targetW}px;height:${targetH}px;perspective:900px;transform-style:preserve-3d;`;

    const boosterImg = document.createElement('img');
    boosterImg.src = imgSrc;
    boosterImg.draggable = false;
    boosterImg.addEventListener('dragstart', e => e.preventDefault());
    boosterImg.style.cssText = `width:100%;height:100%;object-fit:contain;display:block;`
      +`filter:drop-shadow(0 0 ${tier===3?'38px':'24px'} ${color}${tier===3?'b0':'80'}) drop-shadow(0 16px 44px rgba(0,0,0,.75));`
      +`animation:${tierCfg.idleAnim};user-select:none;-webkit-user-drag:none;`;

    // Ligne de couture
    const seamLine = document.createElement('div');
    const seamThick = tier===3 ? '3px' : tier===2 ? '2px' : '2px';
    const seamOpacity = tier===3 ? 'cc' : tier===2 ? 'aa' : '80';
    seamLine.style.cssText = `position:absolute;top:13%;left:6%;right:6%;height:${seamThick};`
      +`background:linear-gradient(90deg,transparent,${color}${seamOpacity},rgba(255,255,255,.7),${color}${seamOpacity},transparent);`
      +`animation:tearLinePulse ${tier===3?'1.1s':'1.8s'} ease-in-out infinite;pointer-events:none;`;

    // Hint horizontal
    const hint = document.createElement('div');
    hint.style.cssText = `position:absolute;top:calc(13% - 30px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;pointer-events:none;white-space:nowrap;`;
    hint.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" style="animation:swipeHintArrow 1.4s ease-in-out infinite;filter:drop-shadow(0 0 5px ${color});transform:scaleX(-1);"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      <div style="font-size:${tier===3?'10px':'9px'};font-weight:900;color:${color};letter-spacing:${tier===3?'2.5px':'1.8px'};text-shadow:0 0 10px ${color};">${tier===3?'⚡ DÉCHIRER ⚡':'DÉCHIRER'}</div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" style="animation:swipeHintArrow 1.4s ease-in-out .15s infinite;filter:drop-shadow(0 0 5px ${color});"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>`;

    const tapHint = document.createElement('div');
    // Positionné en fixed juste sous le bas du PNG, pas dans le boosterWrap
    const tapHintTop = targetY + targetH + 14;
    tapHint.style.cssText = `position:fixed;top:${tapHintTop}px;left:${targetX}px;width:${targetW}px;`
      +`text-align:center;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.8px;white-space:nowrap;pointer-events:none;`;
    tapHint.textContent = 'Glisse sur la couture · ou tape';

    boosterWrap.appendChild(boosterImg);
    boosterWrap.appendChild(seamLine);
    boosterWrap.appendChild(hint);
    overlay.appendChild(boosterWrap);
    overlay.appendChild(tapHint);

    // ── Bouton Annuler ──
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = '✕ Annuler';
    cancelBtn.style.cssText = `position:absolute;bottom:6%;left:50%;transform:translateX(-50%);`
      +`padding:8px 24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);`
      +`color:rgba(255,255,255,.45);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1.2px;`
      +`cursor:pointer;transition:background .18s,color .18s;z-index:10;`;
    cancelBtn.addEventListener('mouseenter', ()=>{
      cancelBtn.style.background='rgba(255,255,255,.12)';
      cancelBtn.style.color='rgba(255,255,255,.8)';
    });
    cancelBtn.addEventListener('mouseleave', ()=>{
      cancelBtn.style.background='rgba(255,255,255,.06)';
      cancelBtn.style.color='rgba(255,255,255,.45)';
    });
    function closeOverlaySoft() {
      overlay.style.transition = 'opacity .32s ease';
      overlay.style.opacity = '0';
      setTimeout(()=>overlay.remove(), 340);
    }
    cancelBtn.addEventListener('click', e=>{
      e.stopPropagation();
      closeOverlaySoft();
    });
    overlay.appendChild(cancelBtn);

    // ── Lueur sur le PNG via canvas overlay — active UNIQUEMENT pendant le déchirement ──
    // Un canvas transparent positionné par-dessus le PNG, visible seulement après doTear()
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width  = targetW;
    glowCanvas.height = targetH;
    glowCanvas.style.cssText = `position:absolute;left:0;top:0;width:${targetW}px;height:${targetH}px;`
      +`pointer-events:none;opacity:0;transition:opacity .15s;z-index:5;mix-blend-mode:screen;`;
    boosterWrap.appendChild(glowCanvas);
    const glowCtx = glowCanvas.getContext('2d');

    // Dessine un trait de déchirure lumineux — ellipse fine et allongée horizontalement
    function drawTearGlow(rx, ry) {
      glowCtx.clearRect(0, 0, targetW, targetH);
      // Dimensions : large horizontalement, très fine verticalement
      const ellipseW = targetW * 0.52;  // demi-axe horizontal
      const ellipseH = targetH * 0.028; // demi-axe vertical (trait fin)
      glowCtx.save();
      glowCtx.translate(rx, ry);
      // Étirer l'espace pour dessiner un gradient radial circulaire puis l'aplatir
      glowCtx.scale(1, ellipseH / ellipseW);
      const grad = glowCtx.createRadialGradient(0, 0, 0, 0, 0, ellipseW);
      grad.addColorStop(0,    'rgba(255,255,255,0.92)');
      grad.addColorStop(0.12, 'rgba(255,255,255,0.60)');
      grad.addColorStop(0.30, color + 'cc');
      grad.addColorStop(0.60, color + '44');
      grad.addColorStop(1,    'rgba(0,0,0,0)');
      glowCtx.fillStyle = grad;
      glowCtx.beginPath();
      glowCtx.arc(0, 0, ellipseW, 0, Math.PI * 2);
      glowCtx.fill();
      glowCtx.restore();
    }

    // Convertit position écran → coordonnées relatives au PNG
    function screenToBooster(cx, cy) {
      return { rx: cx - targetX, ry: cy - targetY };
    }

    // Lueur inactive au départ — s'active uniquement lors du début du déchirement
    let _glowActive = false;

    function moveTearGlow(cx, cy) {
      if(!_glowActive) return;
      const {rx, ry} = screenToBooster(cx, cy);
      const onPng = rx >= 0 && rx <= targetW && ry >= 0 && ry <= targetH;
      if(onPng) {
        const clampedRx = Math.max(0, Math.min(targetW, rx));
        const clampedRy = Math.max(0, Math.min(targetH * 0.45, ry));
        drawTearGlow(clampedRx, clampedRy);
      }
    }

    function startGlow(cx, cy) {
      if(_glowActive) return;
      _glowActive = true;
      glowCanvas.style.opacity = '1';
      moveTearGlow(cx, cy);
    }

    overlay.addEventListener('mousemove', e => moveTearGlow(e.clientX, e.clientY), {passive:true});
    overlay.addEventListener('touchmove', e => {
      const t = e.touches[0];
      moveTearGlow(t.clientX, t.clientY);
    }, {passive:true});

    document.body.appendChild(overlay);

    if(navigator.vibrate) navigator.vibrate(tier===3 ? [20,30,20] : [18]);

    // ── Phase 2 : déchirure ──
    function doTear() {
      if(overlay._tearing) return;
      overlay._tearing = true;
      cancelBtn.style.display = 'none';

      // Tension
      boosterImg.style.animation = tierCfg.tensionAnim;
      if(navigator.vibrate) navigator.vibrate(tier===3 ? [18,60,30,80,40] : tier===2 ? [14,50,28] : [12,40,22]);

      setTimeout(()=>{
        playTearSound(tier);
        glowCanvas.style.opacity = '0';
        seamLine.style.display = 'none';
        hint.style.display = 'none';
        tapHint.style.display = 'none';
        aura.style.display = 'none';

        const bW = targetW, bH = targetH;
        const bX = targetX, bY = targetY;
        const flapH = Math.round(bH * .20);

        // ── Profil de déchirure irrégulier ──
        const zigAmp = tier===3 ? flapH * 0.38 : tier===2 ? flapH * 0.26 : flapH * 0.18;
        const steps  = tier===3 ? 28 : tier===2 ? 20 : 14;
        function makeTearProfile() {
          const pts = [];
          for (let i = 0; i <= steps; i++) {
            const x = i / steps;
            const wave1 = Math.sin(x * Math.PI * (tier===3 ? 5.8 : tier===2 ? 4.2 : 3.0) + 0.7) * zigAmp * 0.6;
            const wave2 = Math.sin(x * Math.PI * (tier===3 ? 11.3 : tier===2 ? 7.8 : 5.5) + 2.1) * zigAmp * 0.4;
            const wave3 = tier===3 ? Math.sin(x * Math.PI * 17.6 + 1.3) * zigAmp * 0.15 : 0;
            pts.push({ x: x * bW, y: flapH + wave1 + wave2 + wave3 });
          }
          return pts;
        }
        const tearProfile = makeTearProfile();

        // ── clip-path : le front de déchirure avance de gauche à droite ──
        // La "fente" suit exactement le profil ; à droite du front = coupure nette à flapH
        function buildClipFlap(revealW) {
          // Forme : rectangle haut complet → descend le long du profil jusqu'au front → ligne droite à flapH jusqu'à droite → coin haut droit
          const revealed = tearProfile.filter(p => p.x <= revealW);
          const frontY   = revealed.length ? revealed[revealed.length - 1].y : flapH;
          // Polygon : bord haut → droit en haut → droit à flapH → front de coupure → remonte le profil de droite à gauche → gauche bas
          let pts = [`0px 0px`, `${bW}px 0px`, `${bW}px ${flapH}px`];
          // Partie droite pas encore déchirée (ligne droite à flapH)
          pts.push(`${revealW.toFixed(1)}px ${flapH}px`);
          // Retour le long du profil déjà tracé (de droite à gauche)
          for (let i = revealed.length - 1; i >= 0; i--) {
            pts.push(`${revealed[i].x.toFixed(1)}px ${revealed[i].y.toFixed(1)}px`);
          }
          pts.push(`0px ${flapH}px`);
          return `polygon(${pts.join(', ')})`;
        }
        function buildClipBody(revealW) {
          const revealed = tearProfile.filter(p => p.x <= revealW);
          // Polygon : gauche bas → droit bas → droit haut (flapH) → front de coupure (ligne droite) → profil tracé
          let pts = [`0px 100%`, `${bW}px 100%`, `${bW}px ${flapH}px`];
          pts.push(`${revealW.toFixed(1)}px ${flapH}px`);
          for (let i = revealed.length - 1; i >= 0; i--) {
            pts.push(`${revealed[i].x.toFixed(1)}px ${revealed[i].y.toFixed(1)}px`);
          }
          pts.push(`0px ${flapH}px`);
          return `polygon(${pts.join(', ')})`;
        }

        // ── Durées selon tier ──
        const tearDurMs  = tier===3 ? 820  : tier===2 ? 600  : 440;  // durée du tracé
        const glowWidth  = tier===3 ? 18   : tier===2 ? 12   : 8;
        const glowOp     = tier===3 ? 0.95 : tier===2 ? 0.75 : 0.55;
        // Durée du fade de la lueur après fin du tracé
        const glowFadeMs = tier===3 ? 180  : tier===2 ? 140  : 100;
        // Délai avant que flap/body commencent à bouger (après fin du tracé)
        const physDelayMs = tier===3 ? 60  : tier===2 ? 50  : 40;

        // ── SVG lueur sur la fente ──
        const fenteSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        fenteSvg.setAttribute('width', bW);
        fenteSvg.setAttribute('height', bH);
        fenteSvg.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;pointer-events:none;overflow:visible;z-index:20;`;
        const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
        const gradId = 'tearGrad_' + Date.now();
        const grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
        grad.setAttribute('id', gradId);
        grad.setAttribute('x1','0%'); grad.setAttribute('y1','0%');
        grad.setAttribute('x2','100%'); grad.setAttribute('y2','0%');
        [['0%',0],['50%',glowOp],['100%',0]].forEach(([off, op]) => {
          const s = document.createElementNS('http://www.w3.org/2000/svg','stop');
          s.setAttribute('offset', off);
          s.setAttribute('stop-color', color);
          s.setAttribute('stop-opacity', String(op));
          grad.appendChild(s);
        });
        defs.appendChild(grad);
        fenteSvg.appendChild(defs);
        const fenteGlow = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        fenteGlow.setAttribute('fill','none');
        fenteGlow.setAttribute('stroke', `url(#${gradId})`);
        fenteGlow.setAttribute('stroke-width', String(glowWidth));
        fenteGlow.setAttribute('stroke-linecap','round');
        fenteGlow.setAttribute('stroke-linejoin','round');
        fenteGlow.style.cssText = `filter:blur(${tier===3?'4px':tier===2?'3px':'2px'});opacity:0;transition:opacity ${glowFadeMs}ms ease;`;
        fenteSvg.appendChild(fenteGlow);
        overlay.appendChild(fenteSvg);

        // ── Flap (haut) + Body (bas) — commencent full-image, clippath réduit au fil du tracé ──
        boosterImg.style.opacity = '0';

        const flap = document.createElement('div');
        flap.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;width:${bW}px;height:${bH}px;pointer-events:none;will-change:clip-path,transform,opacity;`;
        const fi = document.createElement('img');
        fi.src = imgSrc; fi.draggable = false;
        fi.style.cssText = `position:absolute;left:0;top:0;width:${bW}px;height:${bH}px;object-fit:contain;`;
        flap.appendChild(fi); overlay.appendChild(flap);

        const body = document.createElement('div');
        body.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;width:${bW}px;height:${bH}px;pointer-events:none;will-change:clip-path,transform,opacity;`;
        const bi = document.createElement('img');
        bi.src = imgSrc; bi.draggable = false;
        bi.style.cssText = `position:absolute;left:0;top:0;width:${bW}px;height:${bH}px;object-fit:contain;`;
        body.appendChild(bi); overlay.appendChild(body);

        // Initialiser les clips (flap couvre tout en haut, body tout en bas)
        flap.style.clipPath = buildClipFlap(0);
        body.style.clipPath = buildClipBody(0);

        // ── Easing ──
        function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

        // ── RAF : Phase 1 — tracé progressif de gauche à droite ──
        const startTs = performance.now();

        function animTear(ts) {
          const elapsed = ts - startTs;
          const raw = Math.min(elapsed / tearDurMs, 1);
          const progress = easeInOut(raw);
          const revealW = progress * bW;

          // Clip-path suit le front de déchirure
          flap.style.clipPath = buildClipFlap(revealW);
          body.style.clipPath = buildClipBody(revealW);

          // Lueur suit le front (polyline des points déjà tracés)
          if (raw > 0.01) {
            fenteGlow.style.opacity = '1';
            const revealed = tearProfile.filter(p => p.x <= revealW);
            if (revealed.length >= 2) {
              fenteGlow.setAttribute('points',
                revealed.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
              );
            }
          }

          if (raw < 1) {
            requestAnimationFrame(animTear);
          } else {
            // ── Phase 2 : tracé terminé → fade rapide de la lueur + séparation physique ──
            fenteGlow.style.opacity = '0'; // CSS transition glowFadeMs

            setTimeout(()=>{
              // Flap se soulève et disparaît
              flap.style.transition = `transform ${tierCfg.flapSpeed} cubic-bezier(.4,0,.2,1), opacity ${tierCfg.flapSpeed} ease`;
              body.style.transition = `transform ${tierCfg.bottomSpeed} cubic-bezier(.4,0,.2,1), opacity ${tierCfg.bottomSpeed} ease`;
              flap.style.transformOrigin = `center ${flapH}px`;
              flap.style.transform = tier===3
                ? 'perspective(600px) rotateX(-160deg) translateY(-25%) scaleY(.85)'
                : tier===2
                ? 'perspective(600px) rotateX(-140deg) translateY(-20%)'
                : 'perspective(400px) rotateX(-120deg) translateY(-16%)';
              flap.style.opacity = '0';
              body.style.transform = tier===3
                ? 'translateY(30%) scaleX(.94)'
                : tier===2
                ? 'translateY(24%) scaleX(.96)'
                : 'translateY(20%) scaleX(.97)';
              body.style.opacity = '0';

              // Cartes éparpillées
              if(navigator.vibrate) navigator.vibrate(tier===3?[0,80,30,50,20,40,15]:[0,60,25,30,15]);
              const cardSrc = 'https://i.goopics.net/iic46c.png';
              const cardCount = 5;
              const cardW = Math.round(bW * (tier===3?.30:.28));
              const cardH = Math.round(cardW * 1.4);
              const cardPositions = [
                { dx:-bW*.50, dy: bH*.20, rot:-30, delay:.10, scale:.85 },
                { dx:-bW*.25, dy:-bH*.10, rot:-12, delay:.16, scale:.93 },
                { dx:-bW*.05, dy: bH*.24, rot:  2, delay:.13, scale:1.0 },
                { dx: bW*.20, dy:-bH*.06, rot: 14, delay:.19, scale:.91 },
                { dx: bW*.48, dy: bH*.16, rot: 30, delay:.09, scale:.86 },
              ].slice(0, cardCount);
              const cxCenter = bX + bW/2;
              const cyCenter = bY + flapH + cardH * .3;
              cardPositions.forEach((c) => {
                const cd = document.createElement('div');
                const startT = `translateX(0px) translateY(${-bH*.15}px) rotate(0deg) scale(.25)`;
                const endT   = `translateX(${c.dx}px) translateY(${c.dy}px) rotate(${c.rot}deg) scale(${c.scale})`;
                cd.style.cssText = `position:absolute;left:${cxCenter - cardW/2}px;top:${cyCenter - cardH/2}px;`
                  +`width:${cardW}px;height:${cardH}px;`
                  +`--cf-start:${startT};--cf-end:${endT};`
                  +`animation:cardFanOut .55s cubic-bezier(.22,.68,0,1.25) ${c.delay+.15}s both, cardFanFade .9s ease ${c.delay+.70}s both;`
                  +`pointer-events:none;box-shadow:0 6px 22px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.14);`;
                const ci = document.createElement('img');
                ci.src = cardSrc;
                ci.style.cssText = `width:100%;height:100%;object-fit:cover;display:block;`;
                cd.appendChild(ci); overlay.appendChild(cd);
              });
            }, physDelayMs);
          }
        }
        requestAnimationFrame(animTear);

        setTimeout(()=>{ window.location.href = href; }, tierCfg.totalDur);
      }, tierCfg.tensionDur);
    }

    // Clic dans le PNG → déchirer / clic hors PNG → fermer l'overlay (= Annuler)
    overlay.addEventListener('click', (e) => {
      if(overlay._tearing) return;
      const inBoosterX = e.clientX >= targetX && e.clientX <= targetX + targetW;
      const inBoosterY = e.clientY >= targetY && e.clientY <= targetY + targetH;
      if(inBoosterX && inBoosterY) {
        doTear();
      } else {
        closeOverlaySoft();
      }
    });

    // Glisser horizontalement sur la zone haute du booster PNG → déchirer (touch)
    let _tearX0=null, _tearY0=null, _tearInZone=false;
    overlay.addEventListener('touchstart', e=>{
      const t = e.touches[0];
      _tearX0 = t.clientX; _tearY0 = t.clientY;
      // Zone de swipe = haut du PNG (de targetY à 35% du booster)
      const seamBottom = targetY + targetH * .35;
      _tearInZone = t.clientY >= targetY && t.clientY <= seamBottom
                 && t.clientX >= targetX && t.clientX <= targetX + targetW;
      // Activer la lueur dès le début du toucher en zone couture
      if(_tearInZone) startGlow(t.clientX, t.clientY);
    }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      if(_tearX0===null) return;
      const dx = Math.abs(e.changedTouches[0].clientX - _tearX0);
      const dy = Math.abs(e.changedTouches[0].clientY - _tearY0);
      _tearX0=null; _tearY0=null;
      // Seuil 75% de la largeur du booster
      if(_tearInZone && dx > targetW * 0.75 && dx > dy * 1.1) doTear();
    }, {passive:true});

    // Glisser horizontalement sur la zone haute du booster PNG → déchirer (souris PC)
    let _mX0=null, _mY0=null, _mInZone=false, _mDragging=false;
    overlay.addEventListener('mousedown', e=>{
      e.preventDefault(); // bloque le drag navigateur
      _mX0 = e.clientX; _mY0 = e.clientY; _mDragging = true;
      const seamBottom = targetY + targetH * .35;
      _mInZone = e.clientY >= targetY && e.clientY <= seamBottom
              && e.clientX >= targetX && e.clientX <= targetX + targetW;
      // Activer la lueur dès le début du drag en zone couture
      if(_mInZone) startGlow(e.clientX, e.clientY);
      overlay.style.cursor = 'grabbing';
    });
    overlay.addEventListener('mousemove', e=>{
      if(!_mDragging || _mX0===null) return;
      const dx = Math.abs(e.clientX - _mX0);
      const dy = Math.abs(e.clientY - _mY0);
      // Déclencher si glissement ≥ 75% de la largeur du booster sur la zone couture
      if(_mInZone && dx > targetW * 0.75 && dx > dy * 1.1) {
        _mX0=null; _mDragging=false;
        overlay.style.cursor = 'default';
        doTear();
      }
    });
    overlay.addEventListener('mouseup', e=>{
      _mX0=null; _mY0=null; _mDragging=false;
      overlay.style.cursor = 'default';
    });
    overlay.addEventListener('mouseleave', ()=>{ _mDragging=false; _mX0=null; overlay.style.cursor='default'; });
  }

  // ── Handler boutons open-booster ──
  document.querySelectorAll('.open-booster').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const bid = parseInt(btn.dataset.bid);
      const selectedBooster = BOOSTERS[state.boosterSelectedIdx ?? 1];
      if(!selectedBooster || selectedBooster.id !== bid) return;
      const booster = BOOSTERS.find(b=>b.id===bid);
      if(!booster) return;
      const coins = state.coins || 0;
      if(coins < booster.price){
        showToast(`Il vous faut ${booster.price.toLocaleString('fr-FR')} coins pour ouvrir ce booster.`,'🚫');
        return;
      }
      // Vérifier la limite quotidienne
      const _uid = state.currentUser?.id || '';
      const _rem = getBoosterRemaining(_uid, bid);
      if(_rem === 0){
        showToast('Limite quotidienne atteinte — réessaie demain ! ⏳ ' + timeUntilMidnight(), '🚫');
        return;
      }
      const meta = [
        {color:'#9ca3af', src:'https://i.goopics.net/ueiki4.png', href:'booster1.html'},
        {color:'#cd7f32', src:'https://i.goopics.net/61e1o1.png', href:'booster2.html'},
        {color:'#f0c060', src:'https://i.goopics.net/cussu4.png', href:'booster3.html'},
      ];
      const m = meta[bid-1];
      if(m){
        markBoosterUsed(_uid, bid);
        startDailyTicker();
        triggerBoosterOpen(bid, m.color, m.src, m.href);
      }
    });
  });


  // ─── CARROUSEL BOOSTERS ───────────────────────────────────────────
  const prevBtn = document.getElementById('booster-prev');
  const nextBtn = document.getElementById('booster-next');
  if(prevBtn) prevBtn.addEventListener('click',()=>{
    const cur = state.boosterSelectedIdx ?? 1;
    if(cur > 0) setState({boosterSelectedIdx: cur - 1});
  });
  if(nextBtn) nextBtn.addEventListener('click',()=>{
    const cur = state.boosterSelectedIdx ?? 1;
    if(cur < BOOSTERS.length - 1) setState({boosterSelectedIdx: cur + 1});
  });

  // Clic sur item côté → sélectionner
  document.querySelectorAll('.booster-carousel-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx = parseInt(el.dataset.cidx);
      if(idx !== (state.boosterSelectedIdx ?? 1)) setState({boosterSelectedIdx: idx});
    });
  });

  // Swipe touch carrousel
  const track = document.getElementById('booster-carousel-track');
  if(track){
    let _cStartX = null;
    track.addEventListener('touchstart',(e)=>{ _cStartX = e.touches[0].clientX; },{passive:true});
    track.addEventListener('touchend',(e)=>{
      if(_cStartX === null) return;
      const dx = e.changedTouches[0].clientX - _cStartX;
      _cStartX = null;
      if(Math.abs(dx) < 40) return;
      const cur = state.boosterSelectedIdx ?? 1;
      if(dx < 0 && cur < BOOSTERS.length - 1) setState({boosterSelectedIdx: cur + 1});
      else if(dx > 0 && cur > 0) setState({boosterSelectedIdx: cur - 1});
    });
    // Swipe souris PC
    let _cMouseDown = null;
    track.addEventListener('mousedown',(e)=>{ _cMouseDown = e.clientX; track.style.cursor='grabbing'; });
    track.addEventListener('mouseup',(e)=>{
      track.style.cursor='grab';
      if(_cMouseDown === null) return;
      const dx = e.clientX - _cMouseDown;
      _cMouseDown = null;
      if(Math.abs(dx) < 40) return;
      const cur = state.boosterSelectedIdx ?? 1;
      if(dx < 0 && cur < BOOSTERS.length - 1) setState({boosterSelectedIdx: cur + 1});
      else if(dx > 0 && cur > 0) setState({boosterSelectedIdx: cur - 1});
    });
    track.addEventListener('mouseleave',()=>{ track.style.cursor='grab'; _cMouseDown = null; });
  }

  const btnPioche = document.getElementById('btn-pioche');
  if(btnPioche) btnPioche.addEventListener('click',()=>{
    const _uid = state.currentUser?.id || '';
    if(!canPiocheToday(_uid)){
      showToast('Pioche déjà utilisée aujourd\'hui ! ⏳ ' + timeUntilMidnight(), '🎴');
      return;
    }
    setState({showPioche:true,piocheFlipped:{},piocheChosen:null,piocheResult:null});
  });

  // Booster hover
  document.querySelectorAll('.booster-card').forEach(el=>{
    const bid=parseInt(el.dataset.bid);
    const b=BOOSTERS.find(b=>b.id===bid);
    if(!b)return;
    el.addEventListener('mouseenter',()=>{
      el.style.boxShadow=`0 0 24px ${b.color}70,0 0 48px ${b.color}30`;
      el.style.zIndex=10;
      const img=el.querySelector('.booster-img');
      if(img){img.style.transform='scale(1.22) translateY(-6px)';img.style.filter=`drop-shadow(0 12px 36px ${b.color}99) brightness(1.1)`;}
    });
    el.addEventListener('mouseleave',()=>{
      el.style.boxShadow='';
      el.style.zIndex='';
      const img=el.querySelector('.booster-img');
      if(img){img.style.transform='';img.style.filter=`drop-shadow(0 6px 20px ${b.color}70)`;}
    });
  });

  // Pioche
  const piocheClose = document.getElementById('pioche-close');
  if(piocheClose) piocheClose.addEventListener('click',()=>setState({showPioche:false}));

  document.querySelectorAll('.pioche-card').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.piocheChosen!==null)return;
      const idx=parseInt(el.dataset.idx);
      const newFlipped={...state.piocheFlipped,[idx]:true};
      setState({piocheChosen:idx,piocheFlipped:newFlipped});
      setTimeout(()=>{
        // Tirage pondéré par rareté : Mythique 0.1%, Rare 1%, Peu Commune 11.9%, Commune 87%
        const roll = Math.random() * 100;
        let targetRarity;
        if (roll < 0.1)       targetRarity = 'mythic';
        else if (roll < 1.1)  targetRarity = 'rare';
        else if (roll < 13.0) targetRarity = 'uncommon';
        else                  targetRarity = 'common';

        const pool = ALL_CARDS.filter(c => c.rarity === targetRarity);
        // Fallback si le pool est vide pour cette rareté
        const finalPool = pool.length > 0 ? pool : ALL_CARDS;
        const drawn = finalPool[Math.floor(Math.random() * finalPool.length)];
        setState({piocheResult: drawn});
      },700);
    });
  });

  const piocheCollect = document.getElementById('pioche-collect');
  if(piocheCollect) piocheCollect.addEventListener('click', async ()=>{
    const card = state.piocheResult;
    if (card) {
      // Ajouter la carte en base Supabase
      const db = window.db;
      const myId = state.currentUser?.id;
      if (db && myId) {
        const cardIdNum = parseInt(card.id, 10);
        // Vérifier si le joueur a déjà cette carte
        const { data: existing } = await db.from('player_cards')
          .select('id, quantity')
          .eq('player_id', myId)
          .eq('card_id', cardIdNum)
          .single();
        if (existing) {
          await db.from('player_cards')
            .update({ quantity: existing.quantity + 1 })
            .eq('id', existing.id);
        } else {
          await db.from('player_cards')
            .insert({ player_id: myId, card_id: cardIdNum, quantity: 1 });
        }
        // Recharger la collection
        if (window.loadCollection) window.loadCollection();
        markPiocheUsed(myId);
        startDailyTicker();
        showToast(`${card.name} ajoutée à la collection !`, '✓');
      }
    }
    setState({showPioche:false});
  });

  // Modal backdrops
  const notifBg=document.getElementById('notif-bg');
  if(notifBg) notifBg.addEventListener('click',(e)=>{if(e.target===notifBg)setState({showNotif:false});});

  // Friends modal binds
  document.querySelectorAll('.friends-tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({friendsTab:btn.dataset.ftab}));
  });
  const btnAddFriend=document.getElementById('btn-add-friend');
  if(btnAddFriend) btnAddFriend.addEventListener('click',()=>setState({showAddFriend:true}));
  const btnCancelAdd=document.getElementById('btn-cancel-add-friend');
  if(btnCancelAdd) btnCancelAdd.addEventListener('click',()=>setState({showAddFriend:false}));

async function loadLeaderboard(period){
  const db = window.db;
  if(!db){ setState({leaderboardLoading:false,leaderboardData:[]}); return; }

  try {
    let query = db.from('players')
      .select('id, discord_username, avatar_url, wins, losses, coins')
      .order('wins', {ascending:false})
      .limit(50); // récupérer plus pour calculer le rang

    if(period === 'week'){
      const d = new Date(); d.setDate(d.getDate()-7);
      query = query.gte('updated_at', d.toISOString());
    } else if(period === 'month'){
      const d = new Date(); d.setMonth(d.getMonth()-1);
      query = query.gte('updated_at', d.toISOString());
    }

    const { data, error } = await query;
    if(error || !data){ setState({leaderboardLoading:false, leaderboardData:[]}); return; }

    // Calculer le rang du joueur connecté
    const myId = state.currentUser?.id;
    let playerRank = null;
    if(myId){
      const idx = data.findIndex(r => r.id === myId);
      if(idx !== -1) playerRank = idx + 1;
    }

    setState({leaderboardLoading:false, leaderboardData: data.slice(0,20), playerRank});
  } catch(e){
    console.error('[loadLeaderboard]', e);
    setState({leaderboardLoading:false, leaderboardData:[]});
  }
}

// ─── SWIPE NAVIGATION (onglet par onglet, zone contenu uniquement) ─
(function initSwipe(){
  let _t0x = null, _t0y = null;
  let _locked = null; // 'h' | 'v' | null
  let _startEl = null;

  function anyModalOpen(){
    return state.showSettings||state.showFriends||state.showNotif||state.showMessages||
           state.showPioche||state.showLeaderboard||state.showTutorial||state.showDeckBuilder||
           state.collSelectedCard||state.showTrade||state.showProfile||state.showAddFriend||
           state.showQuests||state.showHowTo;
  }

  function isInNav(el){
    const nav = document.getElementById('bottom-nav');
    const header = document.querySelector('#app > div > div:first-child');
    if(nav && nav.contains(el)) return true;
    if(header && header.contains(el)) return true;
    return false;
  }

  document.addEventListener('touchstart', e => {
    if(anyModalOpen()) return;
    if(isInNav(e.target)) return;
    const touch = e.touches[0];
    _t0x = touch.clientX;
    _t0y = touch.clientY;
    _locked = null;
    _startEl = e.target;
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if(_t0x === null || anyModalOpen()) return;
    const dx = e.touches[0].clientX - _t0x;
    const dy = e.touches[0].clientY - _t0y;
    if(_locked === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      // Ratio plus strict : 2:1 horizontal/vertical pour éviter les faux positifs lors du scroll
      _locked = Math.abs(dx) > Math.abs(dy) * 2 ? 'h' : 'v';
    }
  }, {passive: true});

  document.addEventListener('touchend', e => {
    if(_t0x === null) return;
    const dx = e.changedTouches[0].clientX - _t0x;
    const wasH = _locked === 'h';
    const capturedStartEl = _startEl;
    _t0x = null; _t0y = null; _locked = null; _startEl = null;

    if(!wasH) return;
    if(anyModalOpen()) return;

    // Sur l'onglet Boosters : le swipe appartient entièrement au carrousel, jamais aux onglets
    if(state.tab === 2) return;

    // Seuil : 55px ou 16% de la largeur — volontaire
    const threshold = Math.max(55, window.innerWidth * 0.16);
    if(Math.abs(dx) < threshold) return;

    if(dx < 0 && state.tab < 2){
      setState({tab: state.tab + 1});
      if(state.tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    } else if(dx > 0 && state.tab > 0){
      setState({tab: state.tab - 1});
    }
  }, {passive: true});
})();
</script>

const STREAK_REWARDS = [25, 50, 75, 100, 125, 150, 200]; // J1→J7

// ─── SYSTÈME XP & NIVEAUX ─────────────────────────────────────────
// Coût en XP pour passer du niveau N au niveau N+1
function xpToNextLevel(level) {
  if (level <= 0) return 250;
  // Dizaine de transition (X9 → X0 suivant) : coût élevé
  // Sauf si c'est une centaine (99→100, 199→200, etc.)
  const isCentury   = (level % 100) === 99; // 99,199,299…
  const isDecade    = (level % 10)  === 9;  // 9,19,29… (inclut 99 donc on check d'abord century)
  if (isCentury) return 3000;
  if (isDecade)  return 1500; // 9→10, 19→20, 29→30…
  if (level < 9) return 250;  // niveaux 1–8 → 9 (palette initiale)
  return 500;                 // tout le reste (10–98, 100–198, etc.)
}

// Calcule le niveau et l'XP restante à partir d'un total d'XP brut
function computeLevel(totalXp) {
  let lvl = 1;
  let remaining = totalXp;
  while (true) {
    const cost = xpToNextLevel(lvl);
    if (remaining < cost) break;
    remaining -= cost;
    lvl++;
  }
  return { level: lvl, xpInLevel: remaining, xpNeeded: xpToNextLevel(lvl) };
}

// XP total cumulé pour atteindre le début du niveau N (sans compter le dernier palier)
function totalXpForLevel(level) {
  let total = 0;
  for (let l = 1; l < level; l++) total += xpToNextLevel(l);
  return total;
}

}

async function grantXp(userId, amount, reason) {
  const db = window.db;
  if (!db || !userId || !amount) return;
  const { data } = await db.from('players').select('xp').eq('id', userId).single();
  const currentXp = data?.xp ?? 0;
  const newXp = currentXp + amount;
  await db.from('players').update({ xp: newXp }).eq('id', userId);
  const before = computeLevel(currentXp);
  const after  = computeLevel(newXp);
  setState({ playerXp: newXp, playerLevel: after.level });
  if (after.level > before.level) {
    showXpLevelUpToast(after.level);
    // Accorder la récompense pour chaque niveau passé
    for (let l = before.level + 1; l <= after.level; l++) {
      await grantLevelReward(userId, l);
    }
  }
}

async function loadPlayerXp(userId) {
  const db = window.db;
  if (!db || !userId) return;
  const { data } = await db.from('players').select('xp').eq('id', userId).single();
  const xp = data?.xp ?? 0;
  const { level } = computeLevel(xp);
  setState({ playerXp: xp, playerLevel: level });

  // ── RÉTROACTIF : charger TOUTES les récompenses de niveau non réclamées ──
  try {
    // Récompenses boosters non lues
    const { data: lvlBoosterNotifs } = await db.from('notifications')
      .select('id, text, meta, created_at')
      .eq('user_id', userId).eq('type', 'level_reward_booster').eq('read', false);

    // Récompenses coins non lues
    const { data: lvlCoinsNotifs } = await db.from('notifications')
      .select('id, text, meta, created_at')
      .eq('user_id', userId).eq('type', 'level_reward').eq('read', false);

    const pendingRewards = [];

    (lvlBoosterNotifs || []).forEach(n => {
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      pendingRewards.push({ notifId: n.id, level: meta.level, type: meta.rewardType || 'booster_prestige', label: n.text });
    });

    (lvlCoinsNotifs || []).forEach(n => {
      // Extraire le montant du texte si possible (ex: "+300 coins")
      const match = (n.text || '').match(/\+(\d+)\s*coins/i);
      const amount = match ? parseInt(match[1]) : 300;
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      pendingRewards.push({ notifId: n.id, level: meta.level || 0, type: 'coins', amount, label: n.text });
    });

    if (pendingRewards.length > 0) {
      // Fusionner sans doublons
      const existing = state.pendingLevelRewards || [];
      const existingIds = new Set(existing.map(r => r.notifId));
      const newOnes = pendingRewards.filter(r => !existingIds.has(r.notifId));
      if (newOnes.length > 0) {
        setState({ pendingLevelRewards: [...existing, ...newOnes] });
      }
    }
  } catch(e) { /* silencieux */ }
}

async function grantCoins(userId, amount, reason) {

  // Récupérer les coins actuels puis incrémenter
  const { data } = await db.from('players').select('coins').eq('id', userId).single();
  const current = data?.coins ?? 0;
  await db.from('players').update({ coins: current + amount }).eq('id', userId);
  setState({ coins: current + amount });

  // Notification in-game dans la table notifications
  try {
    await db.from('notifications').insert({
      user_id: userId, type: 'reward', from_id: userId,
      text: reason + ' : +' + amount + ' coins',
      read: false,
    });
  } catch(e) {}
}

async function checkLoginStreak(userId) {
  const db = window.db;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

  // Lire le streak depuis Supabase (lié au compte, pas au device)
  const { data: playerRow } = await db
    .from('players')
    .select('streak, last_streak_date, first_win_date')
    .eq('id', userId)
    .single();

  if (!playerRow) return;

  const lastStreakDate = playerRow.last_streak_date;
  const firstWinDate = playerRow.first_win_date;

  // Déjà récompensé aujourd'hui → juste afficher
  if (lastStreakDate === today) {
    setState({ loginStreak: playerRow.streak || 1, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });
    return;
  }

  // Calculer le nouveau streak
  let newStreak = 1;
  if (lastStreakDate) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastStreakDate === yesterday.toISOString().slice(0, 10)) {
      newStreak = ((playerRow.streak || 0) % 7) + 1;
    }
  }

  // Accorder la récompense coins
  const coinsEarned = STREAK_REWARDS[newStreak - 1];
  await grantCoins(userId, coinsEarned, `Connexion Jour ${newStreak}`);
  showRewardToast(`🔥 Streak Jour ${newStreak} !`, coinsEarned, '🔥');

  // +10 XP connexion quotidienne
  await grantXp(userId, 10, 'Connexion quotidienne');
  showXpToast(10, 'Connexion du jour');

  // Sauvegarder dans Supabase
  await db.from('players').update({
    streak: newStreak,
    last_streak_date: today,
  }).eq('id', userId);

  setState({ loginStreak: newStreak, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });
}

window.onPlayerWin = async function() {
  const db = window.db;
  const userId = state.currentUser?.id;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10);

  if (state.firstWinTodayDone) return;

  // Vérifier en DB pour éviter le doublon multi-device
  const { data: p } = await db.from('players').select('first_win_date').eq('id', userId).single();
  if (p && p.first_win_date === today) {
    setState({ firstWinTodayDone: true });
    return;
  }

  // 1ère victoire du jour !
  await grantCoins(userId, 100, '1ère victoire du jour');
  showRewardToast('1ère victoire du jour !', 100, '🏆');
  if (window.grantXp) {
    await grantXp(userId, 20, '1ère victoire du jour');
    showXpToast(20, '1ère victoire du jour');
  }
  await db.from('players').update({ first_win_date: today }).eq('id', userId);
  setState({ firstWinTodayDone: true });
};

// Au chargement : vérifier si retour OAuth Discord (hash dans l'URL)
waitForSupabase(() => {
  const db = window.db;

  // Si retour depuis Discord OAuth
  if (window.location.hash.includes('access_token')) {
    db.auth.onAuthStateChange(async (event, session) => {
      if ((event === 'SIGNED_IN') && session) {
        history.replaceState(null, '', window.location.pathname);
        const user = session.user;
        // Vérifier si le joueur existe déjà avant l'upsert
        const { data: existingPlayer } = await db.from('players').select('id,coins').eq('id', user.id).single();
        const isNewPlayer = !existingPlayer;
        await db.from('players').upsert({
          id: user.id,
          discord_username: user.user_metadata.full_name || user.user_metadata.name,
          avatar_url: user.user_metadata.avatar_url,
        }, { onConflict: 'id' });
        const { data: playerData } = await db.from('players').select('coins').eq('id', user.id).single();
        if (isNewPlayer) {
          // Stocker un flag pour déclencher les notifs de bienvenue après enterGame
          sessionStorage.setItem('_new_player', '1');
        }
        enterGame(user, playerData ? playerData.coins : 100);
      }
    });
    return;
  }

  // Session déjà stockée → entrer auto sans clic
  const stored = getStoredSession();
  if (stored && stored.user) {
    db.from('players').select('coins').eq('id', stored.user.id).single()
      .then(({ data }) => {
        enterGame(stored.user, data ? data.coins : 0);
      });
  }
});

async function loadCollection() {
  // Attendre db
  let tries = 0;
  while (!window.db && tries++ < 50) await new Promise(r => setTimeout(r, 100));
  const db = window.db;
  if (!db) { console.error('[Collection] db indispo'); return; }

  // Récupérer l'user depuis la session active
  const userId = state.currentUser?.id;
  if (!userId) { console.warn('[Collection] pas de currentUser'); return; }

  const { data: allCards, error } = await db.from('cards').select('*').order('id');
  if (error) { console.error('[Collection]', error.message); return; }
  console.log('[Collection]', allCards?.length, 'cartes');

  const { data: playerCards } = await db.from('player_cards')
    .select('card_id, quantity, created_at').eq('player_id', userId);

  const ownedMap = {};
  if (playerCards) playerCards.forEach(pc => { ownedMap[pc.card_id] = pc; });

  // Nombre de joueurs distincts possédant chaque carte (1 exemplaire min, peu importe la quantité)
  const { data: globalCounts } = await db.from('player_cards')
    .select('card_id, player_id');
  const globalCountMap = {};
  if (globalCounts) {
    globalCounts.forEach(row => {
      if (!globalCountMap[row.card_id]) globalCountMap[row.card_id] = new Set();
      globalCountMap[row.card_id].add(row.player_id);
    });
  }

  // Rang du joueur courant pour chaque carte : position par date d'obtention
  // On récupère toutes les entrées de la carte triées par created_at pour trouver le rang
  const { data: allPlayerCards } = await db.from('player_cards')
    .select('card_id, player_id, created_at').order('created_at', { ascending: true });
  const cardRankMap = {};
  if (allPlayerCards) {
    allPlayerCards.forEach(row => {
      if (!cardRankMap[row.card_id]) cardRankMap[row.card_id] = [];
      cardRankMap[row.card_id].push(row.player_id);
    });
  }

  ALL_CARDS = (allCards || []).map(c => ({
    id: String(c.id).padStart(3,'0'),
    name: c.name,
    set: c.set_name || 'SET-1',
    rarity: c.rarity || 'common',
    type: c.type || 'Héro',
    color: RARITY_COLOR[c.rarity] || '#9ca3af',
    image_url: c.image_url || null,
    owned: !!ownedMap[c.id],
    count: ownedMap[c.id] ? ownedMap[c.id].quantity : 0,
    obtainedAt: ownedMap[c.id] ? ownedMap[c.id].created_at : null,
    globalOwners: globalCountMap[c.id] ? globalCountMap[c.id].size : 0,
    myRank: cardRankMap[c.id] ? (cardRankMap[c.id].indexOf(userId) + 1 || null) : null,
    // Stats Supabase (colonnes optionnelles — null si absentes de la table cards)
    attack:    c.attack    ?? null,
    defense:   c.defense   ?? null,
    precision: c.precision ?? null,
    hp:        c.hp        ?? null,
  }));
  render();
}

    .from('friend_requests')

  const { data: friendsData } = await db
    .from('friend_requests')
    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url)')

    .eq('status', 'accepted');

let _msgRealtimeSub = null;
let _notifRealtimeSub = null;
let _activeConvFriendId = null; // ref globale stable, survit aux re-renders

// Souscription globale aux messages — s'active une seule fois à l'entrée dans le jeu
async function subscribeMessagesGlobal(myId) {
  const db = window.db;
  if (!db || !myId) return;
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} _msgRealtimeSub = null; }

  // Fonction commune pour traiter un message entrant dans l'UI
  function handleIncomingMsg(m, isOutgoing) {
    if (!m) return;
    const convPartnerId = isOutgoing ? m.to_id : m.from_id;
    const displayFromId = m.from_id;
    // Éviter les doublons
    const prev = state.messages[convPartnerId] || [];
    if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
    const updated = [...prev, { from: displayFromId, text: m.text, ts: m.created_at }];
    state.messages = { ...state.messages, [convPartnerId]: updated };
    // Conv active et visible → append direct au DOM
    if (convPartnerId === _activeConvFriendId && state.activeConvId === convPartnerId && state.showMessages) {
      const list = document.getElementById('msg-list');
      if (list) {
        const div = document.createElement('div');
        const th = t();
        const isMine = displayFromId === myId;
        div.style.cssText = `display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;`;
        div.innerHTML = `<div style="max-width:75%;background:${isMine?th.accent:th.bgTertiary};color:${isMine?'#fff':th.text};padding:8px 12px;border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${m.text.replace(/</g,'&lt;')}</div>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
      }
      if (!isOutgoing) markMsgNotifsRead(convPartnerId);
      return;
    }
    if (!isOutgoing) setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
  }

  // Canal 1 : messages reçus (to_id = moi)
  _msgRealtimeSub = db.channel('messages-rt-in-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, false))
    .subscribe();

  // Canal 2 : messages envoyés (from_id = moi) — pour les voir en temps réel de son côté
  const _msgSentSub = db.channel('messages-rt-out-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `from_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, true))
    .subscribe();
}

async function subscribeNotifications() {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Charger les combat requests en attente
  const { data: combatNotifs } = await db.from('notifications')
    .select('id, from_id, read')
    .eq('user_id', myId).eq('type', 'combat_request').eq('read', false);

  if (combatNotifs && combatNotifs.length > 0) {
    const fromIds = [...new Set(combatNotifs.map(n => n.from_id))];
    const { data: senders } = await db.from('players').select('id, discord_username, avatar_url').in('id', fromIds);
    const senderMap = {};
    (senders||[]).forEach(s => { senderMap[s.id] = s; });
    const combatReqs = combatNotifs.map(n => ({
      request_id: n.id,
      from_id: n.from_id,
      discord_username: senderMap[n.from_id]?.discord_username || 'Joueur',
      avatar_url: senderMap[n.from_id]?.avatar_url || null,
    }));
    setState({ combatRequestsIn: combatReqs });
  }

  // Charger les notifications non lues (type message)
  const { data: notifs } = await db.from('notifications')
    .select('id, type, from_id, text, created_at, read')
    .eq('user_id', myId)
    .eq('read', false)
    .order('created_at', { ascending: false });

  // Filtrer celles de la conv déjà ouverte (si on revient d'une conv)
  // et les marquer lues en base pour éviter qu'elles réapparaissent au prochain refresh
  const activeConv = state.activeConvId;
  const allMsgNotifs = (notifs||[]).filter(n => n.type === 'message');

  // Notifs de convs déjà actives → marquer lues silencieusement
  const toMarkRead = activeConv ? allMsgNotifs.filter(n => n.from_id === activeConv) : [];
  if (toMarkRead.length > 0) {
    db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', activeConv)
      .eq('read', false)
      .then(()=>{}).catch(()=>{});
  }

  const msgNotifs = allMsgNotifs.filter(n => !activeConv || n.from_id !== activeConv);
  setState({ msgNotifCount: msgNotifs.length, pendingMsgNotifs: msgNotifs });

  // Charger les récompenses de niveau booster non réclamées
  const { data: lvlBoosterNotifs } = await db.from('notifications')
    .select('id, text, meta, created_at')
    .eq('user_id', myId).eq('type', 'level_reward_booster').eq('read', false);
  if (lvlBoosterNotifs && lvlBoosterNotifs.length > 0) {
    const pendingRewards = lvlBoosterNotifs.map(n => {
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      return { notifId: n.id, level: meta.level, type: meta.rewardType || 'booster_prestige', label: n.text };
    });
    setState({ pendingLevelRewards: pendingRewards });
  }

  // Realtime : écouter les nouvelles notifications
  if (_notifRealtimeSub) { try { db.removeChannel(_notifRealtimeSub); } catch(e){} }
  _notifRealtimeSub = db.channel('notif-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myId}`,
    }, payload => {
      const n = payload.new;
      if (!n) return;
      // Si la conv de cet expéditeur est déjà ouverte → marquer lu directement, pas de badge
      if (state.activeConvId && n.from_id === state.activeConvId) {
        markMsgNotifsRead(n.from_id);
        return;
      }
      if (n.type === 'trade_accepted' || n.type === 'trade_declined') {
        const isAccepted = n.type === 'trade_accepted';
        const prev = state.tradeResultNotifs || [];
        setState({ tradeResultNotifs: [...prev, { id: n.id, accepted: isAccepted, from_id: n.from_id, text: n.text }] });
        showToast(n.text || (isAccepted ? 'Échange accepté !' : 'Échange refusé'), isAccepted ? '🔄' : '✗');
        return;
      }
      if (n.type === 'combat_request') {
        // Charger l'avatar/nom de l'expéditeur
        db.from('players').select('discord_username, avatar_url').eq('id', n.from_id).single()
          .then(({ data: sender }) => {
            const req = {
              request_id: n.id,
              from_id: n.from_id,
              discord_username: sender?.discord_username || 'Joueur',
              avatar_url: sender?.avatar_url || null,
            };
            setState({ combatRequestsIn: [...(state.combatRequestsIn||[]), req] });
            showToast(n.text || 'Défi en combat reçu !', '⚔️');
          });
        return;
      }
      if (n.type === 'combat_accepted') {
        // Récupérer le match_id depuis le meta
        let matchId = state.pendingMatchId || null;
        try { if (n.meta) matchId = JSON.parse(n.meta)?.match_id || matchId; } catch(e) {}
        try {
          sessionStorage.setItem('pvp_match_id', matchId || '');
          sessionStorage.setItem('pvp_opponent_id', n.from_id || '');
          sessionStorage.setItem('pvp_my_id', state.currentUser?.id || '');
          sessionStorage.setItem('pvp_role', 'challenger');
        } catch(e) {}
        showPvpCountdown(5, () => { window.location.href = 'GAMEPLAY.html'; });
        return;
      }
      if (n.type === 'combat_declined') {
        showToast('Ton défi a été refusé.', '✗');
        return;
      }
      const prev = state.pendingMsgNotifs || [];
      setState({
        msgNotifCount: (state.msgNotifCount || 0) + 1,
        pendingMsgNotifs: [n, ...prev],
      });
      showToast(n.text || 'Nouveau message !', '💬');
    })
    .subscribe();
}

  // ── Synthèse sonore Web Audio (déchirure + ouverture) ──────────────
  function playTearSound(tier) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Bruit blanc filtré → son de déchirure
      function tearNoise(startT, dur, vol, hifreq) {
        const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
        const d = buf.getChannelData(0);
        for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.setValueAtTime(hifreq, ctx.currentTime);
        filt.Q.value = 0.8;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
        src.start(ctx.currentTime + startT);
        src.stop(ctx.currentTime + startT + dur + 0.05);
      }
      // Thump grave = impact d'ouverture
      function thump(startT, freq, dur, vol) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq * 2.2, ctx.currentTime + startT);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + startT + dur * 0.6);
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + startT);
        osc.stop(ctx.currentTime + startT + dur + 0.05);
      }
      // Shimmer haute fréquence (légendaire)
      function shimmer(startT, freq, dur, vol) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + startT);
        osc.frequency.linearRampToValueAtTime(freq * 1.5, ctx.currentTime + startT + dur);
        gain.gain.setValueAtTime(0, ctx.currentTime + startT);
        gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startT + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startT + dur);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + startT);
        osc.stop(ctx.currentTime + startT + dur + 0.05);
      }
      if(tier === 1) {
        // Normal : déchirure courte, thump léger
        tearNoise(0,    0.18, 0.55, 2200);
        tearNoise(0.05, 0.14, 0.35, 3800);
        thump(0.14, 90, 0.22, 0.5);
      } else if(tier === 2) {
        // Prestige : déchirure plus longue, thump plus profond
        tearNoise(0,    0.22, 0.75, 1800);
        tearNoise(0.04, 0.18, 0.55, 3200);
        tearNoise(0.12, 0.12, 0.4,  5000);
        thump(0.18, 70, 0.30, 0.75);
        shimmer(0.22, 800, 0.35, 0.15);
      } else {
        // Légendaire : déchirure lente et puissante, thump grave, shimmer épique
        tearNoise(0,    0.35, 1.1,  1200);
        tearNoise(0.06, 0.28, 0.85, 2500);
        tearNoise(0.15, 0.22, 0.65, 4500);
        tearNoise(0.28, 0.18, 0.5,  7000);
        thump(0.28, 55, 0.45, 1.0);
        thump(0.32, 110, 0.35, 0.5);
        shimmer(0.35, 600, 0.55, 0.22);
        shimmer(0.42, 1200, 0.45, 0.18);
      }
    } catch(e){}
  }

  // ── Animation d'ouverture booster — Phase 1 : focus + Phase 2 : déchirure par le haut ──
  function triggerBoosterOpen(bid, color, imgSrc, href) {
    if(document.getElementById('booster-focus-overlay')) return;

    // Fade out musique progressif
    (function fadeOutMusic(){
      if(!_ytPlayer || !audioPlaying) return;
      let vol = typeof state.musicVolume === 'number' ? state.musicVolume : 60;
      try { vol = _ytPlayer.getVolume ? _ytPlayer.getVolume() : vol; } catch(e){}
      let step = 0;
      const interval = setInterval(()=>{
        step++;
        const newVol = Math.max(0, vol - step * (vol / 18));
        try { _ytPlayer.setVolume(newVol); } catch(e){}
        if(newVol <= 0){ clearInterval(interval); try{ _ytPlayer.pauseVideo(); }catch(e){} }
      }, 50);
    })();

    const centralImg = document.querySelector('.booster-img.open-booster[data-bid="'+bid+'"]');
    if(!centralImg){ window.location.href = href; return; }
    const rect = centralImg.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    const vw = window.innerWidth, vh = window.innerHeight;

    // Tier : 1=Normal, 2=Prestige, 3=Légendaire
    const tier = bid; // bid 1/2/3 correspond directement

    // Paramètres selon le tier
    const tierCfg = {
      1: { sizeRatio:.78, maxW:330, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdle 2.4s ease-in-out .45s infinite',
           tensionAnim:'tensionShake .20s ease both', tensionDur:210, tearDur:820, totalDur:2400,
           flapSpeed:'.72s', bottomSpeed:'.72s', auraColor:'rgba(156,163,175,.10)' },
      2: { sizeRatio:.80, maxW:345, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdlePrestige 2.0s ease-in-out .45s infinite',
           tensionAnim:'tensionShakePrestige .28s ease both', tensionDur:240, tearDur:920, totalDur:2600,
           flapSpeed:'.85s', bottomSpeed:'.85s', auraColor:'rgba(205,127,50,.14)' },
      3: { sizeRatio:.82, maxW:360, idleAnim:'boosterFocusIn .42s cubic-bezier(.34,1.56,.64,1) both, boosterIdleLegend 1.6s ease-in-out .45s infinite',
           tensionAnim:'tensionShakeLegend .38s ease both', tensionDur:300, tearDur:1150, totalDur:3000,
           flapSpeed:'1.05s', bottomSpeed:'1.05s', auraColor:'rgba(240,192,96,.20)' },
    }[tier] || {};

    const targetW = Math.min(vw * tierCfg.sizeRatio, tierCfg.maxW);
    const targetH = targetW * (h / w);
    const targetX = (vw - targetW) / 2;
    const targetY = (vh - targetH) / 2 - vh * .04;

    // ── Overlay principal ──
    const overlay = document.createElement('div');
    overlay.id = 'booster-focus-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99998;animation:bgBlurIn .38s ease both;backdrop-filter:blur(16px);background:rgba(4,8,18,.90);user-select:none;';

    // Aura de fond spécifique au tier
    const aura = document.createElement('div');
    aura.style.cssText = `position:absolute;left:${targetX - targetW*.25}px;top:${targetY - targetH*.1}px;`
      +`width:${targetW*1.5}px;height:${targetH*1.2}px;`
      +`background:radial-gradient(ellipse at center,${tierCfg.auraColor} 0%,transparent 70%);`
      +`animation:legendAura ${tier===3?'1.4':'2.0'}s ease-in-out infinite;pointer-events:none;`;
    overlay.appendChild(aura);

    // ── Wrapper booster ──
    const boosterWrap = document.createElement('div');
    boosterWrap.id = 'booster-focus-wrap';
    boosterWrap.style.cssText = `position:absolute;left:${targetX}px;top:${targetY}px;width:${targetW}px;height:${targetH}px;perspective:900px;transform-style:preserve-3d;`;

    const boosterImg = document.createElement('img');
    boosterImg.src = imgSrc;
    boosterImg.draggable = false;
    boosterImg.addEventListener('dragstart', e => e.preventDefault());
    boosterImg.style.cssText = `width:100%;height:100%;object-fit:contain;display:block;`
      +`filter:drop-shadow(0 0 ${tier===3?'38px':'24px'} ${color}${tier===3?'b0':'80'}) drop-shadow(0 16px 44px rgba(0,0,0,.75));`
      +`animation:${tierCfg.idleAnim};user-select:none;-webkit-user-drag:none;`;

    // Ligne de couture
    const seamLine = document.createElement('div');
    const seamThick = tier===3 ? '3px' : tier===2 ? '2px' : '2px';
    const seamOpacity = tier===3 ? 'cc' : tier===2 ? 'aa' : '80';
    seamLine.style.cssText = `position:absolute;top:13%;left:6%;right:6%;height:${seamThick};`
      +`background:linear-gradient(90deg,transparent,${color}${seamOpacity},rgba(255,255,255,.7),${color}${seamOpacity},transparent);`
      +`animation:tearLinePulse ${tier===3?'1.1s':'1.8s'} ease-in-out infinite;pointer-events:none;`;

    // Hint horizontal
    const hint = document.createElement('div');
    hint.style.cssText = `position:absolute;top:calc(13% - 30px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;pointer-events:none;white-space:nowrap;`;
    hint.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" style="animation:swipeHintArrow 1.4s ease-in-out infinite;filter:drop-shadow(0 0 5px ${color});transform:scaleX(-1);"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      <div style="font-size:${tier===3?'10px':'9px'};font-weight:900;color:${color};letter-spacing:${tier===3?'2.5px':'1.8px'};text-shadow:0 0 10px ${color};">${tier===3?'⚡ DÉCHIRER ⚡':'DÉCHIRER'}</div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" style="animation:swipeHintArrow 1.4s ease-in-out .15s infinite;filter:drop-shadow(0 0 5px ${color});"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>`;

    const tapHint = document.createElement('div');
    // Positionné en fixed juste sous le bas du PNG, pas dans le boosterWrap
    const tapHintTop = targetY + targetH + 14;
    tapHint.style.cssText = `position:fixed;top:${tapHintTop}px;left:${targetX}px;width:${targetW}px;`
      +`text-align:center;font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.8px;white-space:nowrap;pointer-events:none;`;
    tapHint.textContent = 'Glisse sur la couture · ou tape';

    boosterWrap.appendChild(boosterImg);
    boosterWrap.appendChild(seamLine);
    boosterWrap.appendChild(hint);
    overlay.appendChild(boosterWrap);
    overlay.appendChild(tapHint);

    // ── Bouton Annuler ──
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = '✕ Annuler';
    cancelBtn.style.cssText = `position:absolute;bottom:6%;left:50%;transform:translateX(-50%);`
      +`padding:8px 24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);`
      +`color:rgba(255,255,255,.45);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1.2px;`
      +`cursor:pointer;transition:background .18s,color .18s;z-index:10;`;
    cancelBtn.addEventListener('mouseenter', ()=>{
      cancelBtn.style.background='rgba(255,255,255,.12)';
      cancelBtn.style.color='rgba(255,255,255,.8)';
    });
    cancelBtn.addEventListener('mouseleave', ()=>{
      cancelBtn.style.background='rgba(255,255,255,.06)';
      cancelBtn.style.color='rgba(255,255,255,.45)';
    });
    function closeOverlaySoft() {
      overlay.style.transition = 'opacity .32s ease';
      overlay.style.opacity = '0';
      setTimeout(()=>overlay.remove(), 340);
    }
    cancelBtn.addEventListener('click', e=>{
      e.stopPropagation();
      closeOverlaySoft();
    });
    overlay.appendChild(cancelBtn);

    // ── Lueur sur le PNG via canvas overlay — active UNIQUEMENT pendant le déchirement ──
    // Un canvas transparent positionné par-dessus le PNG, visible seulement après doTear()
    const glowCanvas = document.createElement('canvas');
    glowCanvas.width  = targetW;
    glowCanvas.height = targetH;
    glowCanvas.style.cssText = `position:absolute;left:0;top:0;width:${targetW}px;height:${targetH}px;`
      +`pointer-events:none;opacity:0;transition:opacity .15s;z-index:5;mix-blend-mode:screen;`;
    boosterWrap.appendChild(glowCanvas);
    const glowCtx = glowCanvas.getContext('2d');

    // Dessine un trait de déchirure lumineux — ellipse fine et allongée horizontalement
    function drawTearGlow(rx, ry) {
      glowCtx.clearRect(0, 0, targetW, targetH);
      // Dimensions : large horizontalement, très fine verticalement
      const ellipseW = targetW * 0.52;  // demi-axe horizontal
      const ellipseH = targetH * 0.028; // demi-axe vertical (trait fin)
      glowCtx.save();
      glowCtx.translate(rx, ry);
      // Étirer l'espace pour dessiner un gradient radial circulaire puis l'aplatir
      glowCtx.scale(1, ellipseH / ellipseW);
      const grad = glowCtx.createRadialGradient(0, 0, 0, 0, 0, ellipseW);
      grad.addColorStop(0,    'rgba(255,255,255,0.92)');
      grad.addColorStop(0.12, 'rgba(255,255,255,0.60)');
      grad.addColorStop(0.30, color + 'cc');
      grad.addColorStop(0.60, color + '44');
      grad.addColorStop(1,    'rgba(0,0,0,0)');
      glowCtx.fillStyle = grad;
      glowCtx.beginPath();
      glowCtx.arc(0, 0, ellipseW, 0, Math.PI * 2);
      glowCtx.fill();
      glowCtx.restore();
    }

    // Convertit position écran → coordonnées relatives au PNG
    function screenToBooster(cx, cy) {
      return { rx: cx - targetX, ry: cy - targetY };
    }

    // Lueur inactive au départ — s'active uniquement lors du début du déchirement
    let _glowActive = false;

    function moveTearGlow(cx, cy) {
      if(!_glowActive) return;
      const {rx, ry} = screenToBooster(cx, cy);
      const onPng = rx >= 0 && rx <= targetW && ry >= 0 && ry <= targetH;
      if(onPng) {
        const clampedRx = Math.max(0, Math.min(targetW, rx));
        const clampedRy = Math.max(0, Math.min(targetH * 0.45, ry));
        drawTearGlow(clampedRx, clampedRy);
      }
    }

    function startGlow(cx, cy) {
      if(_glowActive) return;
      _glowActive = true;
      glowCanvas.style.opacity = '1';
      moveTearGlow(cx, cy);
    }

    overlay.addEventListener('mousemove', e => moveTearGlow(e.clientX, e.clientY), {passive:true});
    overlay.addEventListener('touchmove', e => {
      const t = e.touches[0];
      moveTearGlow(t.clientX, t.clientY);
    }, {passive:true});

    document.body.appendChild(overlay);

    if(navigator.vibrate) navigator.vibrate(tier===3 ? [20,30,20] : [18]);

    // ── Phase 2 : déchirure ──
    function doTear() {
      if(overlay._tearing) return;
      overlay._tearing = true;
      cancelBtn.style.display = 'none';

      // Tension
      boosterImg.style.animation = tierCfg.tensionAnim;
      if(navigator.vibrate) navigator.vibrate(tier===3 ? [18,60,30,80,40] : tier===2 ? [14,50,28] : [12,40,22]);

      setTimeout(()=>{
        playTearSound(tier);
        glowCanvas.style.opacity = '0';
        seamLine.style.display = 'none';
        hint.style.display = 'none';
        tapHint.style.display = 'none';
        aura.style.display = 'none';

        const bW = targetW, bH = targetH;
        const bX = targetX, bY = targetY;
        const flapH = Math.round(bH * .20);

        // ── Profil de déchirure irrégulier ──
        const zigAmp = tier===3 ? flapH * 0.38 : tier===2 ? flapH * 0.26 : flapH * 0.18;
        const steps  = tier===3 ? 28 : tier===2 ? 20 : 14;
        function makeTearProfile() {
          const pts = [];
          for (let i = 0; i <= steps; i++) {
            const x = i / steps;
            const wave1 = Math.sin(x * Math.PI * (tier===3 ? 5.8 : tier===2 ? 4.2 : 3.0) + 0.7) * zigAmp * 0.6;
            const wave2 = Math.sin(x * Math.PI * (tier===3 ? 11.3 : tier===2 ? 7.8 : 5.5) + 2.1) * zigAmp * 0.4;
            const wave3 = tier===3 ? Math.sin(x * Math.PI * 17.6 + 1.3) * zigAmp * 0.15 : 0;
            pts.push({ x: x * bW, y: flapH + wave1 + wave2 + wave3 });
          }
          return pts;
        }
        const tearProfile = makeTearProfile();

        // ── clip-path : le front de déchirure avance de gauche à droite ──
        // La "fente" suit exactement le profil ; à droite du front = coupure nette à flapH
        function buildClipFlap(revealW) {
          // Forme : rectangle haut complet → descend le long du profil jusqu'au front → ligne droite à flapH jusqu'à droite → coin haut droit
          const revealed = tearProfile.filter(p => p.x <= revealW);
          const frontY   = revealed.length ? revealed[revealed.length - 1].y : flapH;
          // Polygon : bord haut → droit en haut → droit à flapH → front de coupure → remonte le profil de droite à gauche → gauche bas
          let pts = [`0px 0px`, `${bW}px 0px`, `${bW}px ${flapH}px`];
          // Partie droite pas encore déchirée (ligne droite à flapH)
          pts.push(`${revealW.toFixed(1)}px ${flapH}px`);
          // Retour le long du profil déjà tracé (de droite à gauche)
          for (let i = revealed.length - 1; i >= 0; i--) {
            pts.push(`${revealed[i].x.toFixed(1)}px ${revealed[i].y.toFixed(1)}px`);
          }
          pts.push(`0px ${flapH}px`);
          return `polygon(${pts.join(', ')})`;
        }
        function buildClipBody(revealW) {
          const revealed = tearProfile.filter(p => p.x <= revealW);
          // Polygon : gauche bas → droit bas → droit haut (flapH) → front de coupure (ligne droite) → profil tracé
          let pts = [`0px 100%`, `${bW}px 100%`, `${bW}px ${flapH}px`];
          pts.push(`${revealW.toFixed(1)}px ${flapH}px`);
          for (let i = revealed.length - 1; i >= 0; i--) {
            pts.push(`${revealed[i].x.toFixed(1)}px ${revealed[i].y.toFixed(1)}px`);
          }
          pts.push(`0px ${flapH}px`);
          return `polygon(${pts.join(', ')})`;
        }

        // ── Durées selon tier ──
        const tearDurMs  = tier===3 ? 820  : tier===2 ? 600  : 440;  // durée du tracé
        const glowWidth  = tier===3 ? 18   : tier===2 ? 12   : 8;
        const glowOp     = tier===3 ? 0.95 : tier===2 ? 0.75 : 0.55;
        // Durée du fade de la lueur après fin du tracé
        const glowFadeMs = tier===3 ? 180  : tier===2 ? 140  : 100;
        // Délai avant que flap/body commencent à bouger (après fin du tracé)
        const physDelayMs = tier===3 ? 60  : tier===2 ? 50  : 40;

        // ── SVG lueur sur la fente ──
        const fenteSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        fenteSvg.setAttribute('width', bW);
        fenteSvg.setAttribute('height', bH);
        fenteSvg.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;pointer-events:none;overflow:visible;z-index:20;`;
        const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
        const gradId = 'tearGrad_' + Date.now();
        const grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
        grad.setAttribute('id', gradId);
        grad.setAttribute('x1','0%'); grad.setAttribute('y1','0%');
        grad.setAttribute('x2','100%'); grad.setAttribute('y2','0%');
        [['0%',0],['50%',glowOp],['100%',0]].forEach(([off, op]) => {
          const s = document.createElementNS('http://www.w3.org/2000/svg','stop');
          s.setAttribute('offset', off);
          s.setAttribute('stop-color', color);
          s.setAttribute('stop-opacity', String(op));
          grad.appendChild(s);
        });
        defs.appendChild(grad);
        fenteSvg.appendChild(defs);
        const fenteGlow = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        fenteGlow.setAttribute('fill','none');
        fenteGlow.setAttribute('stroke', `url(#${gradId})`);
        fenteGlow.setAttribute('stroke-width', String(glowWidth));
        fenteGlow.setAttribute('stroke-linecap','round');
        fenteGlow.setAttribute('stroke-linejoin','round');
        fenteGlow.style.cssText = `filter:blur(${tier===3?'4px':tier===2?'3px':'2px'});opacity:0;transition:opacity ${glowFadeMs}ms ease;`;
        fenteSvg.appendChild(fenteGlow);
        overlay.appendChild(fenteSvg);

        // ── Flap (haut) + Body (bas) — commencent full-image, clippath réduit au fil du tracé ──
        boosterImg.style.opacity = '0';

        const flap = document.createElement('div');
        flap.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;width:${bW}px;height:${bH}px;pointer-events:none;will-change:clip-path,transform,opacity;`;
        const fi = document.createElement('img');
        fi.src = imgSrc; fi.draggable = false;
        fi.style.cssText = `position:absolute;left:0;top:0;width:${bW}px;height:${bH}px;object-fit:contain;`;
        flap.appendChild(fi); overlay.appendChild(flap);

        const body = document.createElement('div');
        body.style.cssText = `position:absolute;left:${bX}px;top:${bY}px;width:${bW}px;height:${bH}px;pointer-events:none;will-change:clip-path,transform,opacity;`;
        const bi = document.createElement('img');
        bi.src = imgSrc; bi.draggable = false;
        bi.style.cssText = `position:absolute;left:0;top:0;width:${bW}px;height:${bH}px;object-fit:contain;`;
        body.appendChild(bi); overlay.appendChild(body);

        // Initialiser les clips (flap couvre tout en haut, body tout en bas)
        flap.style.clipPath = buildClipFlap(0);
        body.style.clipPath = buildClipBody(0);

        // ── Easing ──
        function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

        // ── RAF : Phase 1 — tracé progressif de gauche à droite ──
        const startTs = performance.now();

        function animTear(ts) {
          const elapsed = ts - startTs;
          const raw = Math.min(elapsed / tearDurMs, 1);
          const progress = easeInOut(raw);
          const revealW = progress * bW;

          // Clip-path suit le front de déchirure
          flap.style.clipPath = buildClipFlap(revealW);
          body.style.clipPath = buildClipBody(revealW);

          // Lueur suit le front (polyline des points déjà tracés)
          if (raw > 0.01) {
            fenteGlow.style.opacity = '1';
            const revealed = tearProfile.filter(p => p.x <= revealW);
            if (revealed.length >= 2) {
              fenteGlow.setAttribute('points',
                revealed.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
              );
            }
          }

          if (raw < 1) {
            requestAnimationFrame(animTear);
          } else {
            // ── Phase 2 : tracé terminé → fade rapide de la lueur + séparation physique ──
            fenteGlow.style.opacity = '0'; // CSS transition glowFadeMs

            setTimeout(()=>{
              // Flap se soulève et disparaît
              flap.style.transition = `transform ${tierCfg.flapSpeed} cubic-bezier(.4,0,.2,1), opacity ${tierCfg.flapSpeed} ease`;
              body.style.transition = `transform ${tierCfg.bottomSpeed} cubic-bezier(.4,0,.2,1), opacity ${tierCfg.bottomSpeed} ease`;
              flap.style.transformOrigin = `center ${flapH}px`;
              flap.style.transform = tier===3
                ? 'perspective(600px) rotateX(-160deg) translateY(-25%) scaleY(.85)'
                : tier===2
                ? 'perspective(600px) rotateX(-140deg) translateY(-20%)'
                : 'perspective(400px) rotateX(-120deg) translateY(-16%)';
              flap.style.opacity = '0';
              body.style.transform = tier===3
                ? 'translateY(30%) scaleX(.94)'
                : tier===2
                ? 'translateY(24%) scaleX(.96)'
                : 'translateY(20%) scaleX(.97)';
              body.style.opacity = '0';

              // Cartes éparpillées
              if(navigator.vibrate) navigator.vibrate(tier===3?[0,80,30,50,20,40,15]:[0,60,25,30,15]);
              const cardSrc = 'https://i.goopics.net/iic46c.png';
              const cardCount = 5;
              const cardW = Math.round(bW * (tier===3?.30:.28));
              const cardH = Math.round(cardW * 1.4);
              const cardPositions = [
                { dx:-bW*.50, dy: bH*.20, rot:-30, delay:.10, scale:.85 },
                { dx:-bW*.25, dy:-bH*.10, rot:-12, delay:.16, scale:.93 },
                { dx:-bW*.05, dy: bH*.24, rot:  2, delay:.13, scale:1.0 },
                { dx: bW*.20, dy:-bH*.06, rot: 14, delay:.19, scale:.91 },
                { dx: bW*.48, dy: bH*.16, rot: 30, delay:.09, scale:.86 },
              ].slice(0, cardCount);
              const cxCenter = bX + bW/2;
              const cyCenter = bY + flapH + cardH * .3;
              cardPositions.forEach((c) => {
                const cd = document.createElement('div');
                const startT = `translateX(0px) translateY(${-bH*.15}px) rotate(0deg) scale(.25)`;
                const endT   = `translateX(${c.dx}px) translateY(${c.dy}px) rotate(${c.rot}deg) scale(${c.scale})`;
                cd.style.cssText = `position:absolute;left:${cxCenter - cardW/2}px;top:${cyCenter - cardH/2}px;`
                  +`width:${cardW}px;height:${cardH}px;`
                  +`--cf-start:${startT};--cf-end:${endT};`
                  +`animation:cardFanOut .55s cubic-bezier(.22,.68,0,1.25) ${c.delay+.15}s both, cardFanFade .9s ease ${c.delay+.70}s both;`
                  +`pointer-events:none;box-shadow:0 6px 22px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.14);`;
                const ci = document.createElement('img');
                ci.src = cardSrc;
                ci.style.cssText = `width:100%;height:100%;object-fit:cover;display:block;`;
                cd.appendChild(ci); overlay.appendChild(cd);
              });
            }, physDelayMs);
          }

      const inBoosterY = e.clientY >= targetY && e.clientY <= targetY + targetH;
      if(inBoosterX && inBoosterY) {
        doTear();

        closeOverlaySoft();

    // Glisser horizontalement sur la zone haute du booster PNG → déchirer (touch)
    let _tearX0=null, _tearY0=null, _tearInZone=false;
    overlay.addEventListener('touchstart', e=>{
      const t = e.touches[0];
      _tearX0 = t.clientX; _tearY0 = t.clientY;
      // Zone de swipe = haut du PNG (de targetY à 35% du booster)
      const seamBottom = targetY + targetH * .35;
      _tearInZone = t.clientY >= targetY && t.clientY <= seamBottom
                 && t.clientX >= targetX && t.clientX <= targetX + targetW;
      // Activer la lueur dès le début du toucher en zone couture
      if(_tearInZone) startGlow(t.clientX, t.clientY);
    }, {passive:true});
    overlay.addEventListener('touchend', e=>{
      if(_tearX0===null) return;
      const dx = Math.abs(e.changedTouches[0].clientX - _tearX0);
      const dy = Math.abs(e.changedTouches[0].clientY - _tearY0);
      _tearX0=null; _tearY0=null;
      // Seuil 75% de la largeur du booster
      if(_tearInZone && dx > targetW * 0.75 && dx > dy * 1.1) doTear();
    }, {passive:true});

    overlay.addEventListener('mousedown', e=>{
      e.preventDefault(); // bloque le drag navigateur
      _mX0 = e.clientX; _mY0 = e.clientY; _mDragging = true;
      const seamBottom = targetY + targetH * .35;
      _mInZone = e.clientY >= targetY && e.clientY <= seamBottom

      // Activer la lueur dès le début du drag en zone couture
      if(_mInZone) startGlow(e.clientX, e.clientY);
      overlay.style.cursor = 'grabbing';
    });
    overlay.addEventListener('mousemove', e=>{
      if(!_mDragging || _mX0===null) return;
      const dx = Math.abs(e.clientX - _mX0);
      const dy = Math.abs(e.clientY - _mY0);
      // Déclencher si glissement ≥ 75% de la largeur du booster sur la zone couture
      if(_mInZone && dx > targetW * 0.75 && dx > dy * 1.1) {
        _mX0=null; _mDragging=false;
        overlay.style.cursor = 'default';
        doTear();
      }
    });
    overlay.addEventListener('mouseup', e=>{
      _mX0=null; _mY0=null; _mDragging=false;

// ─── LOAD PLAYER RANK (silencieux, au démarrage) ──────────────────
async function loadPlayerRankOnly(userId) {
  const db = window.db;
  if (!db || !userId) return;
  try {
    const HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Accept': 'application/json',
    };

    // Nombre de cartes distinctes du joueur connecté
    const myCardsResp = await fetch(
      SUPABASE_URL + '/rest/v1/player_cards?select=card_id&player_id=eq.' + userId + '&limit=10000',
      { headers: HEADERS }
    );
    const myCards = myCardsResp.ok ? await myCardsResp.json() : [];
    const myCardCount = new Set(myCards.map(r => r.card_id)).size;

    // Nombre de joueurs avec PLUS de cartes distinctes
    // On doit compter côté JS — pas de COUNT DISTINCT sur une colonne étrangère via REST
    const allCardsResp = await fetch(
      SUPABASE_URL + '/rest/v1/player_cards?select=player_id,card_id&limit=50000',
      { headers: HEADERS }
    );
    const allCards = allCardsResp.ok ? await allCardsResp.json() : [];

    // Construire map player_id → nb cartes distinctes
    const cardMap = {};
    (allCards||[]).forEach(r => {
      if(!r.player_id) return;
      if(!cardMap[r.player_id]) cardMap[r.player_id] = new Set();
      cardMap[r.player_id].add(r.card_id);
    });

    // Rang = nb de joueurs avec plus de cartes + 1
    let above = 0;
    Object.values(cardMap).forEach(s => {
      if(s.size > myCardCount) above++;
    });
    // Si le joueur n'est pas dans la map (0 cartes), above = nombre total de joueurs avec des cartes
    const rank = above + 1;
    setState({ playerRank: rank });
  } catch(e) { /* silencieux */ }
}

// ─── LOAD LEADERBOARD ─────────────────────────────────────────────
async function loadLeaderboard(period){
  setState({leaderboardLoading:true});

  const HEADERS = {
    'apikey':        SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Accept':        'application/json',
  };

  try {
    // ── 1. Tous les joueurs ────────────────────────────────────────
    const playersUrl = SUPABASE_URL +
      '/rest/v1/players' +
      '?select=id,discord_username,avatar_url,wins,losses,coins,xp,first_win_date,last_streak_date' +
      '&order=coins.desc.nullslast&limit=500';

    const [playersResp, playerCardsResp, cardDefsResp, statsResp] = await Promise.all([
      fetch(playersUrl, {headers: HEADERS}),
      // player_cards : qui possède quoi
      fetch(SUPABASE_URL + '/rest/v1/player_cards?select=player_id,card_id&limit=100000', {headers: HEADERS}),
      // cards : définitions (id → rarity) — source de vérité pour les raretés
      fetch(SUPABASE_URL + '/rest/v1/cards?select=id,rarity&limit=10000', {headers: HEADERS}),
      fetch(SUPABASE_URL + '/rest/v1/stats?select=user_id,time_played_seconds&limit=500', {headers: HEADERS}),
    ]);

    if(!playersResp.ok){
      console.error('[Leaderboard] players HTTP', playersResp.status);
      setState({leaderboardLoading:false, leaderboardData:[]}); return;
    }

    const rawPlayers  = await playersResp.json();
    const rawCards    = playerCardsResp.ok ? await playerCardsResp.json() : [];
    const rawCardDefs = cardDefsResp.ok    ? await cardDefsResp.json()    : [];
    const rawStats    = statsResp.ok       ? await statsResp.json()       : [];
    console.log('[Leaderboard] joueurs:', rawPlayers?.length,
      '| player_cards:', rawCards?.length,
      '| card_defs:', rawCardDefs?.length,
      '| stats:', rawStats?.length);

    // Map user_id → time_played_seconds
    // Si stats vide ou absente : estimer via (wins+losses)*15min
    const timeMap = {};
    const statsOk = rawStats && rawStats.length > 0;
    (rawStats||[]).forEach(s=>{ if(s.user_id && s.time_played_seconds > 0) timeMap[s.user_id] = s.time_played_seconds; });

    // ── 2. Construire la map player_id → cartes + rarités ──────────
    const cardCountMap  = {}; // player_id → Set(card_id distincts)
    const raritySetMap  = {}; // player_id → {common:Set, uncommon:Set, rare:Set, mythic:Set}

    // Map card_id → rarity depuis la table "cards" Supabase (source de vérité)
    // Les valeurs de rarity dans Supabase peuvent être 'COMMUNE','PEU COMMMUNE','RARE','MYTHIQUE'
    // ou 'common','uncommon','rare','mythic' selon la config — on normalise les deux
    const RARITY_NORM = {
      'COMMUNE':'common','PEU COMMMUNE':'uncommon','RARE':'rare','MYTHIQUE':'mythic',
      'common':'common','uncommon':'uncommon','rare':'rare','mythic':'mythic',
    };
    const cardRarityMap = {};
    (rawCardDefs||[]).forEach(c => {
      if(c.id !== undefined && c.rarity !== undefined){
        cardRarityMap[String(c.id)] = RARITY_NORM[c.rarity] || c.rarity.toLowerCase();
      }
    });
    console.log('[Leaderboard] cardRarityMap taille:', Object.keys(cardRarityMap).length,
      '| exemple:', Object.entries(cardRarityMap).slice(0,3));

    (rawCards||[]).forEach(row => {
      if(!row.player_id) return;
      const pid = row.player_id;
      const cid = String(row.card_id);

      // Set global des cartes distinctes
      if(!cardCountMap[pid]) cardCountMap[pid] = new Set();
      cardCountMap[pid].add(cid);

      // Set par rareté (une seule entrée par card_id distinct)
      if(!raritySetMap[pid]) raritySetMap[pid] = {common:new Set(),uncommon:new Set(),rare:new Set(),mythic:new Set()};
      const r = cardRarityMap[cid];
      if(r && raritySetMap[pid][r]) raritySetMap[pid][r].add(cid);
    });

    // Convertir les Sets en comptages
    const rarityCountMap = {};
    Object.keys(raritySetMap).forEach(pid => {
      rarityCountMap[pid] = {
        common:   raritySetMap[pid].common.size,
        uncommon: raritySetMap[pid].uncommon.size,
        rare:     raritySetMap[pid].rare.size,
        mythic:   raritySetMap[pid].mythic.size,
      };
    });

    // ── 3. Normaliser + enrichir ───────────────────────────────────
    const totalCardCount = rawCardDefs.length || ALL_CARDS.length || 0;
    let all = (rawPlayers||[]).map(p => {
      const xp = p.xp ?? 0;
      const lvl = computeLevel(xp).level;
      const rc = rarityCountMap[p.id] || {common:0,uncommon:0,rare:0,mythic:0};
      return {
        ...p,
        wins:   p.wins   ?? 0,
        losses: p.losses ?? 0,
        coins:  p.coins  ?? 0,
        xp,
        level:       lvl,
        cards:       cardCountMap[p.id] ? cardCountMap[p.id].size : 0,
        time_secs:   timeMap[p.id] || ((p.wins||0)+(p.losses||0)) * 900,
        rc_common:   rc.common,
        rc_uncommon: rc.uncommon,
        rc_rare:     rc.rare,
        rc_mythic:   rc.mythic,
        coll_pct:    totalCardCount > 0 ? Math.round((cardCountMap[p.id]?.size || 0) / totalCardCount * 100) : 0,
      };
    });

    // Assurer que le joueur connecté est présent
    const myId = state.currentUser?.id;
    if(myId && !all.find(p => p.id === myId)){
      const meta = state.currentUser?.user_metadata || {};
      all.push({
        id: myId,
        discord_username: meta.full_name || meta.name || 'Toi',
        avatar_url: meta.avatar_url || null,
        wins: state.wins ?? 0, losses: state.losses ?? 0, coins: state.coins ?? 0,
        cards: cardCountMap[myId] ? cardCountMap[myId].size : 0,
        first_win_date: null, last_streak_date: null,
      });
    }

    // ── 4. Filtre par période ──────────────────────────────────────
    // "Semaine" = joueurs actifs cette semaine (first_win_date ou last_streak_date dans les 7j)
    // "Mois"    = joueurs actifs ce mois (dans les 30j)
    // "All"     = tous
    let filtered = all;

    if(period === 'week'){
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 7);
      const active = all.filter(p => {
        const d1 = p.first_win_date   ? new Date(p.first_win_date)   : null;
        const d2 = p.last_streak_date ? new Date(p.last_streak_date) : null;
        return (d1 && d1 >= cutoff) || (d2 && d2 >= cutoff);
      });
      filtered = active.length > 0 ? active : all; // fallback si personne n'a joué
    } else if(period === 'month'){
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);
      const active = all.filter(p => {
        const d1 = p.first_win_date   ? new Date(p.first_win_date)   : null;
        const d2 = p.last_streak_date ? new Date(p.last_streak_date) : null;
        return (d1 && d1 >= cutoff) || (d2 && d2 >= cutoff);
      });
      filtered = active.length > 0 ? active : all;
    }

    // ── 5. Tri : cards desc, coins desc en départage ────────────────
    filtered.sort((a,b) => (b.cards - a.cards) || (b.coins - a.coins));

    // ── 6. Rang du joueur connecté — toujours sur ALL trié par cartes ──
    // (indépendant du filtre période pour que le bouton RANG soit cohérent)
    const allByCards = [...all].sort((a,b) => (b.cards - a.cards) || (b.coins - a.coins));
    let playerRank = null;
    if(myId){
      const idx = allByCards.findIndex(r => r.id === myId);
      playerRank = idx !== -1 ? idx + 1 : null;
    }

    setState({leaderboardLoading:false, leaderboardData: filtered.slice(0,50), playerRank});

  } catch(e){
    console.error('[Leaderboard] exception:', e);
    setState({leaderboardLoading:false, leaderboardData:[]});
  }
}

// ─── SWIPE NAVIGATION (onglet par onglet, zone contenu uniquement) ─
(function initSwipe(){
  let _t0x = null, _t0y = null;
  let _locked = null; // 'h' | 'v' | null
  let _startEl = null;

  function anyModalOpen(){
    return state.showSettings||state.showFriends||state.showNotif||state.showMessages||
           state.showPioche||state.showLeaderboard||state.showTutorial||state.showDeckBuilder||
           state.collSelectedCard||state.showTrade||state.showProfile||state.showAddFriend||
           state.showQuests||state.showHowTo;
  }

  function isInNav(el){
    const nav = document.getElementById('bottom-nav');
    const header = document.querySelector('#app > div > div:first-child');
    if(nav && nav.contains(el)) return true;
    if(header && header.contains(el)) return true;
    return false;
  }

  document.addEventListener('touchstart', e => {
    if(anyModalOpen()) return;
    if(isInNav(e.target)) return;
    const touch = e.touches[0];
    _t0x = touch.clientX;
    _t0y = touch.clientY;
    _locked = null;
    _startEl = e.target;
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if(_t0x === null || anyModalOpen()) return;
    const dx = e.touches[0].clientX - _t0x;
    const dy = e.touches[0].clientY - _t0y;
    if(_locked === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)){
      // Ratio plus strict : 2:1 horizontal/vertical pour éviter les faux positifs lors du scroll
      _locked = Math.abs(dx) > Math.abs(dy) * 2 ? 'h' : 'v';
    }
  }, {passive: true});

  document.addEventListener('touchend', e => {
    if(_t0x === null) return;
    const dx = e.changedTouches[0].clientX - _t0x;
    const wasH = _locked === 'h';
    const capturedStartEl = _startEl;
    _t0x = null; _t0y = null; _locked = null; _startEl = null;

    if(!wasH) return;
    if(anyModalOpen()) return;

    // Sur l'onglet Boosters : le swipe appartient entièrement au carrousel, jamais aux onglets
    if(state.tab === 2) return;

    // Seuil : 55px ou 16% de la largeur — volontaire
    const threshold = Math.max(55, window.innerWidth * 0.16);
    if(Math.abs(dx) < threshold) return;

    if(dx < 0 && state.tab < 2){
      setState({tab: state.tab + 1});
      if(state.tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    } else if(dx > 0 && state.tab > 0){
      setState({tab: state.tab - 1});
    }
  }, {passive: true});
})();

// ─── VALIDATION DE DECK (règles : 30 cartes, max 2 Mythiques, max 2 exemplaires d'une même carte) ──
// Retourne { valid, errors:[{code,msg}], stats:{total,mythCount,dupOver} }
function validateDeck(deck) {
  const errors = [];
  const cards = (deck && deck.cards) || [];
  let total = 0;
  let mythCount = 0;
  const dupOver = []; // cartes (toutes raretés) > 2 exemplaires
  for (const c of cards) {
    const card = ALL_CARDS.find(x => parseInt(x.id) === parseInt(c.card_id));
    total += c.quantity;
    if (!card) continue;
    if (card.rarity === 'mythic') {
      mythCount += c.quantity;
    }
    // Limite de 2 exemplaires d'une même carte, quelle que soit la rareté
    if (c.quantity > 2) {
      dupOver.push({ name: card.name, qty: c.quantity, rarity: card.rarity });
    }
  }
  if (total !== 30) errors.push({ code: 'total', msg: `Le deck doit contenir exactement 30 cartes (actuellement ${total}/30)` });
  if (mythCount > 2) errors.push({ code: 'mythTotal', msg: `Maximum 2 cartes Mythiques au total dans le deck (actuellement ${mythCount})` });
  dupOver.forEach(c => {
    const rLabel = RARITY_LABEL[c.rarity] || '';
    errors.push({ code: 'dup', msg: `"${c.name}"${rLabel?` (${rLabel})`:''} : max 2 exemplaires (actuellement ${c.qty})` });
  });
  return { valid: errors.length === 0, errors, stats: { total, mythCount, dupOver } };
}

  if (notifIdx !== undefined && notifIdx !== null) n.splice(notifIdx, 1);
  setState({ welcomeNotifs: n, showNotif: false });

  // 2. Marquer comme réclamé côté Supabase (AVANT la redirection : on veut
  //    s'assurer que le flag est persisté, sinon une erreur réseau laisserait
  //    la porte ouverte à une seconde réclamation).
  if (uid && window.db) {
    try {
      await window.db.from('players')
        .update({ starter_pack_claimed: true, pending_free_booster: 'booster_normal' })
        .eq('id', uid);
    } catch(e) {
      // En cas d'échec : on bloque, on ré-affiche la notif et on informe.
      console.error('Starter pack claim failed:', e);
      setState({ welcomeNotifs: [...(state.welcomeNotifs || []), { id: 'starter', type: 'starter_pack' }] });
      if (window.showToast) window.showToast('Connexion perdue, réessaie', '⚠️');
      return;
    }
  }

  // 3. Mirror localStorage + redirection booster
  try { localStorage.setItem('starter_claimed_' + (uid || ''), '1'); } catch(e) {}
  if (window.setBoosterFree) window.setBoosterFree();
  // Ticket à usage unique : autorise l'ouverture sur booster1.html
  try { sessionStorage.setItem('booster_ticket', JSON.stringify({ bid: 1, ts: Date.now() })); } catch(e) {}
  window.location.href = 'booster1.html';
};

// ─── RÉCOMPENSES & STREAK ─────────────────────────────────────────
const STREAK_REWARDS = [25, 50, 75, 100, 125, 150, 200]; // J1→J7

// ─── SYSTÈME XP & NIVEAUX ─────────────────────────────────────────
// Coût en XP pour passer du niveau N au niveau N+1
function xpToNextLevel(level) {
  if (level <= 0) return 250;
  // Dizaine de transition (X9 → X0 suivant) : coût élevé
  // Sauf si c'est une centaine (99→100, 199→200, etc.)
  const isCentury   = (level % 100) === 99; // 99,199,299…
  const isDecade    = (level % 10)  === 9;  // 9,19,29… (inclut 99 donc on check d'abord century)
  if (isCentury) return 3000;
  if (isDecade)  return 1500; // 9→10, 19→20, 29→30…
  if (level < 9) return 250;  // niveaux 1–8 → 9 (palette initiale)
  return 500;                 // tout le reste (10–98, 100–198, etc.)
}

// Calcule le niveau et l'XP restante à partir d'un total d'XP brut
function computeLevel(totalXp) {
  let lvl = 1;
  let remaining = totalXp;
  while (true) {
    const cost = xpToNextLevel(lvl);
    if (remaining < cost) break;
    remaining -= cost;
    lvl++;
  }
  return { level: lvl, xpInLevel: remaining, xpNeeded: xpToNextLevel(lvl) };
}

// XP total cumulé pour atteindre le début du niveau N (sans compter le dernier palier)
function totalXpForLevel(level) {
  let total = 0;
  for (let l = 1; l < level; l++) total += xpToNextLevel(l);
  return total;
}

// ─── RÉCOMPENSES DE NIVEAU ────────────────────────────────────────
function getLevelReward(level) {
  if (level % 10 === 0) return { type: 'booster_legendaire', label: 'Booster Légendaire ⚡' };
  if (level % 5  === 0) return { type: 'booster_prestige',   label: 'Booster Prestige 📦' };
  return { type: 'coins', amount: 300, label: '300 coins' };
}

async function grantLevelReward(userId, level) {
  const db = window.db;
  if (!db || !userId) return;
  const reward = getLevelReward(level);

  // ── Guard anti-doublon fiable : charger toutes les notifs du type, filtrer en JS ──
  try {
    const { data: allNotifs } = await db.from('notifications')
      .select('id, read, meta')
      .eq('user_id', userId)
      .in('type', ['level_reward', 'level_reward_booster']);

    const existingForLevel = (allNotifs || []).filter(n => {
      try { return JSON.parse(n.meta || '{}').level === level; } catch(e) { return false; }
    });

    if (existingForLevel.length > 0) {
      // Notif déjà existante (lue ou non) pour ce niveau → ne pas recréer
      const unread = existingForLevel.find(n => !n.read);
      if (unread) {
        const alreadyPending = (state.pendingLevelRewards||[]).some(r => r.notifId === unread.id);
        if (!alreadyPending) {
          setState({ pendingLevelRewards: [...(state.pendingLevelRewards||[]), { notifId: unread.id, level, ...reward }] });
        }
      }
      return; // Ne pas recréer
    }
  } catch(e) { console.warn('grantLevelReward guard error', e); }

  if (reward.type === 'coins') {
    let notifId = null;
    try {
      const { data: notifData } = await db.from('notifications').insert({
        user_id: userId, type: 'level_reward', from_id: userId,
        text: `Niveau ${level} atteint ! Récompense : +${reward.amount} coins`,
        read: false,
        meta: JSON.stringify({ level, rewardType: 'coins', amount: reward.amount }),
      }).select('id').single();
      notifId = notifData?.id || null;
    } catch(e) {}
    setState({ pendingLevelRewards: [...(state.pendingLevelRewards||[]), { notifId, level, ...reward }] });
  } else {
    let notifId = null;
    try {
      const { data: notifData } = await db.from('notifications').insert({
        user_id: userId, type: 'level_reward_booster', from_id: userId,
        text: `Niveau ${level} atteint ! Récompense : ${reward.label}`,
        read: false,
        meta: JSON.stringify({ rewardType: reward.type, level }),
      }).select('id').single();
      notifId = notifData?.id || null;
    } catch(e) {}
    setState({ pendingLevelRewards: [...(state.pendingLevelRewards||[]), { notifId, level, ...reward }] });
  }
}

async function grantXp(userId, amount, reason) {
  const db = window.db;
  if (!db || !userId || !amount) return;
  const { data } = await db.from('players').select('xp').eq('id', userId).single();
  const currentXp = data?.xp ?? 0;
  const newXp = currentXp + amount;
  await db.from('players').update({ xp: newXp }).eq('id', userId);
  const before = computeLevel(currentXp);
  const after  = computeLevel(newXp);
  setState({ playerXp: newXp, playerLevel: after.level });
  if (after.level > before.level) {
    // Toast + récompense pour CHAQUE niveau passé
    for (let l = before.level + 1; l <= after.level; l++) {
      const reward = typeof getLevelReward === 'function' ? getLevelReward(l) : null;
      const delay = (l - before.level - 1) * 4000;
      setTimeout(() => showXpLevelUpToast(l, reward), delay);
      await grantLevelReward(userId, l);
    }
  }
}

function showXpToast(amount, reason) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:70px;right:14px;background:linear-gradient(135deg,rgba(15,14,23,.97),rgba(26,24,37,.97));color:#fffbeb;padding:8px 14px;font-size:11px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 0 0 2px #000,3px 3px 0 #000;transition:opacity .4s,transform .4s;opacity:0;transform:translateY(-8px);border:1px solid rgba(139,92,246,.4);';
  el.innerHTML = `<span style="font-size:16px;">✨</span><div><div style="font-size:10px;color:#a78bfa;font-weight:900;letter-spacing:.5px;">${reason}</div><div style="font-size:12px;font-weight:900;color:#c4b5fd;">+${amount} XP</div></div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateY(0)'; });
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(-12px)'; setTimeout(()=>el.remove(),400); }, 2800);
}

function showXpLevelUpToast(newLevel, reward) {
  // Son level up via Web Audio
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047]; // do mi sol do
    notes.forEach((freq, i) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = freq;
      const t = ac.currentTime + i * 0.12;

// ── Détection de level up au retour sur la page (depuis un mode de jeu) ──
(function() {
  const LEVEL_KEY = 'tcg_player_level_before';

  // Sauvegarder le niveau courant quand on quitte la page
  window.addEventListener('pagehide', () => {
    const lvl = state.playerLevel || 1;
    try { sessionStorage.setItem(LEVEL_KEY, String(lvl)); } catch(e) {}
  });

  // Vérifier au retour sur la page
  async function checkLevelUpOnReturn() {
    if (state.screen !== 'game') return; // seulement si on est sur l'écran principal
    const userId = state.currentUser?.id;
    if (!userId || !window.db) return;

    const storedLevel = parseInt(sessionStorage.getItem(LEVEL_KEY) || '0');
    if (!storedLevel) return;

    // Recharger le XP depuis Supabase
    const { data } = await window.db.from('players').select('xp').eq('id', userId).single();
    const xp = data?.xp ?? 0;
    const { level: currentLevel } = computeLevel(xp);

    if (currentLevel > storedLevel) {
      // Level up détecté — toast + récompense pour chaque niveau manqué
      for (let l = storedLevel + 1; l <= currentLevel; l++) {
        const reward = typeof getLevelReward === 'function' ? getLevelReward(l) : null;
        setTimeout(() => showXpLevelUpToast(l, reward), (l - storedLevel - 1) * 4000);
        await grantLevelReward(userId, l); // accorder la récompense (guard anti-doublon intégré)
      }
      setState({ playerXp: xp, playerLevel: currentLevel });
    }
    try { sessionStorage.removeItem(LEVEL_KEY); } catch(e) {}
  }

  // Au retour via visibilitychange (tab redevenu visible)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      setTimeout(checkLevelUpOnReturn, 800);
    }
  });

  // Au retour via pageshow (back/forward cache, retour depuis booster.html etc.)
  window.addEventListener('pageshow', (e) => {
    if (e.persisted || performance.navigation?.type === 2) {
      setTimeout(checkLevelUpOnReturn, 800);
    }
  });
})();

async function loadPlayerXp(userId) {
  const db = window.db;
  if (!db || !userId) return;
  const { data } = await db.from('players').select('xp').eq('id', userId).single();
  const xp = data?.xp ?? 0;
  const { level } = computeLevel(xp);
  setState({ playerXp: xp, playerLevel: level });

  try {
    // 1. Charger les niveaux déjà réclamés (source de vérité absolue)
    const { data: claimedRows } = await db.from('claimed_rewards')
      .select('level').eq('player_id', userId);
    const claimedLevels = new Set((claimedRows || []).map(r => r.level));

    // 2. Charger les récompenses dans level_rewards pour avoir les bons montants
    const { data: rewardRows } = await db.from('level_rewards')
      .select('level, reward_type, amount, label');
    const rewardMap = {};
    (rewardRows || []).forEach(r => { rewardMap[r.level] = r; });

    // 3. Charger les notifs non lues
    const { data: allLvlNotifs } = await db.from('notifications')
      .select('id, type, read, meta')
      .eq('user_id', userId)
      .in('type', ['level_reward', 'level_reward_booster'])
      .eq('read', false);

    const levelsWithNotif = new Set();
    const pendingRewards = [];

    (allLvlNotifs || []).forEach(n => {
      let meta = {};
      try { meta = JSON.parse(n.meta || '{}'); } catch(e) {}
      const lvl = typeof meta.level === 'number' ? meta.level : parseInt(meta.level);
      if (!lvl || isNaN(lvl)) return;
      levelsWithNotif.add(lvl);

      // Ne pas afficher si déjà réclamé en base
      if (claimedLevels.has(lvl)) return;

      // Lire le montant depuis level_rewards (source de vérité), fallback sur meta
      const rwd = rewardMap[lvl];
      if (rwd) {
        if (rwd.reward_type === 'coins') {
          pendingRewards.push({ notifId: n.id, level: lvl, type: 'coins', amount: rwd.amount || 300 });
        } else {
          pendingRewards.push({ notifId: n.id, level: lvl, type: rwd.reward_type, label: rwd.label });
        }
      } else {
        // Fallback si level_rewards pas encore rempli
        if (n.type === 'level_reward') {
          const match = (n.meta || '').match(/"amount":(\d+)/);
          pendingRewards.push({ notifId: n.id, level: lvl, type: 'coins', amount: match ? parseInt(match[1]) : 300 });
        } else {
          pendingRewards.push({ notifId: n.id, level: lvl, type: meta.rewardType || 'booster_prestige', label: n.text });
        }
      }
    });

    // 4. Pour chaque niveau atteint non réclamé et sans notif → créer la notif
    for (let l = 2; l <= level; l++) {
      if (!claimedLevels.has(l) && !levelsWithNotif.has(l)) {
        await grantLevelReward(userId, l);
      }
    }

    // 5. Mettre à jour le state avec les récompenses à afficher + les niveaux réclamés
    setState({ _claimedLevels: claimedLevels });
    if (pendingRewards.length > 0) {
      const existing = state.pendingLevelRewards || [];
      const existingIds = new Set(existing.map(r => r.notifId));
      const newOnes = pendingRewards.filter(r => r.notifId && !existingIds.has(r.notifId));
      if (newOnes.length > 0) setState({ pendingLevelRewards: [...existing, ...newOnes] });
    }
  } catch(e) { console.warn('[loadPlayerXp]', e); }
}
window.claimLevelReward = async function(btn, notifId, rewardType, amount, level) {
  if(btn.disabled) return;
  amount = parseInt(amount) || 0;
  level = parseInt(level) || 0;

  btn.disabled = true;
  btn.textContent = '…';

  // Récupérer db — recréer si window.db absent
  let db = window.db;
  if(!db && window.supabase && window.supabase.createClient) {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY,
      { auth: { autoRefreshToken: true, persistSession: true } });
    window.db = db;
  }
  const _s = window._gameState || {};
  const myId = _s?.currentUser?.id;

  if(!db || !myId || !level) {
    console.error('[claim] manquant:', {db:!!db, myId, level});
    btn.disabled = false; btn.textContent = 'RÉCLAMER'; return;
  }

  // Insérer dans claimed_rewards (la contrainte UNIQUE bloque le double-claim)
  const { error: insertErr } = await db.from('claimed_rewards').insert({ player_id: myId, level: level });
  if(insertErr) {
    // Déjà réclamé → juste nettoyer l'interface
    console.warn('[claim] déjà réclamé:', insertErr.message);
    const remaining = ((window._gameState||{}).pendingLevelRewards||[]).filter(r => r.level !== level);
    setState({ pendingLevelRewards: remaining, showNotif: false });
    if(notifId) { try { await db.from('notifications').update({ read: true }).eq('id', notifId); } catch(e) {} }
    return;
  }

  // Marquer uniquement la notif de CE niveau comme lue
  if(notifId) {
    try { await db.from('notifications').update({ read: true }).eq('id', notifId) } catch(e) {};
  }

  const remaining = ((window._gameState||{}).pendingLevelRewards||[]).filter(r => r.level !== level);

  // Mettre à jour le Set local des niveaux réclamés pour bloquer le realtime
  const updatedClaimed = new Set(state._claimedLevels || []);
  updatedClaimed.add(level);

  if(rewardType === 'coins') {
    const { data: playerData } = await db.from('players').select('coins').eq('id', myId).single();
    const current = playerData?.coins ?? 0;
    await db.from('players').update({ coins: current + amount }).eq('id', myId);
    setState({ coins: current + amount, pendingLevelRewards: remaining, showNotif: false, _claimedLevels: updatedClaimed });
    // ── Stats coins earned ──────────────────────────────────────────
    try{ db.rpc('increment_stat', { p_user_id: myId, p_field: 'coins_earned', p_amount: amount }).then(()=>{}).catch(()=>{}); }catch(e){}
    showRewardToast('Niveau ' + level + ' — Récompense reçue !', amount, '<svg width="10" height="10" viewBox="0 0 24 24" fill="#fbbf24" style="flex-shrink:0;vertical-align:middle;"><circle cx="12" cy="12" r="10" opacity=".4"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.5h-2v-1.8c-1.4-.3-2.5-1.3-2.5-2.7h2c0 .6.7 1 1.5 1s1.5-.4 1.5-1c0-.7-.6-1-1.8-1.3C10.1 10.3 9 9.4 9 8c0-1.3 1-2.3 2.5-2.6V3.5h2v1.9c1.3.4 2.2 1.4 2.2 2.6h-2c0-.6-.6-1-1.5-1s-1.4.4-1.4 1c0 .6.5.9 1.7 1.2 1.8.4 3 1.4 3 3 0 1.4-1 2.5-2.5 2.8v1.5z"/></svg>');
  } else {
    try { await db.from('players').update({ pending_free_booster: rewardType }).eq('id', myId) } catch(e) {};
    setState({ showNotif: false, pendingLevelRewards: remaining, _claimedLevels: updatedClaimed });
    setTimeout(()=>{
      if(rewardType === 'booster_legendaire') {
        try { sessionStorage.setItem('booster_ticket', JSON.stringify({ bid: 3, ts: Date.now() })); } catch(e) {}
        window.location.href = 'booster3.html';
      } else {
        try { sessionStorage.setItem('booster_ticket', JSON.stringify({ bid: 2, ts: Date.now() })); } catch(e) {}
        window.location.href = 'booster2.html';
      }
    }, 200);
  }
};

window.isBoosterFree = function() {
  try {
    const ss = sessionStorage.getItem('booster_free');
    if(ss === '1') {
      sessionStorage.removeItem('booster_free');
      try { localStorage.removeItem('booster_free'); } catch(e) {}
      return true;
    }
    // Fallback localStorage (TTL 5 min)
    const ls = localStorage.getItem('booster_free');
    if(ls) {
      const obj = JSON.parse(ls);
      if(obj.v === '1' && (Date.now() - obj.t) < 5 * 60 * 1000) {
        localStorage.removeItem('booster_free');
        return true;
      }
      localStorage.removeItem('booster_free');
    }
  } catch(e) {}
  return false;
};

async function checkLoginStreak(userId) {
  const db = window.db;
  if (!db || !userId) return;

  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

  // Lire le streak depuis Supabase (lié au compte, pas au device)
  const { data: playerRow } = await db
    .from('players')
    .select('streak, last_streak_date, first_win_date')
    .eq('id', userId)
    .single();

  if (!playerRow) return;

  const lastStreakDate = playerRow.last_streak_date;
  const firstWinDate = playerRow.first_win_date;

  // Déjà récompensé aujourd'hui → juste afficher
  if (lastStreakDate === today) {
    setState({ loginStreak: playerRow.streak || 1, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });
    return;
  }

  // Calculer le nouveau streak
  let newStreak = 1;
  if (lastStreakDate) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastStreakDate === yesterday.toISOString().slice(0, 10)) {
      newStreak = ((playerRow.streak || 0) % 7) + 1;
    }
  }

  // Accorder la récompense coins
  const coinsEarned = STREAK_REWARDS[newStreak - 1];
  await grantCoins(userId, coinsEarned, `Connexion Jour ${newStreak}`);
  showRewardToast(`🔥 Streak Jour ${newStreak} !`, coinsEarned, '🔥');

  // +10 XP connexion quotidienne
  await grantXp(userId, 10, 'Connexion quotidienne');
  showXpToast(10, 'Connexion du jour');

  // Sauvegarder dans Supabase
  await db.from('players').update({
    streak: newStreak,
    last_streak_date: today,
  }).eq('id', userId);

  setState({ loginStreak: newStreak, lastLoginDate: today, firstWinTodayDone: firstWinDate === today });

}

  if (!userId) return;

  // La quête hebdo target = 12 (= 3 fois toutes les quêtes quotidiennes sur la semaine)

// Incrémenter un compteur de quête quotidienne et déclencher la récompense si complète
async function progressDailyQuest(questId) {
  const userId = state.currentUser?.id;
  if (!userId) return;
  const d = getDailyData(userId);
  const today = _todayStr();

  const questKey = 'dq_' + questId;
  const doneKey  = 'dq_' + questId + '_done';

  // Vérifier que c'est bien aujourd'hui (reset auto)
  const progress = (d[questKey + '_date'] === today) ? (d[questKey] || 0) : 0;
  const done     = (d[doneKey + '_date'] === today) ? d[doneKey] : false;
  if (done) return; // déjà complétée

  const quest = DAILY_QUESTS.find(q => q.id === questId);
  if (!quest) return;

  const newProgress = progress + 1;
  setDailyData(userId, {
    [questKey]: newProgress,
    [questKey + '_date']: today,
  });
  setState({ _questUpdate: Date.now() }); // forcer re-render

  if (newProgress >= quest.target) {
    // Récompense !
    setDailyData(userId, { [doneKey]: true, [doneKey + '_date']: today });
    await grantCoins(userId, quest.coins, 'Quête : ' + quest.label);
    showRewardToast('Quête : ' + quest.label, quest.coins, quest.icon);
    await grantXp(userId, quest.xp, 'Quête : ' + quest.label);
    showXpToast(quest.xp, 'Quête : ' + quest.label);
    setState({ _questUpdate: Date.now() });
    // Vérifier si 3 quêtes quotidiennes complétées ce jour → quête hebdo
    _checkDailyQuestCountForWeekly(userId);
  }
}

// Incrémenter un compteur de quête hebdomadaire
async function progressWeeklyQuest(questId) {
  const userId = state.currentUser?.id;
  if (!userId) return;
  const w = getWeeklyData(userId);

  const questKey = 'wq_' + questId;
  const doneKey  = 'wq_' + questId + '_done';

  const progress = w[questKey] || 0;
  if (w[doneKey]) return;

  const quest = WEEKLY_QUESTS.find(q => q.id === questId);
  if (!quest) return;

  const newProgress = progress + 1;
  setWeeklyData(userId, { [questKey]: newProgress });
  setState({ _questUpdate: Date.now() });

  if (newProgress >= quest.target) {
    setWeeklyData(userId, { [doneKey]: true });
    await grantCoins(userId, quest.coins, 'Quête semaine : ' + quest.label);
    showRewardToast('Quête semaine : ' + quest.label, quest.coins, quest.icon);
    await grantXp(userId, quest.xp, 'Quête semaine : ' + quest.label);
    showXpToast(quest.xp, 'Quête semaine : ' + quest.label);

// Retourne true si on peut lancer le jeu, false sinon. Ouvre le Deck Builder si besoin de correction.
async function checkDefaultDeck() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) { showToast('Non connecté', '✗'); return false; }

  const { data: deck } = await db.from('decks')
    .select('id, name, is_default')
    .eq('player_id', myId)
    .eq('is_default', true)
    .single();

  if (!deck) {
    showDeckRuleModal({
      title: 'Aucun deck par défaut',
      icon: '🗂️',
      message: 'Tu dois configurer un deck par défaut avant de jouer. Ouvre le Deck Builder dans l\'onglet Collection pour en créer un.',
      confirmLabel: 'Ouvrir le Deck Builder',
      onConfirm: () => setState({ tab: 1, showDeckBuilder: true, deckBuilderView: 'list' })
    });
    return false;
  }

  const { data: dc } = await db.from('deck_cards')
    .select('card_id, quantity')
    .eq('deck_id', deck.id);

  const deckForValidation = { cards: (dc || []).map(c => ({ card_id: c.card_id, quantity: c.quantity })) };
  const validation = validateDeck(deckForValidation);

  if (validation.valid) return true;

  // Construire un message explicite selon les problèmes
  const total = validation.stats.total;
  const structuralErrors = validation.errors.filter(e => e.code !== 'total');

  if (total < 30 && structuralErrors.length === 0) {
    // Juste incomplet
    showDeckRuleModal({
      title: `Deck "${deck.name}" incomplet`,
      icon: '⚠️',
      message: `Ton deck contient seulement <b>${total}/30 cartes</b>. Complète-le dans le Deck Builder pour pouvoir jouer.`,
      confirmLabel: 'Ouvrir le Deck Builder',
      cancelLabel: 'Plus tard',
      onConfirm: () => {
        setState({ tab: 1, showDeckBuilder: true, deckBuilderView: 'edit', activeDeckId: deck.id });
      }
    });
    return false;
  }

  // Violations structurelles (+ éventuellement total != 30)
  showDeckRuleModal({
    title: `Deck "${deck.name}" invalide`,
    icon: '⚠️',
    message: `Ton deck par défaut ne respecte pas les règles de jeu. Corrige-le avant de lancer une partie.`,
    lines: validation.errors.map(e => e.msg),
    confirmLabel: 'Ouvrir le Deck Builder',
    cancelLabel: 'Plus tard',
    onConfirm: () => {
      setState({ tab: 1, showDeckBuilder: true, deckBuilderView: 'edit', activeDeckId: deck.id });
    }
  });
  return false;
}

// Au chargement : vérifier si retour OAuth Discord (hash dans l'URL)
waitForSupabase(() => {
  const db = window.db;

  // Si retour depuis Discord OAuth
  if (window.location.hash.includes('access_token')) {
    db.auth.onAuthStateChange(async (event, session) => {
      if ((event === 'SIGNED_IN') && session) {
        history.replaceState(null, '', window.location.pathname);
        const user = session.user;
        // Vérifier si le joueur existe déjà avant l'upsert
        const { data: existingPlayer } = await db.from('players').select('id,coins').eq('id', user.id).single();
        const isNewPlayer = !existingPlayer;
        await db.from('players').upsert({
          id: user.id,
          discord_username: user.user_metadata.full_name || user.user_metadata.name,
          avatar_url: user.user_metadata.avatar_url,
        }, { onConflict: 'id' });
        const { data: playerData } = await db.from('players').select('coins').eq('id', user.id).single();
        if (isNewPlayer) {
          // Stocker un flag pour déclencher les notifs de bienvenue après enterGame
          sessionStorage.setItem('_new_player', '1');
        }
        enterGame(user, playerData ? playerData.coins : 100);
      }
    });
    return;
  }

  // Session déjà stockée → entrer auto sans clic
  const stored = getStoredSession();
  if (stored && stored.user) {
    db.from('players').select('coins').eq('id', stored.user.id).single()
      .then(({ data }) => {
        enterGame(stored.user, data ? data.coins : 0);
      });
  }
});

async function loadCollection() {
  // Attendre db
  let tries = 0;
  while (!window.db && tries++ < 50) await new Promise(r => setTimeout(r, 100));
  const db = window.db;
  if (!db) { console.error('[Collection] db indispo'); return; }

  // Récupérer l'user depuis la session active
  const userId = state.currentUser?.id;
  if (!userId) { console.warn('[Collection] pas de currentUser'); return; }

  const { data: allCards, error } = await db.from('cards').select('*').order('id');
  if (error) { console.error('[Collection]', error.message); return; }
  console.log('[Collection]', allCards?.length, 'cartes');

  const { data: playerCards } = await db.from('player_cards')
    .select('card_id, quantity, created_at').eq('player_id', userId);

  const ownedMap = {};
  if (playerCards) playerCards.forEach(pc => { ownedMap[pc.card_id] = pc; });

  // Nombre de joueurs distincts possédant chaque carte (1 exemplaire min, peu importe la quantité)
  const { data: globalCounts } = await db.from('player_cards')
    .select('card_id, player_id');
  const globalCountMap = {};
  if (globalCounts) {
    globalCounts.forEach(row => {
      if (!globalCountMap[row.card_id]) globalCountMap[row.card_id] = new Set();
      globalCountMap[row.card_id].add(row.player_id);
    });
  }

  // Rang du joueur courant pour chaque carte : position par date d'obtention
  // On récupère toutes les entrées de la carte triées par created_at pour trouver le rang
  const { data: allPlayerCards } = await db.from('player_cards')
    .select('card_id, player_id, created_at').order('created_at', { ascending: true });
  const cardRankMap = {};
  if (allPlayerCards) {
    allPlayerCards.forEach(row => {
      if (!cardRankMap[row.card_id]) cardRankMap[row.card_id] = [];
      cardRankMap[row.card_id].push(row.player_id);
    });
  }

  ALL_CARDS = (allCards || []).map(c => ({
    id: String(c.id).padStart(3,'0'),
    name: c.name,
    set: c.set_name || 'SET-1',
    rarity: c.rarity || 'common',
    type: c.type || 'Héro',
    color: RARITY_COLOR[c.rarity] || '#9ca3af',
    image_url: c.image_url || null,
    owned: !!ownedMap[c.id],
    count: ownedMap[c.id] ? ownedMap[c.id].quantity : 0,
    obtainedAt: ownedMap[c.id] ? ownedMap[c.id].created_at : null,
    globalOwners: globalCountMap[c.id] ? globalCountMap[c.id].size : 0,
    myRank: cardRankMap[c.id] ? (cardRankMap[c.id].indexOf(userId) + 1 || null) : null,
    // Stats Supabase (colonnes optionnelles — null si absentes de la table cards)
    attack:    c.attack    ?? null,
    defense:   c.defense   ?? null,
    precision: c.precision ?? null,
    hp:        c.hp        ?? null,
  }));
  render();
}

    .from('friend_requests')

    .eq('receiver_id', userId).eq('status', 'pending');

    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url)')

let _msgRealtimeSub = null;
let _notifRealtimeSub = null;
let _friendReqSub = null;
let _activeConvFriendId = null; // ref globale stable, survit aux re-renders

// Souscription globale aux messages — s'active une seule fois à l'entrée dans le jeu
async function subscribeMessagesGlobal(myId) {
  const db = window.db;
  if (!db || !myId) return;
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} _msgRealtimeSub = null; }

  // Fonction commune pour traiter un message entrant dans l'UI
  function handleIncomingMsg(m, isOutgoing) {
    if (!m) return;
    const convPartnerId = isOutgoing ? m.to_id : m.from_id;
    const displayFromId = m.from_id;
    // Éviter les doublons
    const prev = state.messages[convPartnerId] || [];
    if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
    const updated = [...prev, { from: displayFromId, text: m.text, ts: m.created_at }];
    state.messages = { ...state.messages, [convPartnerId]: updated };
    // Conv active et visible → append direct au DOM
    if (convPartnerId === _activeConvFriendId && state.activeConvId === convPartnerId && state.showMessages) {
      const list = document.getElementById('msg-list');
      if (list) {
        const div = document.createElement('div');
        const th = t();
        const isMine = displayFromId === myId;
        div.style.cssText = `display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;`;
        div.innerHTML = `<div style="max-width:75%;background:${isMine?th.accent:th.bgTertiary};color:${isMine?'#000':th.text};padding:8px 12px;border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${m.text.replace(/</g,'&lt;')}</div>`;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
      }
      if (!isOutgoing) markMsgNotifsRead(convPartnerId);
      return;
    }
    if (!isOutgoing) setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
  }

  // Canal 1 : messages reçus (to_id = moi)
  _msgRealtimeSub = db.channel('messages-rt-in-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, false))
    .subscribe();

  // Canal 2 : messages envoyés (from_id = moi) — pour les voir en temps réel de son côté
  const _msgSentSub = db.channel('messages-rt-out-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `from_id=eq.${myId}`,
    }, payload => handleIncomingMsg(payload.new, true))
    .subscribe();
}
window.subscribeMessagesGlobal = subscribeMessagesGlobal;

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

// ─── AMBIENT MUSIC ────────────────────────────────────────────────
let audioCtx=null, audioNodes=[], audioPlaying=false;

function audioPlay(){
  if(audioPlaying)return;
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  audioPlaying=true;
  const ctx=audioCtx;

  // ── Master + compresseur doux ──
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.22,ctx.currentTime+4);
  master.connect(ctx.destination);
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.knee.value=12;comp.ratio.value=3;
  comp.attack.value=0.1;comp.release.value=0.4;
  comp.connect(master);

  // ── Filtre passe-bas global (coupe tous les aigus stridents) ──
  const lpf=ctx.createBiquadFilter();
  lpf.type='lowpass';lpf.frequency.value=700;lpf.Q.value=0.4;
  lpf.connect(comp);

  // ── Grande reverb douce ──
  const irLen=ctx.sampleRate*4;
  const ir=ctx.createBuffer(2,irLen,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=ir.getChannelData(ch);
    for(let i=0;i<irLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,1.6);
  }
  const reverb=ctx.createConvolver();reverb.buffer=ir;
  const rvGain=ctx.createGain();rvGain.gain.value=0.5;
  reverb.connect(rvGain);rvGain.connect(master);
  lpf.connect(reverb);

  // ── Pads continus Am9 (A2 C3 E3 G3 B3) — sine pur, très doux ──
  const padFreqs=[110,130.81,164.81,196.00,246.94];
  padFreqs.forEach((freq,i)=>{
    const osc=ctx.createOscillator();
    const env=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    osc.detune.value=(i%2===0?-5:6);
    // Respiration ultra-lente
    const lfo=ctx.createOscillator();
    const lfoG=ctx.createGain();
    lfo.type='sine';lfo.frequency.value=0.025+i*0.006;
    lfoG.gain.value=0.006;
    lfo.connect(lfoG);lfoG.connect(env.gain);
    lfo.start();audioNodes.push(lfo);
    const vol=0.048-i*0.007;
    env.gain.setValueAtTime(0,ctx.currentTime);
    env.gain.linearRampToValueAtTime(vol,ctx.currentTime+5+i*1.8);
    osc.connect(env);env.connect(lpf);
    osc.start();audioNodes.push(osc);
  });

  // ── Basse profonde A1 (55 Hz) ──
  const bassOsc=ctx.createOscillator();
  const bassEnv=ctx.createGain();
  bassOsc.type='sine';bassOsc.frequency.value=55;
  bassEnv.gain.setValueAtTime(0,ctx.currentTime);
  bassEnv.gain.linearRampToValueAtTime(0.09,ctx.currentTime+6);
  const bLfo=ctx.createOscillator();const bLfoG=ctx.createGain();
  bLfo.type='sine';bLfo.frequency.value=0.02;bLfoG.gain.value=0.01;
  bLfo.connect(bLfoG);bLfoG.connect(bassEnv.gain);bLfo.start();audioNodes.push(bLfo);
  bassOsc.connect(bassEnv);bassEnv.connect(comp);
  bassOsc.start();audioNodes.push(bassOsc);

  // ── Mélodie lo-fi espacée (Am pentatonique, sine pur, notes longues) ──
  const scale=[220,261.63,293.66,329.63,392.00,440.00,392.00,329.63,261.63,220];
  const noteDur=3.8;
  const noteGap=3.0;
  const loopLen=scale.length*(noteDur+noteGap)+8;
  let mt=ctx.currentTime+10;
  const scheduleMelody=()=>{
    if(!audioPlaying) return;
    scale.forEach((freq,i)=>{
      const t=mt+i*(noteDur+noteGap);
      const o=ctx.createOscillator();const e=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=3;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(0.022,t+noteDur*0.3);
      e.gain.setValueAtTime(0.022,t+noteDur*0.65);
      e.gain.linearRampToValueAtTime(0,t+noteDur);
      o.connect(e);e.connect(lpf);
      o.start(t);o.stop(t+noteDur+0.1);audioNodes.push(o);
    });
    mt+=loopLen;
    if(audioPlaying) setTimeout(scheduleMelody,(loopLen-1)*1000);
  };
  scheduleMelody();

  // ── Accords qui évoluent toutes les 16s ──
  const chords=[
    [110,164.81,220,261.63],   // Am
    [87.31,130.81,174.61,220], // Fm
    [65.41,130.81,164.81,196], // C
    [82.41,123.47,164.81,196], // Em
  ];
  let ci=0;
  const chordOscs=[];
  const scheduleChord=()=>{
    if(!audioPlaying) return;
    // Fade out anciens
    chordOscs.forEach(({o,g})=>{
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.5);
      setTimeout(()=>{try{o.stop();}catch(e){}},2700);
    });
    chordOscs.length=0;
    chords[ci%chords.length].forEach((freq,i)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=i%2===0?-4:5;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.018-i*0.003,ctx.currentTime+3);
      o.connect(g);g.connect(lpf);o.start();
      audioNodes.push(o);chordOscs.push({o,g});
    });
    ci++;
    if(audioPlaying) setTimeout(scheduleChord,16000);
  };
  setTimeout(scheduleChord,3000);
}
function audioStop(){
  audioNodes.forEach(n=>{try{n.stop();}catch(e){}});
  audioNodes=[];audioPlaying=false;
}

function render(){
  const app = document.getElementById('app');
  const th = t();
  app.style.background = th.bg;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
  }
}

function bindSplash(){
  document.getElementById('splash').addEventListener('click', ()=>{
    const cta = document.querySelector('.cta-pulse');
    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Update conic ring
    const ring = document.getElementById('conic-ring');
    if(ring) ring.style.background = `conic-gradient(from ${angle}deg,#5865f2,#eb459e,#fee75c,#57f287,#5865f2)`;
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

      <!-- Ligne haute : profil + musique + paramètres -->
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center;">
        <div style="display:flex;gap:4px;">
          <button id="btn-profile" style="width:32px;height:32px;border-radius:50%;overflow:hidden;border:2px solid ${state.showProfile?th.accent:th.border};transition:border .15s;flex-shrink:0;background:${th.surface};display:flex;align-items:center;justify-content:center;">
            ${state.currentUser?.user_metadata?.avatar_url
              ? `<img src="${state.currentUser.user_metadata.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />`
              : `<span style="font-size:13px;">👤</span>`}
          </button>
          <button id="btn-music" style="width:32px;height:32px;border-radius:50%;background:${state.musicOn?th.accent+'30':th.surface};color:${state.musicOn?th.accent:th.textFaint};border:1px solid ${state.musicOn?th.accent+'60':th.border};display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;">
            ${state.musicOn?SVG.musicOn:SVG.musicOff}
          </button>
          <button id="btn-settings" style="width:32px;height:32px;border-radius:50%;background:${state.showSettings?th.accent:th.surface};color:${state.showSettings?'#fff':th.textMuted};border:1px solid ${th.border};display:flex;align-items:center;justify-content:center;transition:all .15s;">${SVG.settings}</button>
        </div>
        <!-- Ligne basse : amis + messages + notifs -->
        <div style="display:flex;gap:4px;">
          <button id="btn-friends" style="width:32px;height:32px;border-radius:50%;background:${state.showFriends?th.accent:th.surface};color:${state.showFriends?'#fff':th.textMuted};border:1px solid ${th.border};display:flex;align-items:center;justify-content:center;transition:all .15s;">${SVG.users}</button>
          <div style="position:relative;">
            <button id="btn-messages" style="width:32px;height:32px;border-radius:50%;background:${state.showMessages?th.accent:th.surface};color:${state.showMessages?'#fff':th.textMuted};border:1px solid ${th.border};display:flex;align-items:center;justify-content:center;transition:all .15s;">${SVG.chat}</button>
            ${(state.msgNotifCount||0)>0&&!state.showMessages?`<div style="position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:${th.accent};color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid ${th.bgSecondary};">${state.msgNotifCount}</div>`:''}
          </div>
          <div style="position:relative;">
            <button id="btn-notif" style="width:32px;height:32px;border-radius:50%;background:${state.showNotif?th.accent:th.surface};color:${state.showNotif?'#fff':th.textMuted};border:1px solid ${th.border};display:flex;align-items:center;justify-content:center;transition:all .15s;">${SVG.bell}</button>
            ${NOTIF_COUNT>0&&!state.showNotif?`<div style="position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:${th.red};color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid ${th.bgSecondary};">${NOTIF_COUNT}</div>`:''}
          </div>
        </div>
      </div>
    </div>
    <!-- TAB LINE -->
    <div style="display:flex;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      ${TABS.map((_,i)=>`<div style="flex:1;height:2px;background:${state.tab===i?th.accent:'transparent'};transition:background .25s;"></div>`).join('')}
    </div>
    <!-- CONTENT -->
    <div style="flex:1;overflow:hidden;position:relative;">
      <div id="tab-slider" style="display:flex;width:300%;height:100%;transform:translateX(${-state.tab*(100/3)}%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);">
        <div style="width:33.333%;height:100%;overflow:hidden;">${state.tab===0?renderTabPlay(th):'<div></div>'}</div>
        <div style="width:33.333%;height:100%;overflow:hidden;">${state.tab===1?renderTabCollection(th):'<div></div>'}</div>
        <div style="width:33.333%;height:100%;overflow:hidden;">${state.tab===2?renderTabBoosters(th):'<div></div>'}</div>
      </div>
    </div>
    <!-- NAV BAS -->
    <div style="display:flex;background:${th.bgSecondary};border-top:1px solid ${th.border};flex-shrink:0;">
      ${TABS.map((tb,i)=>`
        <button data-tab="${i}" style="flex:1;padding:9px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;color:${state.tab===i?th.accent:th.textMuted};transition:color .15s;">
          <div style="transform:${state.tab===i?'scale(1.12)':'scale(1)'};transition:transform .15s;">${tb.icon}</div>
          <span style="font-size:9px;font-weight:700;letter-spacing:.5px;">${tb.label}</span>
          <div style="width:4px;height:4px;border-radius:50%;background:${state.tab===i?th.accent:'transparent'};transition:background .15s;"></div>
        </button>`).join('')}
    </div>
    <!-- MODALS -->
    ${state.showSettings?renderSettingsModal(th):''}
    ${state.showFriends?renderFriendsModal(th):''}
    ${state.showNotif?renderNotifModal(th):''}
    ${state.showMessages?renderMessagesModal(th):''}
    ${state.collSelectedCard?renderCardDetailModal(state.collSelectedCard,th):''}
    ${state.showPioche?renderPiocheMechanic(th):''}
    ${state.showProfile?renderProfileModal(th):''}
    ${state.showAddFriend?renderAddFriendModal(th):''}
  </div>`;
}

// ─── PROFILE MODAL ───────────────────────────────────────────────

      <div style="position:relative;margin-bottom:48px;">
        <div style="height:72px;border-radius:12px;background:linear-gradient(135deg,${th.accent},#eb459e);opacity:.7;"></div>

        <div style="font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:${th.text};">${name}</div>

          <div style="font-size:18px;">🏆</div>
          <div style="font-size:16px;font-weight:800;color:${th.green};margin-top:2px;">—</div>
          <div style="font-size:9px;color:${th.textMuted};">Victoires</div>
        </div>
        <div style="background:${th.bgTertiary};border-radius:10px;padding:10px 6px;text-align:center;border:1px solid ${th.border};">
          <div style="font-size:18px;">💀</div>
          <div style="font-size:16px;font-weight:800;color:${th.red};margin-top:2px;">—</div>
          <div style="font-size:9px;color:${th.textMuted};">Défaites</div>
        </div>

          <div style="font-size:18px;">🃏</div>
          <div style="font-size:${totalCards > 0 ? '13px' : '16px'};font-weight:800;color:${th.accent};margin-top:2px;letter-spacing:.5px;">${cardsDisplay}</div>
          <div style="font-size:9px;color:${th.textMuted};">Cartes</div>
        </div>
      </div>
      <button id="btn-logout" style="width:100%;padding:11px;border-radius:10px;background:transparent;border:1px solid ${th.red}40;color:${th.red};font-size:12px;font-weight:700;cursor:pointer;">Se déconnecter</button>

// ─── TAB PLAY ─────────────────────────────────────────────────────

    {id:"pvp",label:"PvP",sub:"Joueur contre Joueur",desc:"Affronte d'autres joueurs en temps réel sur Discord",icon:"⚔️",color:th.accent,available:true},
    {id:"ia",label:"vs IA",sub:"Entraînement solo",desc:"Perfectionne ta stratégie contre notre IA adaptative",icon:"🤖",color:th.green,available:true},
    {id:"secret",label:"???",sub:"Mode secret",desc:"Ce mode sera débloqué prochainement…",icon:"🔒",color:th.textFaint,available:false},
  ];
  return `
  <div style="display:flex;flex-direction:column;height:100%;padding:14px;gap:10px;overflow:hidden;">
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:${th.textMuted};text-transform:uppercase;">Mode de jeu</div>
    <div style="display:flex;flex-direction:column;gap:8px;flex:1;">
      ${modes.map(m=>`
        <button class="mode-btn" data-mode="${m.id}" style="flex:1;background:${m.available?`linear-gradient(135deg,${m.color}12,transparent)`:th.bgSecondary};border:1px solid ${m.available?m.color+'35':th.border};border-radius:14px;display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:${m.available?'pointer':'not-allowed'};opacity:${m.available?1:.42};transition:all .2s;width:100%;text-align:left;">
          <div style="width:54px;height:54px;border-radius:14px;flex-shrink:0;background:${m.available?m.color+'20':th.surface};border:1px solid ${m.color}30;display:flex;align-items:center;justify-content:center;font-size:26px;">${m.icon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:${m.available?m.color:th.textFaint};">${m.label}</div>
            <div style="font-size:12px;font-weight:600;color:${th.text};margin-top:1px;">${m.sub}</div>
            <div style="font-size:10px;color:${th.textMuted};margin-top:3px;line-height:1.4;">${m.desc}</div>
          </div>
          ${m.available
            ?`<div style="padding:7px 14px;border-radius:99px;flex-shrink:0;background:transparent;border:1px solid ${m.color}60;color:${m.color};font-size:10px;font-weight:700;white-space:nowrap;">JOUER</div>`
            :`<div style="padding:4px 10px;border-radius:99px;background:${th.surface};color:${th.textFaint};font-size:9px;font-weight:600;flex-shrink:0;">Bientôt</div>`}
        </button>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      ${[{l:"Victoires",v:"—",c:th.green,i:"🏆"},{l:"Défaites",v:"—",c:th.red,i:"💀"},{l:"Rang",v:"—",c:th.yellow,i:"⭐"}].map(s=>`
        <div style="flex:1;background:${th.bgSecondary};border-radius:10px;padding:10px 6px;text-align:center;border:1px solid ${th.border};">
          <div style="font-size:16px;">${s.i}</div>
          <div style="font-size:18px;font-weight:800;color:${s.c};margin-top:2px;">${s.v}</div>
          <div style="font-size:9px;color:${th.textMuted};">${s.l}</div>
        </div>`).join('')}

  </div>`;

// ─── TAB COLLECTION ───────────────────────────────────────────────
function renderTabCollection(th){
  const owned = ALL_CARDS.filter(c=>c.owned).length;
  let cards = [...ALL_CARDS]
    .filter(c=>state.collFilterSet==="all"||c.set===state.collFilterSet)
    .filter(c=>state.collFilterRarity==="all"||c.rarity===state.collFilterRarity)
    .filter(c=>state.collShowOwned==="all"||(state.collShowOwned==="owned"&&c.owned)||(state.collShowOwned==="missing"&&!c.owned))
    .filter(c=>state.collFilterType==="all"||c.type===state.collFilterType)
    .sort((a,b)=>state.collSortBy==="id"?a.id.localeCompare(b.id):RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  return `
  <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;">
    <div style="flex-shrink:0;padding:12px 14px 0;">
      <div style="background:linear-gradient(135deg,${th.accent}18,${th.accent}06);border:1px solid ${th.accent}40;border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;">
        <div style="position:absolute;right:-8px;top:-8px;font-size:52px;opacity:.04;pointer-events:none;">🗂️</div>
        <div style="width:42px;height:42px;border-radius:10px;flex-shrink:0;background:${th.accent}20;border:1px solid ${th.accent}50;display:flex;align-items:center;justify-content:center;font-size:20px;">🗂️</div>
        <div style="flex:1;">
          <div style="font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:${th.text};">Deck Builder</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:1px;">${owned} carte${owned>1?'s':''} disponible${owned>1?'s':''}</div>
        </div>
        <button style="padding:6px 12px;border-radius:99px;flex-shrink:0;background:${th.accent};color:#fff;border:none;cursor:not-allowed;font-size:10px;font-weight:700;opacity:.55;">Bientôt</button>
      </div>
    </div>
    <div style="padding:8px 14px 6px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;gap:5px;align-items:center;">
        <span style="font-size:10px;color:${th.textMuted};white-space:nowrap;">Tri :</span>
        <button class="sort-btn" data-sort="id" style="padding:4px 10px;border-radius:99px;font-size:10px;font-weight:600;background:${state.collSortBy==='id'?th.accent:th.surface};color:${state.collSortBy==='id'?'#fff':th.textMuted};border:none;transition:all .15s;">ID</button>
        <button class="sort-btn" data-sort="rarity" style="padding:4px 10px;border-radius:99px;font-size:10px;font-weight:600;background:${state.collSortBy==='rarity'?th.accent:th.surface};color:${state.collSortBy==='rarity'?'#fff':th.textMuted};border:none;transition:all .15s;">Rareté</button>
        <div style="margin-left:auto;position:relative;">
          <div style="display:flex;gap:4px;margin-bottom:2px;">
          <button class="owned-filter-btn" data-val="all" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;border:none;background:${state.collShowOwned==='all'?th.text:th.surface};color:${state.collShowOwned==='all'?th.bg:th.textMuted};">Toutes</button>
          <button class="owned-filter-btn" data-val="owned" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;border:1px solid ${th.green}60;background:${state.collShowOwned==='owned'?th.green:th.surface};color:${state.collShowOwned==='owned'?'#000':th.green};">Possédées</button>
          <button class="owned-filter-btn" data-val="missing" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;border:1px solid ${th.red}60;background:${state.collShowOwned==='missing'?th.red:th.surface};color:${state.collShowOwned==='missing'?'#fff':th.red};">Manquantes</button>
        </div>
        <button id="set-filter-btn" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:10px;font-weight:600;background:${state.collFilterSet!=='all'?th.accent:th.surface};color:${state.collFilterSet!=='all'?'#fff':th.textMuted};border:1px solid ${state.collFilterSet!=='all'?th.accent:th.border};;white-space:nowrap;">
            ${state.collFilterSet === "all" ? "Tous les Sets" : state.collFilterSet}
            <span style="display:inline-block;transform:${state.collSetOpen?'rotate(180deg)':'none'};transition:transform .2s;">${SVG.chevron}</span>
          </button>
          ${state.collSetOpen?`
          <div id="set-dropdown" style="position:absolute;right:0;top:calc(100% + 6px);background:${th.bgSecondary};border:1px solid ${th.border};border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:50;min-width:140px;">
            <button class="set-opt" data-val="all" style="display:block;width:100%;text-align:left;padding:9px 14px;font-size:11px;font-weight:600;background:${state.collFilterSet==='all'?th.accent+'20':'transparent'};color:${state.collFilterSet==='all'?th.accent:th.text};border:none;border-bottom:1px solid ${th.border};">Tous les Sets</button>
            ${[...new Set(ALL_CARDS.map(c=>c.set))].sort().map(s=>`
              <button class="set-opt" data-val="${s}" style="display:block;width:100%;text-align:left;padding:9px 14px;font-size:11px;font-weight:600;background:${state.collFilterSet===s?th.accent+'20':'transparent'};color:${state.collFilterSet===s?th.accent:th.text};border:none;border-bottom:1px solid ${th.border};">${s}</button>`).join('')}
          </div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:5px;overflow-x:auto;">
        <button class="rar-btn" data-rar="all" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterRarity==='all'?th.text:th.surface};color:${state.collFilterRarity==='all'?th.bg:th.textMuted};border:none;">Tout</button>
        ${RARITY_ORDER.map(r=>`<button class="rar-btn" data-rar="${r}" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterRarity===r?RARITY_COLOR[r]:th.surface};color:${state.collFilterRarity===r?'#fff':RARITY_COLOR[r]};border:1px solid ${RARITY_COLOR[r]}40;">${RARITY_LABEL[r]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;">
        <button class="type-btn" data-type="all" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterType==='all'?th.text:th.surface};color:${state.collFilterType==='all'?th.bg:th.textMuted};border:none;flex-shrink:0;">Tous</button>
        <button class="type-btn" data-type="Hero" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterType==='Hero'?'#f59e0b':th.surface};color:${state.collFilterType==='Hero'?'#000':th.yellow};border:1px solid #f59e0b40;flex-shrink:0;">⚔ Héros</button>
        <button class="type-btn" data-type="Ruse" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterType==='Ruse'?'#10b981':th.surface};color:${state.collFilterType==='Ruse'?'#000':th.green};border:1px solid #10b98140;flex-shrink:0;">🃏 Ruse</button>
        <button class="type-btn" data-type="Arcane" style="padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;background:${state.collFilterType==='Arcane'?'#8b5cf6':th.surface};color:${state.collFilterType==='Arcane'?'#fff':'#8b5cf6'};border:1px solid #8b5cf640;flex-shrink:0;">✦ Arcane</button>
      </div>
      <div style="font-size:9px;color:${th.textFaint};">${owned}/${ALL_CARDS.length} obtenues · ${cards.length} affichées</div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 14px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-content:start;">
      ${cards.map(c=>renderCollCard(c,th)).join('')}
      ${cards.length===0?`<div style="grid-column:1/-1;text-align:center;color:${th.textMuted};font-size:12px;padding-top:30px;">Aucune carte</div>`:''}
    </div>
  </div>`;
}

function renderCollCard(card,th){
  if(!card.owned){
    return `<div class="coll-card" data-cardid="${card.id}" style="background:${th.bgTertiary};border:1px solid ${th.border};border-radius:10px;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;opacity:.32;filter:grayscale(1);cursor:pointer;transition:all .15s;">
      <div style="font-size:18px;">🂠</div>
      <div style="font-size:9px;font-weight:700;color:${th.textMuted};">#${card.id}</div>
    </div>`;
  }
  return `<div class="coll-card" data-cardid="${card.id}" style="background:linear-gradient(160deg,${card.color}18,${th.bgSecondary});border:1px solid ${card.color}30;border-radius:10px;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .2s;overflow:hidden;padding:8px 6px 6px;gap:4px;position:relative;">
    ${card.count>1?`<div style="position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:${th.accent};color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;">×${card.count}</div>`:''}
    <div style="flex:1;width:100%;border-radius:6px;background:linear-gradient(135deg,${card.color}30,${card.color}10);display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
    <div style="font-size:8px;font-weight:700;color:${th.text};text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;">${card.name}</div>
    <div style="display:flex;justify-content:space-between;width:100%;align-items:center;">
      <span style="font-size:8px;color:${th.textMuted};">#${card.id}</span>
      <span style="font-size:9px;color:${RARITY_COLOR[card.rarity]};">◆</span>
    </div>
  </div>`;
}

// ─── TAB BOOSTERS ─────────────────────────────────────────────────
function renderTabBoosters(th){
  const bazar=[
    {top:"6%",left:"2%",rotate:"-7deg",scale:1.0,zIndex:1},
    {top:"18%",left:"34%",rotate:"5deg",scale:1.1,zIndex:3},
    {top:"3%",right:"2%",rotate:"11deg",scale:0.95,zIndex:2},

  <div style="display:flex;flex-direction:column;height:100%;padding:12px 14px 14px;gap:10px;overflow:hidden;position:relative;">
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:${th.textMuted};text-transform:uppercase;flex-shrink:0;">Boosters & Pioche</div>
    <div style="flex:1;position:relative;min-height:0;">
      ${BOOSTERS.map((b,i)=>{
        const pos=bazar[i];
        const isOpen=state.boosterOpening===b.id;
        const styleExtra = pos.right ? `right:${pos.right};` : `left:${pos.left};`;
        return `
        <div class="booster-card" data-bid="${b.id}" style="position:absolute;top:${pos.top};${styleExtra}width:46%;background:linear-gradient(150deg,${b.color}22,${b.color}08);border:1px solid ${b.color}45;border-radius:18px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .25s;transform:rotate(${pos.rotate}) scale(${pos.scale});z-index:${pos.zIndex};">
          <div style="position:absolute;inset:0;border-radius:18px;background:radial-gradient(ellipse at 50% 20%,${b.color}18,transparent 70%);pointer-events:none;"></div>
          ${[0,1,2].map(k=>`<div style="position:absolute;bottom:36px;left:50%;width:44px;height:62px;border-radius:6px;background:linear-gradient(135deg,${b.color}30,${b.color}10);border:1px solid ${b.color}40;transform:translateX(-50%) rotate(${(k-1)*8}deg) translateY(${k*2}px);z-index:${k};pointer-events:none;"></div>`).join('')}
          <div style="font-size:${i===1?42:36}px;filter:drop-shadow(0 0 12px ${b.color}90);animation:${isOpen?'shakePack .4s ease':'floatPack 1.5s ease-in-out infinite'};z-index:1;margin-top:8px;">🃏</div>
          <div style="text-align:center;z-index:1;width:100%;">
            <div style="font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:${th.text};">${b.name}</div>
            <div style="font-size:9px;color:${th.textMuted};margin-top:1px;">${b.cards} cartes</div>
            <div style="font-size:9px;color:${RARITY_COLOR[b.rarity]};font-weight:700;margin-bottom:6px;">◆ ${RARITY_LABEL[b.rarity]}</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:800;color:${b.color};margin-bottom:8px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" opacity=".25"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.5h-2v-1.8c-1.4-.3-2.5-1.3-2.5-2.7h2c0 .6.7 1 1.5 1s1.5-.4 1.5-1c0-.7-.6-1-1.8-1.3C10.1 10.3 9 9.4 9 8c0-1.3 1-2.3 2.5-2.6V3.5h2v1.9c1.3.4 2.2 1.4 2.2 2.6h-2c0-.6-.6-1-1.5-1s-1.4.4-1.4 1c0 .6.5.9 1.7 1.2 1.8.4 3 1.4 3 3 0 1.4-1 2.5-2.5 2.8v1.5z"/></svg>${b.price}</div>
            <button class="open-booster" data-bid="${b.id}" style="width:100%;padding:7px 0;border-radius:99px;background:${isOpen?b.color+'70':b.color};color:#fff;border:none;font-size:10px;font-weight:700;box-shadow:${isOpen?`0 0 20px ${b.color}`:'none'};transition:all .2s;">
              ${isOpen?"⋯ Ouverture":"Ouvrir"}
            </button>
          </div>
        </div>`}).join('')}
      <div style="position:absolute;bottom:0;left:0;right:0;">
        <div id="btn-pioche" style="background:linear-gradient(135deg,${th.green}18,${th.green}06);border:1px solid ${th.green}40;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;cursor:pointer;">
          <div style="position:absolute;right:-8px;top:-8px;font-size:50px;opacity:.06;pointer-events:none;">🎴</div>
          <div style="position:relative;width:52px;height:66px;flex-shrink:0;">
            ${[0,1,2,3,4].map(k=>`<div style="position:absolute;inset:0;background:linear-gradient(135deg,${th.green}40,${th.green}15);border:1px solid ${th.green}50;border-radius:6px;transform:rotate(${(k-2)*5}deg) translateY(${k}px);display:flex;align-items:center;justify-content:center;font-size:20px;">🂠</div>`).join('')}
          </div>
          <div style="flex:1;">
            <div style="font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:${th.text};">Pioche Classique</div>

          <div style="padding:6px 12px;border-radius:99px;background:${th.green};color:#fff;font-size:10px;font-weight:700;flex-shrink:0;">Piocher</div>

  </div>`;
}

// ─── TAB MESSAGES ────────────────────────────────────────────────
function renderMessagesModal(th){
  const friends = state.friends || [];
  const activeId = state.activeConvId;
  const msgs = (state.messages[activeId] || []);
  const myId = state.currentUser?.id;

  const innerContent = activeId && friends.find(f=>f.id===activeId) ? (() => {
    const friend = friends.find(f=>f.id===activeId);
    return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button id="msg-back" style="background:none;border:none;color:${th.textMuted};font-size:20px;cursor:pointer;padding:0;line-height:1;">←</button>
      <div style="width:30px;height:30px;border-radius:50%;overflow:hidden;background:${th.surface};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${friend.avatar_url?`<img src="${friend.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:14px;">👤</span>'}
      </div>
      <div style="font-size:13px;font-weight:700;color:${th.text};">${friend.discord_username||'Ami'}</div>
    </div>
    <div id="msg-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;min-height:0;">
      ${msgs.length===0
        ? `<div style="text-align:center;color:${th.textFaint};font-size:11px;padding:20px 0;">Aucun message pour le moment.<br><span style="font-size:10px;">Envoie le premier !</span></div>`
        : msgs.map(m=>`
        <div style="display:flex;flex-direction:${m.from===myId?'row-reverse':'row'};gap:6px;align-items:flex-end;">
          <div style="max-width:75%;background:${m.from===myId?th.accent:th.bgTertiary};color:${m.from===myId?'#fff':th.text};padding:8px 12px;border-radius:${m.from===myId?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${m.text}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0;">
      <input id="msg-input" placeholder="Message..." style="flex:1;padding:9px 12px;border-radius:99px;background:${th.bgTertiary};border:1px solid ${th.border};color:${th.text};font-size:12px;outline:none;"/>
      <button id="msg-send" style="width:36px;height:36px;border-radius:50%;background:${th.accent};color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">↑</button>
    </div>`;
  })() : `
    <div style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:${th.text};margin-bottom:14px;">Messages</div>
    ${friends.length===0
      ? `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:${th.textMuted};font-size:12px;text-align:center;">
           <div style="font-size:28px;">💬</div>
           Aucun message pour le moment.
         </div>`
      : friends.map(f=>`
      <div class="conv-item" data-fid="${f.id}" style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:${th.bgTertiary};border:1px solid ${th.border};cursor:pointer;margin-bottom:6px;">
        <div style="width:36px;height:36px;border-radius:50%;overflow:hidden;background:${th.surface};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
          ${f.avatar_url?`<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:16px;">👤</span>'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.discord_username||'Ami'}</div>
          <div style="font-size:10px;color:${th.textFaint};">Appuyer pour écrire</div>
        </div>
        <div style="font-size:18px;color:${th.textFaint};">›</div>
      </div>`).join('')}
  `;

  return `
  <div id="messages-bg" style="position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:100;">
    <div style="width:100%;max-width:420px;height:92%;background:${th.bgSecondary};border-radius:20px 20px 0 0;padding:16px 16px 28px;box-shadow:0 -8px 40px rgba(0,0,0,.4);display:flex;flex-direction:column;">
      <div style="width:36px;height:4px;border-radius:99px;background:${th.border};margin:0 auto 14px;flex-shrink:0;"></div>
      ${innerContent}
    </div>
  </div>`;
}

// ─── PIOCHE MECHANIC ──────────────────────────────────────────────
function renderPiocheMechanic(th){
  const TOTAL=50,COLS=8,GAP=5,CW=Math.floor((Math.min(window.innerWidth,420)-40-GAP*(COLS-1))/COLS),CH=Math.round(CW*1.43);
  return `
  <div id="pioche-overlay" style="position:absolute;inset:0;z-index:200;background:rgba(0,0,0,.95);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:12px;padding:20px;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;">
      <div style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#f2f3f5;">Pioche Classique</div>
      <button id="pioche-close" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);color:#96989d;display:flex;align-items:center;justify-content:center;">${SVG.x}</button>
    </div>
    <div style="font-size:11px;color:#96989d;text-align:center;">${state.piocheChosen===null?"✦ Choisissez une carte face cachée ✦":"Retournement en cours…"}</div>
    ${!state.piocheResult?`
    <div style="position:relative;width:${CW*COLS+GAP*(COLS-1)}px;height:${CH*5+GAP*4}px;flex-shrink:0;margin:0 auto;">
      ${Array.from({length:TOTAL},(_,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const rot=(((i*37+13)%20)-10)*0.5;
        const isChosen=state.piocheChosen===i;
        const isFlipped=state.piocheFlipped[i];
        return `<div class="pioche-card" data-idx="${i}" style="position:absolute;left:${col*(CW+GAP)}px;top:${row*(CH+GAP)}px;width:${CW}px;height:${CH}px;cursor:${state.piocheChosen===null?'pointer':'default'};perspective:300px;">
          <div style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:${isFlipped?'rotateY(180deg)':`rotate(${rot}deg)`};transition:transform .6s ease;">
            <div style="position:absolute;inset:0;backface-visibility:hidden;background:${isChosen?'linear-gradient(135deg,#5865f2,#eb459e)':'linear-gradient(135deg,#2b2d31,#1e1f22)'};border:1px solid ${isChosen?'#5865f2':'rgba(255,255,255,.12)'};border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:${isChosen?'0 0 16px #5865f280':'none'};transform:${isChosen?'scale(1.1)':'scale(1)'};transition:all .2s;">🂠</div>
            <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#5865f230,#eb459e20);border:1px solid #5865f260;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    ${state.piocheResult?`
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:110px;aspect-ratio:2/3;background:linear-gradient(160deg,${state.piocheResult.color}30,#2b2d31);border:2px solid ${state.piocheResult.color}80;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px ${state.piocheResult.color}50;">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,${state.piocheResult.color}30,${state.piocheResult.color}10);">🃏</div>
        <div style="padding:6px 8px;background:#2b2d31;">
          <div style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#f2f3f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.piocheResult.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:2px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]}</div>
        </div>
      </div>
      <div style="text-align:center;">

// ─── BIND EVENTS ──────────────────────────────────────────────────
function bindGame(){
  const th = t();

  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tab = parseInt(btn.dataset.tab);
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click',()=>{
    audioToggle();
    setState({musicOn:!state.musicOn});
  });

  const btnSettings = document.getElementById('btn-settings');
  if(btnSettings) btnSettings.addEventListener('click',()=>setState({showSettings:true,showFriends:false,showNotif:false}));

  const btnFriends = document.getElementById('btn-friends');
  if(btnFriends) btnFriends.addEventListener('click',()=>{
    setState({showFriends:true,showSettings:false,showNotif:false,showMessages:false});
    loadFriends();
  });

  const btnNotif = document.getElementById('btn-notif');
  if(btnNotif) btnNotif.addEventListener('click',()=>setState({showNotif:true,showSettings:false,showFriends:false,showMessages:false}));

  const btnMessages = document.getElementById('btn-messages');
  if(btnMessages) btnMessages.addEventListener('click',()=>{
    setState({showMessages:true,showSettings:false,showFriends:false,showNotif:false});
    if((state.friends||[]).length===0) loadFriends();
    // Si une conv est déjà ouverte, effacer son badge
    if (state.activeConvId) markMsgNotifsRead(state.activeConvId);
  });

  const messagesBg = document.getElementById('messages-bg');
  if(messagesBg) messagesBg.addEventListener('click',(e)=>{if(e.target===messagesBg)setState({showMessages:false,activeConvId:null});});

  const btnProfile = document.getElementById('btn-profile');
  if(btnProfile) btnProfile.addEventListener('click',()=>setState({showProfile:true,showSettings:false,showFriends:false,showNotif:false}));

  const profileBg = document.getElementById('profile-bg');
  if(profileBg) profileBg.addEventListener('click',(e)=>{if(e.target===profileBg)setState({showProfile:false});});

  const btnLogout = document.getElementById('btn-logout');
  if(btnLogout) btnLogout.addEventListener('click', ()=>{ if(window.logoutUser) window.logoutUser(); });

  // Collection filters
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collSortBy:btn.dataset.sort}));
  });
  document.querySelectorAll('.rar-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterRarity:btn.dataset.rar}));
  });
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterType:btn.dataset.type}));
  });

  // Filtre possédées/toutes/manquantes
  document.querySelectorAll('.owned-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collShowOwned:btn.dataset.val}));
  });

  // Messages : liste conversations
  document.querySelectorAll('.conv-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const fid = el.dataset.fid;
      setState({activeConvId:fid});
      loadMessages(fid);
      markMsgNotifsRead(fid);
    });
  });

  // Messages : retour liste
  const msgBack = document.getElementById('msg-back');
  if(msgBack) msgBack.addEventListener('click',()=>setState({activeConvId:null}));

  // Messages : envoi
  const msgSend = document.getElementById('msg-send');
  const msgInput = document.getElementById('msg-input');
  if(msgSend && msgInput){
    const sendMsg = () => {
      const text = msgInput.value.trim();
      if(!text) return;
      msgInput.value='';
      sendMessage(state.activeConvId, text);
    };
    msgSend.addEventListener('click', sendMsg);
    msgInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter') sendMsg(); });
  }

  // Fermer autres modals quand messages s'ouvre
  const messagesBg2 = document.getElementById('messages-bg');
  if(messagesBg2) messagesBg2.addEventListener('click',(e)=>{if(e.target===messagesBg2)setState({showMessages:false,activeConvId:null});});
  const setBtn = document.getElementById('set-filter-btn');
  if(setBtn) setBtn.addEventListener('click',(e)=>{e.stopPropagation();setState({collSetOpen:!state.collSetOpen});});
  document.querySelectorAll('.set-opt').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterSet:btn.dataset.val,collSetOpen:false}));
  });

  // Coll cards
  document.querySelectorAll('.coll-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const card = ALL_CARDS.find(c=>c.id===el.dataset.cardid);
      if(card) setState({collSelectedCard:card});
    });
    if(!el.style.filter){ // owned
      el.addEventListener('mouseenter',()=>{el.style.transform='translateY(-3px) scale(1.03)';el.style.boxShadow=`0 8px 20px rgba(0,0,0,.3)`;});
      el.addEventListener('mouseleave',()=>{el.style.transform='';el.style.boxShadow='';});
    } else {
      el.addEventListener('mouseenter',()=>{el.style.opacity='.55';el.style.transform='scale(1.04)';});
      el.addEventListener('mouseleave',()=>{el.style.opacity='.32';el.style.transform='scale(1)';});
    }
  });

  // Card modal close
  const cardModalBg = document.getElementById('card-modal-bg');
  if(cardModalBg) cardModalBg.addEventListener('click',(e)=>{if(e.target===cardModalBg)setState({collSelectedCard:null});});
  const cardModalClose = document.getElementById('card-modal-close');
  if(cardModalClose) cardModalClose.addEventListener('click',()=>setState({collSelectedCard:null}));

  // Mode de jeu
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const mode = btn.dataset.mode;
      if (mode === 'ia') window.location.href = 'PVE.html';
      else if (mode === 'pvp') {
        setState({showFriends:true, friendsTab:'list'});
        loadFriends();
      }
    });
  });

  // Boosters
  document.querySelectorAll('.open-booster').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const bid=parseInt(btn.dataset.bid);
      const booster = BOOSTERS.find(b=>b.id===bid);
      if (!booster) return;
      // Vérifier le solde sans déduire (la déduction est gérée dans la page booster)
      const coins = state.coins || 0;
      if (coins < booster.price) {
        showToast(`Il vous faut ${booster.price.toLocaleString('fr-FR')} coins pour ouvrir ce booster.`, '🚫');
        return;
      }
      if (bid === 1) { window.location.href = 'booster1.html'; return; }
      if (bid === 2) { window.location.href = 'booster2.html'; return; }
      if (bid === 3) { window.location.href = 'booster3.html'; return; }
    });
  });

  const btnPioche = document.getElementById('btn-pioche');
  if(btnPioche) btnPioche.addEventListener('click',()=>setState({showPioche:true,piocheFlipped:{},piocheChosen:null,piocheResult:null}));

  // Booster hover
  document.querySelectorAll('.booster-card').forEach(el=>{
    const bid=parseInt(el.dataset.bid);
    const b=BOOSTERS.find(b=>b.id===bid);
    if(!b)return;
    el.addEventListener('mouseenter',()=>{
      el.style.transform=`scale(${parseFloat(el.style.transform.match(/scale\(([^)]+)\)/)?.[1]||1)+0.04}) rotate(0deg)`;
      el.style.boxShadow=`0 16px 40px ${b.color}50`;
      el.style.zIndex=10;
      el.style.border=`1px solid ${b.color}90`;
    });
    el.addEventListener('mouseleave',()=>{
      const idx=BOOSTERS.indexOf(b);
      const bazar=[{rotate:"-7deg",scale:1.0},{rotate:"5deg",scale:1.1},{rotate:"11deg",scale:0.95}];
      const pos=bazar[idx];
      el.style.transform=`rotate(${pos.rotate}) scale(${pos.scale})`;
      el.style.boxShadow='0 4px 16px rgba(0,0,0,.3)';
      el.style.zIndex=pos.zIndex||1;
      el.style.border=`1px solid ${b.color}45`;
    });
  });

  // Pioche
  const piocheClose = document.getElementById('pioche-close');
  if(piocheClose) piocheClose.addEventListener('click',()=>setState({showPioche:false}));

  document.querySelectorAll('.pioche-card').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.piocheChosen!==null)return;
      const idx=parseInt(el.dataset.idx);
      const newFlipped={...state.piocheFlipped,[idx]:true};
      setState({piocheChosen:idx,piocheFlipped:newFlipped});
      setTimeout(()=>{
        // Tirage pondéré par rareté : Mythique 0.1%, Rare 1%, Peu Commune 11.9%, Commune 87%
        const roll = Math.random() * 100;
        let targetRarity;
        if (roll < 0.1)       targetRarity = 'mythic';
        else if (roll < 1.1)  targetRarity = 'rare';
        else if (roll < 13.0) targetRarity = 'uncommon';
        else                  targetRarity = 'common';

        const pool = ALL_CARDS.filter(c => c.rarity === targetRarity);
        // Fallback si le pool est vide pour cette rareté
        const finalPool = pool.length > 0 ? pool : ALL_CARDS;
        const drawn = finalPool[Math.floor(Math.random() * finalPool.length)];
        setState({piocheResult: drawn});
      },700);
    });
  });

  const piocheCollect = document.getElementById('pioche-collect');
  if(piocheCollect) piocheCollect.addEventListener('click', async ()=>{
    const card = state.piocheResult;
    if (card) {
      // Ajouter la carte en base Supabase
      const db = window.db;
      const myId = state.currentUser?.id;
      if (db && myId) {
        const cardIdNum = parseInt(card.id, 10);
        // Vérifier si le joueur a déjà cette carte
        const { data: existing } = await db.from('player_cards')
          .select('id, quantity')
          .eq('player_id', myId)
          .eq('card_id', cardIdNum)
          .single();
        if (existing) {
          await db.from('player_cards')
            .update({ quantity: existing.quantity + 1 })
            .eq('id', existing.id);
        } else {
          await db.from('player_cards')
            .insert({ player_id: myId, card_id: cardIdNum, quantity: 1 });
        }
        // Recharger la collection
        if (window.loadCollection) window.loadCollection();
        showToast(`${card.name} ajoutée à la collection !`, '✓');
      }
    }
    setState({showPioche:false});
  });

  // Modal backdrops
  const notifBg=document.getElementById('notif-bg');
  if(notifBg) notifBg.addEventListener('click',(e)=>{if(e.target===notifBg)setState({showNotif:false});});

  // Friends modal binds
  document.querySelectorAll('.friends-tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({friendsTab:btn.dataset.ftab}));
  });
  const btnAddFriend=document.getElementById('btn-add-friend');
  if(btnAddFriend) btnAddFriend.addEventListener('click',()=>setState({showAddFriend:true}));
  const btnCancelAdd=document.getElementById('btn-cancel-add-friend');
  if(btnCancelAdd) btnCancelAdd.addEventListener('click',()=>setState({showAddFriend:false}));
  const addFriendBg=document.getElementById('add-friend-bg');
  if(addFriendBg) addFriendBg.addEventListener('click',(e)=>{if(e.target===addFriendBg)setState({showAddFriend:false});});
  const btnSearchFriend=document.getElementById('btn-search-friend');
  if(btnSearchFriend) btnSearchFriend.addEventListener('click', ()=>{ if(window.searchAndSendFriendRequest) window.searchAndSendFriendRequest(); });
  document.querySelectorAll('.accept-friend, .notif-accept-friend').forEach(btn=>{
    btn.addEventListener('click',()=>respondFriendRequest(btn.dataset.rid, true));
  });
  document.querySelectorAll('.decline-friend, .notif-decline-friend').forEach(btn=>{
    btn.addEventListener('click',()=>respondFriendRequest(btn.dataset.rid, false));
  });

  // DM depuis liste amis
  document.querySelectorAll('.friend-dm').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const fid = btn.dataset.fid;
      setState({showMessages:true, showFriends:false, activeConvId:fid});
      loadMessages(fid);
      markMsgNotifsRead(fid);
    });
  });
  const settingsBg=document.getElementById('settings-bg');
  if(settingsBg) settingsBg.addEventListener('click',(e)=>{if(e.target===settingsBg)setState({showSettings:false});});
  const friendsBg=document.getElementById('friends-bg');
  if(friendsBg) friendsBg.addEventListener('click',(e)=>{if(e.target===friendsBg)setState({showFriends:false});});

  // Theme toggle
  const themeToggle=document.getElementById('theme-toggle');
  if(themeToggle) themeToggle.addEventListener('click',()=>setState({isDark:!state.isDark}));

  // Close set dropdown on outside click
  document.addEventListener('click',(e)=>{
    if(state.collSetOpen){
      const dd=document.getElementById('set-dropdown');
      const btn=document.getElementById('set-filter-btn');
      if(dd&&!dd.contains(e.target)&&btn&&!btn.contains(e.target)){
        setState({collSetOpen:false});
      }
    }
  },{once:true});

  // Touch swipe
  const app=document.getElementById('app');
  app.addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true});
  app.addEventListener('touchend',(e)=>{
    if(touchStartX===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>60){
      if(dx<0&&state.tab<2)setState({tab:state.tab+1});
      if(dx>0&&state.tab>0)setState({tab:state.tab-1});
    }
    touchStartX=null;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────
render();
</script>

function waitForSupabase(cb) {

window.checkAuthAndEnter = async function() {
  // 1. Lire la session stockée directement — instantané, pas de réseau
  const stored = getStoredSession();
  if (stored && stored.user) {
    const user = stored.user;
    // Récupérer les vraies coins avant d'entrer (évite le flash à 100)
    waitForSupabase(async () => {
      const { data } = await window.db.from('players').select('coins').eq('id', user.id).single();
      enterGame(user, data ? data.coins : 0);
    });
    return;
  }
  // 2. Pas de session stockée → afficher bouton Discord
  showDiscordLoginBtn();
};

window.loginDiscord = function() {
  waitForSupabase(() => {
    window.db.auth.signInWithOAuth({
      provider: 'discord',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  });
};

window.logoutUser = function() {
  waitForSupabase(() => { window.db.auth.signOut(); });
  // Vider la session du localStorage
  try {
    const key = 'sb-' + SUPABASE_URL.split('//')[1].split('.')[0] + '-auth-token';
    localStorage.removeItem(key);
  } catch(e) {}
  setState({ showProfile: false, currentUser: null, screen: 'splash' });
  render();
};

// Au chargement : vérifier si retour OAuth Discord (hash dans l'URL)
waitForSupabase(() => {
  const db = window.db;

  // Si retour depuis Discord OAuth
  if (window.location.hash.includes('access_token')) {
    db.auth.onAuthStateChange(async (event, session) => {
      if ((event === 'SIGNED_IN') && session) {
        history.replaceState(null, '', window.location.pathname);
        const user = session.user;
        await db.from('players').upsert({
          id: user.id,
          discord_username: user.user_metadata.full_name || user.user_metadata.name,
          avatar_url: user.user_metadata.avatar_url,
        }, { onConflict: 'id' });
        const { data: playerData } = await db.from('players').select('coins').eq('id', user.id).single();
        enterGame(user, playerData ? playerData.coins : 100);
      }
    });
    return;
  }

  // Session déjà stockée → entrer auto sans clic
  const stored = getStoredSession();
  if (stored && stored.user) {
    db.from('players').select('coins').eq('id', stored.user.id).single()
      .then(({ data }) => {
        enterGame(stored.user, data ? data.coins : 0);
      });
  }
});

// ─── FRIENDS SYSTEM ───────────────────────────────────────────────
async function loadFriends() {
  const db = window.db;
  if (!db) return;
  const userId = state.currentUser?.id;
  if (!userId) return;

  const { data: inReqs } = await db
    .from('friend_requests')
    .select('id, sender_id, players!friend_requests_sender_id_fkey(discord_username, avatar_url)')
    .eq('receiver_id', userId).eq('status', 'pending');

  const friendRequestsIn = (inReqs||[]).map(r=>({
    request_id: r.id,
    discord_username: r.players?.discord_username,
    avatar_url: r.players?.avatar_url,
  }));

  const { data: friendsData } = await db
    .from('friend_requests')
    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url)')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
    .eq('status', 'accepted');

  const friends = (friendsData||[]).map(f=>{
    const other = f.sender_id === userId ? f.receiver : f.players;
    return { id: other?.id, discord_username: other?.discord_username, avatar_url: other?.avatar_url };
  }).filter(f=>f.id);

  setState({ friends, friendRequestsIn });
}

window.searchAndSendFriendRequest = searchAndSendFriendRequest;

window.sendFriendRequest = async function(receiverId) {

// ─── MESSAGES ─────────────────────────────────────────────────────
let _msgRealtimeSub = null;
let _notifRealtimeSub = null;

async function loadMessages(friendId) {
  const db = window.db;
  if (!db || !friendId) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  const { data } = await db.from('messages')
    .select('id, from_id, to_id, text, created_at')
    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  const msgs = (data||[]).map(m=>({ from: m.from_id, text: m.text, ts: m.created_at }));
  const newMessages = { ...state.messages, [friendId]: msgs };
  setState({ messages: newMessages });

  // Scroll en bas
  setTimeout(()=>{
    const list = document.getElementById('msg-list');
    if(list) list.scrollTop = list.scrollHeight;
  }, 50);

  // Realtime : écouter les nouveaux messages pour cette conversation
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} }
  _msgRealtimeSub = db.channel('messages-rt-' + friendId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => {
      const m = payload.new;
      if (!m) return;
      // Seulement si c'est de cet ami
      if (m.from_id !== friendId) {
        // Message d'un autre ami : juste mettre à jour le compteur notif
        // (uniquement si la conv de cet autre ami n'est pas ouverte)
        if (state.activeConvId !== m.from_id) {
          setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
        }
        return;
      }
      // Si la conv est ouverte, marquer directement comme lu (pas de badge)
      if (state.activeConvId === friendId) {
        markMsgNotifsRead(friendId);
      }
      const prev = state.messages[friendId] || [];
      // Éviter les doublons
      if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
      const updated = [...prev, { from: m.from_id, text: m.text, ts: m.created_at }];
      setState({ messages: { ...state.messages, [friendId]: updated } });
      setTimeout(()=>{ const l=document.getElementById('msg-list'); if(l) l.scrollTop=l.scrollHeight; },50);
    })
    .subscribe();
}

async function subscribeNotifications() {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Charger les notifications non lues (type message)
  const { data: notifs } = await db.from('notifications')
    .select('id, type, from_id, text, created_at, read')
    .eq('user_id', myId)
    .eq('read', false)
    .order('created_at', { ascending: false });

  // Filtrer celles de la conv déjà ouverte (si on revient d'une conv)
  // et les marquer lues en base pour éviter qu'elles réapparaissent au prochain refresh
  const activeConv = state.activeConvId;
  const allMsgNotifs = (notifs||[]).filter(n => n.type === 'message');

  // Notifs de convs déjà actives → marquer lues silencieusement
  const toMarkRead = activeConv ? allMsgNotifs.filter(n => n.from_id === activeConv) : [];
  if (toMarkRead.length > 0) {
    db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', activeConv)
      .eq('read', false)
      .then(()=>{}).catch(()=>{});
  }

  const msgNotifs = allMsgNotifs.filter(n => !activeConv || n.from_id !== activeConv);
  setState({ msgNotifCount: msgNotifs.length, pendingMsgNotifs: msgNotifs });

  // Realtime : écouter les nouvelles notifications
  if (_notifRealtimeSub) { try { db.removeChannel(_notifRealtimeSub); } catch(e){} }
  _notifRealtimeSub = db.channel('notif-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myId}`,
    }, payload => {
      const n = payload.new;
      if (!n) return;
      // Si la conv de cet expéditeur est déjà ouverte → marquer lu directement, pas de badge
      if (state.activeConvId && n.from_id === state.activeConvId) {
        markMsgNotifsRead(n.from_id);
        return;
      }
      const prev = state.pendingMsgNotifs || [];
      setState({
        msgNotifCount: (state.msgNotifCount || 0) + 1,
        pendingMsgNotifs: [n, ...prev],
      });
      showToast(n.text || 'Nouveau message !', '💬');
    })
    .subscribe();
}

window.subscribeNotifications = subscribeNotifications;

async function sendMessage(toId, text) {
  const db = window.db;
  if (!db || !toId || !text) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Optimistic update
  const prev = state.messages[toId] || [];
  const newMsg = { from: myId, text, ts: new Date().toISOString() };
  setState({ messages: { ...state.messages, [toId]: [...prev, newMsg] } });
  setTimeout(()=>{ const l=document.getElementById('msg-list'); if(l) l.scrollTop=l.scrollHeight; },50);

  // Envoyer en base
  await db.from('messages').insert({ from_id: myId, to_id: toId, text });

  // Notif au receveur via la table notifications
  await db.from('notifications').insert({
    user_id: toId,
    type: 'message',
    from_id: myId,
    text: text.length > 40 ? text.slice(0,40)+'…' : text,
    read: false,
  }).then(()=>{}).catch(()=>{});
}

// Marquer les notifs message comme lues quand on ouvre la conv
async function markMsgNotifsRead(fromId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  // Mise à jour immédiate du state pour que le badge disparaisse sans attendre
  const remaining = (state.pendingMsgNotifs || []).filter(n => n.from_id !== fromId);
  setState({ msgNotifCount: remaining.length, pendingMsgNotifs: remaining });
  // Persistance en base (impératif pour que le badge ne revienne pas au refresh)
  if (!db || !myId) return;
  try {
    await db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', fromId)
      .eq('read', false);
  } catch(e) { console.warn('[markMsgNotifsRead]', e); }
}

window.loadMessages = loadMessages;
window.sendMessage = sendMessage;
window.markMsgNotifsRead = markMsgNotifsRead;
</script>

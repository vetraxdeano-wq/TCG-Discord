let _notifPollInterval = null;
async function pollNotificationsAndTrades() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  // Vérifier si un combat_accepted est arrivé pour moi (challenger)
  const { data: acceptedNotifs } = await db.from('notifications')
    .select('id, from_id, meta')
    .eq('user_id', myId).eq('type', 'combat_accepted').eq('read', false);
  if (acceptedNotifs && acceptedNotifs.length > 0) {
    const n = acceptedNotifs[0];
    // Marquer comme lu immédiatement pour éviter double déclenchement
    await db.from('notifications').update({ read: true }).eq('id', n.id).catch(()=>{});
    let matchId = state.pendingMatchId || null;
    try { if (n.meta) matchId = JSON.parse(n.meta)?.match_id || matchId; } catch(e) {}
    try {
      sessionStorage.setItem('pvp_match_id', matchId || '');
      sessionStorage.setItem('pvp_opponent_id', n.from_id || '');
      sessionStorage.setItem('pvp_my_id', myId);
      sessionStorage.setItem('pvp_role', 'challenger');
    } catch(e) {}
    showPvpCountdown(5, () => { window.location.href = 'GAMEPLAY.html'; });
    return;
  }

  // Re-charger les combat requests non lus
  const { data: combatNotifs } = await db.from('notifications')
    .select('id, from_id, read')
    .eq('user_id', myId).eq('type', 'combat_request').eq('read', false);
  if (combatNotifs && combatNotifs.length > 0) {
    const existing = new Set((state.combatRequestsIn||[]).map(r=>r.request_id));
    const newOnes = combatNotifs.filter(n=>!existing.has(n.id));
    if (newOnes.length > 0) {
      const fromIds = [...new Set(newOnes.map(n=>n.from_id))];
      const { data: senders } = await db.from('players').select('id, discord_username, avatar_url').in('id', fromIds);
      const senderMap = {};
      (senders||[]).forEach(s=>{ senderMap[s.id]=s; });
      const addReqs = newOnes.map(n=>({
        request_id: n.id, from_id: n.from_id,
        discord_username: senderMap[n.from_id]?.discord_username||'Joueur',
        avatar_url: senderMap[n.from_id]?.avatar_url||null,
      }));
      setState({ combatRequestsIn: [...(state.combatRequestsIn||[]), ...addReqs] });
    }
  }

  // Re-charger les trades entrants en attente (non encore vus)
  const { data: pendingTrades } = await db.from('trades')
    .select('*').eq('to_id', myId).eq('status', 'pending');
  if (pendingTrades && pendingTrades.length > 0 && !state.tradeIncoming) {
    const trade = pendingTrades[0];
    const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
    setState({
      showTrade: true,
      tradeIncoming: { ...trade, from_name: sender?.discord_username || 'Un joueur' },
      tradeMyCard: null,
    });
  }

  // Re-charger le badge messages
  const { data: msgNotifs } = await db.from('notifications')
    .select('id, from_id').eq('user_id', myId).eq('type', 'message').eq('read', false);
  const activeConv = state.activeConvId;
  const filtered = (msgNotifs||[]).filter(n=>!activeConv||n.from_id!==activeConv);
  if (filtered.length !== state.msgNotifCount) {
    setState({ msgNotifCount: filtered.length });
  }
}
function startNotifPolling() {
  if (_notifPollInterval) clearInterval(_notifPollInterval);
  _notifPollInterval = setInterval(pollNotificationsAndTrades, 20000);
}
window.startNotifPolling = startNotifPolling;

async function sendCombatRequest(toId, toName) {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  const myName = state.currentUser?.user_metadata?.full_name || state.currentUser?.user_metadata?.name || 'Un joueur';
  if (!myId || !toId) return;

  // Vérifier deck par défaut avant d'envoyer
  const { data: deck } = await db.from('decks')
    .select('id').eq('player_id', myId).eq('is_default', true).single();
  if (!deck) {
    showToast('Configure un deck par défaut avant de défier !', '🗂️');
    return;
  }

  // Créer un ID de match unique partagé entre les deux joueurs
  const matchId = `${myId}_${toId}_${Date.now()}`;

  try {
    await db.from('notifications').insert({
      user_id: toId,
      type: 'combat_request',
      from_id: myId,
      text: `${myName} te défie en combat !`,
      read: false,
      meta: JSON.stringify({ match_id: matchId }),
    });
    showToast(`Défi envoyé à ${toName} !`, '⚔️');
    setState({ showFriends: false, pendingMatchId: matchId });
  } catch(e) {
    showToast('Erreur lors de l\'envoi du défi', '✗');
  }
}

async function respondCombatRequest(notifId, fromId, accept) {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Récupérer le meta (match_id) de la notif
  let matchId = null;
  try {
    const { data: notifData } = await db.from('notifications').select('meta').eq('id', notifId).single();
    if (notifData?.meta) matchId = JSON.parse(notifData.meta)?.match_id;
  } catch(e) {}

  // Marquer la notif comme lue
  await db.from('notifications').update({ read: true }).eq('id', notifId);

  // Retirer de la liste locale
  const updated = (state.combatRequestsIn || []).filter(r => r.request_id !== notifId);
  setState({ combatRequestsIn: updated, showNotif: false });

  if (!accept) {
    showToast('Défi refusé', '✗');
    // Prévenir l'expéditeur du refus
    if (fromId) {
      await db.from('notifications').insert({
        user_id: fromId,
        type: 'combat_declined',
        from_id: myId,
        text: 'Ton défi a été refusé.',
        read: false,
      }).catch(()=>{});
    }
    return;
  }

  // Vérifier deck par défaut
  const { data: deck } = await db.from('decks')
    .select('id').eq('player_id', myId).eq('is_default', true).single();
  if (!deck) {
    showToast('Configure un deck par défaut avant de combattre !', '🗂️');
    return;
  }

  // Envoyer combat_accepted à l'expéditeur avec le même match_id
  if (fromId) {
    await db.from('notifications').insert({
      user_id: fromId,
      type: 'combat_accepted',
      from_id: myId,
      text: 'Ton défi a été accepté ! Combat dans 5 secondes…',
      read: false,
      meta: JSON.stringify({ match_id: matchId }),
    }).catch(()=>{});
  }

  // Lancer le countdown sur l'accepteur (moi)
  try {
    sessionStorage.setItem('pvp_match_id', matchId || '');
    sessionStorage.setItem('pvp_opponent_id', fromId || '');
    sessionStorage.setItem('pvp_my_id', myId);
    sessionStorage.setItem('pvp_role', 'defender');
  } catch(e) {}
  showPvpCountdown(5, () => { window.location.href = 'GAMEPLAY.html'; });
}

function showPvpCountdown(seconds, onDone) {
  // Supprimer un éventuel countdown existant
  const existing = document.getElementById('pvp-countdown-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pvp-countdown-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:rgba(0,0,0,0.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    font-family:'Oswald',sans-serif;
  `;
  overlay.innerHTML = `
    <div style="font-size:18px;color:#fbbf24;font-weight:900;letter-spacing:3px;text-transform:uppercase;">⚔️ COMBAT PvP</div>
    <div style="font-size:14px;color:#9d8ea0;text-align:center;padding:0 30px;">Redirection vers le champ de bataille…</div>
    <div id="pvp-count-num" style="font-family:'Bangers',cursive;font-size:96px;font-weight:900;color:#f43f5e;line-height:1;text-shadow:0 0 40px rgba(244,63,94,0.6);">${seconds}</div>
    <div style="width:200px;height:4px;background:#1a1825;overflow:hidden;">
      <div id="pvp-count-bar" style="height:100%;background:linear-gradient(90deg,#f43f5e,#fbbf24);width:100%;transition:width ${seconds}s linear;"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Déclencher l'animation de la barre
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const bar = document.getElementById('pvp-count-bar');
      if (bar) bar.style.width = '0%';
    });
  });

  let n = seconds;
  const numEl = () => document.getElementById('pvp-count-num');
  const iv = setInterval(() => {
    n--;
    const el = numEl();
    if (el) el.textContent = n > 0 ? n : '⚔️';
    if (n <= 0) {
      clearInterval(iv);
      onDone();
    }
  }, 1000);
}

  CREATE POLICY "Users manage own deck_cards" ON deck_cards FOR ALL
    USING (deck_id IN (SELECT id FROM decks WHERE player_id = auth.uid()));
*/

async function loadDecks() {
  const db = window.db;
  const myId = state.currentUser?.id;

  const { data: decksData } = await db.from('decks')
    .select('id, name, is_default, created_at')

    .order('created_at', { ascending: true });

  if (!decksData) return;

  // Charger les cartes de chaque deck
  const deckIds = decksData.map(d=>d.id);
  let allDeckCards = [];
  if (deckIds.length > 0) {
    const { data: dc } = await db.from('deck_cards')
      .select('deck_id, card_id, quantity')
      .in('deck_id', deckIds);
    allDeckCards = dc || [];
  }

  const decks = decksData.map(d=>({
    ...d,
    cards: allDeckCards.filter(c=>c.deck_id===d.id)
  }));

  setState({ decks });
}

async function createDeck() {
  const db = window.db;
  const myId = state.currentUser?.id;

function addCardToDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const card = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(cardId));
  if (!card || !card.owned) return;

  const deckCards = deck.cards || [];
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  if (deckTotal >= 30) { showToast('30 cartes max dans un deck', '⚠'); return; }

  const mythCount = deckCards.reduce((s,c)=>{
    const cd=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(cd&&cd.rarity==='mythic'?c.quantity:0);
  },0);

  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  const currentQty = existing ? existing.quantity : 0;

  // Ne pas dépasser le nombre d'exemplaires possédés
  if (currentQty >= card.count) {
    showToast(`Tu ne possèdes que ${card.count} exemplaire${card.count>1?'s':''} de cette carte`, '⚠'); return;
  }
  // Règles de limite Rare/Mythic
  if ((card.rarity==='mythic'||card.rarity==='rare') && currentQty >= 2) {
    showToast(`Max 2 exemplaires pour les ${card.rarity==='mythic'?'Mythiques':'Rares'}`, '⚠'); return;
  }
  if (card.rarity==='mythic' && mythCount >= 2 && currentQty === 0) {
    showToast('Max 2 cartes Mythiques par deck', '⚠'); return;
  }

  let newCards;
  if (existing) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity+1}:c);
  } else {
    newCards = [...deckCards, {card_id: parseInt(cardId), quantity:1, deck_id: deck.id}];
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

function removeCardFromDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const deckCards = deck.cards || [];
  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  if (!existing) return;

  let newCards;
  if (existing.quantity > 1) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity-1}:c);
  } else {
    newCards = deckCards.filter(c=>parseInt(c.card_id)!==parseInt(cardId));
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

// ─── AUTO-FILL DECK ───────────────────────────────────────────────
function autoFillDeck() {
  const decks = state.decks || [];
  const deck = decks.find(d => d.id === state.activeDeckId);
  if (!deck) return;

  // Cartes possédées, triées par rareté décroissante (mythic > rare > uncommon > common)
  const rarityPriority = { mythic: 0, rare: 1, uncommon: 2, common: 3 };
  const ownedCards = ALL_CARDS
    .filter(c => c.owned && c.count > 0)
    .sort((a, b) => {
      const rDiff = rarityPriority[a.rarity] - rarityPriority[b.rarity];
      if (rDiff !== 0) return rDiff;
      // À rareté égale, prioriser les cartes avec plus d'exemplaires
      return b.count - a.count;
    });

  // Construire le deck en appliquant toutes les règles
  let newCards = []; // [{card_id, quantity}]
  let total = 0;
  let mythCount = 0;

  const qtyInNew = (cardId) => {
    const e = newCards.find(c => parseInt(c.card_id) === parseInt(cardId));
    return e ? e.quantity : 0;
  };

  for (const card of ownedCards) {
    if (total >= 30) break;

    // Combien d'exemplaires peut-on ajouter ?
    let maxAdd = card.count; // limité par ce qu'on possède

    // Rare/Mythic : max 2 exemplaires dans le deck
    if (card.rarity === 'mythic' || card.rarity === 'rare') {
      maxAdd = Math.min(maxAdd, 2);
    }

    // Mythic : max 2 au total dans le deck
    if (card.rarity === 'mythic') {
      maxAdd = Math.min(maxAdd, 2 - mythCount);
    }

    if (maxAdd <= 0) continue;

    // Limiter à ce qu'il reste à remplir
    const toAdd = Math.min(maxAdd, 30 - total);
    if (toAdd <= 0) continue;

    newCards.push({ card_id: parseInt(card.id), quantity: toAdd, deck_id: deck.id });
    total += toAdd;
    if (card.rarity === 'mythic') mythCount += toAdd;
  }

  if (total === 0) {
    showToast('Aucune carte possédée pour remplir le deck', '⚠');
    return;
  }

  const updatedDecks = decks.map(d => d.id === deck.id ? { ...d, cards: newCards } : d);
  setState({ decks: updatedDecks });
  showToast(`Deck rempli automatiquement (${total}/30 cartes)`, total === 30 ? '✨' : '⚠');
}

async function saveDeck() {
  const db = window.db;
  if (!db) return;
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const cards = deck.cards || [];
  const deckTotal = cards.reduce((s,c)=>s+c.quantity,0);

  try {
    // Supprimer toutes les cartes existantes
    const { error: delErr } = await db.from('deck_cards').delete().eq('deck_id', deck.id);
    if (delErr) throw delErr;

    // Réinsérer si des cartes sont présentes
    // quantity est clampée à 2 max (contrainte DB deck_cards_quantity_check)
    if (cards.length > 0) {
      const rows = cards.map(c=>({
        deck_id: deck.id,
        card_id: parseInt(c.card_id),
        quantity: Math.min(c.quantity, 2)
      }));
      const { error: insErr } = await db.from('deck_cards').insert(rows);
      if (insErr) throw insErr;
    }

    if (deckTotal < 30) {
      showToast(`${deck.name} sauvegardé (${deckTotal}/30 cartes)`, '💾');
    } else {
      // Si c'est le seul deck et qu'aucun n'est par défaut → le mettre par défaut automatiquement
      const allDecks = state.decks || [];
      const hasDefault = allDecks.some(d => d.is_default);
      if (allDecks.length === 1 && !hasDefault) {
        await db.from('decks').update({ is_default: true }).eq('id', deck.id);
        const updated = allDecks.map(d => d.id===deck.id ? {...d, is_default:true} : d);
        setState({ decks: updated });
        showToast(`${deck.name} sauvegardé et mis par défaut !`, '⭐');
      } else {
        showToast(`${deck.name} sauvegardé !`, '✓');
      }
    }
  } catch(e) {
    console.error('[saveDeck]', e);
    // Si c'est une erreur de contrainte check, le delete a réussi mais l'insert a échoué partiellement
    // → recharger le deck depuis la DB pour avoir l'état réel
    if (e.message && e.message.includes('check constraint')) {
      await loadDecks();
      showToast('Sauvegarde partielle — modifie la contrainte SQL (voir console)', '⚠');
    } else {
      showToast('Erreur sauvegarde : ' + (e.message || 'inconnue'), '✗');
    }
  }
}

// Envoyer l'offre de trade en DB
async function sendTradeOffer(theirCardId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  const toId = state.tradeWithId;
  const myCard = state.tradeMyCard;
  if (!db || !myId || !toId || !myCard || !theirCardId) {
    showToast('Données manquantes pour le trade', '⚠'); return;
  }

  const theirCard = ALL_CARDS.find(c => parseInt(c.id) === parseInt(theirCardId));
  if (!theirCard) {
    showToast('Carte demandée introuvable', '✗'); return;
  }
  if (theirCard.rarity !== myCard.rarity) {
    showToast('Échange de même rareté uniquement', '⚠'); return;
  }
  if (parseInt(theirCard.id) === parseInt(myCard.id)) {
    showToast('Tu ne peux pas échanger une carte contre elle-même', '⚠'); return;
  }
  // Limite 1 trade par jour
  if (!canTradeToday(myId)) {
    showToast('Tu as déjà effectué un échange aujourd\'hui ! ⏳ ' + timeUntilMidnight(), '🔄');
    return;
  }

  try {
    const { data, error } = await db.from('trades').insert({
      from_id: myId,
      to_id: toId,
      from_card_id: parseInt(myCard.id),
      to_card_id: parseInt(theirCardId),
      status: 'pending',
    }).select().single();

    if (error) {
      console.error('[sendTradeOffer]', error);
      showToast('Erreur envoi trade : ' + (error.message || 'inconnue'), '✗'); return;
    }

    // Notifier l'ami
    await db.from('notifications').insert({
      user_id: toId, type: 'trade', from_id: myId,
      text: `Échange proposé : carte #${String(myCard.id).replace(/^0+/,'')} ↔ carte #${String(theirCardId).replace(/^0+/,'')}`,
      read: false,
    }).then(()=>{}).catch(()=>{});

    markTradeUsed(myId);
    startDailyTicker();
    setState({ showTrade: false, tradeMyCard: null, tradeStep: null, tradeWantedNum: null });
    showToast('Proposition envoyée !', '🔄');
    // Rafraîchir les trades dans la conv si elle est ouverte
    if (state.activeConvId === toId) loadConvTrades(toId);
  } catch(e) {
    console.error('[sendTradeOffer] exception', e);
    showToast('Erreur envoi trade', '✗');
  }
}

window.respondTrade = async function respondTrade(tradeId, accept) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !tradeId) return;

  const incoming = state.tradeIncoming;
  if (!incoming) return;

  if (accept) {
    // Vérifier que les deux joueurs possèdent encore les cartes
    const { data: myCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', myId).eq('card_id', incoming.to_card_id).single();
    const { data: theirCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id).single();

    if (!myCards || myCards.quantity < 1) { showToast('Tu ne possèdes plus cette carte', '✗'); return; }
    if (!theirCards || theirCards.quantity < 1) { showToast("L'autre joueur ne possède plus sa carte", '✗'); return; }

    // Exécuter l'échange
    // Retirer les cartes des deux joueurs
    if (myCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: myCards.quantity - 1 }).eq('player_id', myId).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', myId).eq('card_id', incoming.to_card_id);
    }
    if (theirCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: theirCards.quantity - 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    }

    // Donner les cartes aux deux joueurs
    const upsertMy = await db.from('player_cards').select('quantity').eq('player_id', myId).eq('card_id', incoming.from_card_id).single();
    if (upsertMy.data) {
      await db.from('player_cards').update({ quantity: upsertMy.data.quantity + 1 }).eq('player_id', myId).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: myId, card_id: incoming.from_card_id, quantity: 1 });
    }
    const upsertTheir = await db.from('player_cards').select('quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id).single();
    if (upsertTheir.data) {
      await db.from('player_cards').update({ quantity: upsertTheir.data.quantity + 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: incoming.from_id, card_id: incoming.to_card_id, quantity: 1 });
    }

    await db.from('trades').update({ status: 'accepted' }).eq('id', tradeId);

    // Notifier l'expéditeur
    await db.from('notifications').insert({
      user_id: incoming.from_id, type: 'trade_accepted', from_id: myId,
      text: 'Ton échange a été accepté !', read: false,
    }).then(()=>{}).catch(()=>{});

    // Recharger la collection
    if (window.loadCollection) window.loadCollection();
    const fromCardName = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(incoming.from_card_id))?.name || '#'+incoming.from_card_id;
    showToast('Échange effectué ! Tu as reçu : ' + fromCardName, '🔄');
  } else {
    await db.from('trades').update({ status: 'declined' }).eq('id', tradeId);
    // Notifier l'expéditeur du refus
    if (incoming.from_id) {
      await db.from('notifications').insert({
        user_id: incoming.from_id, type: 'trade_declined', from_id: myId,
        text: 'Ton échange a été refusé.', read: false,
      }).then(()=>{}).catch(()=>{});
    }
    showToast('Échange refusé', '✗');
  }

  setState({ showTrade: false, tradeIncoming: null, tradeStep: null, tradeWantedNum: null });
  // Rafraîchir les trades dans la conv si elle est ouverte avec cet ami
  const partnerId = incoming?.from_id;
  if (partnerId && state.activeConvId === partnerId) loadConvTrades(partnerId);
};

// Écouter les trades entrants en realtime
async function subscribeTradeNotifications() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  // Charger immédiatement les trades entrants en attente (au cas où reçus hors ligne)
  const { data: pendingTrades } = await db.from('trades')
    .select('*').eq('to_id', myId).eq('status', 'pending');
  if (pendingTrades && pendingTrades.length > 0 && !state.tradeIncoming) {
    const trade = pendingTrades[0];
    const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
    setState({
      showTrade: true,
      tradeIncoming: { ...trade, from_name: sender?.discord_username || 'Un joueur' },
      tradeMyCard: null,
    });
    showToast(`${sender?.discord_username||'Un joueur'} t'a proposé un échange !`, '🔄');
  }

  if (_tradeRealtimeSub) { try { db.removeChannel(_tradeRealtimeSub); } catch(e){} }

  _tradeRealtimeSub = db.channel('trades-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'trades',
      filter: `to_id=eq.${myId}`,
    }, async payload => {
      const trade = payload.new;
      if (!trade || trade.status !== 'pending') return;

      // Charger le nom de l'expéditeur
      const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
      const fromName = sender?.discord_username || 'Un joueur';

      setState({
        showTrade: true,
        tradeIncoming: { ...trade, from_name: fromName },
        tradeMyCard: null,
      });
      showToast(`${fromName} propose un échange !`, '🔄');
    })
    .subscribe();
}

window.subscribeTradeNotifications = subscribeTradeNotifications;

        ${imgSrc
          ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;-webkit-user-drag:none;" draggable="false" />`
          : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${rarCol}40,${rarCol}15);display:flex;align-items:center;justify-content:center;font-size:80px;">🃏</div>`}
        <!-- Overlay reflet holographique -->
        <div id="c3d-holo" style="
          position:absolute;inset:0;
          background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%);
          mix-blend-mode:screen;pointer-events:none;opacity:0;transition:opacity .15s;
        "></div>
        <!-- Brillance spéculaire -->
        <div id="c3d-spec" style="
          position:absolute;inset:0;
          background:radial-gradient(circle at 50% 50%,rgba(255,255,255,${fx.specAlpha}) 0%,transparent 65%);
          mix-blend-mode:screen;pointer-events:none;opacity:0;transition:opacity .1s;
        "></div>
        <!-- Reflet de rareté -->
        <div id="c3d-rar" style="
          position:absolute;inset:0;
          background:linear-gradient(135deg,${rarCol}30,transparent 50%,${rarCol}20);
          mix-blend-mode:color-dodge;pointer-events:none;opacity:0;transition:opacity .15s;
        "></div>
      </div>
    </div>
    <div style="margin-top:18px;font-family:'Bangers',cursive;font-size:13px;letter-spacing:2px;color:rgba(255,255,255,.35);">MAINTENIR APPUYÉ · BOUGER POUR PIVOTER</div>
    <div style="position:absolute;top:16px;right:16px;">
      <button id="c3d-close" style="width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>
  `;

  document.body.appendChild(viewer);

  const card3d = document.getElementById('c3d-card');
  const holo   = document.getElementById('c3d-holo');
  const spec   = document.getElementById('c3d-spec');
  const rar    = document.getElementById('c3d-rar');

  let pressed = false;
  let currentRX = 0, currentRY = 0;
  const MAX_TILT = 18; // moins sensible qu'avant (était 22-28)

  function applyTilt(nx, ny) {
    // nx, ny : -1 à 1 (position normalisée dans la carte)
    const rx = -ny * MAX_TILT;
    const ry =  nx * MAX_TILT;
    currentRX = rx; currentRY = ry;
    card3d.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.03,1.03,1.03)`;

    // Reflet : se déplace avec la position
    const hx = (nx * 0.5 + 0.5) * 100;
    const hy = (ny * 0.5 + 0.5) * 100;

    if(fx.rainbow) {
      const ang = 105 + ry * 1.2;
      holo.style.background = `linear-gradient(${ang}deg, ${fx.holoColors})`;
    } else {
      holo.style.background = `linear-gradient(${105 + ry}deg, transparent 35%, rgba(255,255,255,${fx.holoAlpha * 1.5}) 50%, transparent 65%)`;
    }
    spec.style.background = `radial-gradient(circle at ${hx}% ${hy}%, rgba(255,255,255,${fx.specAlpha}) 0%, transparent 60%)`;

    holo.style.opacity = '1';
    spec.style.opacity = '1';
    rar.style.opacity  = String(fx.rarAlpha);
    viewer.style.cursor = 'grabbing';
  }

  function releaseTilt() {
    pressed = false;
    card3d.style.transition = 'transform .45s cubic-bezier(.25,.46,.45,.94)';
    card3d.style.transform = 'rotateX(0) rotateY(0) scale3d(1,1,1)';
    holo.style.opacity = '0';
    spec.style.opacity = '0';
    rar.style.opacity  = '0';
    viewer.style.cursor = 'grab';
    setTimeout(() => { card3d.style.transition = 'transform .08s ease-out'; }, 460);
  }

  function getRelative(el, cx, cy) {
    const r = el.getBoundingClientRect();
    const nx = ((cx - r.left) / r.width)  * 2 - 1;
    const ny = ((cy - r.top)  / r.height) * 2 - 1;
    return { nx: Math.max(-1, Math.min(1, nx)), ny: Math.max(-1, Math.min(1, ny)) };
  }

  // Mouse
  viewer.addEventListener('mousedown', (e) => {
    if(e.target === document.getElementById('c3d-close')) return;
    pressed = true;
    card3d.style.transition = 'transform .08s ease-out';
    const {nx, ny} = getRelative(card3d, e.clientX, e.clientY);
    applyTilt(nx, ny);
  });
  viewer.addEventListener('mousemove', (e) => {
    if(!pressed) return;
    const {nx, ny} = getRelative(card3d, e.clientX, e.clientY);
    applyTilt(nx, ny);
  });
  viewer.addEventListener('mouseup', releaseTilt);
  viewer.addEventListener('mouseleave', () => { if(pressed) releaseTilt(); });

  // Touch
  viewer.addEventListener('touchstart', (e) => {
    if(e.target === document.getElementById('c3d-close')) return;
    e.preventDefault();
    pressed = true;
    card3d.style.transition = 'transform .08s ease-out';
    const t = e.touches[0];
    const {nx, ny} = getRelative(card3d, t.clientX, t.clientY);
    applyTilt(nx, ny);
  }, {passive:false});
  viewer.addEventListener('touchmove', (e) => {
    if(!pressed) return;
    e.preventDefault();
    const t = e.touches[0];
    const {nx, ny} = getRelative(card3d, t.clientX, t.clientY);
    applyTilt(nx, ny);
  }, {passive:false});
  viewer.addEventListener('touchend', releaseTilt);

  // Fermer — clic sur fond ou bouton ✕
  document.getElementById('c3d-close').addEventListener('click', () => closeViewer());
  viewer.addEventListener('click', (e) => {
    if(e.target === viewer) closeViewer();
  });

  // Échap
  function onKey(e) { if(e.key === 'Escape') closeViewer(); }
  document.addEventListener('keydown', onKey);

  function closeViewer() {
    viewer.style.animation = 'fadeOut .18s ease both';
    setTimeout(() => { viewer.remove(); document.removeEventListener('keydown', onKey); }, 190);
  }
}

// Keyframes pour fadeOut (fadeIn déjà défini dans les styles globaux)
(function(){
  if(document.getElementById('card3d-styles')) return;
  const s = document.createElement('style');
  s.id = 'card3d-styles';
  s.textContent = `@keyframes fadeOut{from{opacity:1}to{opacity:0}}`;
  document.head.appendChild(s);
})();
</script>
</body>
</html>

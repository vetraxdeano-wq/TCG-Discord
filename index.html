    }
    .tc-mini-card {
      width:64px; height:90px; position:relative; overflow:hidden;
      border:2px solid rgba(255,255,255,.1); background:#1e1f22;
      opacity:.5; filter:brightness(.75) saturate(.6);
    }
    .tc-mini-card img { width:100%; height:100%; object-fit:contain; display:block; }
    .tc-mini-card-name {
      font-size:8px; font-weight:700; color:rgba(255,255,255,.38);
      text-align:center; max-width:72px; line-height:1.2;
    }
    .tc-mini-rar {
      font-size:7px; font-weight:800; letter-spacing:1px;
      font-family:'Oswald',sans-serif;
    }
    .tc-center {
      display:flex; flex-direction:column; align-items:center;
      gap:10px; position:relative; z-index:2; padding:0 10px; flex-shrink:0;
    }
    .tc-obtained-label {
      font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
      color:rgba(255,255,255,.5); font-family:'Oswald',sans-serif;
      animation:tcLabelPop .5s ease .95s both;
    }
    .tc-main-wrap { perspective:900px; position:relative; }
    .tc-main-card {
      position:relative; transform-style:preserve-3d;
      will-change:transform; transition:transform .08s ease-out;
      animation:tcCardReveal .7s cubic-bezier(.22,.61,.36,1) .85s both;
      cursor:grab;
    }
    .tc-main-card:active { cursor:grabbing; }
    .tc-main-card img { display:block; width:100%; height:100%; object-fit:contain; pointer-events:none; -webkit-user-drag:none; }
    .tc-holo,.tc-spec,.tc-rar { position:absolute; inset:0; pointer-events:none; mix-blend-mode:screen; opacity:0; transition:opacity .15s; }
    .tc-card-glow {
      position:absolute; inset:-12px; pointer-events:none; z-index:-1;
      animation:tcGlowPulse 2.4s ease-in-out 1.5s infinite;
    }
    .tc-rar-badge {
      font-size:10px; font-weight:800; letter-spacing:1.5px;
      font-family:'Oswald',sans-serif;
      animation:tcLabelPop .5s ease 1.1s both;
    }
    .tc-card-name {
      font-size:12px; font-weight:700; color:#fff;
      text-align:center; max-width:110px; line-height:1.2;
    }
    .tc-divider {
      width:1px; height:110px; flex-shrink:0;
      background:linear-gradient(to bottom,transparent,rgba(255,255,255,.1),transparent);
      margin:0 6px; margin-top:28px;
    }
    .tc-hint {
      font-size:9px; letter-spacing:1.5px; color:rgba(255,255,255,.22);
      font-family:'Oswald',sans-serif; text-transform:uppercase;
      animation:tcSlideUp .4s ease 1.55s both; opacity:0; margin-top:-4px;
    }
    .tc-close-btn {
      margin-top:22px; padding:11px 28px;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.55); font-family:'Oswald',sans-serif;
      font-size:12px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
      cursor:pointer; transition:background .15s,color .15s;
      animation:tcSlideUp .4s ease 1.4s both; opacity:0;
    }
    .tc-close-btn:hover { background:rgba(255,255,255,.13); color:rgba(255,255,255,.9); }
  `;
  document.head.appendChild(s);
})();

// Keyframes pour fadeOut (fadeIn déjà défini dans les styles globaux)
(function(){
  if(document.getElementById('card3d-styles')) return;
  const s = document.createElement('style');
  s.id = 'card3d-styles';
  s.textContent = `
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}
    #card-3d-viewer > div:last-child {
      top: max(env(safe-area-inset-top, 16px), 16px) !important;
    }
  `;
  document.head.appendChild(s);
})();
</script>

<script>

// ─── TRADE COMPLETE ANIMATION ────────────────────────────────────────────────
function showTradeCompleteAnimation({ obtainedCard, givenCard, senderName }) {
  const existing = document.getElementById('trade-complete-overlay');
  if (existing) existing.remove();

  const rarity  = obtainedCard.rarity || 'common';
  const col     = RARITY_COLOR[rarity] || '#64748b';
  const rarLabel = RARITY_LABEL[rarity] || rarity;

  const RFX = {
    mythic: {
      holoAlpha:.22, specAlpha:.30, rarAlpha:.65, rainbow:true,
      holoColors:`rgba(255,80,80,.18) 0%,rgba(255,200,50,.22) 20%,rgba(80,255,160,.18) 40%,rgba(80,160,255,.22) 60%,rgba(200,80,255,.18) 80%,rgba(255,80,80,.18) 100%`,
      glowBase:`0 0 24px ${RARITY_COLOR.mythic}88,0 0 48px ${RARITY_COLOR.mythic}44`,
      glowPeak:`0 0 48px ${RARITY_COLOR.mythic}cc,0 0 96px ${RARITY_COLOR.mythic}66`,
      particles:['#f43f5e','#ff8c94','#ffd700','#ff6b8a'], count:28,
    },
    rare: {
      holoAlpha:.14, specAlpha:.22, rarAlpha:.48, rainbow:false,
      holoColors:`rgba(167,139,250,.12) 20%,rgba(255,255,255,.18) 50%,rgba(167,139,250,.12) 80%`,
      glowBase:`0 0 16px ${RARITY_COLOR.rare}66,0 0 32px ${RARITY_COLOR.rare}33`,
      glowPeak:`0 0 32px ${RARITY_COLOR.rare}aa,0 0 64px ${RARITY_COLOR.rare}55`,
      particles:['#a78bfa','#c4b5fd','#7c3aed'], count:20,
    },
    uncommon: {
      holoAlpha:.09, specAlpha:.15, rarAlpha:.32, rainbow:false,
      holoColors:`rgba(56,189,248,.09) 25%,rgba(255,255,255,.13) 50%,rgba(56,189,248,.09) 75%`,
      glowBase:`0 0 10px ${RARITY_COLOR.uncommon}44`,
      glowPeak:`0 0 20px ${RARITY_COLOR.uncommon}77,0 0 40px ${RARITY_COLOR.uncommon}33`,
      particles:['#38bdf8','#7dd3fc'], count:14,
    },
    common: {
      holoAlpha:.05, specAlpha:.09, rarAlpha:.18, rainbow:false,
      holoColors:`rgba(200,200,200,.05) 30%,rgba(255,255,255,.09) 50%,rgba(200,200,200,.05) 70%`,
      glowBase:`0 0 6px rgba(150,150,150,.25)`,
      glowPeak:`0 0 12px rgba(150,150,150,.4)`,
      particles:['#94a3b8','#cbd5e1'], count:10,
    },
  };
  const fx = RFX[rarity] || RFX.common;

  const vw = window.innerWidth, vh = window.innerHeight;
  const maxH = Math.min(Math.round(vh * .42), 260);
  const cardH = maxH;
  const cardW = Math.round(cardH * 0.667);

  function miniHTML(card) {
    const c = RARITY_COLOR[card.rarity] || '#64748b';
    const l = RARITY_LABEL[card.rarity] || card.rarity;
    return `
      <div class="tc-mini-card" style="border-color:${c}28;">
        ${card.image_url
          ? `<img src="${card.image_url}" alt="${card.name}" />`
          : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:24px;">🃏</div>`}
      </div>
      <div class="tc-mini-card-name">${card.name}</div>
      <div class="tc-mini-rar" style="color:${c}55;">◆ ${l}</div>
    `;
  }

  const overlay = document.createElement('div');
  overlay.id = 'trade-complete-overlay';
  overlay.innerHTML = `
    <div id="tc-particles" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>
    <div class="tc-header">
      <div class="tc-header-label">Résultat de l'échange</div>
      <div class="tc-header-title">ÉCHANGE FINALISÉ</div>
    </div>
    <div class="tc-cards-zone">
      <div class="tc-side tc-left">
        <div class="tc-side-label">DONNÉ PAR</div>
        <div class="tc-side-name">${senderName}</div>
        ${miniHTML(obtainedCard)}
      </div>
      <div class="tc-divider"></div>
      <div class="tc-center">
        <div class="tc-obtained-label">✦ TU OBTIENS</div>
        <div class="tc-main-wrap">
          <div class="tc-card-glow" style="--tc-glow-base:${fx.glowBase};--tc-glow-peak:${fx.glowPeak};"></div>
          <div id="tc-main-card" class="tc-main-card" style="width:${cardW}px;height:${cardH}px;">
            ${obtainedCard.image_url
              ? `<img src="${obtainedCard.image_url}" alt="${obtainedCard.name}" />`
              : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,${col}40,${col}15);font-size:56px;">🃏</div>`}
            <div class="tc-holo" id="tc-holo"></div>
            <div class="tc-spec" id="tc-spec"></div>
            <div class="tc-rar"  id="tc-rar" style="background:linear-gradient(135deg,${col}30,transparent 50%,${col}20);mix-blend-mode:color-dodge;"></div>
          </div>
        </div>
        <div class="tc-rar-badge" style="color:${col};">◆ ${rarLabel}</div>
        <div class="tc-card-name">${obtainedCard.name}</div>
      </div>
      <div class="tc-divider"></div>
      <div class="tc-side tc-right">
        <div class="tc-side-label">TA CARTE DONNÉE</div>
        <div class="tc-side-name">à ${senderName}</div>
        ${miniHTML(givenCard)}
      </div>
    </div>
    <div class="tc-hint">↔ maintenir &amp; déplacer pour pivoter</div>
    <button class="tc-close-btn" id="tc-close-btn">✕ Fermer</button>
  `;
  document.body.appendChild(overlay);

  // Particules
  const pCont = document.getElementById('tc-particles');
  (fx.particles || ['#fff']).forEach((color, ci) => {
    const total = fx.count || 12;
    const perColor = Math.ceil(total / fx.particles.length);
    for (let i = 0; i < perColor; i++) {
      const el = document.createElement('div');
      el.className = 'tc-particle';
      const angle = Math.random() * 360;
      const dist  = 80 + Math.random() * 160;
      const dx = Math.round(Math.cos(angle * Math.PI/180) * dist);
      const dy = Math.round(Math.sin(angle * Math.PI/180) * dist - 40);
      const size = 4 + Math.random() * 6;
      el.style.cssText = `left:50%;top:50%;width:${size}px;height:${size}px;background:${color};--tc-dx:${dx}px;--tc-dy:${dy}px;--tc-dur:${1+Math.random()*.8}s;--tc-delay:${.9+Math.random()*.5}s;`;
      pCont.appendChild(el);
    }
  });

  // Tilt 3D
  const mainCard = document.getElementById('tc-main-card');
  const holoEl  = document.getElementById('tc-holo');
  const specEl  = document.getElementById('tc-spec');
  const rarEl   = document.getElementById('tc-rar');
  let tcPressed = false;
  const MAX_TILT = 18;

  function tcGetRel(el, cx, cy) {
    const r = el.getBoundingClientRect();
    return {
      nx: Math.max(-1, Math.min(1, ((cx-r.left)/r.width)*2-1)),
      ny: Math.max(-1, Math.min(1, ((cy-r.top)/r.height)*2-1)),
    };
  }
  function tcApplyTilt(nx, ny) {
    const rx = -ny * MAX_TILT, ry = nx * MAX_TILT;
    mainCard.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg) scale3d(1.03,1.03,1.03)`;
    const hx = (nx*.5+.5)*100, hy = (ny*.5+.5)*100;
    if (fx.rainbow) {
      holoEl.style.background = `linear-gradient(${105+ry*1.2}deg,${fx.holoColors})`;
    } else {
      holoEl.style.background = `linear-gradient(${105+ry}deg,transparent 35%,rgba(255,255,255,${fx.holoAlpha*1.5}) 50%,transparent 65%)`;
    }
    specEl.style.background = `radial-gradient(circle at ${hx}% ${hy}%,rgba(255,255,255,${fx.specAlpha}) 0%,transparent 60%)`;
    holoEl.style.opacity='1'; specEl.style.opacity='1'; rarEl.style.opacity=String(fx.rarAlpha);
    mainCard.style.cursor='grabbing';
  }
  function tcReleaseTilt() {
    tcPressed = false;
    mainCard.style.transition='transform .45s cubic-bezier(.25,.46,.45,.94)';
    mainCard.style.transform='rotateX(0) rotateY(0) scale3d(1,1,1)';
    holoEl.style.opacity='0'; specEl.style.opacity='0'; rarEl.style.opacity='0';
    mainCard.style.cursor='grab';
    setTimeout(()=>{ mainCard.style.transition='transform .08s ease-out'; }, 460);
  }
  mainCard.addEventListener('mousedown',(e)=>{ tcPressed=true; mainCard.style.transition='transform .08s ease-out'; const {nx,ny}=tcGetRel(mainCard,e.clientX,e.clientY); tcApplyTilt(nx,ny); });
  window.addEventListener('mousemove',(e)=>{ if(!tcPressed)return; const {nx,ny}=tcGetRel(mainCard,e.clientX,e.clientY); tcApplyTilt(nx,ny); });
  window.addEventListener('mouseup',()=>{ if(tcPressed)tcReleaseTilt(); });
  mainCard.addEventListener('touchstart',(e)=>{ tcPressed=true; mainCard.style.transition='transform .08s ease-out'; const t=e.touches[0]; const {nx,ny}=tcGetRel(mainCard,t.clientX,t.clientY); tcApplyTilt(nx,ny); },{passive:true});
  mainCard.addEventListener('touchmove',(e)=>{ if(!tcPressed)return; const t=e.touches[0]; const {nx,ny}=tcGetRel(mainCard,t.clientX,t.clientY); tcApplyTilt(nx,ny); },{passive:true});
  mainCard.addEventListener('touchend',tcReleaseTilt);

  function tcClose() {
    overlay.style.animation='fadeOut .22s ease both';
    setTimeout(()=>overlay.remove(), 230);
  }
  document.getElementById('tc-close-btn').addEventListener('click', tcClose);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) tcClose(); });
  function tcOnKey(e) { if(e.key==='Escape'){ tcClose(); document.removeEventListener('keydown',tcOnKey); } }
  document.addEventListener('keydown', tcOnKey);
}

// ─── FRIEND PICKER POUR TRADE DEPUIS MODAL CARTE ─────────────────
function _showFriendPickerForTrade(card){
  const existing = document.getElementById('_ftp-overlay');
  if(existing) existing.remove();
  const friends = state.friends || [];
  const th = themes.dark;

  const overlay = document.createElement('div');
  overlay.id = '_ftp-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;';

  overlay.innerHTML = `
    <div style="width:100%;max-width:360px;background:${th.bgSecondary};border:3px solid #000;box-shadow:6px 6px 0 #000;overflow:hidden;">
      <div style="height:3px;background:${th.accent};"></div>
      <div style="display:flex;align-items:center;gap:10px;padding:14px 16px 0;">
        <div style="font-family:'Luckiest Guy',cursive;font-size:16px;color:${th.text};letter-spacing:.5px;flex:1;">Proposer à un ami</div>
        <button id="_ftp-close" style="width:28px;height:28px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      <div style="padding:8px 16px 4px;font-size:10px;color:${th.textMuted};">
        Tu proposes : <span style="color:${RARITY_COLOR[card.rarity]};font-weight:700;">${card.name}</span>
        <span style="color:${th.textFaint};"> · ${RARITY_LABEL[card.rarity]}</span>
      </div>
      <div style="max-height:300px;overflow-y:auto;padding:6px 16px 16px;display:flex;flex-direction:column;gap:6px;">
        ${friends.map(f=>`
        <button class="_ftp-friend" data-fid="${f.id}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${th.bgTertiary};border:2px solid #000;cursor:pointer;width:100%;text-align:left;">
          <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:${th.accent}20;border:2px solid #000;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
            ${f.avatar_url?`<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;" />`:`<span style="font-size:14px;">👤</span>`}
          </div>
          <div style="flex:1;font-size:11px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.discord_username||'Ami'}</div>
          <span style="font-size:10px;color:${th.accent};font-weight:700;flex-shrink:0;">Choisir →</span>
        </button>`).join('')}
      </div>
    </div>`;

  document.body.appendChild(overlay);

  document.getElementById('_ftp-close').addEventListener('click', ()=>overlay.remove());
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });

  overlay.querySelectorAll('._ftp-friend').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      overlay.remove();
      setState({
        collSelectedCard: null,
        showTrade: true,
        tradeWithId: btn.dataset.fid,
        tradeMyCard: card,
        tradeStep: 'pick_their_card',
        tradeWantedNum: null,
        tradeSearch: '',
      });
    });
  });
}
</script>

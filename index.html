<script>
  // ─── PWA INSTALL SYSTEM ──────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let _pwaInstallPrompt = null;
  let _pwaHideTimer = null;
  let _isInstalled = window.matchMedia('(display-mode: standalone)').matches
                  || ('standalone' in navigator && navigator.standalone);

  // Détection navigateur/plateforme
  const _ua = navigator.userAgent;
  const _isIos     = /iphone|ipad|ipod/i.test(_ua);
  const _isAndroid = /android/i.test(_ua);
  const _isOpera   = /OPR\/|Opera/i.test(_ua);
  const _isFirefox = /Firefox/i.test(_ua) && !/Seamonkey/i.test(_ua);
  const _isSamsung = /SamsungBrowser/i.test(_ua);
  const _isEdge    = /Edg\//i.test(_ua);
  const _isChrome  = /Chrome/i.test(_ua) && !_isOpera && !_isEdge && !_isSamsung;
  const _isSafari  = /Safari/i.test(_ua) && !_isChrome && !_isAndroid;
  const _isMobile  = _isIos || _isAndroid;

  function _hidePwaBtn() {
    const btn = document.getElementById('pwa-install-btn');
    if (btn) { btn.style.opacity = '0'; btn.style.pointerEvents = 'none'; setTimeout(()=>{ btn.style.display='none'; }, 400); }
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    _pwaInstallPrompt = e;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    _pwaInstallPrompt = null;
    _isInstalled = true;
    _hidePwaBtn();
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  });

  // Déclencher : prompt natif si dispo, sinon overlay contextuel
  window.triggerPwaInstall = function() {
    if (_pwaInstallPrompt) {
      _pwaInstallPrompt.prompt();
      _pwaInstallPrompt.userChoice.then(() => {
        _pwaInstallPrompt = null;
        _hidePwaBtn();
      });
      return;
    }
    // iOS : essayer Web Share API pour déclencher le flow natif
    if (_isIos && navigator.share) {
      navigator.share({ title: 'Discord TCG', url: window.location.href })
        .catch(() => {});
      // Montrer quand même le guide car share ≠ install
    }
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) {
      _buildPwaOverlay(); // injecter le contenu contextualisé
      overlay.style.display = 'flex';
    }
  };

  window.closePwaOverlay = function() {
    const overlay = document.getElementById('pwa-install-overlay');
    if (overlay) overlay.style.display = 'none';
  };

  // Construire l'overlay avec le bon contenu selon le navigateur détecté
  function _buildPwaOverlay() {
    const body = document.getElementById('pwa-overlay-body');
    if (!body) return;

    let sections = [];

    if (_isIos) {
      sections.push({
        icon:'🍎', label:'iPhone / iPad — Safari', color:'#eb459e',
        html:`1. Appuie sur l'icône <strong>⬆ Partager</strong> (en bas sur iPhone, en haut sur iPad).<br>2. Fais défiler et appuie sur <strong>« Sur l'écran d'accueil »</strong>.<br>3. Confirme avec <strong>« Ajouter »</strong> en haut à droite.<br><em style="font-size:10px;opacity:.7;">⚠ Fonctionne uniquement dans Safari, pas Chrome iOS.</em>`
      });
    } else if (_isSamsung) {
      sections.push({
        icon:'📱', label:'Samsung Internet (Android)', color:'#1e88e5',
        html:`1. Appuie sur l'icône <strong>☰</strong> en bas à droite.<br>2. Appuie sur <strong>« Ajouter page à »</strong>.<br>3. Choisis <strong>« Écran d'accueil »</strong> puis confirme.`
      });
    } else if (_isFirefox && _isAndroid) {
      sections.push({
        icon:'🦊', label:'Firefox Android', color:'#ff7139',
        html:`1. Appuie sur les <strong>⋮</strong> en haut à droite.<br>2. Appuie sur <strong>« Installer »</strong> ou <strong>« Ajouter à l'écran d'accueil »</strong>.<br><em style="font-size:10px;opacity:.7;">Si absent, utilise Chrome pour Android à la place.</em>`
      });
    } else if (_isFirefox) {
      sections.push({
        icon:'🦊', label:'Firefox (PC) — Non supporté', color:'#ff7139',
        html:`Firefox sur PC ne supporte pas l'installation d'applications web.<br>👉 Ouvre ce site dans <strong>Chrome</strong> ou <strong>Edge</strong> pour pouvoir l'installer.`
      });
    } else if (_isOpera && _isMobile) {
      sections.push({
        icon:'🎭', label:'Opera Mobile (Android)', color:'#cc0f16',
        html:`1. Appuie sur l'icône <strong>O</strong> ou les <strong>⋮</strong> en bas.<br>2. Appuie sur <strong>« Ajouter à l'écran d'accueil »</strong>.<br><em style="font-size:10px;opacity:.7;">Si l'option n'apparaît pas, utilise Chrome Android.</em>`
      });
    } else if (_isOpera) {
      sections.push({
        icon:'🎭', label:'Opera (PC)', color:'#cc0f16',
        html:`1. Regarde dans la barre d'adresse à droite — une icône <strong>📲</strong> ou <strong>⊕</strong> devrait apparaître.<br>2. Clique dessus puis sur <strong>« Installer »</strong>.<br>3. Si absent : menu Opera <strong>O</strong> en haut à gauche → <strong>« Enregistrer comme application »</strong>.<br><em style="font-size:10px;opacity:.7;">Si rien n'apparaît, utilise Chrome ou Edge qui supportent mieux l'installation.</em>`
      });
    } else if (_isEdge) {
      sections.push({
        icon:'🌐', label:'Microsoft Edge', color:'#0078d4',
        html:`1. Regarde l'icône <strong>⊕</strong> ou <strong>📲</strong> à droite de la barre d'adresse.<br>2. Clique dessus → <strong>« Installer Discord TCG »</strong>.<br>3. Ou : menu <strong>⋯</strong> en haut à droite → <strong>« Applications »</strong> → <strong>« Installer ce site en tant qu'application »</strong>.`
      });
    } else if (_isAndroid) {
      sections.push({
        icon:'📱', label:'Android — Chrome', color:'#57f287',
        html:`1. Appuie sur les <strong>⋮</strong> en haut à droite de Chrome.<br>2. Appuie sur <strong>« Ajouter à l'écran d'accueil »</strong> ou <strong>« Installer l'application »</strong>.<br>3. Confirme avec <strong>« Installer »</strong>.`
      });
    } else {
      sections.push({
        icon:'🖥', label:'Chrome / Edge (PC)', color:'#5865f2',
        html:`1. Regarde l'icône <strong>⊕</strong> ou <strong>📲</strong> à droite de la barre d'adresse.<br>2. Clique dessus → <strong>« Installer Discord TCG »</strong>.<br>3. Ou : menu <strong>⋮</strong> → <strong>« Enregistrer et partager »</strong> → <strong>« Installer la page en tant qu'application »</strong>.`
      });
    }

    if (!_isChrome || _isMobile) {
      sections.push({
        icon:'💡', label:'Conseil : Chrome ou Edge recommandé', color:'#fbbf24',
        html:`Pour une installation facile, ouvre ce site dans <strong>Chrome</strong> ou <strong>Edge</strong> — le bouton d'installation s'affiche automatiquement dans la barre d'adresse.`
      });
    }

    body.innerHTML = sections.map(s => `
      <div style="background:#0f0e17;border:2px solid ${s.color}30;padding:14px;margin-bottom:10px;">
        <div style="font-size:11px;font-weight:900;color:${s.color};letter-spacing:.8px;margin-bottom:8px;">${s.icon} ${s.label}</div>
        <div style="font-size:11px;color:#9d8ea0;line-height:1.7;">${s.html}</div>
      </div>`).join('');
  }

  // Auto-hide : montrer le bouton si pas encore installé, puis cacher après 15s
  window._startPwaAutoHide = function() {
    if (_isInstalled) return; // déjà installé, rien à faire
    if (_pwaHideTimer) return; // déjà lancé
    const btn = document.getElementById('pwa-install-btn');
    if (btn) {
      btn.style.display = 'flex';
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
    }
    _pwaHideTimer = setTimeout(() => {
      _hidePwaBtn();
    }, 15000);
  };

  // Cacher si déjà installé au chargement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => _hidePwaBtn());
  }
  // Sur iOS en standalone : masquer immédiatement
  if (_isInstalled) {
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
    });
  }
</script>

<!-- ── Bouton installation PWA — en haut à droite ── -->
<div id="pwa-install-btn" style="display:none;position:fixed;top:12px;right:12px;z-index:9999;align-items:center;gap:0;">
  <button onclick="window.triggerPwaInstall()" style="display:flex;align-items:center;gap:7px;padding:8px 14px;background:#5865f2;color:#fff;border:2px solid #000;border-right:none;box-shadow:3px 3px 0 #000;font-family:inherit;font-size:11px;font-weight:900;cursor:pointer;letter-spacing:.5px;white-space:nowrap;">
    📲 INSTALLER
  </button>
  <button onclick="document.getElementById('pwa-install-btn').style.display='none'" style="display:flex;align-items:center;justify-content:center;width:30px;height:100%;padding:8px 0;background:#3b3f70;color:#c4c9ff;border:2px solid #000;box-shadow:3px 3px 0 #000;font-family:inherit;font-size:13px;font-weight:900;cursor:pointer;line-height:1;">✕</button>
</div>

  <div style="width:100%;max-width:380px;background:#1a1825;border:3px solid #000;box-shadow:6px 6px 0 #000;overflow:hidden;">
    <div style="height:4px;background:linear-gradient(90deg,#5865f2,#eb459e,#fee75c);"></div>
    <div style="padding:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:1px;">📲 INSTALLER DISCORD TCG</div>
        <button onclick="window.closePwaOverlay()" style="background:transparent;border:none;color:#9d8ea0;font-size:20px;cursor:pointer;line-height:1;padding:0 2px;">✕</button>
      </div>
      <!-- Contenu injecté dynamiquement selon le navigateur -->
      <div id="pwa-overlay-body"></div>
    </div>
  </div>
</div>

const themes = {
  dark:{
    bg:"#0f0e17",bgSecondary:"#1a1825",bgTertiary:"#221f2e",

    border:"rgba(0,0,0,0.9)",borderStrong:"rgba(0,0,0,1)",
    inkColor:"#000",halftone:"rgba(0,0,0,0.04)",

};

const BOOSTERS = [
  {id:1,name:"Normal",price:150,color:"#9ca3af",rarity:"common",cards:5},
  {id:2,name:"Prestige",price:1000,color:"#cd7f32",rarity:"rare",cards:5},
  {id:3,name:"Légendaire",price:2000,color:"#f0c060",rarity:"mythic",cards:5},
];

// ALL_CARDS sera chargé depuis Supabase
let ALL_CARDS = [];

// ─── DAILY LIMITS (localStorage par joueur) ───────────────────────
// Clé : daily_<userId>  →  { piocheDate, boosterPrestigeDate, boosterPrestigeCount,
//                            boosterLegDate, boosterLegCount, tradeDate }
function _dailyKey(userId){ return 'daily_' + userId; }
function _todayStr(){ return new Date().toISOString().slice(0,10); }

function getDailyData(userId){
  try{ return JSON.parse(localStorage.getItem(_dailyKey(userId)) || '{}'); }
  catch(e){ return {}; }
}
function setDailyData(userId, patch){
  const cur = getDailyData(userId);
  localStorage.setItem(_dailyKey(userId), JSON.stringify({...cur, ...patch}));
}

// Pioche : 1x/jour
function canPiocheToday(userId){
  const d = getDailyData(userId);
  return d.piocheDate !== _todayStr();
}
function markPiocheUsed(userId){
  setDailyData(userId, { piocheDate: _todayStr() });
}

// Boosters : Prestige 2x/j, Légendaire 1x/j
function getBoosterRemaining(userId, boosterId){
  const d = getDailyData(userId);
  const today = _todayStr();
  if(boosterId === 2){ // Prestige
    if(d.boosterPrestigeDate !== today) return 2;
    return Math.max(0, 2 - (d.boosterPrestigeCount || 0));
  }
  if(boosterId === 3){ // Légendaire
    if(d.boosterLegDate !== today) return 1;
    return Math.max(0, 1 - (d.boosterLegCount || 0));
  }
  return Infinity; // Normal : illimité
}
function markBoosterUsed(userId, boosterId){
  const d = getDailyData(userId);
  const today = _todayStr();
  if(boosterId === 2){
    const count = d.boosterPrestigeDate === today ? (d.boosterPrestigeCount || 0) : 0;
    setDailyData(userId, { boosterPrestigeDate: today, boosterPrestigeCount: count + 1 });
  } else if(boosterId === 3){
    const count = d.boosterLegDate === today ? (d.boosterLegCount || 0) : 0;
    setDailyData(userId, { boosterLegDate: today, boosterLegCount: count + 1 });
  }
}

// Trade : 1x/jour
function canTradeToday(userId){
  const d = getDailyData(userId);
  return d.tradeDate !== _todayStr();
}
function markTradeUsed(userId){
  setDailyData(userId, { tradeDate: _todayStr() });
}

// Renvoie un string "Xh Ym Zs" jusqu'au prochain minuit
function timeUntilMidnight(){
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return h + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
}

// Ticker global pour rafraîchir les timers toutes les secondes
let _dailyTickerInterval = null;
function startDailyTicker(){
  if(_dailyTickerInterval) return;
  _dailyTickerInterval = setInterval(()=>{
    document.querySelectorAll('[data-daily-timer]').forEach(el=>{
      el.textContent = timeUntilMidnight();
    });
  }, 1000);
}

let audioPlaying = false;

(function loadYTApi(){
  if(window.YT && window.YT.Player){ _ytReady = true; return; }
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function(){
  _ytReady = true;
  const container = document.getElementById('yt-audio-player');
  if(!container) return;
  _ytPlayer = new YT.Player('yt-audio-player', {
    videoId: YT_VIDEO_ID,
    playerVars:{
      autoplay: 0,
      controls: 0,
      loop: 1,
      playlist: YT_VIDEO_ID,
      start: YT_START_SEC,
      modestbranding: 1,
      rel: 0,
      playsinline: 1,
      mute: 0,
    },
    events:{
      onReady: function(e){
        e.target.setVolume(25);
        if(_ytPendingPlay){ _ytPendingPlay = false; _doPlay(); }
      },
      onStateChange: function(e){
        // Relancer si stoppé/mis en pause alors qu'on veut jouer
        // Ne pas relancer si l'user a coupé (audioPlaying=false) — évite le rallumage depuis une autre appli
        if(audioPlaying && (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.PAUSED)){
          // Vérifier que c'est bien notre propre pause et non une pause externe (autre appli audio)
          // On utilise un délai court : si audioPlaying est encore true après 300ms, on relance
          setTimeout(()=>{ if(audioPlaying){ try{ _ytPlayer.playVideo(); }catch(ex){} } }, 300);
        }
      },
      onError: function(){
        // Retry après erreur réseau
        if(audioPlaying) setTimeout(_doPlay, 2000);
      },
    }
  });
};

function _doPlay(){
  if(!_ytPlayer) return;
  try{
    const s = _ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1;
    // -1=unstarted, 1=playing, 2=paused, 3=buffering, 5=video cued
    if(s === 1) return; // déjà en train de jouer
    _ytPlayer.playVideo();
  }catch(e){}
}

function _ensurePlay(){
  // Polling léger : reessaie toutes les 800ms si pas encore en lecture
  if(_ytPlayRetryTimer) return;
  _ytPlayRetryTimer = setInterval(()=>{
    if(!audioPlaying){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; }
    const s = _ytPlayer ? (_ytPlayer.getPlayerState ? _ytPlayer.getPlayerState() : -1) : -1;
    if(s === 1){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; return; } // joue, ok
    _doPlay();
  }, 800);
  // Arrêter le polling après 15s max (éviter boucle infinie)
  setTimeout(()=>{ if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; } }, 15000);
}

// ─── PERSISTANCE PRÉFÉRENCE MUSIQUE ──────────────────────────────
function _saveMusicPref(on){ try{ localStorage.setItem('music_on', on ? '1' : '0'); }catch(e){} }
function _loadMusicPref(){ try{ var v=localStorage.getItem('music_on'); return v===null ? true : v==='1'; }catch(e){ return true; } }

function audioPlay(){
  if(audioPlaying) return;
  audioPlaying = true;
  _saveMusicPref(true);
  if(!_ytReady || !_ytPlayer){ _ytPendingPlay = true; return; }
  _doPlay();
  _ensurePlay();
}
function audioStop(){
  audioPlaying = false;
  _ytPendingPlay = false;
  _saveMusicPref(false);
  if(_ytPlayRetryTimer){ clearInterval(_ytPlayRetryTimer); _ytPlayRetryTimer=null; }
  if(_ytPlayer){ try{ _ytPlayer.pauseVideo(); } catch(e){} }
}
function audioToggle(){ if(audioPlaying) audioStop(); else audioPlay(); }

window._setMusicVolume = function(val) {
  const v = parseInt(val);
  state.musicVolume = v;
  if (_ytPlayer && _ytPlayer.setVolume) {
    try { _ytPlayer.setVolume(v); } catch(e) {}
  }
  // Mettre à jour l'affichage du % sans re-render complet
  const span = document.querySelector('#music-volume-slider + span, span:has(+ #music-volume-slider)');
  // Mettre à jour le label à côté du slider
  const slider = document.getElementById('music-volume-slider');
  if (slider) {
    const label = slider.previousElementSibling;
    if (label) label.textContent = v + '%';
  }
};

// Unlock audio dès la première interaction utilisateur (contourne la politique autoplay)
(function(){
  const unlock = ()=>{
    if(audioPlaying && _ytPlayer){
      try{ const s=_ytPlayer.getPlayerState(); if(s!==1) _doPlay(); }catch(e){}
    }
  };
  document.addEventListener('touchstart', unlock, {once:true, passive:true});
  document.addEventListener('click', unlock, {once:true});
})();

// Détection de pause externe (autre appli audio iOS/Android) via Page Visibility API
// Si la page redevient visible et que audioPlaying est true, on vérifie l'état réel
// MAIS si le joueur a manuellement coupé (audioPlaying=false), on ne relance JAMAIS
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && audioPlaying && _ytPlayer) {
    // On laisse YT gérer — on ne force pas playVideo() ici pour ne pas interférer avec d'autres applis audio
    // Le polling _ensurePlay() gère déjà ce cas si nécessaire
  }
});

function render(){
  const app = document.getElementById('app');
  const th = t();
  // Body background = couleur de la nav (bgSecondary) pour qu'aucune bande différente
  // ne soit visible sur Android/iOS autour de l'app (safe-area, barre système, etc.)
  document.body.style.background = th.bgSecondary;
  document.documentElement.style.background = th.bgSecondary;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
  }
}

function bindSplash(){
  document.getElementById('splash').addEventListener('click', ()=>{
    const cta = document.querySelector('.cta-pulse');
    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Animate logo glow pulse
    const logo = document.getElementById('splash-logo');
    if(logo){
      const glow = 0.25 + Math.sin(splashTick * 0.04) * 0.1;
      logo.style.filter = `drop-shadow(0 0 ${18+Math.sin(splashTick*.04)*6}px rgba(251,191,36,${glow})) drop-shadow(0 0 6px rgba(251,191,36,.15))`;
    }
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

        <span style="font-size:${isMobile?'10px':'12px'};font-weight:900;color:${th.yellow};letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.coins !== undefined ? state.coins.toLocaleString('fr-FR') : '…'}</span>
      </div>

      <!-- Icon cluster -->
      <div style="display:flex;gap:${isMobile?'2px':'4px'};align-items:center;flex-shrink:0;">
        <!-- Messages -->
        <button id="btn-messages" style="position:relative;width:${isMobile?'26px':'32px'};height:${isMobile?'26px':'32px'};background:${MSG_COUNT>0?th.accent+'14':'transparent'};border:1px solid ${MSG_COUNT>0?th.accent+'35':th.border};color:${MSG_COUNT>0?th.accent:th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;">

        <!-- Friends -->

        <!-- Quêtes -->
        <button id="btn-quests" style="position:relative;width:${isMobile?'26px':'32px'};height:${isMobile?'26px':'32px'};background:transparent;border:1px solid ${th.border};color:${th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;" title="Quêtes & Récompenses">

        </button>
        <!-- Music — visible sur tous les appareils -->
        <button id="btn-music" style="height:${isMobile?'26px':'32px'};padding:0 ${isMobile?'6px':'8px'};gap:${isMobile?'3px':'5px'};background:${state.musicOn?th.accent+'14':'transparent'};border:1px solid ${state.musicOn?th.accent+'35':th.border};color:${state.musicOn?th.accent:th.textMuted};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;">${state.musicOn?SVG.musicOn:SVG.musicOff}${isMobile?'':`<span style="font-size:8px;font-weight:700;opacity:.7;">${state.musicVolume??25}%</span>`}</button>
        <!-- Avatar -->
        <button id="btn-profile" style="width:${isMobile?'26px':'32px'};height:${isMobile?'26px':'32px'};overflow:hidden;border:2px solid #000;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,${th.accent},${th.accentAlt});">

    ${state.showTrade?renderTradeModal(th):''}
    ${state.showLeaderboard?renderLeaderboardModal(th):''}
    ${state.showTutorial?renderTutorialModal(th):''}
    ${state.showHowTo?renderHowToModal(th):''}
    ${state.showQuests?renderQuestsModal(th):''}
  </div>`;
}


// ─── PROFILE MODAL ───────────────────────────────────────────────
function renderProfileModal(th){
  const u = state.currentUser;
  const name = u && u.user_metadata && (u.user_metadata.full_name || u.user_metadata.name) || 'Joueur';
  const avatar = u && u.user_metadata && u.user_metadata.avatar_url;
  const totalCards = ALL_CARDS.length;
  const ownedCards = ALL_CARDS.filter(c => c.owned).length;
  const pct = totalCards > 0 ? Math.round(ownedCards/totalCards*100) : 0;
  const winRate = (state.wins !== null && state.losses !== null && (state.wins+state.losses) > 0)
    ? Math.round(state.wins/(state.wins+state.losses)*100) : null;

  return `
  <div id="profile-bg" style="position:absolute;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;z-index:100;">
    <div id="profile-sheet" class="slide-up" style="width:100%;max-width:420px;background:${th.bgSecondary};border-top:4px solid #000;border-left:3px solid #000;border-right:3px solid #000;box-shadow:-4px -4px 0 #000;padding-bottom:max(env(safe-area-inset-bottom,0px),24px);">

      <!-- Pull handle -->
      <div style="display:flex;justify-content:center;padding:10px 0 0;">
        <div style="width:40px;height:4px;background:rgba(255,255,255,.12);"></div>
      </div>

      <!-- Banner with avatar overlay -->
      <div style="position:relative;margin:0;height:80px;overflow:hidden;">
        <div style="position:absolute;inset:0;background:linear-gradient(135deg,${th.bg} 0%,rgba(56,189,248,.12) 50%,rgba(129,140,248,.12) 100%);"></div>
        <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.04) 1px,transparent 1px);background-size:20px 20px;"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(to top,${th.bgSecondary},transparent);"></div>
      </div>

      <div style="padding:0 20px 0;margin-top:-38px;position:relative;">

        <!-- Avatar row -->
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;">
          <div style="position:relative;">
            <div style="width:72px;height:72px;border:3px solid ${th.bgSecondary};overflow:hidden;background:${th.surface};box-shadow:0 8px 24px rgba(0,0,0,.5);">
              ${avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">` : '<span style="font-size:32px;display:flex;align-items:center;justify-content:center;height:100%;">👤</span>'}
            </div>
            <div style="position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:${th.green};border:2px solid ${th.bgSecondary};box-shadow:0 0 8px ${th.green};" class="pulse-dot"></div>
          </div>
          <button id="btn-logout" style="padding:7px 14px;background:transparent;border:1px solid ${th.red}35;color:${th.red};font-size:9px;font-weight:800;cursor:pointer;letter-spacing:.8px;transition:all .18s;">DÉCONNEXION</button>
        </div>

        <!-- Name + status -->
        <div style="margin-bottom:18px;">
          <div style="font-family:'Bangers',cursive;font-size:18px;font-weight:700;color:${th.text};letter-spacing:.5px;">${name}</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:3px;">Connecté via Discord ✓</div>
        </div>

        <!-- Stats row (4 cards) -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;">
          ${[
            {i:'🏆',v:state.wins!==null?state.wins:'—',l:'Victoires',c:th.green},
            {i:'💀',v:state.losses!==null?state.losses:'—',l:'Défaites',c:th.red},
            {i:'📊',v:winRate!==null?winRate+'%':'—',l:'Win rate',c:th.yellow},
            {i:'⭐',v:state.playerRank ? '#'+state.playerRank : '—',l:'Rang',c:th.accentAlt},
          ].map(s=>`
          <div style="background:${th.bgTertiary};border:2px solid #000;padding:10px 6px;text-align:center;">
            <div style="font-size:16px;margin-bottom:3px;">${s.i}</div>
            <div style="font-size:16px;font-weight:900;color:${s.c};line-height:1;">${s.v}</div>
            <div style="font-size:7px;color:${th.textMuted};margin-top:3px;letter-spacing:.4px;text-transform:uppercase;">${s.l}</div>
          </div>`).join('')}
        </div>

        <!-- XP Bar -->
        ${(()=>{
          const xp = state.playerXp || 0;
          const lvl = state.playerLevel || 1;
          const info = computeLevel(xp);
          const pct = Math.round(info.xpInLevel / info.xpNeeded * 100);
          const lvlColor = '#a78bfa';
          return `<div style="background:${th.bgTertiary};border:2px solid #000;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;">
            <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${lvlColor},#818cf8);"></div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="background:linear-gradient(135deg,${lvlColor},#818cf8);padding:4px 14px;font-family:'Bangers',cursive;font-size:18px;font-weight:900;color:#fff;letter-spacing:1.5px;box-shadow:3px 3px 0 #000;">LVL ${lvl}</div>
                <div>
                  <div style="font-size:11px;font-weight:700;color:${th.text};">Expérience</div>
                  <div style="font-size:9px;color:${th.textMuted};margin-top:1px;">${xp} XP total</div>
                </div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:11px;font-weight:900;color:${lvlColor};">${info.xpInLevel}<span style="font-size:9px;color:${th.textFaint};font-weight:600;"> / ${info.xpNeeded}</span></div>
                <div style="font-size:8px;color:${th.textFaint};margin-top:1px;">${pct}%</div>
              </div>
            </div>
            <div style="height:8px;background:${th.bg};overflow:hidden;position:relative;">
              <div style="position:absolute;inset:0;background:linear-gradient(90deg,${lvlColor},#818cf8);width:${pct}%;transition:width .8s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px ${lvlColor}60;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;">
              <span style="font-size:8px;color:${th.textFaint};">Niveau ${lvl}</span>
              <span style="font-size:8px;color:${lvlColor};font-weight:700;">→ Niveau ${lvl+1} dans ${info.xpNeeded - info.xpInLevel} XP</span>
            </div>
          </div>`;
        })()}

        <!-- Collection progress card -->
        <div style="background:${th.bgTertiary};border:2px solid #000;padding:14px 16px;position:relative;overflow:hidden;">
          <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${th.accent}40,transparent);"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:7px;">
              <span style="font-size:14px;">🃏</span>
              <span style="font-size:12px;font-weight:700;color:${th.text};">Collection</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:4px;">
              <span style="font-size:14px;font-weight:900;color:${th.accent};">${ownedCards}<span style="font-size:10px;color:${th.textMuted};font-weight:600;">/${totalCards}</span></span>
              <span style="font-size:9px;color:${th.textMuted};background:${th.accent}12;border:1px solid ${th.accent}25;padding:1px 7px;">${pct}%</span>
            </div>
          </div>
          <div style="height:5px;background:${th.bg};overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${th.accent},${th.accentAlt});box-shadow:0 0 10px ${th.accentGlow};transition:width .8s cubic-bezier(.4,0,.2,1);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:8px;">
            <span style="font-size:9px;color:${th.textMuted};">${ownedCards} obtenues</span>
            <span style="font-size:9px;color:${th.textMuted};">${totalCards - ownedCards} restantes</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}


// ─── DECK BUILDER ────────────────────────────────────────────────
function renderDeckBuilder(th){
  if(state.deckBuilderView==='edit') return renderDeckEdit(th);
  return renderDeckList(th);
}

function renderDeckList(th){
  const decks = state.decks || [];
  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <!-- Header -->
    <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-close" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;">✕</button>
      <div style="flex:1;">
        <div style="font-family:'Bangers',cursive;font-size:14px;font-weight:700;color:${th.text};letter-spacing:1px;">Deck Builder</div>
        <div style="font-size:9px;color:${th.textMuted};margin-top:1px;">${decks.length} deck${decks.length>1?'s':''} · max 30 cartes</div>
      </div>
      <button id="db-new" style="display:flex;align-items:center;gap:6px;padding:8px 16px;background:${th.accent};color:#fff;border:none;font-size:10px;font-weight:900;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 16px ${th.accentGlow};">＋ NOUVEAU</button>
    </div>
    <!-- List -->
    <div style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;">
      ${decks.length===0?`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;text-align:center;padding:40px 20px;">
          <div style="width:72px;height:72px;background:${th.bgTertiary};border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.4;">🗂️</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:${th.text};margin-bottom:6px;">Aucun deck</div>
            <div style="font-size:11px;color:${th.textMuted};line-height:1.6;">Crée ton premier deck pour<br>commencer à jouer !</div>
          </div>
        </div>
      `:decks.map(deck=>{
        const total = deck.cards ? deck.cards.reduce((s,c)=>s+c.quantity,0) : 0;
        const isPlayable = total===30;
        const isDefault = deck.is_default;
        const pct = Math.min(100,Math.round(total/30*100));
        const statusColor = isPlayable ? th.green : th.textMuted;
        return `
        <div class="deck-item btn-hover" data-deckid="${deck.id}" style="background:${th.bgSecondary};border:1px solid ${isDefault?th.borderStrong:isPlayable?th.green+'28':th.border};padding:0;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;">
          <!-- top line accent -->
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${isDefault?`linear-gradient(90deg,${th.accent},${th.accentAlt})`:(isPlayable?`linear-gradient(90deg,${th.green},${th.accent})`:'transparent')};"></div>
          <!-- main content -->
          <div style="padding:14px 16px 12px;">
            <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">
              <!-- Deck icon -->
              <div style="width:44px;height:44px;background:${isPlayable?th.green+'14':th.bgTertiary};border:1px solid ${isPlayable?th.green+'30':th.border};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🗂️</div>
              <div style="flex:1;min-width:0;padding-top:2px;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                  <div style="font-size:14px;font-weight:800;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${deck.name}</div>
                  ${isDefault?`<span style="font-size:7px;font-weight:900;color:${th.accent};background:${th.accent}14;border:1px solid ${th.accent}30;padding:2px 8px;letter-spacing:.5px;flex-shrink:0;">⭐ DÉFAUT</span>`:''}
                  ${isPlayable&&!isDefault?`<span style="font-size:7px;font-weight:900;color:${th.green};background:${th.green}12;border:1px solid ${th.green}28;padding:2px 8px;letter-spacing:.5px;flex-shrink:0;">✓ PRÊT</span>`:''}
                </div>
                <div style="font-size:10px;color:${statusColor};margin-top:3px;font-weight:600;">${isPlayable?'Deck complet · Prêt à jouer':`${total}/30 cartes`}</div>
              </div>
            </div>
            <!-- Progress bar -->
            <div style="height:4px;background:${th.bgTertiary};overflow:hidden;margin-bottom:12px;">
              <div style="height:100%;width:${pct}%;background:${isPlayable?`linear-gradient(90deg,${th.green},${th.accent})`:pct>50?`linear-gradient(90deg,${th.accent},${th.accentAlt})`:`linear-gradient(90deg,${th.accentAlt},${th.accent})`};transition:width .5s ease;"></div>
            </div>
            <!-- Action row -->
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${!isDefault?`<button class="db-set-default btn-hover" data-deckid="${deck.id}" style="padding:5px 12px;font-size:8px;font-weight:900;background:${th.accent}10;color:${th.accent};border:1px solid ${th.accent}28;cursor:pointer;letter-spacing:.5px;">⭐ PAR DÉFAUT</button>`:''}
              <button class="db-rename btn-hover" data-deckid="${deck.id}" data-deckname="${deck.name}" style="padding:5px 12px;font-size:8px;font-weight:900;background:${th.bgTertiary};color:${th.textMuted};border:2px solid #000;cursor:pointer;letter-spacing:.5px;">✏️ RENOMMER</button>
              <button class="db-delete btn-hover" data-deckid="${deck.id}" style="margin-left:auto;padding:5px 12px;font-size:8px;font-weight:900;background:transparent;color:${th.red};border:1px solid ${th.red}25;cursor:pointer;letter-spacing:.5px;">🗑</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}


function renderDeckEdit(th){
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if(!deck) return renderDeckList(th);
  const deckCards = deck.cards || []; // [{card_id, quantity}]
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  const isPlayable = deckTotal===30;

  // Compter mythiques dans le deck
  const mythCount = deckCards.reduce((s,c)=>{
    const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(card&&card.rarity==='mythic'?c.quantity:0);
  },0);

  // Cartes possédées triées
  const ownedCards = ALL_CARDS.filter(c=>c.owned).sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  // Helper: quantité d'une carte dans le deck
  const qtyInDeck = (cardId)=>{
    const e=deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
    return e?e.quantity:0;
  };

  // Helper: peut-on ajouter cette carte ?
  const canAdd = (card)=>{
    if(deckTotal>=30) return {ok:false,reason:'30 cartes max'};
    const qty=qtyInDeck(card.id);
    // Ne pas mettre plus que ce qu'on possède
    if(qty>= card.count) return {ok:false,reason:`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''}`};
    // Rare/Mythic : max 2 exemplaires dans le deck
    if(card.rarity==='mythic'||card.rarity==='rare'){
      if(qty>=2) return {ok:false,reason:'2 exemplaires max (Rare/Myth)'};
    }
    // Max 2 Mythiques au total dans le deck
    if(card.rarity==='mythic'&&mythCount>=2&&qty===0) return {ok:false,reason:'2 Mythiques max dans le deck'};
    return {ok:true};
  };

  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px 12px;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-back" style="width:32px;height:32px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;">${deck.name}</div>
          <button id="db-rename-edit" data-deckid="${deck.id}" data-deckname="${deck.name}" style="width:22px;height:22px;background:${th.bgTertiary};border:2px solid #000;color:${th.textMuted};font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✏️</button>
        </div>
        <div style="font-size:9px;color:${isPlayable?th.green:th.textMuted};font-weight:700;margin-top:1px;">${isPlayable?'✓ Deck prêt':deckTotal+'/30'} · ${mythCount}/2 Myth.</div>
      </div>
      <button id="db-autofill" style="padding:6px 12px;background:${th.accentAlt}18;color:${th.accentAlt};border:1px solid ${th.accentAlt}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">✨ AUTO</button>
      <button id="db-save" style="padding:6px 14px;background:${th.green};color:#000;border:none;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">💾 SAVE</button>
    </div>

    <!-- Bande deck : plus haute -->
    <div style="background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;padding:8px 12px 6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-size:9px;color:${th.textMuted};font-weight:700;letter-spacing:1px;text-transform:uppercase;">Deck (${deckTotal}/30)</div>
        <div style="font-size:9px;color:${th.textMuted};font-weight:600;">Clique sur une carte du deck pour la retirer</div>
      </div>
      <div style="display:flex;gap:${window.innerWidth<600?'6':'8'}px;overflow-x:auto;padding-bottom:4px;min-height:${window.innerWidth<600?'138':'190'}px;align-items:center;">
        ${deckTotal===0?`<div style="color:${th.textFaint};font-size:10px;padding:0 8px;font-style:italic;">Ajoute des cartes ci-dessous</div>`
          :deckCards.map(entry=>{
            const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(entry.card_id));
            if(!card) return '';
            const dcW = window.innerWidth<600 ? 90 : 126;
            const dcH = window.innerWidth<600 ? 128 : 178;
            return `<div class="db-deck-card" data-cardid="${card.id}" style="flex-shrink:0;width:${dcW}px;height:${dcH}px;background:linear-gradient(135deg,${card.color}40,${card.color}15);border:1px solid ${card.color}70;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;overflow:visible;" title="${card.name} — clic pour retirer">
              ${card.image_url
                ? `<img src="${card.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;position:absolute;inset:0;" />`
                : `🃏`}
              ${entry.quantity>1?`<div style="position:absolute;top:-3px;right:-3px;width:${window.innerWidth<600?14:18}px;height:${window.innerWidth<600?14:18}px;background:${th.accent};color:#fff;font-size:${window.innerWidth<600?7:9}px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:2;">×${entry.quantity}</div>`:''}
              <div style="position:absolute;bottom:2px;font-size:${window.innerWidth<600?6:8}px;color:${card.color};font-weight:700;z-index:2;${card.image_url?'text-shadow:0 0 4px #000;':''}">◆</div>
            </div>`;
          }).join('')}
      </div>
    </div>

    <!-- Collection : plus de colonnes, sans titres, avec "DÉJÀ" et exemplaires -->
    <div style="flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;min-height:0;">

      <!-- ── Barre de recherche + tri + filtres type ── -->
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:6px;flex-shrink:0;">

        <!-- Ligne 0 : recherche -->
        <div style="display:flex;align-items:center;gap:6px;background:${th.bgTertiary};border:1px solid ${th.border};padding:5px 10px;">
          <span style="font-size:11px;color:${th.textMuted};flex-shrink:0;">🔍</span>
          <input id="db-search-input" type="text" placeholder="Nom ou #ID…"
            value="${state.deckSearch||''}"
            style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:11px;font-family:inherit;font-weight:600;"
          />
          ${state.deckSearch ? `<button id="db-search-clear" style="background:none;border:none;color:${th.textMuted};font-size:13px;cursor:pointer;padding:0 2px;flex-shrink:0;">✕</button>` : ''}
        </div>

        <!-- Ligne 1 : compteur + tri -->
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
          <div style="font-size:8px;color:${th.textMuted};font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-right:4px;">Collection (${ownedCards.length})</div>
          ${[
            {k:'rarity',    label:'Rareté'},
            {k:'name',      label:'Nom'},
            {k:'id',        label:'ID'},
            {k:'attack',    label:'ATK'},
            {k:'defense',   label:'DEF'},
            {k:'precision', label:'PREC'},
            {k:'hp',        label:'HP'},
          ].map(opt=>{
            const active  = state.deckSortBy===opt.k;
            const dir     = state.deckSortDir;
            const arrow   = active ? (dir==='asc'?' ↑':' ↓') : '';
            const isStat  = ['attack','defense','precision','hp'].includes(opt.k);
            const hasData = !isStat || ownedCards.some(c=>c[opt.k]!=null);
            if(!hasData) return '';
            return `<button class="db-sort-btn" data-sortby="${opt.k}"
              style="padding:3px 7px;font-size:8px;font-weight:${active?'900':'700'};
              background:${active?th.accent+'22':th.bgTertiary};
              color:${active?th.accent:th.textMuted};
              border:1px solid ${active?th.accent+'60':th.border};
              cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;"
            >${opt.label}${arrow}</button>`;
          }).join('')}
        </div>

        <!-- Ligne 2 : filtres par type -->
        ${(()=>{
          const types = [...new Set(ownedCards.map(c=>c.type||'Héro'))].sort();
          if(types.length <= 1) return '';
          const typeColors = {'Héro':'#60a5fa','Arcane':'#c084fc','Ruse':'#34d399'};
          return `<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
            <div style="font-size:7px;color:${th.textFaint};font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-right:2px;flex-shrink:0;">Type</div>
            <button class="db-type-filter" data-type=""
              style="padding:3px 7px;font-size:8px;font-weight:${!state.deckTypeFilter?'900':'700'};
              background:${!state.deckTypeFilter?th.accent+'22':th.bgTertiary};
              color:${!state.deckTypeFilter?th.accent:th.textMuted};
              border:1px solid ${!state.deckTypeFilter?th.accent+'60':th.border};
              cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;">Tous</button>
            ${types.map(t=>{
              const active = state.deckTypeFilter===t;
              const col = typeColors[t] || th.accentAlt;
              return `<button class="db-type-filter" data-type="${t}"
                style="padding:3px 7px;font-size:8px;font-weight:${active?'900':'700'};
                background:${active?col+'22':th.bgTertiary};
                color:${active?col:th.textMuted};
                border:1px solid ${active?col+'60':th.border};
                cursor:pointer;letter-spacing:.4px;white-space:nowrap;transition:all .15s;"
              >${t}</button>`;
            }).join('')}
          </div>`;
        })()}
      </div>

      <div style="display:grid;grid-template-columns:repeat(${window.innerWidth<600?5:7},1fr);gap:5px;">
        ${(()=>{
          const RARITY_O = {mythic:0,legendary:1,epic:2,rare:3,uncommon:4,common:5};
          // Appliquer le filtre de type si actif
          const typeFiltered = state.deckTypeFilter
            ? ownedCards.filter(c=>(c.type||'Héro')===state.deckTypeFilter)
            : ownedCards;
          // Appliquer la recherche textuelle
          const searchQ = (state.deckSearch||'').toLowerCase().trim();
          const _normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          const searchFiltered = searchQ
            ? typeFiltered.filter(c=>
                _normalize(c.name.toLowerCase()).includes(_normalize(searchQ)) ||
                String(parseInt(c.id)).includes(searchQ) ||
                (c.id||'').toLowerCase().includes(searchQ)
              )
            : typeFiltered;
          const sortedOwned = [...searchFiltered].sort((a,b)=>{
            const dir = state.deckSortDir==='asc'?1:-1;
            const numSort = (field) => {
              const va = a[field]??-1, vb = b[field]??-1;
              return dir*(vb-va) || a.name.localeCompare(b.name,'fr',{sensitivity:'base'});
            };
            switch(state.deckSortBy){
              case 'name':      return dir*(a.name.localeCompare(b.name,'fr',{sensitivity:'base'}));
              case 'type':      return dir*(a.type||'').localeCompare(b.type||'','fr',{sensitivity:'base'}) || (RARITY_O[a.rarity]??9)-(RARITY_O[b.rarity]??9);
              case 'id':        return dir*(parseInt(a.id)-parseInt(b.id));
              case 'attack':    return numSort('attack');
              case 'defense':   return numSort('defense');
              case 'precision': return numSort('precision');
              case 'hp':        return numSort('hp');
              default:          return dir*((RARITY_O[a.rarity]??9)-(RARITY_O[b.rarity]??9)) || a.name.localeCompare(b.name,'fr',{sensitivity:'base'});
            }
          });
          return sortedOwned;
        })().map(card=>{
          const qty=qtyInDeck(card.id);
          const chk=canAdd(card);
          // Calcul exemplaires max ajoutables
          const maxCopies = (card.rarity==='mythic'||card.rarity==='rare') ? 2 : card.count;
          const canAddMore = chk.ok;
          const alreadyFull = !canAddMore && qty>0;
          return `<div class="${canAddMore?'db-add-card':'db-add-card-disabled'}" data-cardid="${card.id}" data-name="${card.name.toLowerCase().replace(/'/g,'&#39;').replace(/"/g,'&quot;')}" style="background:${qty>0?card.color+'25':th.bgSecondary};border:1px solid ${qty>0?card.color+'80':th.border};aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;padding:0;cursor:${canAddMore||alreadyFull?'pointer':'default'};position:relative;overflow:visible;" title="${canAddMore?'Ajouter au deck':chk.reason}">
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;${card.image_url?'':'background:linear-gradient(135deg,'+card.color+'30,'+card.color+'10);'}overflow:visible;">
              ${card.image_url
                ? `<img src="${card.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />`
                : `🃏`}
            </div>
            <!-- Compteur deck (en haut à droite) -->
            ${qty>0?`<div style="position:absolute;top:1px;right:1px;min-width:clamp(13px,2.2vw,18px);height:clamp(13px,2.2vw,18px);background:${th.accent};color:#fff;font-size:clamp(7px,1.4vw,10px);font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 2px;z-index:3;">${qty}</div>`:''}
            <!-- Exemplaires possédés (en bas à gauche) -->
            <div style="position:absolute;bottom:1px;left:1px;font-size:clamp(7px,1.4vw,10px);font-weight:800;color:rgba(255,255,255,.85);text-shadow:0 0 3px #000;z-index:3;">×${card.count}</div>
            <!-- Overlay DÉJÀ DANS LE DECK -->
            ${alreadyFull?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;z-index:4;"><div style="width:100%;text-align:center;font-size:clamp(7px,1.8vw,13px);font-weight:900;color:#fff;letter-spacing:.5px;line-height:1.3;padding:4px 2px;background:transparent;">DÉJÀ<br>DANS<br>LE DECK</div></div>`
            :!canAddMore?`<div style="position:absolute;inset:0;background:rgba(0,0,0,.58);display:flex;align-items:center;justify-content:center;z-index:4;"><div style="width:100%;text-align:center;font-size:clamp(7px,1.8vw,13px);font-weight:900;color:#fbbf24;letter-spacing:.5px;line-height:1.3;padding:4px 2px;background:transparent;">DECK<br>PLEIN</div></div>`:``}
          </div>`;
        }).join('')})()}
      </div>
    </div>
  </div>`;
}

          <button id="trade-accept" onclick="window.respondTrade && window.respondTrade('${incoming.id}', true)" ${receiverOwnsToCard?'':'disabled'} style="flex:1;padding:10px;background:${receiverOwnsToCard?th.green:th.surface};color:${receiverOwnsToCard?'#000':th.textMuted};border:none;font-size:12px;font-weight:700;cursor:${receiverOwnsToCard?'pointer':'default'};opacity:${receiverOwnsToCard?1:.5};">${receiverOwnsToCard ? '✓ Accepter' : '🚫 Carte manquante'}</button>
          <button id="trade-decline" onclick="window.respondTrade && window.respondTrade('${incoming.id}', false)" style="flex:1;padding:10px;background:${th.surface};color:${th.red};border:1px solid ${th.red}40;font-size:12px;font-weight:700;cursor:pointer;">✕ Refuser</button>
        </div>
      </div>
    </div>`;
  }

  // Vue step 2 : saisir le numéro de la carte voulue en échange
  if (state.tradeStep === 'pick_their_card' && state.tradeMyCard) {
    const wantedNum = state.tradeWantedNum ? String(state.tradeWantedNum).replace(/[^0-9]/g,'') : '';
    const wantedCard = wantedNum && parseInt(wantedNum) > 0 ? ALL_CARDS.find(c=>parseInt(c.id)===parseInt(wantedNum)) : null;
    const tradeSearch = state.tradeSearch || '';
    const rarityOk = wantedCard && wantedCard.rarity === state.tradeMyCard.rarity;
    const notSame = wantedCard && parseInt(wantedCard.id) !== parseInt(state.tradeMyCard.id);
    const canSend = wantedCard && rarityOk && notSame;
    // Suggestions : filtre par nom OU id, toutes raretés, pas la même carte
    const suggestions = tradeSearch.length >= 1
      ? ALL_CARDS.filter(c => {
          const q = tradeSearch.toLowerCase();
          const matchId  = String(parseInt(c.id)).includes(q) || c.id.toLowerCase().includes(q);
          const matchName = c.name.toLowerCase().includes(q);
          return (matchId || matchName) && parseInt(c.id) !== parseInt(state.tradeMyCard.id);
        }).slice(0, 8)
      : [];
    return `
    <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;">
      <div style="width:100%;max-width:420px;background:${th.bgSecondary};padding:16px;display:flex;flex-direction:column;box-shadow:0 -20px 60px rgba(0,0,0,.7);border-top:1px solid ${th.borderStrong};max-height:90vh;overflow-y:auto;">
        <div style="width:36px;height:4px;background:${th.border};margin:0 auto 14px;flex-shrink:0;"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0;">
          <button id="trade-step-back" style="width:28px;height:28px;background:${th.surface};border:2px solid #000;color:${th.textMuted};font-size:14px;cursor:pointer;">←</button>
          <div>
            <div style="font-family:'Bangers',cursive;font-size:12px;font-weight:700;color:${th.text};">Quelle carte veux-tu ?</div>
            <div style="font-size:10px;color:${th.textMuted};">Même rareté que ta carte — ${RARITY_LABEL[state.tradeMyCard.rarity]}</div>
          </div>
        </div>

        <!-- Barre de recherche nom ou ID -->
        <div style="background:${th.bgTertiary};border:2px solid #000;padding:0;margin-bottom:2px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;">
          <span style="font-size:13px;color:${th.textMuted};">🔍</span>
          <input id="trade-wanted-search" type="text" value="${tradeSearch}"
            placeholder="Nom ou #ID de la carte…"
            style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:12px;font-family:inherit;font-weight:600;"/>
          ${tradeSearch ? `<button id="trade-search-clear" style="background:transparent;border:none;color:${th.textMuted};font-size:14px;cursor:pointer;padding:0 2px;line-height:1;">✕</button>` : ''}
        </div>

        <!-- Suggestions dropdown -->
        ${suggestions.length > 0 ? `
        <div style="background:${th.bgTertiary};border:2px solid #000;border-top:none;margin-bottom:10px;flex-shrink:0;max-height:220px;overflow-y:auto;">
          ${suggestions.map(c => {
            const col = RARITY_COLOR[c.rarity];
            const isSelected = wantedCard && parseInt(wantedCard.id) === parseInt(c.id);
            const rOk = c.rarity === state.tradeMyCard.rarity;
            return `
            <div class="trade-wanted-suggestion" data-cardid="${c.id}"
              style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;background:${isSelected ? col+'18' : 'transparent'};border-bottom:1px solid ${th.border};transition:background .15s;">
              <div style="width:30px;height:42px;flex-shrink:0;overflow:hidden;position:relative;border:1px solid ${col}50;background:linear-gradient(135deg,${col}25,${col}08);">
                ${c.image_url
                  ? `<img src="${c.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
                  : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;">🃏</div>`}
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:11px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name}</div>
                <div style="font-size:9px;color:${col};margin-top:1px;">◆ ${RARITY_LABEL[c.rarity]} · #${c.id}</div>
              </div>
              ${isSelected ? `<span style="font-size:10px;color:${th.green};font-weight:900;">✓</span>` : ''}
              ${!rOk ? `<span style="font-size:8px;color:${th.red};font-weight:700;">≠ rareté</span>` : ''}
            </div>`;
          }).join('')}
        </div>` : tradeSearch.length >= 1 ? `
        <div style="padding:10px 12px;font-size:10px;color:${th.textMuted};background:${th.bgTertiary};border:2px solid #000;border-top:none;margin-bottom:10px;">Aucune carte trouvée pour « ${tradeSearch} »</div>` : `
        <div style="margin-bottom:10px;font-size:10px;color:${th.textMuted};padding:2px 0;">Tape un nom ou un numéro de carte pour rechercher.</div>`}

        <!-- Carte sélectionnée + validation -->
        ${wantedCard ? `
        <div style="background:${th.bgTertiary};padding:10px 12px;margin-bottom:12px;flex-shrink:0;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:40px;height:56px;flex-shrink:0;overflow:hidden;position:relative;border:2px solid ${rarityOk ? th.green : th.red};background:linear-gradient(135deg,${RARITY_COLOR[wantedCard.rarity]}25,${RARITY_COLOR[wantedCard.rarity]}08);">
              ${wantedCard.image_url
                ? `<img src="${wantedCard.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
                : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>`}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${wantedCard.name}</div>
              <div style="font-size:9px;color:${RARITY_COLOR[wantedCard.rarity]};margin-top:1px;">◆ ${RARITY_LABEL[wantedCard.rarity]} · #${wantedCard.id}</div>
              ${!rarityOk ? `<div style="font-size:9px;color:${th.red};margin-top:3px;font-weight:700;">⚠ Rareté différente — tu proposes du ${RARITY_LABEL[state.tradeMyCard.rarity]}</div>` : ''}
              ${!notSame ? `<div style="font-size:9px;color:${th.red};margin-top:3px;font-weight:700;">⚠ C'est la même carte que tu proposes</div>` : ''}
              ${canSend ? `<div style="font-size:9px;color:${th.green};margin-top:3px;font-weight:700;">✓ Échange valide — même rareté</div>` : ''}
            </div>
          </div>
        </div>` : ''}

        <button id="trade-confirm-send" ${canSend?'':'disabled'} style="padding:12px;background:${canSend?th.accent:th.surface};color:${canSend?'#fff':th.textMuted};border:none;font-size:12px;font-weight:700;cursor:${canSend?'pointer':'default'};opacity:${canSend?1:.5};flex-shrink:0;">

        </button>
        <div style="margin-top:10px;font-size:9px;color:${th.textFaint};text-align:center;">Si ${friendName} ne possède pas la carte demandée, il ne pourra que décliner.</div>

  // ── Calcul grille adaptatif (style pioche) ──
  const _vw = window.innerWidth;
  const _vh = window.innerHeight;
  const _PAD = 8, _GAP = 4;
  // Colonnes : assez pour que les cartes soient petites et tout tienne sans scroll horizontal
  const _COLS = Math.min(10, Math.max(5, Math.floor((_vw - _PAD*2 + _GAP) / 56)));
  // CW calculé pour remplir exactement la largeur disponible
  const _CW = Math.floor((_vw - _PAD*2 - _GAP*(_COLS-1)) / _COLS);
  const _CH = Math.round(_CW * 1.43);

  return `
  <div id="trade-bg" style="position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;">

          <div style="font-family:'Bangers',cursive;font-size:13px;font-weight:700;color:${th.text};letter-spacing:.5px;">Proposer un échange</div>
          <div style="font-size:9px;color:${th.textMuted};">avec ${friendName} · même rareté · 1 contre 1</div>
        </div>
        ${myCard ? `<button id="trade-send" style="padding:7px 14px;background:${th.accent};color:#fff;border:none;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;">Envoyer →</button>` : ''}
      </div>
      ${myCard ? `
      <div style="background:${th.bgTertiary};padding:8px 10px;display:flex;align-items:center;gap:8px;border:1px solid ${myCard.color}50;">
        <div style="width:32px;height:45px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;${myCard.image_url?'cursor:zoom-in;':''}" ${myCard.image_url?`onclick="event.stopPropagation();openCard3DViewer(${JSON.stringify({id:myCard.id,name:myCard.name,rarity:myCard.rarity,image_url:myCard.image_url,owned:myCard.owned,color:RARITY_COLOR[myCard.rarity]})})"`:''}> 
          ${myCard.image_url
            ? `<img src="${myCard.image_url}" style="width:100%;height:100%;object-fit:contain;display:block;" />`
            : `<span style="font-size:20px;">🃏</span>`}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:10px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${myCard.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[myCard.rarity]};">◆ ${RARITY_LABEL[myCard.rarity]}</div>
        </div>
        <button id="trade-clear-card" style="padding:3px 7px;font-size:8px;background:${th.surface};color:${th.textMuted};border:2px solid #000;cursor:pointer;flex-shrink:0;">Changer</button>
      </div>` : `<div style="font-size:10px;color:${th.textMuted};">Sélectionne une de tes cartes à proposer :</div>`}
      <!-- Barre de recherche -->
      <div style="display:flex;align-items:center;gap:6px;background:${th.bgTertiary};border:2px solid #000;padding:5px 10px;">
        <span style="font-size:12px;color:${th.textMuted};">🔍</span>
        <input id="trade-search-input" type="text" placeholder="Nom ou #ID…"
          style="flex:1;background:transparent;border:none;outline:none;color:${th.text};font-size:11px;font-family:inherit;font-weight:600;"
          oninput="(function(v){var cards=document.querySelectorAll('.trade-pick-card');cards.forEach(function(el){var name=(el.dataset.name||'').toLowerCase();var id=(el.dataset.cardid||'');var q=v.toLowerCase();el.style.display=(name.includes(q)||id.includes(q)||q==='')?'':'none';});})(this.value)" />
      </div>
    </div>
    <!-- Grille cartes scrollable, style pioche -->
    <div style="flex:1;overflow-y:auto;width:100%;padding:0 ${_PAD}px ${_PAD}px;overflow-x:hidden;">
      <div style="display:grid;grid-template-columns:repeat(${_COLS},1fr);gap:${_GAP}px;align-content:start;">
        ${ownedCards.map(card=>{
          const sel = myCard && parseInt(myCard.id)===parseInt(card.id);
          const cardData = JSON.stringify({id:card.id,name:card.name,rarity:card.rarity,image_url:card.image_url,owned:card.owned,color:RARITY_COLOR[card.rarity]});
          return `<div class="trade-pick-card" data-cardid="${card.id}" data-name="${card.name.toLowerCase()}"
            style="height:${_CH}px;cursor:pointer;position:relative;background:transparent;${sel?'outline:2px solid '+card.color+';outline-offset:-1px;':''}"
          >
            ${card.image_url
              ? `<img src="${card.image_url}" data-card3d="${cardData.replace(/"/g,'&quot;')}" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;" />`
              : `<div style="width:100%;height:100%;background:linear-gradient(135deg,${card.color}30,${card.color}10);display:flex;align-items:center;justify-content:center;font-size:${Math.round(_CW*0.35)}px;pointer-events:none;">🃏</div>`}
            ${sel ? `<div style="position:absolute;top:2px;right:2px;width:14px;height:14px;background:${card.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#000;z-index:2;pointer-events:none;">✓</div>` : (card.count>1 ? `<div style="position:absolute;top:2px;right:2px;min-width:14px;height:14px;background:rgba(0,0,0,.75);color:#fff;font-size:7px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 2px;z-index:2;border:1px solid rgba(255,255,255,.2);pointer-events:none;">×${card.count}</div>` : '')}
            <div style="position:absolute;bottom:0;left:0;right:0;font-size:${Math.round(_CW*0.095)}px;font-weight:700;color:rgba(255,255,255,.8);text-align:center;text-shadow:0 1px 3px #000;padding-bottom:1px;pointer-events:none;">#${parseInt(card.id)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ─── TAB COLLECTION ───────────────────────────────────────────────
function renderTabCollection(th){
  const owned = ALL_CARDS.filter(c=>c.owned).length;
  let cards = [...ALL_CARDS]
    .filter(c=>state.collFilterSet==="all"||c.set===state.collFilterSet)
    .filter(c=>state.collFilterRarity==="all"||c.rarity===state.collFilterRarity)
    .filter(c=>state.collShowOwned==="all"||(state.collShowOwned==="owned"&&c.owned)||(state.collShowOwned==="missing"&&!c.owned))
    .filter(c=>state.collFilterType==="all"||c.type===state.collFilterType)
    .filter(c=>{
      if(!state.collSearch) return true;
      const q=state.collSearch.trim().toLowerCase();
      if(!q) return true;
      // Recherche par ID (toujours, même cartes non possédées)
      if(String(parseInt(c.id))===q || c.id.toLowerCase().includes(q)) return true;
      // Recherche par nom uniquement si la carte est possédée
      if(c.owned && c.name.toLowerCase().includes(q)) return true;
      return false;
    })
    .sort((a,b)=>{const dir=state.collSortDir==="desc"?-1:1;if(state.collSortBy==="id") return dir*a.id.localeCompare(b.id,undefined,{numeric:true});if(state.collSortBy==="alpha") return dir*(a.name||"").localeCompare(b.name||"","fr",{sensitivity:"base"});return dir*(RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));});
  const pct = ALL_CARDS.length>0?Math.round(owned/ALL_CARDS.length*100):0;

  return `
  <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;background:transparent;">

    <div style="flex-shrink:0;padding:12px 14px 8px;">

        <div style="width:40px;height:40px;flex-shrink:0;background:${th.accent}18;border:1px solid ${th.accent}40;display:flex;align-items:center;justify-content:center;font-size:18px;">🗂️</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Bangers',cursive;font-size:12px;font-weight:700;color:${th.text};letter-spacing:.5px;">Deck Builder</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:2px;">${owned} carte${owned>1?'s':''} disponible${owned>1?'s':''} · ${pct}% de la collection</div>
          <div style="height:2px;background:${th.bg};margin-top:6px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${th.accent},${th.accentAlt});"></div>
          </div>
        </div>
        <button id="btn-open-deckbuilder" style="padding:7px 14px;flex-shrink:0;background:${th.accent};color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:800;letter-spacing:.5px;">OUVRIR</button>
      </div>
    </div>
    <!-- Filters -->
    <div style="padding:0 14px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;gap:6px;background:${th.bgSecondary};border:2px solid #000;padding:4px 10px;">
        <span style="font-size:14px;color:${th.textMuted};">🔍</span>
        <input id="coll-search-input" type="text" placeholder="Rechercher par ID ou nom…" value="${state.collSearch||''}"
          style="flex:1;background:transparent;border:none;outline:none;font-size:11px;color:${th.text};font-family:inherit;"
          oninput="window._collSearchHandler && window._collSearchHandler(this.value)"/>
        ${state.collSearch?`<button onclick="state.collSearch='';render();" style="background:none;border:none;color:${th.textMuted};font-size:14px;cursor:pointer;padding:0;">✕</button>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center;">

        <div style="margin-left:auto;position:relative;">

        ${RARITY_ORDER.map(r=>`<button class="rar-btn" data-rar="${r}" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterRarity===r?RARITY_COLOR[r]+'80':th.border};background:${state.collFilterRarity===r?RARITY_COLOR[r]+'18':'transparent'};color:${state.collFilterRarity===r?RARITY_COLOR[r]:th.textMuted};transition:all .15s;">${RARITY_LABEL[r]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;">
        <button class="type-btn" data-type="all" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='all'?th.borderStrong:th.border};background:${state.collFilterType==='all'?th.accent+'18':'transparent'};color:${state.collFilterType==='all'?th.accent:th.textMuted};transition:all .15s;flex-shrink:0;">Tous</button>

        <button class="type-btn" data-type="Ruse" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Ruse'?'#10b98180':th.border};background:${state.collFilterType==='Ruse'?'rgba(16,185,129,.12)':'transparent'};color:${state.collFilterType==='Ruse'?'#10b981':th.textMuted};transition:all .15s;flex-shrink:0;">🃏 Ruse</button>
        <button class="type-btn" data-type="Arcane" style="padding:4px 12px;font-size:9px;font-weight:700;white-space:nowrap;border:1px solid ${state.collFilterType==='Arcane'?'#8b5cf680':th.border};background:${state.collFilterType==='Arcane'?'rgba(139,92,246,.12)':'transparent'};color:${state.collFilterType==='Arcane'?'#8b5cf6':th.textMuted};transition:all .15s;flex-shrink:0;">✦ Arcane</button>
      </div>
      <div style="font-size:9px;color:${th.textFaint};letter-spacing:.3px;">${owned}/${ALL_CARDS.length} obtenues · ${cards.length} affichées</div>
    </div>
    <!-- Grid -->
    ${(()=>{
      const GAP=6, PAD=10;
      const availW = window.innerWidth - PAD*2;
      const COLS = Math.min(8, Math.max(3, Math.floor(availW / 130)));
      const CW = Math.floor((availW - GAP*(COLS-1)) / COLS);
      const CH = Math.round(CW * 1.5);
      const ROWS = Math.ceil(cards.length / COLS);
      const gridH = ROWS * CH + (ROWS-1) * GAP;
      if(cards.length===0) return `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:${th.textMuted};font-size:12px;"><div style="font-size:32px;">🔍</div>Aucune carte</div>`;
      return `<div style="flex:1;overflow-y:auto;padding:${PAD}px;">
        <div style="position:relative;width:${availW}px;height:${gridH}px;">
          ${cards.map((c,i)=>{
            const col=i%COLS, row=Math.floor(i/COLS);
            const x=col*(CW+GAP), y=row*(CH+GAP);
            return renderCollCard(c,th,x,y,CW,CH);
          }).join('')}
        </div>
      </div>`;
    })()}
  </div>`;
}

function renderCollCard(card,th,x,y,CW,CH){
  if(!card.owned){
    const pngW = Math.round(CW * 0.88);
    const pngH = Math.round(CH * 0.88);
    const pngOffX = Math.round((CW - pngW) / 2);
    const pngOffY = Math.round((CH - pngH) / 2);
    return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;background:transparent;border:none;overflow:visible;">
      <div style="position:absolute;left:${pngOffX}px;top:${pngOffY}px;width:${pngW}px;height:${pngH}px;">
        <img src="https://i.goopics.net/iic46c.png" style="width:100%;height:100%;object-fit:contain;display:block;opacity:.75;" />
        <div style="position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:${Math.max(4, Math.round(CW*0.055))}px;font-weight:700;color:rgba(255,255,255,.70);text-shadow:0 1px 3px #000,0 0 6px #000;line-height:1;">#${card.id}</div>
      </div>
    </div>`;
  }
  const rarCol = card.color;
  // Cartes possédées : plus grandes (120% de la cellule, centrées), sans glow
  const oversize = 1.18;
  const imgW = Math.round(CW * oversize);
  const imgH = Math.round(CH * oversize);
  return `<div class="coll-card" data-cardid="${card.id}" style="position:absolute;left:${x}px;top:${y}px;width:${CW}px;height:${CH}px;cursor:pointer;background:transparent;border:none;overflow:visible;display:flex;align-items:center;justify-content:center;">
    ${card.count>1?`<div style="position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;background:${th.accent};color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.5);">x${card.count}</div>`:''}
    ${card.image_url
      ? `<img src="${card.image_url}" style="width:${imgW}px;height:${imgH}px;object-fit:contain;display:block;flex-shrink:0;" />`
      : `<div style="width:${imgW}px;height:${imgH}px;background:linear-gradient(135deg,${rarCol}25,${rarCol}08);display:flex;align-items:center;justify-content:center;font-size:${Math.round(CW*0.38)}px;">🃏</div>`}
  </div>`;
}

// ─── TAB BOOSTERS ─────────────────────────────────────────────────
function renderTabBoosters(th){
  const isMobile = window.innerWidth < 600;
  const selectedIdx = state.boosterSelectedIdx ?? 1; // défaut : booster du milieu
  const prevIdx = state.boosterPrevIdx ?? selectedIdx;
  const slideDir = selectedIdx > prevIdx ? 'right' : 'left'; // new center came from right or left

  // ── Taille des cartes booster calculée dynamiquement selon la fenêtre ──
  // On réserve de la place pour : header (~50px), label (~32px), infos+bouton (~90px),
  // flèches nav desktop (~52px), pioche (~60px), marges (~20px)
  const _vw = window.innerWidth;
  const _vh = window.innerHeight;
  const _reservedH = isMobile ? 210 : 254; // px réservés hors carrousel
  const _availH    = _vh - _reservedH;     // hauteur disponible pour le booster central
  const _availW    = _vw;
  // Ratio booster PNG ≈ 0.54 (largeur/hauteur)
  const _boosterRatio = 0.54;
  // Taille maximale : ne pas dépasser 85% de la hauteur dispo, ni 42% de la largeur sur desktop
  const _maxByH  = Math.floor(_availH * 0.85);
  const _maxByW  = isMobile ? Math.floor(_availW * 0.72) : Math.floor(_availW * 0.36);
  const _cenH    = Math.min(_maxByH, Math.round(_maxByW / _boosterRatio));
  const _cenW    = Math.round(_cenH * _boosterRatio);
  // Éléments latéraux : 74% de la taille centrale
  const _sideScale = 0.74;
  const cardW    = _cenW;
  const cardH    = _cenH;
  // Décalage du track entre deux boosters (largeur centrale × 0.56 pour overlap naturel)
  const _trackStep = Math.round(_cenW * (isMobile ? 0.70 : 0.58));
  // Margin négatif pour overlap des éléments latéraux
  const marginH  = -Math.round(_cenW * (isMobile ? 0.08 : 0.14));
  const boosterMeta = [
    {
      desc:"",
      gradient:`linear-gradient(160deg,#9ca3af20,#9ca3af06)`,
      src:"https://i.goopics.net/ueiki4.png",
      rates:"Common 65% · Uncommon 28% · Rare 6% · Mythic 1%",
    },
    {
      desc:"",
      gradient:`linear-gradient(160deg,#cd7f3222,#cd7f3206)`,
      src:"https://i.goopics.net/61e1o1.png",
      rates:"Common 25% · Uncommon 52% · Rare 18% · Mythic 5%",

    {
      desc:"",
      gradient:`linear-gradient(160deg,#f0c06022,#f0c06006)`,
      src:"https://i.goopics.net/cussu4.png",
      rates:"Common 12% · Uncommon 38% · Rare 35% · Mythic 15%",

  const b = BOOSTERS[selectedIdx];
  const meta = boosterMeta[selectedIdx];
  const isOpen = state.boosterOpening === b.id;

         <img src="https://i.goopics.net/9vyw2d.png" style="position:absolute;left:-10%;top:5%;width:50%;height:88%;object-fit:contain;pointer-events:none;z-index:2;animation:normalSparkle 2.6s ease-in-out infinite;filter:drop-shadow(0 0 5px #9ca3af) grayscale(1) brightness(1.4);mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,rgba(0,0,0,.9) 25%,rgba(0,0,0,.9) 75%,transparent 100%);"/>`

               cursor:pointer;user-select:none;-webkit-user-drag:none;"/>
    </div>`;
  }

  return `

        50%{transform:translateY(-9px) rotate(.4deg);}
      }

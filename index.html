// ─── AMBIENT MUSIC ────────────────────────────────────────────────
let audioCtx=null, audioNodes=[], audioPlaying=false;

function audioPlay(){
  if(audioPlaying)return;
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
  audioPlaying=true;
  const ctx=audioCtx;

  // ── Master + compresseur doux ──
  const master=ctx.createGain();
  master.gain.setValueAtTime(0,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.22,ctx.currentTime+4);
  master.connect(ctx.destination);
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-18;comp.knee.value=12;comp.ratio.value=3;
  comp.attack.value=0.1;comp.release.value=0.4;
  comp.connect(master);

  // ── Filtre passe-bas global (coupe tous les aigus stridents) ──
  const lpf=ctx.createBiquadFilter();
  lpf.type='lowpass';lpf.frequency.value=700;lpf.Q.value=0.4;
  lpf.connect(comp);

  // ── Grande reverb douce ──
  const irLen=ctx.sampleRate*4;
  const ir=ctx.createBuffer(2,irLen,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=ir.getChannelData(ch);
    for(let i=0;i<irLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/irLen,1.6);
  }
  const reverb=ctx.createConvolver();reverb.buffer=ir;
  const rvGain=ctx.createGain();rvGain.gain.value=0.5;
  reverb.connect(rvGain);rvGain.connect(master);
  lpf.connect(reverb);

  // ── Pads continus Am9 (A2 C3 E3 G3 B3) — sine pur, très doux ──
  const padFreqs=[110,130.81,164.81,196.00,246.94];
  padFreqs.forEach((freq,i)=>{
    const osc=ctx.createOscillator();
    const env=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=freq;
    osc.detune.value=(i%2===0?-5:6);
    // Respiration ultra-lente
    const lfo=ctx.createOscillator();
    const lfoG=ctx.createGain();
    lfo.type='sine';lfo.frequency.value=0.025+i*0.006;
    lfoG.gain.value=0.006;
    lfo.connect(lfoG);lfoG.connect(env.gain);
    lfo.start();audioNodes.push(lfo);
    const vol=0.048-i*0.007;
    env.gain.setValueAtTime(0,ctx.currentTime);
    env.gain.linearRampToValueAtTime(vol,ctx.currentTime+5+i*1.8);
    osc.connect(env);env.connect(lpf);
    osc.start();audioNodes.push(osc);
  });

  // ── Basse profonde A1 (55 Hz) ──
  const bassOsc=ctx.createOscillator();
  const bassEnv=ctx.createGain();
  bassOsc.type='sine';bassOsc.frequency.value=55;
  bassEnv.gain.setValueAtTime(0,ctx.currentTime);
  bassEnv.gain.linearRampToValueAtTime(0.09,ctx.currentTime+6);
  const bLfo=ctx.createOscillator();const bLfoG=ctx.createGain();
  bLfo.type='sine';bLfo.frequency.value=0.02;bLfoG.gain.value=0.01;
  bLfo.connect(bLfoG);bLfoG.connect(bassEnv.gain);bLfo.start();audioNodes.push(bLfo);
  bassOsc.connect(bassEnv);bassEnv.connect(comp);
  bassOsc.start();audioNodes.push(bassOsc);

  // ── Mélodie lo-fi espacée (Am pentatonique, sine pur, notes longues) ──
  const scale=[220,261.63,293.66,329.63,392.00,440.00,392.00,329.63,261.63,220];
  const noteDur=3.8;
  const noteGap=3.0;
  const loopLen=scale.length*(noteDur+noteGap)+8;
  let mt=ctx.currentTime+10;
  const scheduleMelody=()=>{
    if(!audioPlaying) return;
    scale.forEach((freq,i)=>{
      const t=mt+i*(noteDur+noteGap);
      const o=ctx.createOscillator();const e=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=3;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(0.022,t+noteDur*0.3);
      e.gain.setValueAtTime(0.022,t+noteDur*0.65);
      e.gain.linearRampToValueAtTime(0,t+noteDur);
      o.connect(e);e.connect(lpf);
      o.start(t);o.stop(t+noteDur+0.1);audioNodes.push(o);
    });
    mt+=loopLen;
    if(audioPlaying) setTimeout(scheduleMelody,(loopLen-1)*1000);
  };
  scheduleMelody();

  // ── Accords qui évoluent toutes les 16s ──
  const chords=[
    [110,164.81,220,261.63],   // Am
    [87.31,130.81,174.61,220], // Fm
    [65.41,130.81,164.81,196], // C
    [82.41,123.47,164.81,196], // Em
  ];
  let ci=0;
  const chordOscs=[];
  const scheduleChord=()=>{
    if(!audioPlaying) return;
    // Fade out anciens
    chordOscs.forEach(({o,g})=>{
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+2.5);
      setTimeout(()=>{try{o.stop();}catch(e){}},2700);
    });
    chordOscs.length=0;
    chords[ci%chords.length].forEach((freq,i)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type='sine';o.frequency.value=freq;o.detune.value=i%2===0?-4:5;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.018-i*0.003,ctx.currentTime+3);
      o.connect(g);g.connect(lpf);o.start();
      audioNodes.push(o);chordOscs.push({o,g});
    });
    ci++;
    if(audioPlaying) setTimeout(scheduleChord,16000);
  };
  setTimeout(scheduleChord,3000);
}
function audioStop(){
  audioNodes.forEach(n=>{try{n.stop();}catch(e){}});
  audioNodes=[];audioPlaying=false;
}

  const th = t();
  app.style.background = th.bg;
  app.style.color = th.text;

  if(state.screen === "splash"){
    app.innerHTML = renderSplash(th);
    bindSplash();
    startSplashAnim();
  } else {
    stopSplashAnim();
    app.innerHTML = renderGame(th);
    bindGame();
  }
}

    const arrow = document.querySelector('.arrow-bounce');
    if (cta) cta.style.opacity = '0.4';
    if (arrow) arrow.style.display = 'none';
    const wait = setInterval(()=>{
      if (window.checkAuthAndEnter) {
        clearInterval(wait);
        window.checkAuthAndEnter();
      }
    }, 50);
  });
}

const splashPts = Array.from({length:20},(_,i)=>({
  x:Math.random()*100, y:100+Math.random()*20,
  size:Math.random()*2.5+1, speed:Math.random()*.25+.08,
  offset:Math.random()*Math.PI*2,
  color:["#5865f2","#eb459e","#fee75c","#57f287"][i%4],
}));

function startSplashAnim(){
  stopSplashAnim();
  splashTick = 0;
  let angle = 0;
  splashTimer = setInterval(()=>{
    splashTick++;
    angle += 0.6;
    // Update particles
    const svg = document.getElementById('splash-particles');
    if(svg){
      let circles = '';
      splashPts.forEach((p,i)=>{
        const y = ((p.y - splashTick*p.speed)%110+110)%110-5;
        circles += `<circle cx="${p.x + Math.sin(splashTick*.03+p.offset)*2}%" cy="${y}%" r="${p.size}" fill="${p.color}" opacity="${0.2+Math.sin(splashTick*.06+p.offset)*.1}"/>`;
      });
      svg.innerHTML = circles;
    }
    // Update conic ring
    const ring = document.getElementById('conic-ring');
    if(ring) ring.style.background = `conic-gradient(from ${angle}deg,#5865f2,#eb459e,#fee75c,#57f287,#5865f2)`;
  }, 50);
}

function stopSplashAnim(){
  if(splashTimer){ clearInterval(splashTimer); splashTimer=null; }
}

function renderDeckEdit(th){
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if(!deck) return renderDeckList(th);
  const deckCards = deck.cards || []; // [{card_id, quantity}]
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  const isPlayable = deckTotal===30;

  // Compter mythiques dans le deck
  const mythCount = deckCards.reduce((s,c)=>{
    const card=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(card&&card.rarity==='mythic'?c.quantity:0);
  },0);

  // Cartes possédées triées
  const ownedCards = ALL_CARDS.filter(c=>c.owned).sort((a,b)=>RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));

  // Helper: quantité d'une carte dans le deck
  const qtyInDeck = (cardId)=>{
    const e=deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
    return e?e.quantity:0;
  };

  // Helper: peut-on ajouter cette carte ?
  const canAdd = (card)=>{
    if(deckTotal>=30) return {ok:false,reason:'30 cartes max'};
    const qty=qtyInDeck(card.id);
    // Ne pas mettre plus que ce qu'on possède
    if(qty>= card.count) return {ok:false,reason:`Tu n'as que ${card.count} exemplaire${card.count>1?'s':''}`};
    // Rare/Mythic : max 2 exemplaires dans le deck
    if(card.rarity==='mythic'||card.rarity==='rare'){
      if(qty>=2) return {ok:false,reason:'2 exemplaires max (Rare/Myth)'};
    }
    // Max 2 Mythiques au total dans le deck
    if(card.rarity==='mythic'&&mythCount>=2&&qty===0) return {ok:false,reason:'2 Mythiques max dans le deck'};
    return {ok:true};
  };

  return `
  <div id="deckbuilder-bg" style="position:fixed;inset:0;z-index:300;background:${th.bg};display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px 12px;background:${th.bgSecondary};border-bottom:1px solid ${th.border};flex-shrink:0;">
      <button id="db-back" style="width:32px;height:32px;border-radius:10px;background:${th.bgTertiary};border:1px solid ${th.border};color:${th.textMuted};display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;">←</button>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.5px;">${deck.name}</div>
          <button id="db-rename-edit" data-deckid="${deck.id}" data-deckname="${deck.name}" style="width:22px;height:22px;border-radius:6px;background:${th.bgTertiary};border:1px solid ${th.border};color:${th.textMuted};font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✏️</button>
        </div>
        <div style="font-size:9px;color:${isPlayable?th.green:th.textMuted};font-weight:700;margin-top:1px;">${isPlayable?'✓ Deck prêt':deckTotal+'/30'} · ${mythCount}/2 Myth.</div>
      </div>
      <button id="db-autofill" style="padding:6px 12px;border-radius:99px;background:${th.accentAlt}18;color:${th.accentAlt};border:1px solid ${th.accentAlt}40;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.3px;">✨ AUTO</button>

// ─── TAB COLLECTION ───────────────────────────────────────────────
function renderTabCollection(th){
  const owned = ALL_CARDS.filter(c=>c.owned).length;
  let cards = [...ALL_CARDS]
    .filter(c=>state.collFilterSet==="all"||c.set===state.collFilterSet)
    .filter(c=>state.collFilterRarity==="all"||c.rarity===state.collFilterRarity)
    .filter(c=>state.collShowOwned==="all"||(state.collShowOwned==="owned"&&c.owned)||(state.collShowOwned==="missing"&&!c.owned))
    .filter(c=>state.collFilterType==="all"||c.type===state.collFilterType)
    .sort((a,b)=>state.collSortBy==="id"?a.id.localeCompare(b.id):RARITY_ORDER.indexOf(a.rarity)-RARITY_ORDER.indexOf(b.rarity));
  const pct = ALL_CARDS.length>0?Math.round(owned/ALL_CARDS.length*100):0;

  return `
  <div style="display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;background:${th.bg};">
    <!-- Deck builder banner -->
    <div style="flex-shrink:0;padding:12px 14px 8px;">
      <div style="background:linear-gradient(135deg,${th.accent}12,${th.accentAlt}08);border:1px solid ${th.borderStrong};border-radius:16px;padding:12px 16px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;">

function renderCollCard(card,th){
  if(!card.owned){
    return `<div class="coll-card" data-cardid="${card.id}" style="background:${th.bgSecondary};border:1px solid ${th.border};border-radius:12px;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;opacity:.28;filter:grayscale(1);cursor:pointer;transition:all .2s;">
      <div style="font-size:20px;">🂠</div>
      <div style="font-size:8px;font-weight:700;color:${th.textMuted};">#${card.id}</div>
    </div>`;
  }
  return `<div class="coll-card" data-cardid="${card.id}" style="background:linear-gradient(160deg,${card.color}14,${th.bgSecondary});border:1px solid ${card.color}25;border-radius:12px;aspect-ratio:2/3;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .2s;overflow:hidden;padding:7px 5px 5px;gap:3px;position:relative;">
    <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${card.color}50,transparent);"></div>
    ${card.count>1?`<div style="position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:6px;background:${th.accent};color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;">×${card.count}</div>`:''}
    <div style="flex:1;width:100%;border-radius:7px;background:linear-gradient(135deg,${card.color}22,${card.color}08);display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
    <div style="font-size:8px;font-weight:700;color:${th.text};text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px;">${card.name}</div>
    <div style="display:flex;justify-content:space-between;width:100%;align-items:center;padding:0 2px;">
      <span style="font-size:7px;color:${th.textMuted};">#${card.id}</span>
      <span style="font-size:8px;color:${card.color};">◆</span>
    </div>
  </div>`;
}

// ─── TAB BOOSTERS ─────────────────────────────────────────────────
function renderTabBoosters(th){
  const bazar=[
    {top:"4%",left:"1%",rotate:"-8deg",scale:1.0,zIndex:1},
    {top:"16%",left:"33%",rotate:"4deg",scale:1.12,zIndex:3},

        const pos=bazar[i];

        return `
        <div class="booster-card" data-bid="${b.id}" style="position:absolute;top:${pos.top};${styleExtra}width:46%;background:linear-gradient(150deg,${b.color}18,${b.color}06);border:1px solid ${b.color}35;border-radius:20px;padding:16px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .28s cubic-bezier(.4,0,.2,1);transform:rotate(${pos.rotate}) scale(${pos.scale});z-index:${pos.zIndex};overflow:hidden;">
          <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${b.color}60,transparent);"></div>
          <div style="position:absolute;inset:0;border-radius:20px;background:radial-gradient(ellipse at 50% 0%,${b.color}12,transparent 65%);pointer-events:none;"></div>
          ${[0,1,2].map(k=>`<div style="position:absolute;bottom:40px;left:50%;width:44px;height:62px;border-radius:8px;background:linear-gradient(135deg,${b.color}28,${b.color}10);border:1px solid ${b.color}35;transform:translateX(-50%) rotate(${(k-1)*9}deg) translateY(${k*2}px);z-index:${k};pointer-events:none;"></div>`).join('')}

            <div style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:14px;font-weight:900;color:${b.color};margin-bottom:10px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" opacity=".3"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.5h-2v-1.8c-1.4-.3-2.5-1.3-2.5-2.7h2c0 .6.7 1 1.5 1s1.5-.4 1.5-1c0-.7-.6-1-1.8-1.3C10.1 10.3 9 9.4 9 8c0-1.3 1-2.3 2.5-2.6V3.5h2v1.9c1.3.4 2.2 1.4 2.2 2.6h-2c0-.6-.6-1-1.5-1s-1.4.4-1.4 1c0 .6.5.9 1.7 1.2 1.8.4 3 1.4 3 3 0 1.4-1 2.5-2.5 2.8v1.5z"/></svg>${b.price}</div>

          </div>

      <div style="position:absolute;bottom:0;left:0;right:0;">

// ─── TAB MESSAGES ────────────────────────────────────────────────
function renderMessagesModal(th){

  const innerContent = activeId && friends.find(f=>f.id===activeId) ? (() => {

      <button id="msg-back" style="width:32px;height:32px;border-radius:10px;background:${th.bgTertiary};border:1px solid ${th.border};color:${th.textMuted};font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">←</button>

        <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${friend.discord_username||'Ami'}</div>

      </div>

    <div id="msg-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:4px;min-height:0;">
      ${(()=>{
        const trades = (state.convTrades[activeId] || []).map(t=>({...t, _type:'trade', _ts: t.created_at}));
        const allItems = [...msgs.map(m=>({...m, _type:'msg', _ts: m.ts})), ...trades]
          .sort((a,b)=>new Date(a._ts)-new Date(b._ts));

        if(allItems.length===0) return `<div style="text-align:center;color:${th.textFaint};font-size:11px;padding:20px 0;">Aucun message pour le moment.<br><span style="font-size:10px;">Envoie le premier !</span></div>`;

        return allItems.map(item=>{
          if(item._type === 'msg') return `
            <div style="display:flex;flex-direction:${item.from===myId?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:75%;background:${item.from===myId?th.accent:th.bgTertiary};color:${item.from===myId?'#fff':th.text};padding:8px 12px;border-radius:${item.from===myId?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:12px;line-height:1.4;">${item.text}</div>
            </div>`;

          // ── Trade card ──
          const isMine = item.from_id === myId;
          const fromCard = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.from_card_id));
          const toCard   = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(item.to_card_id));
          // Le propriétaire voit ses propres cartes, l'autre voit en mystère si non possédée
          const showFromCard = isMine || (fromCard && fromCard.owned);
          const showToCard   = !isMine || (toCard && toCard.owned);

          const STATUS = {
            pending:  { label:'En attente…',   color:'#fee75c', icon:'⏳', bg:'rgba(254,231,92,.08)',  border:'rgba(254,231,92,.25)' },
            accepted: { label:'Échange accepté !', color:'#57f287', icon:'✓',  bg:'rgba(87,242,135,.08)', border:'rgba(87,242,135,.25)' },
            declined: { label:'Refusé',          color:'#ed4245', icon:'✕',  bg:'rgba(237,66,69,.08)',  border:'rgba(237,66,69,.25)'  },
            cancelled:{ label:'Annulé',          color:'#96989d', icon:'—',  bg:'rgba(150,152,157,.08)',border:'rgba(150,152,157,.2)' },
          };
          const st = STATUS[item.status] || STATUS.pending;
          const tradeLabel = isMine ? 'Tu proposes' : 'Proposition reçue';

          const cardBox = (card, show, isLeft) => {
            const col = card ? RARITY_COLOR[card.rarity] : '#96989d';
            if(show && card) return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;border-radius:7px;background:linear-gradient(135deg,${col}30,${col}10);border:1px solid ${col}60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
                  <div style="font-size:18px;">🃏</div>
                  <div style="font-size:6px;color:${col};font-weight:800;">◆</div>
                </div>
                <div style="font-size:8px;font-weight:700;color:${th.text};text-align:center;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${card.name}</div>
                <div style="font-size:7px;color:${th.textMuted};">#${card.id}</div>
              </div>`;
            return `
              <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
                <div style="width:44px;height:62px;border-radius:7px;background:${th.surface};border:1px solid ${th.border};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:.65;">
                  <div style="font-size:18px;">🂠</div>
                  <div style="font-size:7px;font-weight:700;color:${th.textMuted};">#${isLeft?item.from_card_id:item.to_card_id}</div>
                </div>
                <div style="font-size:7px;color:${th.textMuted};text-align:center;">Mystère</div>
              </div>`;
          };

          return `
            <div style="display:flex;flex-direction:${isMine?'row-reverse':'row'};gap:6px;align-items:flex-end;">
              <div style="max-width:88%;background:${st.bg};border:1px solid ${st.border};border-radius:${isMine?'14px 14px 4px 14px':'14px 14px 14px 4px'};padding:10px 12px;min-width:200px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                  <div style="font-size:9px;font-weight:700;color:${th.textMuted};text-transform:uppercase;letter-spacing:1px;">🔄 ${tradeLabel}</div>
                  <div style="display:flex;align-items:center;gap:4px;background:${st.bg};border:1px solid ${st.border};border-radius:99px;padding:2px 7px;">
                    <span style="font-size:10px;">${st.icon}</span>
                    <span style="font-size:9px;font-weight:700;color:${st.color};">${st.label}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu donnes':'Il donne'}</div>
                    ${cardBox(fromCard, showFromCard, true)}
                  </div>
                  <div style="font-size:16px;color:${th.textMuted};">⇄</div>
                  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="font-size:8px;color:${th.textMuted};margin-bottom:2px;">${isMine?'Tu reçois':'Il veut'}</div>
                    ${cardBox(toCard, showToCard, false)}
                  </div>
                </div>
                <div style="margin-top:6px;font-size:8px;color:${th.textFaint};text-align:center;">${new Date(item.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>`;
        }).join('');
      })()}
    </div>
    <div style="display:flex;gap:8px;padding-top:10px;flex-shrink:0;align-items:center;">
      <button id="msg-trade-btn" data-fid="${friend.id}" style="width:36px;height:36px;border-radius:10px;background:${th.accent}15;color:${th.accent};border:1px solid ${th.accent}40;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;" title="Proposer un échange">🔄</button>
      <input id="msg-input" placeholder="Message..." style="flex:1;padding:10px 14px;border-radius:14px;background:${th.bgTertiary};border:1px solid ${th.border};color:${th.text};font-size:12px;outline:none;transition:border-color .18s;" onfocus="this.style.borderColor='rgba(56,189,248,.35)'" onblur="this.style.borderColor=''"/>
      <button id="msg-send" style="width:36px;height:36px;border-radius:10px;background:${th.accent};color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;">↑</button>
    </div>`;
  })() : `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:${th.text};letter-spacing:1px;">Messages</div>
      <div style="font-size:9px;color:${th.textMuted};letter-spacing:.5px;text-transform:uppercase;">${friends.length} ami${friends.length>1?'s':''}</div>
    </div>
    ${friends.length===0
      ? `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:${th.textMuted};font-size:12px;text-align:center;">
           <div style="font-size:28px;">💬</div>
           Aucun message pour le moment.
         </div>`
      : friends.map(f=>`
      <div class="conv-item btn-hover" data-fid="${f.id}" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:${th.bgTertiary};border:1px solid ${th.border};cursor:pointer;margin-bottom:6px;position:relative;overflow:hidden;transition:all .18s;">
        <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${th.accent};border-radius:99px;opacity:0;"></div>
        <div style="width:40px;height:40px;border-radius:12px;overflow:hidden;background:${th.surface};flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid ${th.border};">
          ${f.avatar_url?`<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:18px;">👤</span>'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.discord_username||'Ami'}</div>
          <div style="font-size:10px;color:${th.textMuted};margin-top:1px;">Appuyer pour écrire</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${th.textFaint}" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('')}
  `;

  return `
  <div id="messages-bg" style="position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;">

      <div style="width:36px;height:4px;border-radius:99px;background:rgba(255,255,255,.1);margin:0 auto 16px;flex-shrink:0;"></div>
      ${innerContent}
    </div>
  </div>`;
}

// ─── PIOCHE MECHANIC ──────────────────────────────────────────────
function renderPiocheMechanic(th){
  const TOTAL=50,COLS=8,GAP=5,CW=Math.floor((Math.min(window.innerWidth,420)-40-GAP*(COLS-1))/COLS),CH=Math.round(CW*1.43);
  return `
  <div id="pioche-overlay" style="position:absolute;inset:0;z-index:200;background:rgba(4,8,18,.97);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:14px;padding:22px;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;">
      <div style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#e8f4ff;letter-spacing:2px;text-transform:uppercase;">Pioche Classique</div>
      <button id="pioche-close" style="width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#5e7d9a;display:flex;align-items:center;justify-content:center;cursor:pointer;">${SVG.x}</button>
    </div>
    <div style="font-size:10px;color:#5e7d9a;text-align:center;letter-spacing:1px;">${state.piocheChosen===null?"✦ Choisissez une carte face cachée ✦":"Retournement en cours…"}</div>
    ${!state.piocheResult?`
    <div style="position:relative;width:${CW*COLS+GAP*(COLS-1)}px;height:${CH*5+GAP*4}px;flex-shrink:0;margin:0 auto;">
      ${Array.from({length:TOTAL},(_,i)=>{
        const col=i%COLS,row=Math.floor(i/COLS);
        const rot=(((i*37+13)%20)-10)*0.5;
        const isChosen=state.piocheChosen===i;
        const isFlipped=state.piocheFlipped[i];
        return `<div class="pioche-card" data-idx="${i}" style="position:absolute;left:${col*(CW+GAP)}px;top:${row*(CH+GAP)}px;width:${CW}px;height:${CH}px;cursor:${state.piocheChosen===null?'pointer':'default'};perspective:300px;">
          <div style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transform:${isFlipped?'rotateY(180deg)':`rotate(${rot}deg)`};transition:transform .6s ease;">
            <div style="position:absolute;inset:0;backface-visibility:hidden;background:${isChosen?'linear-gradient(135deg,#5865f2,#eb459e)':'linear-gradient(135deg,#2b2d31,#1e1f22)'};border:1px solid ${isChosen?'#5865f2':'rgba(255,255,255,.12)'};border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:${isChosen?'0 0 16px #5865f280':'none'};transform:${isChosen?'scale(1.1)':'scale(1)'};transition:all .2s;">🂠</div>
            <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);background:linear-gradient(135deg,#5865f230,#eb459e20);border:1px solid #5865f260;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;">🃏</div>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}
    ${state.piocheResult?`
    <div class="fade-up" style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="width:110px;aspect-ratio:2/3;background:linear-gradient(160deg,${state.piocheResult.color}30,#2b2d31);border:2px solid ${state.piocheResult.color}80;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px ${state.piocheResult.color}50;">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,${state.piocheResult.color}30,${state.piocheResult.color}10);">🃏</div>
        <div style="padding:6px 8px;background:#2b2d31;">
          <div style="font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:#f2f3f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${state.piocheResult.name}</div>
          <div style="font-size:8px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:2px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]}</div>
        </div>
      </div>
      <div style="text-align:center;">
        <div style="font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#f2f3f5;">${state.piocheResult.name}</div>
        <div style="font-size:11px;color:${RARITY_COLOR[state.piocheResult.rarity]};margin-top:3px;">◆ ${RARITY_LABEL[state.piocheResult.rarity]} · ${state.piocheResult.type}</div>
      </div>
      <button id="pioche-collect" style="padding:10px 28px;border-radius:99px;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;border:none;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 20px rgba(56,189,248,.3);">AJOUTER À LA COLLECTION</button>
    </div>`:''}
  </div>`;

            <div style="width:40px;height:40px;border-radius:12px;overflow:hidden;background:${th.surface};flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid ${th.border};">
              ${f.avatar_url?`<img src="${f.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`:'<span style="font-size:18px;">👤</span>'}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:700;color:${th.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.discord_username||'Ami'}</div>

            <div style="display:flex;gap:5px;">
              <button class="friend-dm" data-fid="${f.id}" style="padding:6px 12px;border-radius:99px;font-size:10px;font-weight:800;background:${th.accent}15;color:${th.accent};border:1px solid ${th.accent}40;cursor:pointer;transition:all .18s;letter-spacing:.3px;">💬</button>

          <div style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:14px;background:${th.bgTertiary};border:1px solid ${th.border};margin-bottom:6px;">

// ─── BIND EVENTS ──────────────────────────────────────────────────
function bindGame(){
  const th = t();

  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const tab = parseInt(btn.dataset.tab);
      setState({tab});
      // Rafraîchir les coins à l'ouverture de l'onglet Boosters
      if (tab === 2 && state.currentUser?.id) refreshCoins(state.currentUser.id);
    });
  });

  // Header buttons
  const btnMusic = document.getElementById('btn-music');
  if(btnMusic) btnMusic.addEventListener('click',()=>{
    audioToggle();
    setState({musicOn:!state.musicOn});
  });

  const btnSettings = document.getElementById('btn-settings');
  if(btnSettings) btnSettings.addEventListener('click',()=>setState({showSettings:true,showFriends:false,showNotif:false}));

  const btnFriends = document.getElementById('btn-friends');
  if(btnFriends) btnFriends.addEventListener('click',()=>{
    setState({showFriends:true,showSettings:false,showNotif:false,showMessages:false});
    loadFriends();
  });

  const btnNotif = document.getElementById('btn-notif');
  if(btnNotif) btnNotif.addEventListener('click',()=>setState({showNotif:true,showSettings:false,showFriends:false,showMessages:false}));

  const btnMessages = document.getElementById('btn-messages');
  if(btnMessages) btnMessages.addEventListener('click',()=>{
    setState({showMessages:true,showSettings:false,showFriends:false,showNotif:false});
    if((state.friends||[]).length===0) loadFriends();
    // Si une conv est déjà ouverte, effacer son badge
    if (state.activeConvId) markMsgNotifsRead(state.activeConvId);
  });

  const messagesBg = document.getElementById('messages-bg');
  if(messagesBg) messagesBg.addEventListener('click',(e)=>{if(e.target===messagesBg)setState({showMessages:false,activeConvId:null});});

  const btnProfile = document.getElementById('btn-profile');
  if(btnProfile) btnProfile.addEventListener('click',()=>setState({showProfile:true,showSettings:false,showFriends:false,showNotif:false}));

  const profileBg = document.getElementById('profile-bg');
  if(profileBg) profileBg.addEventListener('click',(e)=>{if(e.target===profileBg)setState({showProfile:false});});

  const btnLogout = document.getElementById('btn-logout');
  if(btnLogout) btnLogout.addEventListener('click', ()=>{ if(window.logoutUser) window.logoutUser(); });

  // Collection filters
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collSortBy:btn.dataset.sort}));
  });
  document.querySelectorAll('.rar-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterRarity:btn.dataset.rar}));
  });
  document.querySelectorAll('.type-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterType:btn.dataset.type}));
  });

  // Filtre possédées/toutes/manquantes
  document.querySelectorAll('.owned-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collShowOwned:btn.dataset.val}));
  });

  // Messages : liste conversations
  document.querySelectorAll('.conv-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const fid = el.dataset.fid;
      setState({activeConvId:fid});
      loadMessages(fid);
      loadConvTrades(fid);
      markMsgNotifsRead(fid);
    });
  });

  // Messages : retour liste
  const msgBack = document.getElementById('msg-back');
  if(msgBack) msgBack.addEventListener('click',()=>{ _activeConvFriendId=null; setState({activeConvId:null}); });

  // Messages : envoi
  const msgSend = document.getElementById('msg-send');
  const msgInput = document.getElementById('msg-input');
  if(msgSend && msgInput){
    const sendMsg = () => {
      const text = msgInput.value.trim();
      if(!text) return;
      msgInput.value='';
      sendMessage(state.activeConvId, text);
    };
    msgSend.addEventListener('click', sendMsg);
    msgInput.addEventListener('keydown',(e)=>{ if(e.key==='Enter') sendMsg(); });
  }

  // Fermer autres modals quand messages s'ouvre
  const messagesBg2 = document.getElementById('messages-bg');
  if(messagesBg2) messagesBg2.addEventListener('click',(e)=>{if(e.target===messagesBg2){ _activeConvFriendId=null; setState({showMessages:false,activeConvId:null});}});
  const setBtn = document.getElementById('set-filter-btn');
  if(setBtn) setBtn.addEventListener('click',(e)=>{e.stopPropagation();setState({collSetOpen:!state.collSetOpen});});
  document.querySelectorAll('.set-opt').forEach(btn=>{
    btn.addEventListener('click',()=>setState({collFilterSet:btn.dataset.val,collSetOpen:false}));
  });

  // Coll cards
  document.querySelectorAll('.coll-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const card = ALL_CARDS.find(c=>c.id===el.dataset.cardid);
      if(card) setState({collSelectedCard:card});
    });
    if(!el.style.filter){ // owned
      el.addEventListener('mouseenter',()=>{el.style.transform='translateY(-3px) scale(1.03)';el.style.boxShadow=`0 8px 20px rgba(0,0,0,.3)`;});
      el.addEventListener('mouseleave',()=>{el.style.transform='';el.style.boxShadow='';});
    } else {
      el.addEventListener('mouseenter',()=>{el.style.opacity='.55';el.style.transform='scale(1.04)';});
      el.addEventListener('mouseleave',()=>{el.style.opacity='.32';el.style.transform='scale(1)';});
    }
  });

  // Card modal close
  const cardModalBg = document.getElementById('card-modal-bg');
  if(cardModalBg) cardModalBg.addEventListener('click',(e)=>{if(e.target===cardModalBg)setState({collSelectedCard:null});});
  const cardModalClose = document.getElementById('card-modal-close');
  if(cardModalClose) cardModalClose.addEventListener('click',()=>setState({collSelectedCard:null}));

  // Bouton "Ajouter au deck" dans modal carte → ouvre deck builder
  const btnAddToDeck = document.getElementById('btn-add-to-deck');
  if(btnAddToDeck) btnAddToDeck.addEventListener('click',()=>{
    setState({collSelectedCard:null,showDeckBuilder:true,deckBuilderView:'list'});
    loadDecks();
  });

  // Ouvrir Deck Builder depuis la collection
  const btnOpenDB = document.getElementById('btn-open-deckbuilder');
  if(btnOpenDB) btnOpenDB.addEventListener('click',()=>{
    setState({showDeckBuilder:true,deckBuilderView:'list'});
    loadDecks();
  });

  // Fermer Deck Builder
  const dbClose = document.getElementById('db-close');
  if(dbClose) dbClose.addEventListener('click',()=>setState({showDeckBuilder:false,deckBuilderView:'list'}));

  // Retour liste depuis édition
  const dbBack = document.getElementById('db-back');
  if(dbBack) dbBack.addEventListener('click',()=>setState({deckBuilderView:'list'}));

  // Nouveau deck
  const dbNew = document.getElementById('db-new');
  if(dbNew) dbNew.addEventListener('click',()=>createDeck());

  // Sauvegarder deck
  const dbSave = document.getElementById('db-save');
  if(dbSave) dbSave.addEventListener('click',()=>saveDeck());

  // Sélection automatique du deck
  const dbAutofill = document.getElementById('db-autofill');
  if(dbAutofill) dbAutofill.addEventListener('click',()=>autoFillDeck());

  // Clic sur un deck → éditer
  document.querySelectorAll('.deck-item').forEach(el=>{
    el.addEventListener('click',(e)=>{
      if(e.target.closest('.db-set-default')||e.target.closest('.db-delete')||e.target.closest('.db-rename')) return;
      setState({activeDeckId:el.dataset.deckid,deckBuilderView:'edit'});
    });
  });

  // Mettre par défaut
  document.querySelectorAll('.db-set-default').forEach(btn=>{
    btn.addEventListener('click',(e)=>{e.stopPropagation();setDefaultDeck(btn.dataset.deckid);});
  });

  // Renommer deck (depuis la liste)
  document.querySelectorAll('.db-rename').forEach(btn=>{
    btn.addEventListener('click',(e)=>{e.stopPropagation();promptRenameDeck(btn.dataset.deckid,btn.dataset.deckname);});
  });

  // Renommer deck (depuis la vue édition)
  const dbRenameEdit = document.getElementById('db-rename-edit');
  if(dbRenameEdit) dbRenameEdit.addEventListener('click',(e)=>{
    e.stopPropagation();
    promptRenameDeck(dbRenameEdit.dataset.deckid, dbRenameEdit.dataset.deckname);
  });

  // Supprimer deck
  document.querySelectorAll('.db-delete').forEach(btn=>{
    btn.addEventListener('click',(e)=>{e.stopPropagation();deleteDeck(btn.dataset.deckid);});
  });

  // Ajouter une carte au deck (vue édition)
  document.querySelectorAll('.db-add-card').forEach(el=>{
    el.addEventListener('click',()=>addCardToDeck(el.dataset.cardid));
  });

  // Retirer une carte du deck (clic sur carte dans le deck)
  document.querySelectorAll('.db-deck-card').forEach(el=>{
    el.addEventListener('click',()=>removeCardFromDeck(el.dataset.cardid));
  });

  // Mode de jeu
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click',async ()=>{
      const mode = btn.dataset.mode;
      if (mode === 'ia' || mode === 'pvp') {
        // Vérifier qu'un deck par défaut jouable existe
        const ok = await checkDefaultDeck();
        if (!ok) return;
        if (mode === 'ia') { window.location.href = 'PVE.html'; return; }
      }
      if (mode === 'pvp') {
        setState({showFriends:true, friendsTab:'list'});
        loadFriends();
      }
    });
  });

  // Boosters
  document.querySelectorAll('.open-booster').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const bid=parseInt(btn.dataset.bid);
      const booster = BOOSTERS.find(b=>b.id===bid);
      if (!booster) return;
      // Vérifier le solde sans déduire (la déduction est gérée dans la page booster)
      const coins = state.coins || 0;
      if (coins < booster.price) {
        showToast(`Il vous faut ${booster.price.toLocaleString('fr-FR')} coins pour ouvrir ce booster.`, '🚫');
        return;
      }
      if (bid === 1) { window.location.href = 'booster1.html'; return; }
      if (bid === 2) { window.location.href = 'booster2.html'; return; }
      if (bid === 3) { window.location.href = 'booster3.html'; return; }
    });
  });

  const btnPioche = document.getElementById('btn-pioche');
  if(btnPioche) btnPioche.addEventListener('click',()=>setState({showPioche:true,piocheFlipped:{},piocheChosen:null,piocheResult:null}));

  // Booster hover
  document.querySelectorAll('.booster-card').forEach(el=>{
    const bid=parseInt(el.dataset.bid);
    const b=BOOSTERS.find(b=>b.id===bid);
    if(!b)return;
    el.addEventListener('mouseenter',()=>{
      el.style.transform=`scale(${parseFloat(el.style.transform.match(/scale\(([^)]+)\)/)?.[1]||1)+0.04}) rotate(0deg)`;
      el.style.boxShadow=`0 16px 40px ${b.color}50`;
      el.style.zIndex=10;
      el.style.border=`1px solid ${b.color}90`;
    });
    el.addEventListener('mouseleave',()=>{
      const idx=BOOSTERS.indexOf(b);
      const bazar=[{rotate:"-7deg",scale:1.0},{rotate:"5deg",scale:1.1},{rotate:"11deg",scale:0.95}];
      const pos=bazar[idx];
      el.style.transform=`rotate(${pos.rotate}) scale(${pos.scale})`;
      el.style.boxShadow='0 4px 16px rgba(0,0,0,.3)';
      el.style.zIndex=pos.zIndex||1;
      el.style.border=`1px solid ${b.color}45`;
    });
  });

  // Pioche
  const piocheClose = document.getElementById('pioche-close');
  if(piocheClose) piocheClose.addEventListener('click',()=>setState({showPioche:false}));

  document.querySelectorAll('.pioche-card').forEach(el=>{
    el.addEventListener('click',()=>{
      if(state.piocheChosen!==null)return;
      const idx=parseInt(el.dataset.idx);
      const newFlipped={...state.piocheFlipped,[idx]:true};
      setState({piocheChosen:idx,piocheFlipped:newFlipped});
      setTimeout(()=>{
        // Tirage pondéré par rareté : Mythique 0.1%, Rare 1%, Peu Commune 11.9%, Commune 87%
        const roll = Math.random() * 100;
        let targetRarity;
        if (roll < 0.1)       targetRarity = 'mythic';
        else if (roll < 1.1)  targetRarity = 'rare';
        else if (roll < 13.0) targetRarity = 'uncommon';
        else                  targetRarity = 'common';

        const pool = ALL_CARDS.filter(c => c.rarity === targetRarity);
        // Fallback si le pool est vide pour cette rareté
        const finalPool = pool.length > 0 ? pool : ALL_CARDS;
        const drawn = finalPool[Math.floor(Math.random() * finalPool.length)];
        setState({piocheResult: drawn});
      },700);
    });
  });

  const piocheCollect = document.getElementById('pioche-collect');
  if(piocheCollect) piocheCollect.addEventListener('click', async ()=>{
    const card = state.piocheResult;
    if (card) {
      // Ajouter la carte en base Supabase
      const db = window.db;
      const myId = state.currentUser?.id;
      if (db && myId) {
        const cardIdNum = parseInt(card.id, 10);
        // Vérifier si le joueur a déjà cette carte
        const { data: existing } = await db.from('player_cards')
          .select('id, quantity')
          .eq('player_id', myId)
          .eq('card_id', cardIdNum)
          .single();
        if (existing) {
          await db.from('player_cards')
            .update({ quantity: existing.quantity + 1 })
            .eq('id', existing.id);
        } else {
          await db.from('player_cards')
            .insert({ player_id: myId, card_id: cardIdNum, quantity: 1 });
        }
        // Recharger la collection
        if (window.loadCollection) window.loadCollection();
        showToast(`${card.name} ajoutée à la collection !`, '✓');
      }
    }
    setState({showPioche:false});
  });

  // Modal backdrops
  const notifBg=document.getElementById('notif-bg');
  if(notifBg) notifBg.addEventListener('click',(e)=>{if(e.target===notifBg)setState({showNotif:false});});

  // Friends modal binds
  document.querySelectorAll('.friends-tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>setState({friendsTab:btn.dataset.ftab}));
  });
  const btnAddFriend=document.getElementById('btn-add-friend');
  if(btnAddFriend) btnAddFriend.addEventListener('click',()=>setState({showAddFriend:true}));
  const btnCancelAdd=document.getElementById('btn-cancel-add-friend');
  if(btnCancelAdd) btnCancelAdd.addEventListener('click',()=>setState({showAddFriend:false}));
  const addFriendBg=document.getElementById('add-friend-bg');
  if(addFriendBg) addFriendBg.addEventListener('click',(e)=>{if(e.target===addFriendBg)setState({showAddFriend:false});});
  const btnSearchFriend=document.getElementById('btn-search-friend');
  if(btnSearchFriend) btnSearchFriend.addEventListener('click', ()=>{ if(window.searchAndSendFriendRequest) window.searchAndSendFriendRequest(); });
  document.querySelectorAll('.accept-friend, .notif-accept-friend').forEach(btn=>{
    btn.addEventListener('click',()=>respondFriendRequest(btn.dataset.rid, true));
  });
  document.querySelectorAll('.decline-friend, .notif-decline-friend').forEach(btn=>{
    btn.addEventListener('click',()=>respondFriendRequest(btn.dataset.rid, false));
  });

  // DM depuis liste amis
  document.querySelectorAll('.friend-dm').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const fid = btn.dataset.fid;
      setState({showMessages:true, showFriends:false, activeConvId:fid});
      loadMessages(fid);
      loadConvTrades(fid);
      markMsgNotifsRead(fid);
    });
  });

  // Échange depuis liste amis
  document.querySelectorAll('.friend-trade').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      setState({showTrade:true, showFriends:false, tradeWithId:btn.dataset.fid, tradeMyCard:null});
    });
  });

  // Échange "+" depuis zone DM
  const msgTradeBtn = document.getElementById('msg-trade-btn');
  if(msgTradeBtn) msgTradeBtn.addEventListener('click',()=>{
    setState({showTrade:true, tradeWithId:msgTradeBtn.dataset.fid, tradeMyCard:null});
  });

  // Fermer trade
  const tradeClose = document.getElementById('trade-close');
  if(tradeClose) tradeClose.addEventListener('click',()=>setState({showTrade:false,tradeMyCard:null,tradeIncoming:null,tradeWantedNum:null}));
  const tradeBg = document.getElementById('trade-bg');
  if(tradeBg) tradeBg.addEventListener('click',(e)=>{if(e.target===tradeBg)setState({showTrade:false,tradeMyCard:null,tradeIncoming:null,tradeWantedNum:null});});

  // Choisir une carte à proposer
  document.querySelectorAll('.trade-pick-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const card = ALL_CARDS.find(c=>c.id===el.dataset.cardid);
      if(card) setState({tradeMyCard:card,tradeWantedNum:null});
    });
  });

  // Changer la carte sélectionnée
  const tradeClear = document.getElementById('trade-clear-card');
  if(tradeClear) tradeClear.addEventListener('click',()=>setState({tradeMyCard:null,tradeWantedNum:null}));

  // Envoyer la proposition de trade
  const tradeSend = document.getElementById('trade-send');
  if(tradeSend) tradeSend.addEventListener('click',()=>setState({tradeStep:'pick_their_card',tradeWantedNum:null}));

  // Retour step 1 depuis step 2
  const tradeStepBack = document.getElementById('trade-step-back');
  if(tradeStepBack) tradeStepBack.addEventListener('click',()=>setState({tradeStep:null,tradeWantedNum:null}));

  // Choisir la carte voulue en échange (step 2) — input numéro
  const tradeWantedInput = document.getElementById('trade-wanted-input');
  if(tradeWantedInput){
    tradeWantedInput.addEventListener('input',()=>{
      state.tradeWantedNum = tradeWantedInput.value ? String(parseInt(tradeWantedInput.value) || '') : '';
      render();
      // Remettre le focus sur l'input après re-render
      const inp = document.getElementById('trade-wanted-input');
      if(inp){ inp.focus(); inp.value = state.tradeWantedNum || ''; }
    });
  }
  const tradeConfirmSend = document.getElementById('trade-confirm-send');
  if(tradeConfirmSend && !tradeConfirmSend.disabled){
    tradeConfirmSend.addEventListener('click',()=>sendTradeOffer(state.tradeWantedNum));
  }

  // Accepter/refuser un trade entrant
  const tradeAccept = document.getElementById('trade-accept');
  if(tradeAccept) tradeAccept.addEventListener('click',()=>respondTrade(state.tradeIncoming?.id, true));
  const tradeDecline = document.getElementById('trade-decline');
  if(tradeDecline) tradeDecline.addEventListener('click',()=>respondTrade(state.tradeIncoming?.id, false));
  const settingsBg=document.getElementById('settings-bg');
  if(settingsBg) settingsBg.addEventListener('click',(e)=>{if(e.target===settingsBg)setState({showSettings:false});});
  const friendsBg=document.getElementById('friends-bg');
  if(friendsBg) friendsBg.addEventListener('click',(e)=>{if(e.target===friendsBg)setState({showFriends:false});});

  // Theme toggle
  const themeToggle=document.getElementById('theme-toggle');
  if(themeToggle) themeToggle.addEventListener('click',()=>setState({isDark:!state.isDark}));

  // Close set dropdown on outside click
  document.addEventListener('click',(e)=>{
    if(state.collSetOpen){
      const dd=document.getElementById('set-dropdown');
      const btn=document.getElementById('set-filter-btn');
      if(dd&&!dd.contains(e.target)&&btn&&!btn.contains(e.target)){
        setState({collSetOpen:false});
      }
    }
  },{once:true});

  // Touch swipe
  const app=document.getElementById('app');
  app.addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true});
  app.addEventListener('touchend',(e)=>{
    if(touchStartX===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>60){
      if(dx<0&&state.tab<2)setState({tab:state.tab+1});
      if(dx>0&&state.tab>0)setState({tab:state.tab-1});
    }
    touchStartX=null;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────
render();
</script>

async function loadCollection() {
  // Attendre db
  let tries = 0;
  while (!window.db && tries++ < 50) await new Promise(r => setTimeout(r, 100));
  const db = window.db;
  if (!db) { console.error('[Collection] db indispo'); return; }

  // Récupérer l'user depuis la session active
  const userId = state.currentUser?.id;
  if (!userId) { console.warn('[Collection] pas de currentUser'); return; }

  const { data: allCards, error } = await db.from('cards').select('*').order('id');
  if (error) { console.error('[Collection]', error.message); return; }
  console.log('[Collection]', allCards?.length, 'cartes');

  const { data: playerCards } = await db.from('player_cards')
    .select('card_id, quantity, created_at').eq('player_id', userId);

  const ownedMap = {};
  if (playerCards) playerCards.forEach(pc => { ownedMap[pc.card_id] = pc; });

  ALL_CARDS = (allCards || []).map(c => ({
    id: String(c.id).padStart(3,'0'),
    name: c.name,
    set: c.set_name || 'SET-1',
    rarity: c.rarity || 'common',
    type: c.type || 'Héro',
    color: RARITY_COLOR[c.rarity] || '#9ca3af',
    owned: !!ownedMap[c.id],
    count: ownedMap[c.id] ? ownedMap[c.id].quantity : 0,
    obtainedAt: ownedMap[c.id] ? ownedMap[c.id].created_at : null,
  }));
  render();
}

  const userId = state.currentUser?.id;

  const { data: inReqs } = await db
    .from('friend_requests')

    .eq('receiver_id', userId).eq('status', 'pending');

  const friendRequestsIn = (inReqs||[]).map(r=>({
    request_id: r.id,

    avatar_url: r.players?.avatar_url,
  }));

  const { data: friendsData } = await db
    .from('friend_requests')
    .select('sender_id, receiver_id, players!friend_requests_sender_id_fkey(id,discord_username,avatar_url), receiver:players!friend_requests_receiver_id_fkey(id,discord_username,avatar_url)')
    .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
    .eq('status', 'accepted');

  const friends = (friendsData||[]).map(f=>{
    const other = f.sender_id === userId ? f.receiver : f.players;
    return { id: other?.id, discord_username: other?.discord_username, avatar_url: other?.avatar_url };

let _msgRealtimeSub = null;
let _notifRealtimeSub = null;
let _activeConvFriendId = null; // ref globale stable, survit aux re-renders

// Souscription globale aux messages — s'active une seule fois à l'entrée dans le jeu
async function subscribeMessagesGlobal(myId) {
  const db = window.db;
  if (!db || !myId) return;
  if (_msgRealtimeSub) { try { db.removeChannel(_msgRealtimeSub); } catch(e){} _msgRealtimeSub = null; }

  _msgRealtimeSub = db.channel('messages-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'messages',
      filter: `to_id=eq.${myId}`,
    }, payload => {
      const m = payload.new;
      if (!m) return;
      const fromId = m.from_id;
      // Éviter les doublons
      const prev = state.messages[fromId] || [];
      if (prev.some(x => x.ts === m.created_at && x.text === m.text)) return;
      const updated = [...prev, { from: fromId, text: m.text, ts: m.created_at }];
      // Toujours stocker dans state pour que la conv soit à jour quand on l'ouvre
      state.messages = { ...state.messages, [fromId]: updated };

      // Conv active et visible → append direct au DOM (pas de re-render = pas de destruction du canal)
      if (fromId === _activeConvFriendId && state.activeConvId === fromId && state.showMessages) {
        const list = document.getElementById('msg-list');
        if (list) {
          const div = document.createElement('div');
          const th = t();
          div.style.cssText = `display:flex;flex-direction:row;gap:6px;align-items:flex-end;`;
          div.innerHTML = `<div style="max-width:75%;background:${th.bgTertiary};color:${th.text};padding:8px 12px;border-radius:14px 14px 14px 4px;font-size:12px;line-height:1.4;">${m.text.replace(/</g,'&lt;')}</div>`;
          list.appendChild(div);
          list.scrollTop = list.scrollHeight;
        }
        markMsgNotifsRead(fromId);
        return;
      }
      // Sinon badge de notif
      setState({ msgNotifCount: (state.msgNotifCount || 0) + 1 });
    })
    .subscribe();
}
window.subscribeMessagesGlobal = subscribeMessagesGlobal;

async function loadMessages(friendId) {
  const db = window.db;
  if (!db || !friendId) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  _activeConvFriendId = friendId; // mémoriser avant tout re-render

  const { data } = await db.from('messages')
    .select('id, from_id, to_id, text, created_at')
    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  const msgs = (data||[]).map(m=>({ from: m.from_id, text: m.text, ts: m.created_at }));
  const newMessages = { ...state.messages, [friendId]: msgs };
  setState({ messages: newMessages });

  setTimeout(()=>{
    const list = document.getElementById('msg-list');
    if(list) list.scrollTop = list.scrollHeight;
  }, 50);
  // Le canal realtime est géré globalement par subscribeMessagesGlobal (appelé à l'entrée dans le jeu)
}

async function loadConvTrades(friendId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !friendId) return;

  const { data } = await db.from('trades')
    .select('id, from_id, to_id, from_card_id, to_card_id, status, created_at')
    .or(`and(from_id.eq.${myId},to_id.eq.${friendId}),and(from_id.eq.${friendId},to_id.eq.${myId})`)
    .order('created_at', { ascending: true });

  setState({ convTrades: { ...state.convTrades, [friendId]: data || [] } });

  // Realtime sur les trades de cette conv (UPDATE de status)
  if (!window._tradeConvSub) {
    window._tradeConvSub = db.channel('trade-conv-rt-' + myId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `from_id=eq.${myId}` }, async () => {
        if (state.activeConvId) await loadConvTrades(state.activeConvId);
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'trades', filter: `to_id=eq.${myId}` }, async () => {
        if (state.activeConvId) await loadConvTrades(state.activeConvId);
      })
      .subscribe();
  }
}

async function subscribeNotifications() {
  const db = window.db;
  if (!db) return;
  const myId = state.currentUser?.id;
  if (!myId) return;

  // Charger les notifications non lues (type message)
  const { data: notifs } = await db.from('notifications')
    .select('id, type, from_id, text, created_at, read')
    .eq('user_id', myId)
    .eq('read', false)
    .order('created_at', { ascending: false });

  // Filtrer celles de la conv déjà ouverte (si on revient d'une conv)
  // et les marquer lues en base pour éviter qu'elles réapparaissent au prochain refresh
  const activeConv = state.activeConvId;
  const allMsgNotifs = (notifs||[]).filter(n => n.type === 'message');

  // Notifs de convs déjà actives → marquer lues silencieusement
  const toMarkRead = activeConv ? allMsgNotifs.filter(n => n.from_id === activeConv) : [];
  if (toMarkRead.length > 0) {
    db.from('notifications')
      .update({ read: true })
      .eq('user_id', myId)
      .eq('type', 'message')
      .eq('from_id', activeConv)
      .eq('read', false)
      .then(()=>{}).catch(()=>{});
  }

  const msgNotifs = allMsgNotifs.filter(n => !activeConv || n.from_id !== activeConv);
  setState({ msgNotifCount: msgNotifs.length, pendingMsgNotifs: msgNotifs });

  // Realtime : écouter les nouvelles notifications
  if (_notifRealtimeSub) { try { db.removeChannel(_notifRealtimeSub); } catch(e){} }
  _notifRealtimeSub = db.channel('notif-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myId}`,
    }, payload => {
      const n = payload.new;
      if (!n) return;
      // Si la conv de cet expéditeur est déjà ouverte → marquer lu directement, pas de badge
      if (state.activeConvId && n.from_id === state.activeConvId) {
        markMsgNotifsRead(n.from_id);
        return;
      }
      const prev = state.pendingMsgNotifs || [];
      setState({
        msgNotifCount: (state.msgNotifCount || 0) + 1,
        pendingMsgNotifs: [n, ...prev],
      });
      showToast(n.text || 'Nouveau message !', '💬');
    })
    .subscribe();
}

window.subscribeNotifications = subscribeNotifications;

  const myId = state.currentUser?.id;

  await db.from('notifications').insert({

}

  CREATE TABLE IF NOT EXISTS decks (

async function loadDecks() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  const { data: decksData } = await db.from('decks')
    .select('id, name, is_default, created_at')
    .eq('player_id', myId)
    .order('created_at', { ascending: true });

  if (!decksData) return;

  // Charger les cartes de chaque deck
  const deckIds = decksData.map(d=>d.id);
  let allDeckCards = [];
  if (deckIds.length > 0) {
    const { data: dc } = await db.from('deck_cards')
      .select('deck_id, card_id, quantity')
      .in('deck_id', deckIds);
    allDeckCards = dc || [];
  }

  const decks = decksData.map(d=>({
    ...d,
    cards: allDeckCards.filter(c=>c.deck_id===d.id)
  }));

  setState({ decks });
}

function addCardToDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const card = ALL_CARDS.find(c=>parseInt(c.id)===parseInt(cardId));
  if (!card || !card.owned) return;

  const deckCards = deck.cards || [];
  const deckTotal = deckCards.reduce((s,c)=>s+c.quantity,0);
  if (deckTotal >= 30) { showToast('30 cartes max dans un deck', '⚠'); return; }

  const mythCount = deckCards.reduce((s,c)=>{
    const cd=ALL_CARDS.find(x=>parseInt(x.id)===parseInt(c.card_id));
    return s+(cd&&cd.rarity==='mythic'?c.quantity:0);
  },0);

  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  const currentQty = existing ? existing.quantity : 0;

  // Ne pas dépasser le nombre d'exemplaires possédés
  if (currentQty >= card.count) {
    showToast(`Tu ne possèdes que ${card.count} exemplaire${card.count>1?'s':''} de cette carte`, '⚠'); return;
  }
  // Règles de limite Rare/Mythic
  if ((card.rarity==='mythic'||card.rarity==='rare') && currentQty >= 2) {
    showToast(`Max 2 exemplaires pour les ${card.rarity==='mythic'?'Mythiques':'Rares'}`, '⚠'); return;
  }
  if (card.rarity==='mythic' && mythCount >= 2 && currentQty === 0) {
    showToast('Max 2 cartes Mythiques par deck', '⚠'); return;
  }

  let newCards;
  if (existing) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity+1}:c);
  } else {
    newCards = [...deckCards, {card_id: parseInt(cardId), quantity:1, deck_id: deck.id}];
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

function removeCardFromDeck(cardId) {
  const decks = state.decks || [];
  const deck = decks.find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const deckCards = deck.cards || [];
  const existing = deckCards.find(c=>parseInt(c.card_id)===parseInt(cardId));
  if (!existing) return;

  let newCards;
  if (existing.quantity > 1) {
    newCards = deckCards.map(c=>parseInt(c.card_id)===parseInt(cardId)?{...c,quantity:c.quantity-1}:c);
  } else {
    newCards = deckCards.filter(c=>parseInt(c.card_id)!==parseInt(cardId));
  }

  const updatedDecks = decks.map(d=>d.id===deck.id?{...d,cards:newCards}:d);
  setState({ decks: updatedDecks });
}

// ─── AUTO-FILL DECK ───────────────────────────────────────────────
function autoFillDeck() {
  const decks = state.decks || [];
  const deck = decks.find(d => d.id === state.activeDeckId);
  if (!deck) return;

  // Cartes possédées, triées par rareté décroissante (mythic > rare > uncommon > common)
  const rarityPriority = { mythic: 0, rare: 1, uncommon: 2, common: 3 };
  const ownedCards = ALL_CARDS
    .filter(c => c.owned && c.count > 0)
    .sort((a, b) => {
      const rDiff = rarityPriority[a.rarity] - rarityPriority[b.rarity];
      if (rDiff !== 0) return rDiff;
      // À rareté égale, prioriser les cartes avec plus d'exemplaires
      return b.count - a.count;
    });

  // Construire le deck en appliquant toutes les règles
  let newCards = []; // [{card_id, quantity}]
  let total = 0;
  let mythCount = 0;

  const qtyInNew = (cardId) => {
    const e = newCards.find(c => parseInt(c.card_id) === parseInt(cardId));
    return e ? e.quantity : 0;
  };

  for (const card of ownedCards) {
    if (total >= 30) break;

    // Combien d'exemplaires peut-on ajouter ?
    let maxAdd = card.count; // limité par ce qu'on possède

    // Rare/Mythic : max 2 exemplaires dans le deck
    if (card.rarity === 'mythic' || card.rarity === 'rare') {
      maxAdd = Math.min(maxAdd, 2);
    }

    // Mythic : max 2 au total dans le deck
    if (card.rarity === 'mythic') {
      maxAdd = Math.min(maxAdd, 2 - mythCount);
    }

    if (maxAdd <= 0) continue;

    // Limiter à ce qu'il reste à remplir
    const toAdd = Math.min(maxAdd, 30 - total);
    if (toAdd <= 0) continue;

    newCards.push({ card_id: parseInt(card.id), quantity: toAdd, deck_id: deck.id });
    total += toAdd;
    if (card.rarity === 'mythic') mythCount += toAdd;
  }

  if (total === 0) {
    showToast('Aucune carte possédée pour remplir le deck', '⚠');
    return;
  }

  const updatedDecks = decks.map(d => d.id === deck.id ? { ...d, cards: newCards } : d);
  setState({ decks: updatedDecks });
  showToast(`Deck rempli automatiquement (${total}/30 cartes)`, total === 30 ? '✨' : '⚠');
}

async function saveDeck() {
  const db = window.db;
  if (!db) return;
  const deck = (state.decks||[]).find(d=>d.id===state.activeDeckId);
  if (!deck) return;

  const cards = deck.cards || [];
  const deckTotal = cards.reduce((s,c)=>s+c.quantity,0);

  try {
    // Supprimer toutes les cartes existantes
    const { error: delErr } = await db.from('deck_cards').delete().eq('deck_id', deck.id);
    if (delErr) throw delErr;

    // Réinsérer si des cartes sont présentes
    // quantity est clampée à 2 max (contrainte DB deck_cards_quantity_check)
    if (cards.length > 0) {
      const rows = cards.map(c=>({
        deck_id: deck.id,
        card_id: parseInt(c.card_id),
        quantity: Math.min(c.quantity, 2)
      }));
      const { error: insErr } = await db.from('deck_cards').insert(rows);
      if (insErr) throw insErr;
    }

    if (deckTotal < 30) {
      showToast(`${deck.name} sauvegardé (${deckTotal}/30 cartes)`, '💾');
    } else {
      // Si c'est le seul deck et qu'aucun n'est par défaut → le mettre par défaut automatiquement
      const allDecks = state.decks || [];
      const hasDefault = allDecks.some(d => d.is_default);
      if (allDecks.length === 1 && !hasDefault) {
        await db.from('decks').update({ is_default: true }).eq('id', deck.id);
        const updated = allDecks.map(d => d.id===deck.id ? {...d, is_default:true} : d);
        setState({ decks: updated });
        showToast(`${deck.name} sauvegardé et mis par défaut !`, '⭐');
      } else {
        showToast(`${deck.name} sauvegardé !`, '✓');
      }
    }
  } catch(e) {
    console.error('[saveDeck]', e);
    // Si c'est une erreur de contrainte check, le delete a réussi mais l'insert a échoué partiellement
    // → recharger le deck depuis la DB pour avoir l'état réel
    if (e.message && e.message.includes('check constraint')) {
      await loadDecks();
      showToast('Sauvegarde partielle — modifie la contrainte SQL (voir console)', '⚠');
    } else {
      showToast('Erreur sauvegarde : ' + (e.message || 'inconnue'), '✗');
    }
  }
}

// Envoyer l'offre de trade en DB
async function sendTradeOffer(theirCardId) {
  const db = window.db;
  const myId = state.currentUser?.id;
  const toId = state.tradeWithId;
  const myCard = state.tradeMyCard;
  if (!db || !myId || !toId || !myCard || !theirCardId) {
    showToast('Données manquantes pour le trade', '⚠'); return;
  }

  const theirCard = ALL_CARDS.find(c => parseInt(c.id) === parseInt(theirCardId));
  if (!theirCard) {
    showToast('Carte demandée introuvable', '✗'); return;
  }
  if (theirCard.rarity !== myCard.rarity) {
    showToast('Échange de même rareté uniquement', '⚠'); return;
  }
  if (parseInt(theirCard.id) === parseInt(myCard.id)) {
    showToast('Tu ne peux pas échanger une carte contre elle-même', '⚠'); return;
  }

  try {
    const { data, error } = await db.from('trades').insert({
      from_id: myId,
      to_id: toId,
      from_card_id: parseInt(myCard.id),
      to_card_id: parseInt(theirCardId),
      status: 'pending',
    }).select().single();

    if (error) {
      console.error('[sendTradeOffer]', error);
      showToast('Erreur envoi trade : ' + (error.message || 'inconnue'), '✗'); return;
    }

    // Notifier l'ami
    await db.from('notifications').insert({
      user_id: toId, type: 'trade', from_id: myId,
      text: `Échange proposé : carte #${String(myCard.id).replace(/^0+/,'')} ↔ carte #${String(theirCardId).replace(/^0+/,'')}`,
      read: false,
    }).then(()=>{}).catch(()=>{});

    setState({ showTrade: false, tradeMyCard: null, tradeStep: null, tradeWantedNum: null });
    showToast('Proposition envoyée !', '🔄');
    // Rafraîchir les trades dans la conv si elle est ouverte
    if (state.activeConvId === toId) loadConvTrades(toId);
  } catch(e) {
    console.error('[sendTradeOffer] exception', e);
    showToast('Erreur envoi trade', '✗');
  }
}

// Accepter ou refuser un trade entrant
async function respondTrade(tradeId, accept) {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId || !tradeId) return;

  const incoming = state.tradeIncoming;
  if (!incoming) return;

  if (accept) {
    // Vérifier que les deux joueurs possèdent encore les cartes
    const { data: myCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', myId).eq('card_id', incoming.to_card_id).single();
    const { data: theirCards } = await db.from('player_cards')
      .select('card_id, quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id).single();

    if (!myCards || myCards.quantity < 1) { showToast('Tu ne possèdes plus cette carte', '✗'); return; }
    if (!theirCards || theirCards.quantity < 1) { showToast("L'autre joueur ne possède plus sa carte", '✗'); return; }

    // Exécuter l'échange
    // Retirer les cartes des deux joueurs
    if (myCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: myCards.quantity - 1 }).eq('player_id', myId).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', myId).eq('card_id', incoming.to_card_id);
    }
    if (theirCards.quantity > 1) {
      await db.from('player_cards').update({ quantity: theirCards.quantity - 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').delete().eq('player_id', incoming.from_id).eq('card_id', incoming.from_card_id);
    }

    // Donner les cartes aux deux joueurs
    const upsertMy = await db.from('player_cards').select('quantity').eq('player_id', myId).eq('card_id', incoming.from_card_id).single();
    if (upsertMy.data) {
      await db.from('player_cards').update({ quantity: upsertMy.data.quantity + 1 }).eq('player_id', myId).eq('card_id', incoming.from_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: myId, card_id: incoming.from_card_id, quantity: 1 });
    }
    const upsertTheir = await db.from('player_cards').select('quantity').eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id).single();
    if (upsertTheir.data) {
      await db.from('player_cards').update({ quantity: upsertTheir.data.quantity + 1 }).eq('player_id', incoming.from_id).eq('card_id', incoming.to_card_id);
    } else {
      await db.from('player_cards').insert({ player_id: incoming.from_id, card_id: incoming.to_card_id, quantity: 1 });
    }

    await db.from('trades').update({ status: 'accepted' }).eq('id', tradeId);

    // Notifier l'expéditeur
    await db.from('notifications').insert({
      user_id: incoming.from_id, type: 'trade_accepted', from_id: myId,
      text: 'Ton échange a été accepté !', read: false,
    }).then(()=>{}).catch(()=>{});

    // Recharger la collection
    if (window.loadCollection) window.loadCollection();
    showToast('Échange effectué !', '🔄');
  } else {
    await db.from('trades').update({ status: 'declined' }).eq('id', tradeId);
    showToast('Échange refusé', '✗');
  }

  setState({ showTrade: false, tradeIncoming: null, tradeStep: null, tradeWantedNum: null });
  // Rafraîchir les trades dans la conv si elle est ouverte avec cet ami
  const partnerId = incoming?.from_id;
  if (partnerId && state.activeConvId === partnerId) loadConvTrades(partnerId);
}

// Écouter les trades entrants en realtime
async function subscribeTradeNotifications() {
  const db = window.db;
  const myId = state.currentUser?.id;
  if (!db || !myId) return;

  if (_tradeRealtimeSub) { try { db.removeChannel(_tradeRealtimeSub); } catch(e){} }

  _tradeRealtimeSub = db.channel('trades-rt-' + myId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'trades',
      filter: `to_id=eq.${myId}`,
    }, async payload => {
      const trade = payload.new;
      if (!trade || trade.status !== 'pending') return;

      // Charger le nom de l'expéditeur
      const { data: sender } = await db.from('players').select('discord_username').eq('id', trade.from_id).single();
      const fromName = sender?.discord_username || 'Un joueur';

      setState({
        showTrade: true,
        tradeIncoming: { ...trade, from_name: fromName },
        tradeMyCard: null,
      });
      showToast(`${fromName} propose un échange !`, '🔄');
    })
    .subscribe();
}

window.subscribeTradeNotifications = subscribeTradeNotifications;
</script>
